body:
  text: 管子補註跋余讀管子然後知莊生鼂錯董生之語時出於管子也不獨此耳凡漢書語之雅馴者率多本管子管子天下之奇文也所以著見於天下後世者豈徒其功烈哉及讀心術上下白心内業諸篇則未嘗不廢書而歎益知其功業之所本然後知世之知管子者殊淺也管子書多古字如専作摶忒作貣宥作侑況作兄釋作澤此類甚衆大匡載召忽語曰百嵗之後吾君下世犯吾君命而廢吾所立奪吾糾也雖得天下吾不生也兄與我齊國之政也而注乃謂召忽呼管仲為兄曰澤命不渝而注乃以為澤恩之命甚陋不可徧舉書既雅奥難句而為之注者復繆於訓故益使後人疑惑不能究知世𫝊房𤣥齡所注者非是予求管子書久矣紹興己未乃從人借得之伏而讀者累月始頗窺其義訓然舛脫甚衆其所未解尚十二三用上下文義及叅以經史訓故頗為是正其訛謬疑者表而發之其所未解者置之不敢以意穿鑿也既取其間奥於理切於務者抄而蔵於家將得善本而卒業焉張嵲跋
