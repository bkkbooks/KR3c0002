body:
  text: 管子補注卷一眀劉績撰牧民第一國頌士經四維五四順六親法經言一凡有地牧民者務在四時四時所以生成萬物也守在倉廩食者人之天也國多財則逺者來地舉辟則民留處舉盡也言地盡闢則人留而安居處也倉廩實則知禮節衣食足則知榮辱上服度則六親固服行也上行禮度則六親各得其所故䏻感恩而結固也四維張則君令行故省刑之要在禁文巧文巧者刑罸所由生守國之度在飾四維順民之經在眀鬼神祇山川鬼神山川皆有尊卑之序故敬眀之敬宗廟恭祖舊謂恭承先祖之舊法不務天時則財不生不務地利則倉廩不盈野蕪曠則民乃菅菅當為姦上無量則民乃妄文巧不禁則民乃淫不璋兩原則刑乃繁璋當為章眀也兩原謂妄之原上無量也淫之原不禁文巧也䏻眀此法者則刑簡不眀鬼神則陋民不悟不悟鬼神有尊卑之異也不祇山川則威令不聞言䏻登封降禪祇祀山川威令逺聞不敬宗廟則民乃上校校效也君無所尊人亦效之不恭祖舊則孝悌不備四維不張國乃滅亡右國頌頌容也謂陳為國之形容國有四維一維絶則傾二維絶則危三維絶則覆四維絶則滅傾可正也危可安也覆可起也滅不可復錯也何謂四維一曰禮二曰義三曰㢘四曰恥禮不踰節義不自進自進謂不由薦舉也㢘不蔽惡隠蔽其惡非貞亷也恥不從枉詭隨邪枉無羞之人故不踰節則上位安不自進則民無巧詐不蔽惡則行自全不從枉則邪事不生右四維績按維網罟之綱所以張之者此四者所以立國故曰維政之所興在順民心政之所廢在逆民心民惡憂勞我佚樂之民惡貧賤我富貴之民惡危墜我存安之民惡滅絶我生育之䏻佚樂之則民為之憂勞君於平康䏻佚樂人及其危人必為之憂勞下三順皆然䏻富貴之則民為之貧賤䏻存安之則民為之危墜䏻生育之則民為之滅絶故刑罰不足以畏其意殺戮不足以服其心畏意服心在於順其所欲不在刑罰殺戮故刑罰繁而意不恐則令不行矣殺戮衆而心不服則上位危矣故從其四欲則逺者自親行其四惡則近者叛之故知予之為取者政之寳也謂與之生全取其死難也績按予謂佚樂富貴存安生育也取謂憂勞貧賤危墜滅絶也右四順錯國於不傾之地積於不涸之倉涸竭也藏於不竭之府下令於流水之原使民於不爭之官眀必死之路開必得之門不為不可成不求不可得不處不可久不行不可復錯國於不傾之地者授有徳也積於不涸之倉者務五穀也藏於不竭之府者養桑麻育六畜也下令於流水之原者令順民心也使民於不爭之官者使各為其所長也各長其所長則順而恱故不爭也績按長長短之長謂使之各盡其才䏻所長不限量之則各得所故不爭眀必死之路者嚴刑罰也開必得之門者信慶賞也不為不可成者量民力也不求不可得者不彊民以其所惡也不處不可久者不偷取一世也謂所處必可使百代常行不行不可復者不欺其民也復重也欺民之事不可重行也故授有徳則國安務五穀則食足養桑麻育六畜則民富令順民心則威令行使民各為其所長則用備嚴刑罰則民逺邪信慶賞則民輕難量民力則事無不成不彊民以其所惡則詐偽不生不偷取一世則民無怨心不欺其民則下親其上右士經士事也經常也謂陳事之可以常行者也以家為鄉鄉不可為也言有家之親斥以為鄉之疎必生怨故不可為也下三事同此以鄉為國國不可為也以國為天下天下不可為也以家為家一親也以鄉為鄉二親也以國為國三親也以天下為天下四親也毋曰不同生逺者不聽謂家也言有家之親而謂之曰不與汝同家而生用此以相疎逺者必不聴下同此毋曰不同鄉逺者不行毋曰不同國逺者不從如地如天何私何親五親也如日如月唯君之節六親也天地日月取其耀臨言人君親下當如天地日月之無私也績按鄉大於家言以為家者為鄉則鄉必不治等而上之皆然故才有大小而治亦隨大小也故治天下者不拘於同家同鄉同國而量如天地日月無私然後䏻治天下也御民之轡在上之所貴言人從上之所貴若馬之從轡道民之門在上之所先上所先行人必行之其從之若由門矣召民之路在上之所好惡故君求之則臣得之君将求之臣已先索得之也績按指所貴君嗜之則臣食之績按指所先君好之則臣服之君惡之則臣匿之一法也績按指好惡毋蔽汝惡毋異汝度汝君也賢者将不汝助言室滿室言堂滿堂是謂聖王二法也言堂室事而令滿取其露見不隠也績按室在内堂在外人君在内言於室在外言於堂皆非私曲隠匿克滿堂室使人人皆知之無所蔽異也城郭溝渠不足以固守兵甲彊力不足以應敵博地多財不足以有衆言城郭兵甲博地不足以固守應敵有衆其固守應敵有衆更在有道者也唯有道者䏻備患於未形也故禍不萌三法也天下不患無臣患無君以使之天下不患無財患無人以分之可以分與財者賢人也故知時者可立以為長無私者可置以為政審於時而察於用而䏻備官者可奉以為君也四法也緩者後於事吝於財者失所親信小人者失士五法也右六親五法形勢第二自天地以及萬物闗諸人事莫不有形勢焉夫勢必因形而立故形端者勢必直状危者勢必傾觸類莫不然可以一隅而反績按此註多非當依後形勢觧自眀經言二山髙而不崩則祈羊至矣淵深而不涸則沈玉極矣極至也山不崩淵不涸興雨之祥故羊羊玉而祈祭烹羊以祭故曰祈天不變其常地不易其則春秋冬夏不更其節古今一也今之天地即古之天地今之四時即古之四時故曰古今一也蛟龍得水而神可立也虎豹託幽而威可載也至徳處盛位天下可平載行也風雨無鄉而怨怒不及也鄉方也既無方所故無從而怨怒也貴有以行令賤有以忘卑貴而行令令乃行賤而忘卑卑可移夀夭貧富無徒歸也皆有理在焉銜命者君之尊也受辭者名之運也言受君之辭以出命則名必運運行也績按受辭謂君出言順理而民受之無異也名運謂名聲彰於四方也上無事而民自試試用也抱蜀不言而廟堂既修抱持也蜀祠器也君人者但抱祠器以身率導雖復靜然不言廟堂之政既以脩理矣鴻鵠鏘鏘唯民歌之感徳化也濟濟多士殷民化之紂之失也戒紂之失故化文王飛蓬之問不在所賔燕雀之集道行不顧蓬飛因風動揺不定喻二三之聲問眀主所不賔敬燕爵翔集事之常細也故行道之人忽而不顧謂小事非大人所宜知犧牷圭璧不足以享鬼神鬼神享徳不在圭璧主功有素寳幣奚為主䏻立功可謂有素有素則諸侯不敢犯寶玉幣帛何所為乎羿之道非射也造父之術非馭也奚仲之巧非斵削也羿之射貴其肄武服戎不在其落烏中鵠造父之馭貴其軍容致逺不在轍迹徧天下也奚仲之巧貴其大車以載不在斵削成光鑑也績按三子技名世必有所以致之非在弓矢操轡斵削之末召逺者使無為焉親近者言無事焉唯夜行者獨有之也逺使無為所以優逺方也親於近者貴於恩厚不在於虚言夜行謂隂行其徳則人不與之爭故獨有之也平原之隰奚有於髙言平隰之澤雖有小封不成於髙喻人有大失小善不成其美隰下澤也大山之隈奚有於深隈山曲也言山既大矣雖有小隈不成為深喻人有髙行雖有小過非不肖也訾讆之人勿與任大訾毁賢讆譽惡也如此之人任之則亂天下也譕臣者可與逺舉言行莫先謂之譕臣有大言行者可與圖國之逺也績按譕音無顧憂者可與致道顧憂謂忠事勤臣道有如此者可致於道者也績按顧憂謂慮後患也其計也速而憂在近者往而勿召也小人之計得之雖速禍敗尋至則憂及之此人親近推之令去不須召也舉長者可逺見者也舉用長利衆皆見之故曰逺見績按舉長則所見不止一方一時裁大者衆之所比也裁斷也䏻斷大事衆必比之美人之懐定服而勿厭也欲令人貴美而懐歸者須安定服行道徳勿有疲厭必得之事不足頼也必諾之言不足信也言人於事莫為疑動言必得應諾如此虚誕者耳不足賴信也績按二句釋皆非觀觧自眀小謹者不大立飺食者不肥體言人無𢎞量但有小謹不䏻大立也飺惡言惡食之人憂嫌致瘠故不䏻肥體績按飺疾移切嫌食而多惡有無棄之言者必㕘之於天地也言無可棄動為法則若天地之無不容載故曰㕘之天地墜岸三仭人之所大難也而猿猱飲焉故曰伐矜好専舉事之禍也猿遇墜岸而䏻飲喻智者逢禍而䏻息也績按觧作蝯蝚古字同喻使人器之不求備也伐矜好専舉事之禍謂自用則小之弊經文不應有故曰此二字疑衍不行其野不違其馬馬有識道之性不違馬而自得塗喻未經其事問其所經績按喻養民於無事時䏻予而無取者天地之配也天地施生不求所報與而不取可以配天地也績按言以一人養天下不以天下養一人也怠倦者不及倦怠之人觸塗廢滯故多不及無廣者疑神神者在内不及者在門無得以已及不及疑神不神神雖無形常在於内故曰在内也不及外見故曰在門也在内者将假在門者将待将假謂神将借已也待謂須自厲以待績按言人觧惰者不䏻及時成事故曰不及操要者忽然成事故曰疑神若䏻審内外䏻立操要之神則觧惰不及者亦從而䏻矣假至也曙戒勿怠後稺逢殃每曙而戒所以戒此日之事以待也曙戒戒勿為倦怠也朝忘其事夕失其功邪氣襲内正色乃衰君不君則臣不臣父不父則子不子上失其位則下踰其節上下不和令乃不行衣冠不整則賔者不肅進退無儀則政令不行且懷且威則君道備矣莫樂之則莫哀之常䏻樂人及其有難人必哀之也莫生之則莫死之常䏻生人及其有危人必死之往者不至来者不極此往情不至則彼來意不極也道之所言者一也而用之者異道之所言其理本一但用之不同其事遂異也有聞道而好為家者一家之人也雖聞道但好理家此但一家之人耳言無廣逺有聞道而好為鄉者一鄉之人也有聞道而好為國者一國之人也有聞道而好為天下者天下之人也此亦仁者見之謂之仁智者見之謂之智也有聞道而好定萬物者天下之配也此則君子體斯道也道往者其人莫来道来者其人莫往道之所設身之化也道者均彼我忘是非故無来往之體然道所設身必與之化也績按道往莫来道来莫往謂人從上之所好持滿者與天安危者與人失天之度雖滿必涸上下不和雖安必危䏻持滿者則與天合䏻安危者則與人合不合於天雖滿必涸不合於人雖安必危欲王天下而失天之道天下不可得而王也得天之道其事若自然失天之道雖立不安其道既得莫知其為之其功既成莫知其釋之藏之無形天之道也疑今者察之古不知来者視之往萬事之生也異趣而同歸古今一也生棟覆屋怨怒不及弱子下瓦慈母操箠言人以生棟造舍雖至覆屋但自咎而已不敢怨及他人至弱子下瓦所損不多慈母便操箠而怒之喻人主過由已作雖大而吞聲過發他人雖小而振怒也天道之極逺者自親天道平分逺近無二故逺者自親也人事之起近親造怨人事則愛惡相攻故有近親造怨也績按出於理曰天道出於欲曰人事萬物之於人也無私近也無私逺也動物則有識而無知植物則有生而無識故於人也無私遠近巧者有餘而拙者不足萬物無私於人故巧者用之有餘拙者用之不足其功順天者天助之其功逆天者天違之天之所助雖小必大天之所違雖成必敗順天者有其功逆天者懷其凶不可復振也烏鳥之狡雖善不親狡謂猜也言烏鳥之性多猜初雖相善後終不親績按當依觧作烏集之交不重之結雖固必觧道之用也貴其重也毋與不可毋彊不䏻毋告不知與不可彊不䏻告不知謂之勞而無功見與之交幾於不親見謂不忘而恃之與親與也見哀之役幾於不結役而哀之雖有惻然見而不忘故彼不結也績按當依觧作見愛之交見施之徳幾於不報雖有恩施之徳然見而不忘故彼不報也四方所歸心行者也心行䏻不見則四方歸之獨王之國勞而多禍獨王謂無四隣之援也績按當依觧作獨任之國獨國之君卑而不威自媒之女醜而不信未之見而親焉可以往矣未見而親親必無終故可往矣久而不忘焉可以来矣日月不眀天不易也山髙而不見地不易也日月無不眀假令不眀是天有雲氣而不易也山髙無不見假令不見是地多險阻不平易也言而不可復者君不言也行而不可再者君不行也謂臣有忠言不可復言者則由君不言故也臣有善行不可再行者則由君不行故也績按註非觀觧自眀凡言而不可復行而不可再者有國者之大禁也權修第三權者所以知輕重也君人者必知事之輕重然後國可為故須修權經言三萬乗之國兵不可以無主無所主則無所統一也土地博大野不可以無吏無吏則不厲於墾闢百姓殷衆官不可以無長無長則無所禀命也操民之命朝不可以無政地博而國貧者野不辟也民衆而兵弱者民無取也兵無主故無所取則故末産不禁則野不辟賞罰不信則民無取野不辟民無取外不可以應敵内不可以固守故曰有萬乗之號而無千乗之用而求權之無輕不可得也國號萬乗及其兵用不滿於千乗如此者權必自輕也地辟而國貧者舟輿飾臺榭廣也賞罰信而兵弱者輕用衆使民勞也舟車飾臺榭廣則賦歛厚矣輕用衆使民勞則民力竭矣賦歛厚則下怨上矣民力竭則令不行矣下怨上令不行而求敵之勿謀已不可得也欲為天下者必重用其國欲為其國者必重用其民欲為其民者必重盡其民力重為矜惜之也無以畜之則往而不可止也往謂亡去也無以牧之則處而不可使也人雖留處無畜牧之道故不可使也逺人至而不去則有以畜之也民衆而可一則有以牧之也見其可也喜之有徴徴驗也必有㤙錫以驗之見喜無空然矣見其不可也惡之有刑賞罰信於其所見雖其所不見其敢為之乎所見之處賞罰既信則所不見懼而從教不敢為非見其可也喜之無徴見其不可也惡之無刑賞罰不信於其所見而求其所不見之為之化不可得也厚愛利足以親之眀智禮足以教之上身服以先之服行也凡所欲教人在上必身自行之所以率先於下也審度量以閑之所以防閑其姦偽也鄉置師以說道之然后申之以憲令勸之以慶賞振之以刑罰振整也故百姓皆說為善則暴亂之行無由至矣地之生財有時民之用力有倦而人君之欲無窮以有時與有倦養無窮之君而度量不生於其間度量不生則賦役無限也則上下相疾也上疾下之不供下疾上之無窮是以臣有殺其君子有殺其父者矣故取於民有度用之有止國雖小必安取於民無度用之不止國雖大必危地之不辟者非吾之地也民之不牧者非吾民也凡牧民者以其所積者食之不可不審也其積多者其食多其積寡者其食寡無積者不食或有積而不食者則民離上有積多而食寡者則民不力有積寡而食多者則民多詐有無積而徒食者則民偷幸故離上不力多詐偷幸舉事不成應敵不用故曰察䏻授官班禄賜予使民之機也野與市爭民民務本業則野與市爭民家與府爭貨下務藏積則家與府爭貨金與粟爭貴所寶惟穀故金與粟爭貴鄉與朝爭治官各務其職故鄉與朝爭治故野不積草農事先也府不積貨藏於民也市不成肆家用足也朝不合衆鄉分治也故野不積草府不積貨市不成肆朝不合衆治之至也人情不二故民情可得而御也審其所好惡則其長短可知也觀其交㳺則其賢不肖可察也二者不失則民䏻可得而官也二者謂好惡交㳺也地之守在城城之守在兵兵之守在人人之守在粟故地不辟則城不固有身不治奚待於人待謂将治之言身既不䏻自治則無以治人也有人不治奚待於家有家不治奚待於鄉有鄉不治奚待於國有國不治奚待於天下天下者國之本也國者鄉之本也鄉者家之本也家者人之本也人者身之本也身者治之本也故上不好本事則末産不禁末産不禁則民緩於時事而輕地利輕地利而求田野之辟倉廩之實不可得也商賈在朝則貨財上流若桓靈之賣官也婦言人事則賞罰不信婦者所以職其蚕織此之不為輒言人事婦人之性險詖故賞罰不信矣男女無别則民無㢘恥貨財上流賞罰不信民無㢘恥而求百姓之安難兵士之死節不可得也朝廷不肅貴賤不眀長幼不分度量不審衣服無等上下凌節而求百姓之尊主政令不可得也上好詐謀間欺臣下間隔也有所隔礙而欺誑也賦歛競得使民偷一偷取一時之快則百姓疾怨而求下之親上不可得也有地不務本事本事謂農君國不䏻一民而求宗廟社稷之無危不可得也上恃龜筮好用巫醫則鬼神驟崇故功之不立名之不章為之患者三茍功不立名不章必為三患下獨王貧賤日不足是也有獨王者謂無黨也有貧賤者有日不足者有日不足之費也一年之計莫如樹穀十年之計莫如樹木終身之計莫如樹人樹人謂濟我而立之一樹一穫者穀也一樹十穫者木也果木過十年漸就枯悴故曰十穫也一樹百穫者人也人有百年之夀雖使無百年子孫亦有嗣之而報徳者故曰百穫也我茍種之如神用之一種百穫近識者莫䏻測其由故曰如神用也舉事如神唯王之門王者貴神道設教也凡牧民者使士無邪行女無淫事士無邪行教也女無淫事訓也教訓成俗而刑罰省數也凡牧民者欲民之正也欲民之正則㣲邪不可不禁也㣲邪者大邪之所生也微邪不禁而求大邪之無傷國不可得也凡牧民者欲民之有禮也欲民之有禮則小禮不可不謹也小禮不謹於國而求百姓之行大禮不可得也凡牧民者欲民之有義也欲民之有義則小義不可不行也小義不行於國而求百姓之行大義不可得也凡牧民者欲民之有亷也欲民之有亷則小亷不可不修也小亷不修於國而求百姓之行大亷不可得也凡牧民者欲民之有恥也欲民之有恥則小恥不可不飾也小恥不飾於國而求百姓之行大恥不可得也凡牧民者欲民之修小禮行小義飾小亷謹小恥禁微邪此厲民之道也民之修小禮行小義飾小㢘謹小恥禁微邪治之本也凡牧民者欲民之可御也欲民之可御則法不可不審法者将立朝廷者也将立朝廷者則爵服不可不貴也爵服加於不義則民賤其爵服民賤其爵服則人主不尊人主不尊則令不行矣法者将用民力者也将用民力者則禄賞不可不重也禄賞加于無功則民輕其禄賞民輕其禄賞則上無以勸民上無以勸民則令不行矣法者将用民䏻者也将用民䏻者則授官不可不審也授官不審則民間其治民間其治則理不上通理不上通則下怨其上下怨其上則令不行矣法者将用民之死命者也用民之死命者則刑罰不可不審也刑罰不審則有辟就有辟就則殺不辜而赦有罪殺不辜而赦有罪則國不免於賊臣矣故夫爵服賤禄賞輕民間其治賊臣首難此謂敗國之教也立政第四三本省官四固服制五事九敗首憲七觀首事經言四國之所以治亂者三殺戮刑罰不足用也三謂三本也謂治亂法各有三也國之所以安危者四城郭險阻不足守也四謂四固國之所以富貧者五輕稅租薄賦歛不足恃也五謂五事治國有三本而安國有四固而富國有五事五事五經也自三本已上總其目君之所審者三一曰徳不當其位二曰功不當其禄三曰能不當其官此三本者治亂之原也故國有徳義未眀於朝者則不可加于尊位功力未見於國者則不可授以重禄臨事不信於民者則不可使任大官故徳厚而位卑者謂之過徳薄而位尊者謂之失寜過於君子而毋失於小人過於君子其為怨淺失於小人其為禍深是故國有徳義未眀於朝而䖏尊位者則良臣不進有功力未見於國而有重禄者則勞臣不勸有臨事不信於民而任大官者則材臣不用三本者審則下不敢求三本者不審則邪臣上通而便辟制威如此則眀塞於上而治壅於下正道捐棄而邪事日長三本者審則便辟無威於國道塗無行禽無禽獸之行疏逺無蔽獄孤寡無隠治故曰刑省治寡朝不合衆右三本君之所慎者四一曰大徳不至仁不可以授國柄徳雖大而仁不至或包藏禍心故不可授國柄二曰見賢不䏻譲不可與尊位三曰罰避親貴不可使主兵四曰不好本事不務地利而輕賦歛不可與都邑此四務者安危之本也故曰卿相不得衆國之危也大臣不和同國之危也兵主不足畏國之危也民不懷其産國之危也故大徳至仁則操國得衆見賢䏻譲則大臣和同罰不避親貴則威行於鄰敵好本事務地利重賦歛則民懐其産右四固君之所務者五一曰山澤不救於火草木不殖成國之貧也二曰溝瀆不遂於隘鄣水不安其藏國之貧也三曰桑麻不殖於野五穀不宜其地國之貧也四曰六畜不育於家𤓰瓠葷菜百果不備具國之貧也五曰工事競於刻鏤女事繁於文章國之貧也故曰山澤救於火草木殖成國之富也溝瀆遂於隘障水安其藏國之富也桑麻殖於野五穀宜其地國之富也六畜育於家𤓰瓠葷菜百果備具國之富也工事無刻鏤女事無文章國之富也右五事分國以為五鄉鄉為之師分鄉以為五州州為之長分州以為十里里為之尉分里以為十游游為之宗十家為什五家為伍什伍皆有長焉築障塞匿匿隠一道路博出入審閭閈慎筦鍵筦藏于里尉置閭有司以時開閉閭有司觀出入者以復于里尉復白凡出入不時衣服不中圏屬羊豕之類也羣徒衆作役也不順於常者閭有司見之復無時若在長家子弟臣妾屬役賔客則里尉以譙于游宗游宗以譙于什伍什伍以譙于長家譙敬而勿復既譙䏻敬而從命無事可白則是教令行一再則宥三則不赦凡孝悌忠信賢良雋材若在長家子弟臣妾屬役賔客則什伍以復于游宗游宗以復于里尉里尉以復于州長州長以計于鄉師鄉師以著于士師凡過黨其在家屬及于長家其在長家及于什伍之長其在什伍之長及于游宗其在游宗及于里尉其在里尉及于州長其在州長及于鄉師其在鄉師及于士師三月一復六月一計十二月一著凡上賢不過等謂上賢雖才用絶倫無得過其勞級績按上謂尊上進用也使䏻不兼官罰有罪不獨及罪必有首從及黨與也賞有功不専與孟春之朝君自聴朝論爵賞校官終五日季冬之夕君自聴朝論罰罪刑殺亦終五日正月之朔百吏在朝君乃出令布憲于國五鄉之師五屬大夫皆受憲于太史大朝之日五鄉之師五屬大夫皆身習憲于君前太史既布憲入籍于太府入籍者入取籍於太府也績按入籍謂入書其憲於太府也下文云不合籍指此憲籍分于君前績按分謂散憲於五鄉之師也五鄉之師出朝遂于鄉官致于鄉屬及于游宗皆受憲憲所以察時令籍所以視功過憲既布乃反致令焉致令于君然后敢就舍憲未布令未致不敢就舎就舎謂之留令死罪不赦五屬大夫皆以行車朝出朝不敢就舎遂行至都之日五屬之都遂於廟致屬吏皆受憲憲既布乃發使者致令以布憲之日蚤晏之時憲既布使者已發然後敢就舎憲未布使者未發不敢就舎就舎謂之留令罪死不赦憲既布有不行憲者謂之不從令罪死不赦考憲而有不合于太府之籍者侈曰専制績按謂増之不足曰虧令績按謂損之罪死不赦首憲既布嵗朝之憲然后可以布憲憲謂月朝之憲右首憲凡将舉事令必先出曰亊将為其賞罰之數必先眀之立事者謹守令以行賞罰計事致令復賞罰之所加有不合於令之所謂者雖有功利則謂之専制罪死不赦首事既布然后可以舉事右首事脩火憲敬山澤林藪積草績按敬同儆戒也夫財之所出以時禁發焉使民於宫室之用薪蒸之所積虞師之事也決水潦通溝瀆脩障防安水藏使時水雖過度無害於五穀嵗雖㐫旱有所秎穫司空之事也績按秎扶問切亦穫也相髙下視肥墝觀地宜眀詔期前後農夫以時均脩焉使五穀桑麻皆安其處由田之事也行鄉里視宫室觀樹蓺簡六畜以時鈞脩焉勸勉百姓使力作毋偷懐樂家室重去鄉里鄉師之事也論百工審時事辨功苦上完利監一五鄉以時鈞脩焉使刻鏤文采毋敢造於鄉工師之事也右省官度爵而制服量禄而用財飲食有量衣服有制宫室有度六畜人徒有數舟車陳器有禁修生則有軒冕服位穀禄田宅之分死則有棺槨絞衾壙壟之度雖有賢身貴體毋其爵不敢服其服雖有富家多資毋其禄不敢用其財天子服文有章而夫人不敢以燕以饗廟将軍績按此有缺文誤字大夫以朝官吏以命士止于帯縁散民不敢服雜采百工商賈不敢服長鬈貂績按鬈音㩲記云燕則鬈自注分髪為鬌紒刑餘戮民不敢服絻一本作絲不敢畜連乗車右服制寝兵之說勝則險阻不守言事者競陳寝兵其說見用而得勝則武術必偃雖有險阻不䏻守矣兼愛之説勝則士卒不戰兼愛之說勝則徐偃弱而行仁宋襄惑而慕古也全生之說勝則亷恥不立全生之說勝則王孫自奉千金何侯日食一萬私議自貴之說勝則上令不行羣徒比周之説勝則賢不肖不分金玉貨財之說勝則爵服下流觀樂玩好之說勝則姦民在上位觀樂玩好之説勝則費仲以奉竒異而居顯位董賢以柔曼而處朝謁也請謁任舉之說勝則繩墨不正謟䛕飾過之説勝則巧佞者用右九敗期而致使而往百姓舎己以上為心者教之所期也始於不足見終於不可及一人服之萬人從之訓之所期也謂君将行令始獨發於心故不足見終則功成事􅋟故不可及也未之令而為未之使而往上不加勉而民自盡竭俗之所期也君䏻盡心於俗所以䏻期於此也好惡形於心百姓化於下罰未行而民畏恐賞未加而民勸勉誠信之所期也君之好惡纔形於心百姓已化於天下為而無害成而不議得而莫之䏻爭天道之所期也君䏻奉順天道所以䏻期於此為之而成求之而得上之所欲小大必舉事之所期也令則行禁則止憲之所及俗之所被被合也謂俗與憲合如百體之從心政之所期也右七觀乘馬第五立國工大數士農商隂陽聖人爵位失時務市事地里經言五凡立國都非於太山之下必於廣川之上髙毋近旱而水用足下毋近水而溝防省因天材就地利故城郭不必中規矩道路不必中凖繩右立國無為者帝為而無以為者王為而不貴者霸不自以為所貴則君道也貴而不過度則臣道也右大數地者政之本也政從地生朝者義之理也義因朝起市者貨之凖也市所以凖貨黄金者用之量也諸侯之地千乗之國者器之制也五者其理可知也為之有道地者政之本也是故地可以正政也地平可以正政地不平均和調則政不可正也不均平和調則地利或幾於息故不可不正也政不正則事不可理也春秋冬夏隂陽之推移也夏秋推陽以生隂冬春推隂以生陽時之短長隂陽之利用也必長短相摩然後成隂陽之用也日夜之易隂陽之化也晝熱夜寒交易其氣此隂陽之化也然則隂陽正矣雖不正有餘不可損不足不可益也假令時有盈縮不正則百六之運數當然也雖有堯湯之聖不䏻免之故不可損益也天地莫之䏻損益也天地亦凖隂陽不可損益也然則可以正政者地也故不可不正也正地者其實必正長亦正短亦正小亦正大亦正長短小大盡正正不正則官不理謂天地之正不正官不可得理官不理則事不治事不治則貨不多是故何以知貨之多也曰事治何以知事之治也曰貨多貨多事治則所求於天下者寡矣為之有道右隂陽績按此釋地者政之本也朝者義之理也是故爵位正而民不怨民不怨則不亂然後義可理理不正則不可以治而不可不理也故一國之人不可以皆貴皆貴則事不成而國不利也皆貴則無為事者故事不成也為事之不成國之不利也使無貴者則民不䏻自理也是故辨於爵列之尊卑則知先後之序貴賤之義矣為之有道右爵位績按此釋朝者義之理也市者貨之凖也是故百貨賤則百利不得謂不得過常之利也百利不得則百事治百事治則百用節矣是故事者生於慮謀慮則事生也成於務専務則事成也失於傲輕傲則失事也不慮則不生不務則不成不傲則不失故曰市者可以知治亂可以知多寡而不䏻為多寡為之有道右務市事績按此釋市者貨之凖也黄金者用之量也辨於黄金之理則知侈儉知侈儉則百用節矣故儉則傷亊侈則傷貨儉則金賤金賤則事不成故傷事侈則金貴金貴則貨賤故傷貨貨盡而後知不足是不知量也事己而後知貨之有餘是不知節也不知量不知節不可謂之有道績按此釋黄金者用之量也天下乗馬服牛而任之輕重有制有一宿之行一宿有定凖則百宿可知也道之逺近有數矣是知諸侯之地千乗之國者所以知地之小大也所以知任之輕重也重而後損之是不知任也輕而後益之是不知器也不知任不知器不可謂之有道績按此釋諸侯之地千乗之國器之制也地之不可食者山之無木者百而當一涸澤百而當一地之無草木者百而當一樊棘雜䖏民不得入焉百而當一藪鎌纒得入焉九而當一績按鎌刈割器纒捆縛索蔓山其木可以為材可以為軸斤斧得入焉九而當一汎山其木可以為棺可以為車斤斧得入焉十而當一流水網罟得入焉五而當一林其木可以為棺可以為車斤斧得入焉五而當一澤網罟得入焉五而當一命之曰地均以實數績按此一節言土地就中論不可食者而除之紀其可食之實不可徒論廣狭也方六里命之曰暴五暴命之曰部五部命之曰聚聚者有市無市則民乏五聚命之曰某鄉四鄉命之曰方官制也官成而立邑五家而伍十家而連五連而暴五暴而長命之曰某鄉四鄉命之曰都邑制也邑成而制事四聚為一離五離為一制五制為一田二田為一夫二夫為一家事制也事成而制器方六里為一乗之地也一乗者四馬也一馬其甲七其蔽五蔽所以䕶車馬四乗其甲二十有八其蔽二十白徒三十人奉車兩器制也績按此一節言官邑事器之制方六里一乗之地也方一里九夫之田也黄金一鎰百乗一宿之盡也無金則用其絹季絹三十三制當一鎰三等其下者曰季無絹則用其布經暴布百兩當一鎰一鎰之金食百乗之一宿則所事之地六步一㪷一本作一升命之曰中嵗有市無市則民不乏矣方六里名之曰社有邑焉名之曰央亦闗市之賦命出闗市之賦黄金百鎰為一箧其貨一穀竉為十箧竉音籠其商茍在市者三十人其正月十二月黄金一鎰命之曰正分春曰書比立夏曰月程秋曰大稽與民數得亡三嵗修封五嵗修界十嵗更制經正也績按此節言既立制而遂定賦也十仞見水不大潦大潦一本作大續繼也預貯水也五尺見水不大旱十一仞見水輕征征稅也十分去二三謂去十仞之二三二則去三四謂去十仭之三四四則去四謂去十仞之四五則去半比之於山五尺見水言平地五仞見水同於山五尺見水十分去一四則去三八尺曰仞分九仞則屈每分有二仞二尺去其三則餘有一丈八尺三則去二二則去一二尺而見水比之於澤績按言地髙則難澇故曰十仞見水不大澇地低則難旱故曰五尺見水不大旱當澇之時若髙亢地十一仞見水則常征十分中免二三分十二仞見水則免三四分十四仞見水則免四分十五仞見水則免五分以其極髙難灌溉可以比於山也當旱之時若汙下地五尺見水則常征十分免四分四尺見水則免三分三尺見水則免二分二尺見水則免一分以其極低易灌溉可以比於澤也十分去一當作十分去四乃字之誤也距國門以外窮四竟之内丈夫二犂童五尺一犂以為三日之功正月令農始作服于公田農耕及雪釋耕始焉芸卒焉士聞見博學意察而不為君臣者與功而不與分焉此人學以為君之臣也然以髙尚其事而不為若此者預食農收之功而不受力作之分也賈知賈之貴賤日至於市而不為官賈者與功而不與分焉工治容貌功䏻日至於市而不為官工者與功而不與分焉績按此言士賈工雖習其業不在官者正月亦與耕公田三日借民力以盡地利也不可使而為工則視貨離之實而出夫粟是故智者知之愚者不知不可以教民教民必以有智者巧者䏻之拙者不䏻不可以教民教人為工必以巧者欲令愚智之人盡曉知之然後可以教人也績按此言教人當使智愚皆知巧拙皆䏻非一令而民服之也不可以為大善非夫人䏻之也不可以為大功是故非誠賈不得食于賈非誠工不得食于工非誠農不得食于農非信士不得立于朝是故官虚而莫敢為之請君有珍車珍甲而莫之敢有君舉事臣不敢誣其所不䏻君知臣臣亦知君知己也故臣莫敢不竭力俱操其誠以来道曰均地分力使民知時也民乃知時日之蚤晏日月之不足饑寒之至于身也是故夜寝蚤起父子兄弟不忘其功為而不倦民不憚勞苦故不均之為惡也地利不可竭民力不可殫不告之以時而民不知不道之以事而民不為與之分貨則民知得正矣審其分則民盡力矣是故不使而父子兄弟不忘其功右士農工商績按此篇言均地立制定賦之法率民盡地力終之以人君出令之事末又言均地分力使民知時為下三節之綱謂之士農工商不知何說也聖人之所以為聖人者善分民也善令人知分故名為聖人聖人不䏻分民則猶百姓也於已不足安得名聖不䏻令人知分則已尚不足何名為聖人是故有事則用用謂人也無事則歸之於民謂令人退歸而居也唯聖人為善託業於民謂託人以成功業也民之生也辟則愚縱其淫辟則昏愚也閉則類類善也閉其淫辟則自善上為一下為二下之效上必倍之也右聖人績按此釋上分力非言聖人也時之處事精矣不可藏而舎也時至則為之不可藏而舍息也故曰今日不為眀日亡貨言不為則失時昔之日已往而不来矣言日既往不還來也右失時績按此釋上使民知時上地方八十里萬室之國一千室之都四中地方百里萬室之國一千室之都四下地方百二十里萬室之國一千室之都四以上地方八十里與下地方百二十里通於中地方百里右地里績按此釋上均地管子補注卷一
