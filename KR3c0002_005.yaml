body:
  text: 管子補注卷五明劉績撰八觀第十三外言四大城不可以不完郭周不可以外通里域不可以橫通橫通謂從旁而通也閭閈不可以毋闔闔扇也宫垣關閉不可以不修故大城不完則亂賊之人謀郭周外通則姦遁踰越者作里域橫通則攘奪竊盜者不止閭閈無闔外內交通則男女無别宫垣不備關閉不固雖有良貨不能守也故形勢不得為非則姦邪之人慤願禁禦周固形勢不得為非則姦邪之人無從生心而變為慤願禁罰威嚴則簡慢之人整齊憲令著明則蠻夷之人不敢犯賞慶信必則有功者勸教訓習俗者衆則君民化變而不自知也習俗而善不知善之為善猶入芝蘭之室不知芳之為芳也是故明君在上位刑省罰寡非可刑而不刑非可罪而不罪也明君者閉其門塞其塗弇其迹使民無由接於淫非之地既閉出非之門又塞生過之塗成罪之迹莫不掩匿如此則自然端直欲接淫非之地其路無由也是以民之道正行善也若性然故罪罰寡而民以治矣行其田野視其耕藝計其農事而飢飽之國可以知也其耕之不深藝之不謹地宜不任草田多穢耕者不必肥荒者不必墝以人猥計其野猥衆也以人衆之多少計其野之廣狹也草田多而辟田少者雖不水旱飢國之野也若是而民寡則不足以守其地若是而民衆則國貧民飢以此遇水旱則衆散而不收彼民不足以守者其城不固民飢者不可以使戰衆散而不收則國為丘墟故曰有地君國而不務耕藝寄生之君也故曰行其田野視其耕藝計其農事而飢飽之國可知也行其山澤觀其桑麻計其六畜之産而貧富之國可知也夫山澤廣大則草木易多也壤地肥饒則桑麻易植也薦草多衍則六畜易繁也薦茂革也莊周曰麋鹿食薦山澤雖廣草木毋禁壤地雖肥桑麻毋數薦草雖多六畜有征征賦閉貨之門也無貨可出若閉門然故曰時貨不遂金玉雖多時貨謂穀帛畜産也謂之貧國也故曰行其山澤觀其桑麻計其六畜之産而貧富之國可知也入國邑視宫室觀車馬衣服而侈儉之國可知也夫國城大而田野淺狹者不足以養其民城域大而人民寡者其民不足以守其城宫營大而室屋寡者其室不足以實其宫室屋衆而人徒寡者其人不足以處其室囷倉寡而臺榭繁者其藏不足以供其費囷倉所藏不足以供臺榭之費故曰主上無積而宫室美氓家無積而衣服修氓家謂民家也乘車者飾觀望步行者雜文采本資少而末用多者本資謂穀帛侈國之俗也國侈則用費用費則民貧民貧則姦智生姦智生則邪巧作故姦邪之所生生於匱不足匱不足之所生生於侈侈之所以生生於毋度故曰審度量節衣服儉財用禁侈泰為國之急也不通於若計者若計謂審度量以下不可使用國故曰入國邑視宫室觀車馬衣服而侈儉之國可知也課凶飢計師役觀臺榭量國費而實虛之國可知也凡田野萬家之衆可食之地方五十里績按方一本作百可以為足矣萬家以下則就山澤可矣萬家以下其人少可以就山澤逐便利萬家以上則去山澤可矣萬家以上其人多則去山澤就原陸而山澤有禁也彼野悉辟而民無積者國地小而食地淺也田半墾而民有餘食而粟米多者國地大而食地博也國地大而野不辟者君好貨而臣好利者也君臣好貨利則妨農功故其野不辟辟地廣而民不足者上賦重流其藏者也上賦重則人藏流散也故曰粟行於三百里賦重則粟賤故人逺行而糶之或逺人來糴也則國毋一年之積粟行於四百里則國毋二年之積粟行於五百里則衆有飢色其稼亡三之一者命曰小凶三分常稼而亡其一時有凶災故也故謂小凶也小凶三年而大凶比三年不孰故曰大凶也大凶則衆有大遺苞矣時既大凶無復蓄積雖相振濟但苞裏升斗以相遺也什一之師什三毋事則稼亡三之一師法也十一而稅周禮之通法今乃十三而稅無事於舊稼亡三之一也績按前作計師役則此師乃師役也謂興師役一分則相逮者衆而為三分是十分中有三分無事農之人而亡稼三之一矣稼亡三之一而非有故蓋積也則道有損瘠矣既已亡三之一又無故積則道行之人有毁損羸瘠者也什一之師三年不解非有餘食也則民有鬻子矣既師十一三年而不解比當有餘食而不餘則以遇歲凶故也所以人有鬻子者績按别本注什三之稅三年不解弛若非蓄積有餘又遇嵗凶則民必鬻子矣故曰山林雖近草木雖美宫室必有度禁發必有時是何也曰大木不可獨伐也大木不可獨舉也大木不可獨運也大木不可加之薄墻之上凡此必資衆力則妨農事故宫室須有度禁發須有時也故曰山林雖廣草木雖美禁發必有時國雖充盈金玉雖多宫室必有度江海雖廣池澤雖博魚鱉雖多罔罟必有正多少小大之正船網不可一財而成也必多財然後成非私草木愛魚鱉也惡廢民於生穀也故曰先王之禁山澤之作者博民於生穀也彼民非穀不食穀非地不生地非民不動動謂發生穀物民非作力毋以致財天下績按當作夫財乃字之誤也之所生生於用力天下所以存其生各由用力也用力之所生生於勞身是故主上用財毋已是民用力毋休也財從力生故用財不已則用力不休也故曰臺榭相望者其上下相怨也上怨下不供下怨上多稅民毋餘積者其禁不必止民飢貧則為盜賊故禁不止也衆有遺苞者其戰不必勝戰士飢則力屈故戰不勝道有損瘠者其守不必固損瘠則死期將至故守不固也故令不必行禁不必止戰不必勝守不必固則危亡隨其後矣故曰課凶飢計師役觀臺榭量國費而實虛之國可知也入州里觀習俗聽民之所以化其上君斯作矣人胥效矣故人莫不化上而治亂之國可知也州里不鬲無阻鬲也閭閈不設出入毋時早晏不禁則攘奪竊盜攻擊殘賊之民毋自勝矣自從也既不設備則盜賊無從而勝食谷水巷鑿井谷水巷井則出汲者生其淫放場圃接鄰家子女易得交通樹木茂淫非者易為宫墻毁壞門户不閉外內交通則男女之别毋自正矣鄉毋長遊什長遊宗也里毋士舍士謂里尉每里當置含使尉居焉時毋會同鄉里每時當有會同所以結恩好也喪蒸不聚蒸冬祭名禁罰不嚴則齒長輯睦毋自生矣鄉里長弟當以齒也故昏禮不謹則民不修廉論賢不鄉舉則士不及行貨財行於國則法令毁於官請謁得於上則黨與成於下鄉官毋法制百姓羣徒不從此亡國弒君之所自生也故曰入州里觀習俗聽民之所以化其上者而治亂之國可知也入朝廷觀左右本求朝之臣謂原本尋求朝之得失論上下之所貴賤者而強弱之國可知也功多為上祿賞為下則積勞之臣不務盡力戰功日多謂積勞之臣論其功多則居於衆上及行祿賞翻在衆下故不務盡力也治行為上爵列為下則豪傑材臣不務竭能便辟左右不論功能而有爵祿則百姓疾怨非上賤爵輕祿左右不論能而有爵祿則百姓非但疾怨又非上輕賤爵祿也金玊貨財商賈之人不論志行而有爵祿不論志行能使在爵祿之位也則上令輕法制毁權重之人不論材能而在尊位則民倍本行而求外勢彼積勞之人不務盡力則兵士不戰矣豪傑材臣不務竭能則內治不别矣百姓疾怨非上賤爵輕祿則上毋以勸衆矣上令輕法制毁則君毋以使臣臣毋以事君矣民倍本行而求外勢則國之情偽竭於敵國矣人既倍本求外則國之情偽盡在於敵矣竭盡也故曰入朝廷觀左右本求朝之臣論上下之所貴賤者而強弱之國可知也置法出令臨衆用民計其威嚴寬惠行於其民與不行於其民可知也法虛立而害疏逺謂其立法但能害疏遠而不行親近故曰虛立也令一布而不聽者存不聽者存是令不行賤爵祿而毋功者富無功者富則有功者貧也然則衆必輕令而上位危輕令則有無君之心故上位危故曰良田不在戰士三年而兵弱良田所以賞戰士不賞則士無戰志故兵弱也賞罰不信五年而破上賣官爵十年而亡倍人倫而禽獸行十年而滅戰不勝弱也地四削入諸侯破也離本國徙都邑亡也有者異姓滅也有其國者異姓之人則宗廟滅若齊之陳氏是也故曰置法出令臨衆用民計威嚴寬惠而行於其民不行於其民可知也計敵與量上意察國本觀民産之所有餘不足而存亡之國可知也敵國強而與國弱諫臣死而諛臣尊私情行而公法毁績按一本作公道然則與國不恃其親謂黨與之國不恃已以為親也而敵國不畏其強冦敵之國不畏已以為強也豪傑不安其位而積勞之人不懷其祿悅商販而不務本貨則民偷處而不事積聚豪傑不安其位則良臣出積勞之人不懷其祿則兵士不用民偷處而不事積聚則囷倉空虛如是而君不為變不改常而更化然則攘奪竊盜殘賊進取之人起矣內者廷無良臣豪傑不安其位兵士不用積勞之人不懷其祿故也囷倉空虛民偷處而不事積聚故也而外有強敵之憂則國居而自毁矣居然自致滅毁故曰計敵與量上意察國本觀民産之所有餘不足而存亡之國可知也故以此八者觀人主之國而人主無所匿其情矣法禁第十四外言五法制不議則民不相私君出法制下不敢議則人奉公而不相與為私刑殺毋赦則民不偷於為善有過必誅則善惡明故不為茍且之善爵祿毋假則下不亂其上爵必有德祿必有功不妄假人則人知君我者必賢德故不亂於上三者藏於官則為法施於國則成俗其餘不強而治矣三者即法刑爵也藏於官謂下不得擅其用如此則法施俗成自斯之外雖不勉強莫不從理矣績按藏於官謂收於君府也君一置其儀則百官守其法上明陳其制則下皆會其度矣君之置其儀也不一則下之倍法而立私理者必多矣是以人用其私廢上之制而道其所聞既廢上之制故競道其所聞冀遂其私欲故下與官列法而上與君分威國家之危必自此始矣下謂庶人上謂權臣列亦分也績按言此用私之人自立一法是下與守法官並陳法上與制法君並操權而分其半矣昔者聖王之治其民也不然廢上之法制者必負以恥負猶被也廢法制者必被之以恥辱也財厚博惠以私親於民者正經而自正矣臣厚財而作福則正禮經以示之其人自正矣亂國之道易國之常賜賞恣於已者聖王之禁也賜賞者人君所獨用也臣為君事故須禁之也聖王既沒受之者衰嗣君不德君人而不能知立君之道以為國本則大臣之贅下而射人心者必多矣越職行恩曰贅福下者君之事也今臣為之故曰贅臣之作福所邀射人心必使歸已也績按别本注君既失德則大臣必作福作威以射人心使之歸己也君不能審立其法以為下制則百姓之立私理而徑於利者必衆矣徑謂邪行以趣疾也昔者聖王之治人也不貴其人博學也欲其人之和同以聽令也博學而不聽令姦人之雄也泰誓曰紂有臣億萬人亦有億萬之心武王有臣三千而一心故紂以億萬之心亡武王以一心存故有國之君茍不能人心一國威齊士義通上之治以為下法則雖有廣地衆民猶不能以為安也君失其道則大臣比權重與權重者相比以相舉於國小臣必循利以相就也故舉國之士以為亡黨為叛亡之黨也行公道以為私惠費公以樹私也進則相推於君退則相譽於民各便其身而忘社稷以廣其居容受博也聚徒威羣蓄黨以威衆上以蔽君下以索民求人附己此皆弱君亂國之道也故國之危也擅國權以深索於民者聖王之禁也其身毋任於上者聖王之禁也進則受祿於君退則藏祿於室毋事治職但力事屬私其所勉力事務者但屬意於私王官私君事去王之官私事則營之君事則去之也績按别本注王官既私君事去矣非其人而人私行者聖王之禁也臣既非其人故其人但為私行所以禁之也修行則不以親為本簡孝敬也治事則不以官為主邀虛譽也舉毋能進毋功者聖王之禁也交人則以為己賜臣或下交於人恃之以為己之恩賜舉人則以為己勞為國舉賢恃之以為己之功勞仕人則與分其祿者薦人令仕得祿與共分也聖王之禁也交於利通而獲於貧窮臣所與交通者皆貨利末業則農桑廢政獲於貧窮輕取於其民而重致於其君下取於人輕然不難上致於君偽飾成重削上以附下枉法以求於民者削上戚用附下成恩枉君公法求人私悅也聖王之禁也用不稱其人家富於其列其祿甚寡而資財甚多者列業也臣有用少而家業富祿寡而資財多則以枉法取於人故也聖王之禁也拂世以為行非上以為名常反上之法制以成羣於國者拂世非上反違法制以結連朋黨亦所謂姦人之雄也聖王之禁也飾於貧窮而發於勤勞權於貧賤內富而外飾於貧窮內逸而外發於勤勞可以致勢而權於貧窮也身無職事家無常姓列上下之間議言為民者聖王之禁也姓生也身既無職事家又無常生自列於上下之間其有言議每輒為人以求名譽非純粹之道故聖王禁之也壺士以為亡資修田以為亡本每以壺飱濟士以為亡去之資若趙孟之為又修營田業以為亡去之本也則生之養私不死既有所備預則私養其生雖亡而不死也然後失矯以深與上為市者自恃其備然後君失必矯其有不從則示之以去就之形而要之故曰與之為市聖王之禁也審飾小節以示民釣虛譽也時言大事以動上示君以不測也逺交以踰羣假爵以臨朝者逺交四鄰以越羣黨虛假髙節威臨本朝也聖王之禁也卑身雜處不簡儔類隱行辟倚倚依也自隱其行以避所依也績按隱索隱行怪之隱辟倚皆邪不正也側入迎逺側身而入閾挺出而迎逺遁上而遁民者卑身雜處所以遁上隱行辟倚所以遁民聖王之禁也詭俗異禮大言法行大為言譽以為法使人遵行也難其所為而髙自錯者錯置也聖王之禁也守委間居博分以致衆守其委積以間居博分其財以致衆勤身遂行説人以貨財勤勞其身以遂其行施其貨財以悅於人濟人以買譽濟施人貨財所以買其聲譽其身甚靜而使人求者靜而多財故人求之聖王之禁也行僻而堅言詭而辨術非而博順惡而澤者所順習者惡事善潤飾之令有光澤聖王之禁也以朋黨為友以蔽惡為仁朋黨有惡相為隱蔽用此為仁以數變為智以重斂為忠以遂忿為勇者聖王之禁也固國之本其身務往於上深附於諸侯者每國自有其本臣無境外之交今雖身務歸於上而心有異託外深附於諸侯聖王之禁也聖王之身治世之時德行必有所是道義必有所明故士莫敢詭俗異禮以自見於國莫敢布惠緩行修上下之交以和親於民從容養民謂之緩行故莫敢超等踰官漁利蘇功以取順其君飾詐以釣君利謂之漁利因少搆多謂之蘇功蘇生息也聖王之治民也進則使無由得其所利退則使無由避其所害必使反乎安其位樂其羣務其職營其名而後止矣能如上事則止而循常也故踰其官而離其羣者必使有害不能其事而失其職者必使有恥是故聖王之教民也以仁錯之以恥使之修其能致其所成而止故曰絶而定絶邪僻之事也靜而治安而尊舉錯而不變者聖王之道也重令第十五外言六凡布國之重器莫重於令令重則君尊君尊則國安令輕則君卑君卑則國危故安國在乎尊君尊君在乎行令行令在乎嚴罰罰嚴令行則百吏皆恐罰不嚴令不行則百吏皆喜故明君察於治民之本本莫要於令故曰虧令者死益令者死增益令者殺無赦不行令者死留令者死令當行而故留之不從令者死五者死而無赦惟令是視設令者必不赦此五死也故曰令重而下恐為上者不明令出雖自上而論可與不可者在下不明之君雖曰出令至於可否必與下論而後定如此者臣反制君何令之為夫倍上令以為威則行恣於己以為私百吏奚不喜之有倍公則得成私虧令而喜不亦冝乎且夫令出雖自上而論可與不可者在下是威下繫於民也可否定於下則是威下繫也威下繫於民而求上之毋危不可得也下強則上危也令出而留者無罪則是教民不敬也王言如絲其出如綸所謂敬也留者不誅是教不敬令出而不行者毋罪行之者有罪是皆教民不聽也不行無罪行之反誅人之不聽上敦之然也令出而論可與不可者在官是威下分也官謂百官可否定於百官則是威下分也益損者毋罪則是教民邪途也益謂增令者損謂虧令者二者不罪人為邪途上敦之然也如此則巧佞之人將以此成私為交比周之人將以此阿黨取與貪利之人將以此收貨聚財懦弱之人將以此阿貴事富便辟伐矜之人將以此買譽成名几此皆上間其隙則下得緣隙而成姦也故令一出示民邪途五衢五衢謂上之五死也死之則五衢塞生之則五衢開而求上之毋危下之毋亂不可得也五衢開故也菽粟不足末生不禁民必有飢餓之色末生謂以末業為生者也而工以雕文刻鏤相稚也謂之逆稚驕也人有飢色不息末以殺之反以雕文相驕故謂之逆布帛不足衣服毋度民必有凍寒之傷而女以美衣錦繡綦組相稚也謂之逆萬乘藏兵之國卒不能野戰應敵社稷必有危亡之患而士以毋分役相稚也謂之逆社稷有危人人皆當效死今反以無分役相驕故謂之逆爵人不論能祿人不論功則士無為行制死節爵不論能故不為行制祿不論功故不為死節也而羣臣必通外請謁取權道行事便辟以貴富諂事便辟以得貴富為榮華以相稚也謂之逆不義富貴志士所以恥反以為榮華而相驕故以為逆朝有經臣國有經俗民有經産經常也何謂朝之經臣察身能而受官不誣於上無能受官謂之誣上謹於法令以治不阿黨撓法從私謂之阿黨竭能盡力而不尚得不貴茍得犯難離患而不辭死致身受命受祿不過其功不以少求多也服位不侈其能不以小居大也不以毋實虛受者有功勞而後受祿朝之經臣也何謂國之經俗所好惡不違於上從君欲也所貴賤不逆於令遵法制也毋上拂之事拂違也毋下比之説毋侈泰之養節而適也毋踰等之服禮而度也謹於鄉里之行信而悌也而不逆於本朝之事者行君令也國之經俗也何謂民之經産畜長樹藝畜長謂畜産也務時殖榖力農墾草禁止末事者民之經産也故曰朝不貴經臣則便辟得進毋功虛取姦邪得行毋能上通賤經臣則邪臣進國不服經俗則臣下不順而上令難行俗無常故也民不務經産則倉廩空虛財用不足輕本務故也便辟得進毋功虛取姦邪得行毋能上通則大臣不和小人好事臣下不順上令難行則應難不捷人心不一倉廩空虛財用不足則國毋以固守人飢則逃散也三者見一焉則敵國制之矣見一尚制况兼有乎故國不虛重兵不虛勝民不虛用令不虛行凡國之重也必待兵之勝也而國乃重凡兵之勝也必待民之用也而兵乃勝凡民之用也必待令之行也而民乃用凡令之行也必待近者之勝也而令乃行先勝服近習今乃得行故禁不勝於親貴罰不行於便辟法禁不誅於嚴重而害於疏逺慶賞不施於卑賤三二而求令之必行不可得也能不通於官受祿賞不當於功號令逆於民心動靜詭於時變有功不必賞有罪不必誅令焉不必行禁焉不必止在上位無以使下而求民之必用不可得也將帥不嚴威民心不專一陳士不死制卒士不輕敵而求兵之必勝不可得也內守不能完外攻不能服野戰不能制敵侵伐不能威四鄰而求國之重不可得也德不加於弱小威不信於強大征伐不能服於天下而求霸於諸侯不可得也威有與兩立下亦有立威者兵有與分爭征伐有自諸侯出德不能懷逺國令不能一諸侯而求王天下不可得也地大國富人衆兵強此霸王之本也然而與危亡為鄰矣天道之數人心之變所以與危亡為鄰則以天道數終人心變易故也天道之數至則反終於下者則反於上盛則衰日中則昃月盈則蝕人心之變有餘則驕不足者必謙驕則緩怠夫驕者驕諸侯驕諸侯者諸侯失於外天子驕則諸侯叛緩怠者民亂於內緩怠必輕於始故民亂諸侯失於外民亂於內天道也驕怠者必失外亂內此天之道也此危亡之時也若夫地雖大而不并兼不攘奪人雖衆不緩怠不傲下國雖富不侈泰不縱欲兵雖強不輕侮諸侯動衆用兵必為天下政理此正天下之本而霸王之主也凡先王治國之器三攻而毁之者六明王能勝其攻故不益於三者而自有國正天下明王雖勝攻於三器亦不加益即勝能自有其國兼正天下績按此言自諸侯而為天子亂王不能勝其攻故亦不損於三者而自有天下而亡亂王既不能勝攻三器自毁更不滅此三旨縱有天下之大而遂滅亡也績按此言自天子而取滅亡三器者何也曰號令也斧鉞也祿賞也六攻者何也曰親也貴也貨也色也巧佞也玩好也三器之用何也曰非號令毋以使下非斧鉞毋以威衆非祿賞無以勸民六攻之敗何也言六攻能敗三器者謂何也曰雖不聽而可以得存者謂親貴也雖犯禁而可以得免者謂貨色也雖毋功而可以得富者謂巧佞玩好也凡國有不聽而可以得存者則號令不足以使下有犯禁而可以得免者則斧鉞不足以威衆有毋功而可以得富者則祿賞不足以勸民號令不足以使下斧鉞不足以威衆祿賞不足以勸民若此則民毋為自用既有罪不誅有功不賞故人不自用其力也民毋為自用則戰不勝則守不固守不固則敵國制之矣然則先王將若之阿曰不為六者變更於號令不為六者疑錯於斧鉞不為六者損益於祿賞若此則逺近一心逺近一心則衆寡同力衆寡同力則戰可以必勝而守可以必固非以并兼攘奪也以為天下政治也此正天下之道也管子補注卷五
