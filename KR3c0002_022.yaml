body:
  text: 管子補注卷二十二明劉績撰事語第七十一管子輕重四桓公問管子曰事之至數可聞乎管子對曰何謂至數桓公曰秦奢教我曰帷蓋不修衣服不衆則女事不泰俎豆之禮不致牲諸侯太牢大夫少牢不若此則六畜不育非髙其臺榭美其宫室則羣材不散績按此言上用之則下為之此言何如管子曰非數也桓公曰何謂非數管子對曰此定壤之數也彼天子之制壤方千里齊諸侯方百里負海子七十里男五十里若胸臂之相使也故淮徐疾贏不足雖在下也不為君憂彼壤挾而欲舉與大國爭者農夫寒耕暑耘力歸於上女勤於緝績徽織功歸於府者非怨民心傷民意也非有積蓄不可以用人非有積財無以勸下秦奢之數不可用於危隘之國桓公曰善桓公又問管子曰佚田謂寡人曰善者用非其有使非其人何不因諸侯權以制天下管子對曰佚田之言非也彼善為國者壤辟舉則民留處倉廪實則知禮節且無委致圍城脆致衝績按委委積也無食則人欲圍而取之脆不堅也衝衝車也城不堅則人思而毁之夫不定內不可以持天下佚田之言非也管子曰歲藏一十年而十也歲藏二五年而十也穀十而守五綈素滿之五在上故視歲而藏縣時積歲國有十年之蓄富勝貧勇勝怯智勝愚微勝不微有義勝無義練士勝驅衆凡十勝者盡有之故發如風雨動如雷霆獨出獨入莫之能禁止不待權輿故佚田之言非也桓公曰善海王第七十二管子輕重五桓公問於管子曰吾欲藉於臺雉何如管子對曰此毁成也吾欲藉於樹木管子對曰此伐生也吾欲藉於六畜管子對曰此殺生也吾欲藉於人何如管子對曰此隱情也桓公曰然則吾何以為國管子對曰唯官山海為可耳桓公曰何謂官山海管子對曰海王之國謹正鹽策海王言以負海之利而王其業桓公曰何謂正鹽策正稅也管子對曰十口之家十人食鹽百口之家百人食鹽終月大男食鹽五升少半少半猶劣薄也大女食鹽三升少半吾子食鹽二升少半吾子謂少男小女也此其大厯也厯數鹽百升而釜鹽十二兩七銖一黍十分之一為升當米六合四勺也百升之鹽七十六斤十二兩十九銖二纍為釡當米六斗四升令鹽之重升加分彊釡五十也分彊半彊也今使鹽官稅其鹽之重每一斗加半合為彊而取之則一釡之鹽得五十合而為之彊升加一彊釡百也升加二彊釡二百也鍾二千十釡之鹽七百六十八斤為鍾當米六斛四斗是也十鍾二萬百鍾二十萬千鍾二百萬萬乘之國人數開口千萬也舉其大數而言之也開口謂大男大女之所食鹽也禺策之商日二百萬禺讀為偶偶對也商計也對其大男大女食鹽者之口數而立策以計所稅之鹽一日計二百萬合為二百鍾十日二千萬一月六千萬萬乘之國正九百萬也萬乘之國大男大女食鹽者千萬人而稅之鹽一日二百鍾十日二千鍾一月六千鍾也今又施其稅數以千萬人如九百萬人之數則所稅之鹽一日百八十鍾十日千八百鍾一月五千四百鍾也月人三十錢之籍為錢三千萬又變其稅五千四百鍾之鹽而籍其錢計一月每人籍錢三十凡千萬人為錢三萬萬矣以此籍之數而比其常籍則當一國而有三千萬人矣今吾非籍之諸君吾子而有二國之籍者六千萬諸君謂老男老女也六十已上為老男五十已上為老女也既不籍於老男老女又不籍於小男小女乃能以千萬人而當三千萬人者蓋鹽官之利耳鹽官之利既然則鐵官之利可知也鹽官之利當一國而三萬人鐵官之利當一國而三萬人焉故能有二國之籍者六千萬人耳其常藉人之數猶在此外也使君施令曰吾將籍於諸君吾子則必囂號今夫給之鹽策則百倍歸於上人無以避此者數也今鐵官之數曰一女必有一針一刀若其事立若猶然後耕者必有一耒一耜一銚若其事立大鋤謂之銚羊昭反行服連輦名所以載作器人挽之軺輦居玉反者大車駕馬者也必有一斤一鋸一錐一鑿若其事立不爾而成事者天下無有今針之重加一也三十針一人之籍也針之重每十分加一分為彊而取之則一女之籍得三十針矣績按一無也字刀之重加六五六三十五刀一人之籍也刀之重每十分加六分以為彊而取之五六為三十則一女之籍得五刀也耜鐵之重加七三耜鐵一人之籍也耜鐵之重每十分加七分以為彊而取之則一農之籍得三耜鐵也其餘輕重皆准此而行其器彌重其加彌多然則舉臂勝事無不服藉者桓公曰然則國無山海不王乎管子曰因人之山海假之名有海之國雖無海而假名有海則亦雖無山而假名有山售鹽於吾國彼國有鹽而糶於吾國為售耳釡十五吾受而官出之以百受取也假令彼鹽平價釡當十錢者吾又加五錢而取之所以來之也既得彼鹽則令吾國鹽官又出而糶之釡以百錢也我未與其本事也與用也本事本鹽也受人之事以重相推以重相推謂加五錢之類也推猶度也此人用之數也彼人所有而皆為我用也國蓄第七十三管子輕重六國有十年之蓄而民不足於食是皆以其技能望君之祿也君有山海之金而民不足於用是皆以其事業交接於君上也故人君挾其食守其用據有餘而制不足故民無不纍於上也五穀食米民之司命也黃金刀幣民之通施也故善者執其通施以御其司命故民力可得而盡也夫民者信親而死利海內皆然民豫則喜奪則怒民情皆然先王知其然故見豫之形不見奪之理民可使由之不可使知之故民愛可洽於上也洽通也租籍者在工商曰租籍所以彊求也租稅者所慮而請也在農曰租稅慮猶計也請求也績按後輕重一作租籍君之所宜得也正籍者君之所彊求也此有闕誤王霸之君去其所以彊求廢其所慮而請故天下樂從也利出於一孔者凡言利者不必貨利慶賞威刑皆是其國無敵出二孔者其兵不詘詘與屈同屈窮也出三孔者不可以舉兵出四孔者其國必亡先王知其然故塞民之養養利也羊向反隘其利途故豫之在君奪之在君貧之在君富之在君故民之戴上如日月親君若父母凡將為國不通於輕重不可為籠以守民不能調通民利不可以語制為大治是故萬乘之國有萬金之賈千乘之國有千金之賈然者何也國多失利則臣不盡其忠士不盡其死矣歲有凶穰故榖有貴賤令有緩急故物有輕重别注上令急於求米則民重米緩於求米則民輕米所緩則賤所急則重也然而人君不能治故使蓄賈游市别注謂賈人之多蓄積也乘民之不給百倍其本别注給足也以十取百分地若一彊者能守分財若一智者能收智者有什倍人之功以一取什愚者有不賡本之事賡猶償也然而人君不能調故民有相百倍之生也夫民富則不可以祿使也貧則不可以罰威也法令之不行萬民之不治貧富之不齊也且君引錣錣籌也丁劣反量用耕田發草上得其數矣民人所食人有若干步畝之數矣計本量委委積也則足矣然而民有饑餓不食者何也榖有所藏也言一國之內耕墾之數君悉知之凡有計口授田家族多少足以自給而人乏於食者謂豪富之家收藏其榖故也人君鑄錢立幣民庶之通施也錢幣無補於饑寒之用人君所立以均制財物通交有無使人之所求各得其欲人有若干百千之數矣然而人事不及用不足者何也利有所并也民事謂常費也言人之所有多少各隨其分而自足君上不能均調其事則豪富并藏財貨專擅其利是故人常費不給以致匱乏績按一本并字下有藏字然則人君非能散積聚鈞羡餘也不足分并財利而調民事也則君雖彊本趣耕本謂務農而自為鑄幣而無已乃今使民下相役耳惡能以為治乎言人君若不能權其利門制其輕重雖鑄幣無限極而與人徒使豪富侵奪貧弱終不能致理也歲適美則市糶無豫而狗彘食人食歲適凶則市糴釡十繦而道有餓民然則豈壤力固不足而食固不贍也哉夫往歲之糶賤狗彘食人食故來歲之民不足也物適賤則半力而無豫民事不償其本物適貴則什倍而不可得民失其用然則豈財物固寡而本委不足也哉夫民利之時失而物利之不平也故善者委施於民之所不足操事於民之所有餘夫民有餘則輕之故人君斂之以輕民不足則重之故人君散之以重斂積之以輕散行之以重故君必有什倍之利而財之櫎可得而平也凡輕重之大利以重射輕以賤泄平萬物之滿虛隨財准平而不變衡絶則重見人君知其然故守之以准平使萬室之都必有萬鍾之藏藏繦千萬使千室之都必有千鍾之藏藏繦百萬春以奉耕夏以奉藝耒耜械器種餉糧食畢取贍於君故大賈蓄家不得豪奪吾民矣然則何君飬其本謹也春賦以斂繒帛夏貸以收秋實蓋方春蠶家闕乏而賦與之約收其繒帛也方夏農人闕乏亦賦與之約取其榖實也是故民無廢事而國無失利也人之所乏君悉與之則豪商富人不得擅其利也凡五榖者萬物之主也榖貴則萬物必賤榖賤則萬物必貴兩者為敵則不俱平故人君御榖物之秩相勝而操事於其不平之間秩積也食為人天故五榖之要可與萬物為敵其價常不俱平所以人君視兩事之委積可彼此相勝輕重於其間則國利不散也故萬民無籍而國利歸於君也夫以室廡籍謂之毁成小曰室大曰廡是使人毁壤廬室以六畜籍謂之止生是使人不競牧飬也以田畝籍謂之禁耕是止其耕稼也以正人籍謂之離情正數之人若丁壯也離情謂離心也以正户籍謂之飬羸羸謂大賈蓄家也正數之户既避其籍則至浮浪為大賈蓄家之所役屬增其利耳五者不可畢用故王者遍行而不盡也故天子籍於幣諸侯籍於食中歲之榖糶石十錢大男食四石月有四十之籍大女食三石月有三十之籍吾子食二石月有二十之籍歲凶榖貴糴石二十錢則大男有八十之籍大女有六十之籍吾子有四十之籍六十為大男五十為大女吾子謂小男小女也按古之石准今之三斗三升三合平歲每石稅十錢凶歲稅二十者非必稅其人謂於操事輕重之間約收其利也是人君非發號令收穡而户籍也彼人君守其本委謹而男女諸君吾子無不服籍者也穡斂也委者謂所委積之物也謹嚴也言人君不用下令稅斂於人但嚴守利途輕重在我則無所逃其稅也一人廩食十人得餘十人廩食百人得餘百人廩食千人得餘夫物多則賤寡則貴散則輕聚則重人君知其然故視國之羡不足而御其財物穀賤則以幣豫食布帛賤則以幣豫衣視物之輕重而御之以准故貴賤可調而君得其利通典注榖賤則以幣與食布幣賤以幣與衣者與當為易隨其所賤而以幣易取之則輕重貴賤由君上也前有萬乘之國而後有千乘之國謂之抵國前有千乘之國而後有萬乘之國謂之距國壤正方四面受敵謂之衢國以百乘衢處謂之託食之君千乘衢處壤削少半萬乘衢處壤削大半何謂百乘衢處託食之君也夫以百乘衢處危懾圍阻千乘萬乘之間夫國之君不相中舉兵而相攻必以為扞格蔽圉之用有功利不得鄉一作享大臣死於外分壤而功列陳繫纍獲虜分賞而祿是壤地盡於功賞而稅臧殫於繼孤也是特名羅於為君耳無壤之有號有百乘之守而實無尺壤之用故謂託食之君然則大國內款小國用盡何以及此曰百乘之國官賦䡄符乘四時之朝夕御之以輕重之准然後百乘可及也千乘之國封天財之所殖械器之所出財物之所生視歲之滿虛而輕重其祿然後千乘可足也萬乘之國守歲之滿虛乘民之緩急正其號令而御其大准然後萬乘可資也玉起於禺氏績按音虞金起於汝漢珠起於赤野東南西北距周七千八百里水絶壤斷舟車不能通先王為其途之逺其至之難故託用於其重以珠玉為上幣以黃金為中幣以刀布為下幣三幣握之則非有補於暖也食之則非有補於飽也先王以守財物以御民事而平天下也績按通典引此天下也下有是以命之曰衡衡者使物一髙一下不得有調也注若五榖與萬物平則人無其利故設上中下之幣而行輕重之術使一髙一下乃可權制利門悉歸於上今人君籍求於民令曰十日而具則財物之賈什去一令曰八日而具則財物之賈什去二令曰五日而具則財物之賈什去半朝令而夕具則財物之賈什去九先王知其然故不求於萬民而籍於號令也山國䡄第七十四管子輕重七桓公問管子曰請問官國䡄管子對曰田有䡄人有䡄用有䡄鄉有䡄人事有䡄幣有䡄縣有䡄國有䡄不通於䡄數而欲為國不可桓公曰行䡄數奈何對曰某鄉田若干人事之准若干榖重若干曰某縣之人若干田若干幣若干而中用榖重若干而中幣終歲度人食其餘若干曰某鄉女勝事者終歲績其功業若干以功業直時而櫎之終歲人已衣被之後餘衣若干别羣䡄相壤宜桓公曰何謂别羣䡄相壤宜管子對曰有莞蒲之壤有竹箭檀柘之壤有汜下漸澤之壤有水潦魚鱉之壤今四壤之數君皆善官而守之則籍於財物不籍於人畝十畝之壤君不以䡄守則民且守之民有過移長力不以本為得此君失也桓公曰䡄意安出管子對曰不隂據其䡄皆下制其上桓公曰此若言何謂也管子對曰某鄉田若干食者若干某鄉之女事若干餘衣若干謹行州里曰田若干人若干人衆田不度食若干曰田若干餘食若干必得䡄程此調之泰䡄也然後調立環乘之幣田䡄之有餘於其人食者謹置公幣焉大家衆小家寡山田間田曰終歲其食不足於其人若干則置公幣焉以滿其准重歲豐年五榖登謂髙田之萌績按萌田民也曰吾所寄幣於子者若干鄉榖之櫎若干請為子什减三榖為上幣為下髙田撫間田山不被榖十倍山田以君寄幣振其不贍未淫決一作失也髙田以時撫於主上坐長加十也女貢織帛茍合于國奉者皆置而劵之以鄉櫎市准曰上無幣有榖以穀准幣環穀而應策國奉決榖反准賦䡄幣榖廩重有加十謂大家委資家曰上且鄰循游人出若干幣謂鄰縣曰有實者皆勿左右不贍則且為人馬假其食民鄰縣四面皆櫎榖坐長而十倍上下令曰資家假幣皆以榖准幣直幣而庚之榖為下幣為上百都百縣䡄據榖坐長十倍環榖而應假幣國幣之九在上一在下幣重而萬物輕斂萬物應之以幣幣在下萬物皆在上萬物重十倍府官以市櫎出萬物除而止國䡄布於未形據其已成乘令而進退無求於民謂之國䡄桓公問於管子曰不籍而贍國為之有道乎管子對曰䡄守其時有官天財何求於民桓公曰何謂官天財管子對曰泰春民之功䌛泰夏民之令之所止令之所發謂山澤之所禁發泰秋民之令之所止令之所發泰冬民之令之所止令之所發此皆民所以時守也此物之髙下之時也此民之所以相并兼之時也君守諸四務桓公曰何謂四務管子對曰泰春民之且所用者君以廪之矣泰夏民之且所用者君已廪之矣泰秋民之且所用者君已廩之矣泰冬民之且所用者君已廩之矣廩藏也言四時人之所要皆先備之所謂耒耜器械種餉糧食必取贍焉則豪人大賈不得擅其利泰春功布日春縑衣夏單衣捍籠纍箕勝籯屑糗若干日之功用人若干無資之家皆假之械器勝籯屑糗公衣功已而歸公衣折劵故力出於民而用出於上春十日不害耕事夏十日不害耘事秋十日不害斂實冬二十日不害除田此之謂時作桓公曰善吾欲立䡄官為之奈何管子對曰鹽鐵之策足以立䡄官桓公曰奈何管子對曰龍夏之地布黃金九千以幣貨金巨家以金小家以幣周岐山至於崢丘之西塞丘者山邑之田也布幣稱貧富而調之周夀陵而東至少沙者中田也據之以幣巨家以金小家以幣三壤已撫而國榖再什倍梁渭陽瑣之牛馬滿齊衍請驅之顛齒量其髙壯曰國為師旅戰車驅就斂子之牛馬上無幣請以榖視市櫎而庚子牛馬為上粟二家立資散其粟反准牛馬歸於上管子曰請立資於民有田倍之內毋有其外外皆為資壤被鞍之馬千乘齊之戰車之具具於此無求於民此去丘邑之籍也國榖之朝夕在上山林廩械器之髙下在上春秋冬夏之輕重在上行田疇田中有木者謂之榖賊宫中四榮樹其餘曰害女功宫室械器非山無所仰然後君立三等之租於山曰握以下者為柴楂把以上者為室奉三圍以上為棺槨之奉柴楂之租若干室奉之租若干棺槨之租若干管子曰鹽鐵撫䡄榖一廩十君常操九民衣食而繇下安無怨咎去其田賦以租其山巨家重葬其親者服重租小家菲葬其親者服小租巨家美修其宫室者服重租小家為室廬者服小租上立䡄於國民之貧富如加之以繩謂之國䡄山權數第七十五管子輕重八桓公問管子曰請問權數管子對曰天以時為權地以財為權人以力為權君以令為權失天之權則人地之權亡桓公曰何為失天之權則人地之權亡管子對曰湯七年旱禹五年水民之無􅕷賣子者績按􅕷章延反糜也湯以莊山之金鑄幣而贖民之無􅕷賣子者禹以歷山之金鑄幣而贖民之無􅕷賣子者故天權失人地之權皆失也故王者歲守十分之參三年與少半成歲三十一年而藏十一年與少半藏參之一不足以傷民而農夫敬事力作故天毁埊古地字凶旱水泆民無入於溝壑乞請者也此守時以待天權之道也桓公曰善吾欲行三權之數為之奈何管子對曰梁山之陽綪絤夜石之幣天下無有管子曰以守國榖歲守一分以行五年國榖之重什倍異日管子曰請立幣國銅以二年之粟顧之立黔落力重與天下調彼重則見射輕則見泄故與天下調泄者失權也見射者失策也不備天權下相求備准下隂相𨽻此刑罰之所起而亂之之本也故平則不平民富則不如貧委積則虛矣此三權之失也已桓公曰守三權之數奈何管子對曰大豐則藏分厄亦藏分桓公曰厄者所以益也何以藏分管子對曰隘則易益也一可以為十十可以為百以厄守豐厄之准數一上十豐之策數十去九則吾九為餘於數策豐則三權皆在君此之謂國權桓公問於管子曰請問國制管子對曰國無制地有量桓公曰何謂國無制地有量管子對曰髙田十石間田五石庸田三石其餘皆屬諸荒田地量百畝一夫之力也粟賈一粟賈十粟賈三十粟賈百其在流策者百畝從中千畝之策也然則百乘從千乘也千乘從萬乘也故地有量國無策桓公曰善今欲為大國大國欲為天下不通權策其無能者矣桓公曰今行權奈何管子對曰君通於廣狹之數不以狹畏廣通於輕重之數不以少畏多此國策之大者也桓公曰善蓋天下視海內長譽而無止為之有道乎管子對曰有曰䡄守其數准平其流動於未形而守事已成物一也而十是九為用徐疾之數輕重之策也一可以為十十可以為百引十之半而藏四以五操事在君之決塞桓公曰何謂決塞管子曰君不髙仁則國不相被君不髙慈孝則民簡其親而輕過此亂之至也則君請以國策十分之一者樹表置髙鄉之孝子聘之幣孝子兄弟衆寡不與師旅之事樹表置髙而髙仁慈孝財散而輕乘輕而守之以策則十之五有在上運五如行事如日月之終復此長有天下之道謂之准道桓公問於管子曰請問教數管子對曰民之能明於農事者置之黃金一斤直食八石民之能蕃育六畜者置之黃金一斤直食八石民之能樹藝者置之黃金一斤直食八石民之能樹瓜瓠葷菜百果使蕃育者置之黃金一斤直食八石民之能已民疾病者置之黃金一斤直食八石民之知時曰歲且厄曰某榖不登曰某榖豐者置之黃金一斤直食八石民之通於蠶桑使蠶不疾病者皆置之黃金一斤直食八石謹聽其言而藏之官使師旅之事無所與此國策之者也國用相靡而足相困揲而咨然後置四限髙下令之徐疾驅屏萬物守之以策有五官技桓公曰何謂五官技管子曰詩者所以記物也時者所以記歲也春秋者所以記成敗也行者道民之利害也易者所以守凶吉成敗也卜者卜凶吉利害也民之能此者皆一馬之田一金之衣此使君不迷妄之數也六家者即見其時使豫先蚤閒之日受之故君無失時無失策萬物興豐無失利逺占得失以為末教詩記人無失辭行殫道無失義易守禍福凶吉不相亂此謂君㨀桓公問於管子曰權柄之數吾已得聞之矣守國之固奈何曰能皆已官時皆已官得失之數萬物之終始君皆已官之矣其餘皆以數行桓公曰何謂以數行管子對曰榖者民之司命也智者民之輔也民智而君愚下富而君貧下貧而君富此之謂事名二國機徐疾而已矣君道度法而已矣人心禁繆而已矣桓公曰何謂度法何謂禁繆管子對曰度法者量人力而舉功禁繆者非往而戒來故禍不萌通而民無患咎桓公曰請問心禁管子對曰晉有臣不忠於其君慮殺其主謂之公過諸公過之家毋使得事君此晉之過失也齊之公過坐立長差惡惡乎來刑善善乎來榮戒也此之謂國戒桓公問管子曰輕重准施之矣策盡於此乎管子曰未也將御神用寶桓公曰何謂御神用寶管子對曰北郭有掘闕而得龜者掘穿也穿地至泉曰闕此檢數百里之地也檢猶比也以此龜為用者其數可比百里之地桓公曰何謂得龜百里之地管子對曰北郭之得龜者令過之平盤之中過之猶置之也平盤者大盤也君請起十乘之使百金之提起發也提裝也命北郭得龜之家曰賜若服中大夫若汝也中大夫齊爵也曰東海之子類於龜東海之子其狀類龜假言此龜東海之子耳東海之子者海神之子也託舍於若託舍猶寄居也賜若大夫之服以終而身而若也勞若以百金勞賜之也之龜為無資之是也是龜至寶而無資也無資無價也而藏諸泰臺秦臺髙臺也一日而釁之以四牛立寶曰無資立龜為寶號曰無資還四年伐孤竹還四年後四年丁氏之家粟丁氏齊之富人所謂丁惠也可食三軍之師行五月可以意料行五月經五月召丁氏而命之曰吾有無資之寶於此吾今將有大事請以寶為質於子以假子之邑粟即家粟也丁氏北鄉再拜入粟不敢受寶質桓公命丁氏曰寡人老矣為子者不知此數終受吾質丁氏歸革築室賦籍藏龜革更也賦敷也籍席也還四年伐孤竹謂丁氏之粟中食三軍五月之食桓公立貢數文行中七年龜中四千金黑白之子當千金凡貢制中二齊之壤策也用貢國危出寶國安行流桓公曰何謂流管子對曰物有豫則君失策而民失生矣故善為天下者操於二豫之外桓公曰何謂二豫之外管子對曰萬乘之國不可以無萬金之蓄飾千乘之國不可以無千金之蓄飾百乘之國不可以無百金之蓄飾以此與令進退此之謂乘時山至數第七十六管子輕重九桓公問管子曰梁聚謂寡人曰古者輕賦稅而肥籍斂取下無順於此者矣梁聚之言何如管子對曰梁聚之言非也彼輕賦稅則倉廩虛肥籍斂則械器不奉械器不奉而諸侯之皮幣不衣倉廩虛則倳賤無祿外皮幣不衣於天下內國倳賤梁聚之言非也君有山山有金以立幣以幣准榖而授祿故國榖斯在上榖賈什倍農夫夜寢蚤起不待見使五穀什倍士半祿而死君農夫夜寢蚤起力作而無止彼善為國者不曰使之使不得不使不曰貧之使不得不用故使民無有不得不使者夫梁聚之言非也桓公曰善桓公又問於管子曰有人教我謂之請士曰何不官百能管子對曰何謂百能桓公曰使智士盡其智謀士盡其謀百工盡其巧若此則可以為國乎管子對曰請士之言非也祿肥則士不死幣輕則士簡賞萬物輕則士偷幸三怠在國何數之有彼榖十藏於上三遊於下謀士盡其慮智士盡其知勇士輕其死請士所謂妄言也不通於輕重謂之妄言桓公問於管子曰昔者周人有天下諸侯賔服名教通於天下而奪於其下何數也管子對曰君分壤而貢入市朝同流黃金一策也江陽之珠一策也秦之明山之曽青一策也此謂以寡為多以狹為廣䡄出之屬也桓公曰天下之數盡於䡄出之屬也今國榖重什倍而萬物輕大夫謂賈之子為吾運榖而斂財榖之重一也今九為餘榖重而萬物輕若此則國財九在大夫矣國歲反一財物之九者皆倍重而出矣財物在下幣之九在大夫然則幣穀羡在大夫也天子以客行令以時出熟榖之人亡諸侯受而官之連朋而聚與髙下萬物以合民用內則大夫自還而不盡忠外則諸侯連朋合與熟榖之人則去亡故天子失其權也桓公曰善桓公又問管子曰終身有天下而勿失為之有道乎管子對曰請勿施於天下獨施之於吾國桓公曰此若言何謂也管子對曰國之廣狹壤之肥墝有數終歲食餘有數彼守國者守榖而已矣曰某縣之壤廣若干某縣之壤狹若干國之廣狹肥墝人之所食多少其數君素皆知之則必積委幣委蓄也各於縣州里蓄積錢幣所謂萬室之邑必有萬鍾之藏藏繦千萬千室之邑必有千鍾之藏藏繦百萬於是縣州里受公錢公錢即積委之幣泰秋國榖去參之一去减也君下令謂郡縣屬大夫里邑皆籍粟入若干榖重一也以藏於上者一其榖價而收藏之國榖參分則二分在上矣言先幣於縣邑當秋時下令收糴也則魏李悝行平糴之法上熟糴三捨一中熟糴二捨一下熟中分之蓋出於此今言出三之一者約中熟為准耳泰春國榖倍重數也泰夏賦榖以市櫎民皆受上榖以治田土泰秋田榖之存豫者若干今上斂榖以幣民曰無幣以榖則民之三有歸於上矣言當春穀貴之時計其價以穀賦與人秋則斂其幣雖設此令本意收其榖入既無幣請輸穀故穀歸於上矣重之相因時之化舉無不為國策重之相因若春時榖貴與榖也時之化舉若秋時榖賤收榖也四時之輕重無不以術權之君用大夫之委以流歸於上君用民以時歸於君藏輕出輕以重數也則彼安有自還之大夫獨委之彼諸侯之榖十使吾國榖二十則諸侯榖歸於吾國矣諸侯榖二十吾國榖十則吾國榖歸於諸侯矣故善為天下者謹守重流重流謂嚴守穀價不使流散而天下不吾泄矣泄散也吾穀不散出彼重之相歸如水之就下吾國歲非凶也以幣藏之故國榖倍重故諸侯之榖至也是藏一分以致諸侯之一分也利不奪於天下大夫不得以富侈以重藏輕國常有十國之策也故諸侯服而無正臣櫎從而以忠此以輕重御天下之道也謂之數應桓公問於管子白請問國㑹管子對曰君失大夫為無伍失民為失下故守大夫以一縣之策守一縣以一鄉之策守一鄉以一家之策守一家以一人之策桓公曰其㑹數奈何管子對曰幣准之數一縣必有一縣中田之策一鄉必有一鄉中田之策一家必有一家直人之用故不以時守郡為無與不以時守鄉為無伍桓公曰行此奈何管子對曰王者藏於民霸者藏於大夫殘國亡家藏於篋桓公曰何謂藏於民請散棧臺之錢散諸城陽鹿臺之布散諸濟隂君下令於百姓曰民富君無與貧民貧君無與富故賦無錢布府無藏財資藏於民歲豐五榖登五榖大輕榖賈去上歲之分以幣據之榖為君幣為下國幣盡在下幣輕榖重上分上歲之二分在下下歲之二分在上則二歲者四分在上則國穀之一分在下榖三倍重邦布之籍終歲十錢人家受食十畝加十是一家十戶也出於國穀策而藏於幣者也以國幣之分復布百姓四減國榖三在上一在下復策也大夫聚壤而封積實而驕上請奪之以㑹桓公曰何謂奪之以㑹管子對曰粟之三分在上謂民萌皆受上粟度君藏焉五榖相靡而重去什三為餘以國幣榖准反行大夫無什於重君以幣賦祿什在上君出榖什而去七君斂三上賦七散振不資者仁義也五榖相靡而輕數也以鄉完重而籍國數也出實財散仁義萬物輕數也乘時進退故曰王者乘時聖人乘易桓公曰善桓公問管子曰特命我曰天子三百領泰嗇而散大夫准此而行此如何管子曰非法家也大夫髙其壟美其室此奪農事及市庸此非便國之道也民不得以織為縿綃而貍之於地彼善為國者乘時徐疾而已矣謂之國㑹桓公問管子曰請問爭奪之事何如管子曰以戚始桓公曰何謂用戚始管子對曰君人之主弟兄十人分國為十兄弟五人分國為五三世則昭穆同祖十世則為祏故伏尸滿衍兵決而無止輕重之家復遊於其間故曰毋豫人以壤毋授人以財財終則有始與四時廢起聖人理之以徐疾守之以決塞奪之以輕重行之以仁義故與天壤同數此王者之大轡也桓公問管子曰請問幣乘馬管子對曰始取夫三大夫之家方六里而一乘二十七人而奉一乘幣乘馬者方六里田之美惡若干榖之多寡若干榖之貴賤若干凡方六里用幣若干榖之重用幣若干故幣乘馬者布幣於國幣為一國陸地之數謂之幣乘馬桓公曰行幣乘馬之數奈何即臣乘馬所謂篋乘馬者臣猶實也篋者以幣為篋而泄重射輕管子對曰士受資以幣大夫受邑以幣人馬受食以幣則一國之榖資在上幣資在下國榖什倍數也萬物財物去什二策也皮革筋角羽毛竹箭器械財物茍合于國器君用者皆有矩劵於上矩券常劵君實鄉州藏焉周制萬二千二五百家為鄉千五百家為州齊雖伯國尚用周制曰某月某日茍從責者鄉決州決故曰就庸一日而決國策出於榖䡄國之策貨幣乘馬者也貨價也言應合受公家之所給皆與之幣則榖之價君上權之其幣在下故榖倍重其有皮革之類堪於所用者所在鄉州有其數若今官曹簿帳人有負公家之債若耒耜種糧之類者官司如要器用若皮革之類者則與其准納如要功庸者令就役一日除其簿書耳此蓋君上一切權之也詳輕重之本旨摧抑富商兼并之家隘塞利門則與奪貧富悉由號令然可易為理也今刀布藏於官府巧幣萬物輕重皆在賈之彼幣重而萬物輕幣輕而萬物重彼榖重而榖輕人君操榖幣金衡而天下可定也此守天下之數也桓公問於管子曰准衡輕重國㑹吾得聞之矣請問縣數管子對曰狼牡以至於馮㑹之日龍夏以北至于海莊禽獸羊牛之地也何不以此通國策哉桓公曰何謂通國策管子對曰馮市門一吏書贅直事若其事唐圉牧食之人飬視不失扞殂者去其都秩與其縣秩大夫不鄉贅合游者謂之無禮義大夫幽其春秋列民幽其門山之祠馮㑹龍夏牛羊犧牲月賈什倍異日此出諸禮義籍於無用之地因捫牢策也謂之通桓公問管子曰請問國勢管子對曰有山處之國有汜下多水之國有山地分之國有水泆之國有漏壤之國此國之五勢人君之所憂也山處之國常藏國榖三分之一汜下多水之國常操國榖三分之一山地分之國常操國穀十分之三水泉之所傷水泆之國常操十分之二漏壤之國謹下諸侯之五穀與工雕文梓器以下天下之五穀此准時五勢之數也桓公問管子曰今有海內縣諸侯則國勢不用已乎管子對曰今以諸侯為䇡公州之飾焉以乘四時行捫牢之策以東西南北相彼用平而准故曰為諸侯則髙下萬物以應諸侯遍有天下則賦幣以守萬物之朝夕調而已利有足則行不滿則有止王者鄉州以時察之故利不相傾縣死其所君守大奉一謂之國簿管子補注卷二十二
