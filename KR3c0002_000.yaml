body:
  text: 管子補注法家類提要臣等謹案管子補注二十四卷明劉績撰績字用熙號蘆泉江夏人𢎞治庚戌進士官至鎮江府知府管子舊注本或稱房𤣥齡或稱尹知章宋張嵲跋其後曰管子書多古字如専作摶忒作貣宥作侑况作兄釋作澤此類甚衆大匡載召忽語曰雖得天下吾不生也兄與我齊國之政也注乃謂召忽呼管仲為兄曰澤命不渝注乃以為恩澤之命不可遍舉黃震日抄曰管子注釋最多抵牾四傷之篇誤名百匿而以四傷名七法之篇幼官篇首章云若因夜虛守靜人物則皇其後方之圖本可覆也乃衍人物二字不知參對乃以夜虛為句守靜人物為句而曲為之說曰聽候人物也幼官五圖以形生理為句而中央之注獨以形生屬上文明法篇以比周以相匿為句而下又云是故忘生死交其後方之明法解可覆也乃以相為匿是為句而曲為之說曰匿公是而不行也五法之章曰天下不患無財患無人以分之分如分地之利之分乃釋云可以分與財者賢人也立政之章曰道塗無行禽指人言之謂其為能行之禽耳乃釋云無禽獸之行版法篇云恱在施愛有衆在廢私今因缺文而云恱在施有衆在廢私不成文矣云云其抉摘皆中理績本之以作是注故於舊解頗有匡正皆附於𤣥齡原注之後以績按别之雖其循文詮解於訓詁亦罕所考訂而推求意義務求明愜較原注所得則已多矣案明有兩劉績一為山隂人字孟熙千頃堂書目載此書於劉績名下注江夏人則為字用熙者無疑坊刻或題曰宋劉績者誤也乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:c3bd288ee8c7ac0791ff2b665938db6b80b50da8c861fb5b593000b4d0faecf5
