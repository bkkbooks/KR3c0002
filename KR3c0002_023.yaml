body:
  text: 管子補注卷二十三明劉績撰地數第七十七管子輕重十桓公曰地數可得聞乎管子對曰地之東西二萬八千里南北二萬六千里其出水者八千里受水者八千里出銅之山四百六十七山出鐵之山三千六百九山此之所以分壤樹榖也戈矛之所發刀幣之所起也能者有餘拙者不足封於泰山禪於梁父封禪之王七十二家得失之數皆在此内是謂國用桓公曰何謂得失之數皆在此管子對曰昔者桀霸有天下而用不足湯有七十里之薄而用有餘天非獨為湯雨菽粟而地非獨為湯出財物也伊尹善通移輕重開闔決塞通於髙下徐疾之筴坐起之費時也黄帝問於伯髙曰吾欲陶天下而以為一家為之有道乎伯髙對曰請刈其莞而樹之吾謹逃其蚤牙則天下可陶而為一家黄帝曰此若言可得聞乎伯髙對曰上有丹沙者下有黄金上有慈石者下有銅金上有陵石者下有鈆錫赤銅上有赭者下有鐵此山之見榮者也茍山之見其榮者君謹封而祭之距封十里而為一壇是則使乘者下行行者趨若犯令者罪死不赦然則與折取之逺矣修教十年而葛盧之山發而出水金從之蚩尤受而制之以為劒鎧矛㦸是歲相兼者諸侯九雍狐之山發而出水金從之蚩尤受而制之以為雍狐之㦸芮戈是歲相兼者諸侯十二故天下之君頓㦸一怒伏尸滿野此見戈之本也桓公問於管子曰請問天財所出地利所在管子對曰山上有赭者其下有鐵上有鈆者其下有銀一曰上有鈆者其下有鉒銀上有丹沙者其下有鉒金上有慈石者其下有銅金此山之見榮者也茍山之見榮者謹封而為禁有動封山者罪死而不赦有犯令者左足入左足斷右足入右足斷然則其與犯之逺矣此天財地利之所在也桓公問於管子曰以天財地利立功成名於天下者誰子也管子對曰文武是也桓公曰此若言何謂也管子對曰夫玉起於禺氏邊山金起於汝漢之右洿珠起於赤野之末光此皆距周七千八百里其涂逺而至難故先王各用於其重珠玉為上幣黄金為中幣刀布為下幣令疾則黄金重令徐則黄金輕先王權度其號令之徐疾髙下其中幣而制下上之用則文武是也桓公問於管子曰吾欲守國財而毋税於天下而外因天下可乎管子對曰可夫水激而流渠令疾而物重先王理其號令之徐疾内守國財而外因天下矣桓公問於管子曰其行事奈何管子對曰夫昔者武王有巨橋之粟貴糴之數武王既勝殷得巨橋粟欲使糴貴巨橋倉在今廣平郡曲周縣也桓公曰為之奈何管子對曰武王立重泉之戍戍名也假設此戍名欲人憚役而競取粟也令曰民自有百鼓之粟者不行榖十二斛也民舉所最粟舉盡也最聚也以避重泉之戍而國穀二什倍巨橋之粟亦二什倍武王以巨橋之粟二什倍而市繒帛軍五歲毋籍衣於民以巨橋之粟二什倍而衡黄金百萬衡平也終身無籍於民准衡之數也桓公問於管子曰今亦可以行此乎管子對曰可夫楚有汝漢之金齊有渠展之鹽燕有遼東之煑此三者亦可以當武王之數十口之家十人咶鹽百口之家百人咶鹽凡食鹽之數一月丈夫五升少半婦人三升少半嬰兒二升少半鹽之重升加分耗而釡五十升加一耗而釡百升加什耗而釡千君伐菹薪煑泲水為鹽正而積之三萬鍾至陽春請籍於時桓公曰何謂籍於時管子曰陽春農事方作令民毋得築垣牆毋得繕冢墓丈夫毋得治宫室毋得立臺榭北海之衆毋得聚庸而煑鹽然鹽之賈必四什倍君以四什之賈修河濟之流南輸梁趙宋衛濮陽惡食無鹽則腫守圉之本其用鹽獨重君伐菹薪煑泲水以籍於天下然則天下不減矣桓公問於管子曰吾欲富本而豐五穀可乎管子對曰不可夫本富而財物衆不能守則税於天下五穀興豐巨錢而天下貴則税於天下然則吾民常為天下擄矣夫善用本者若以身濟於大海觀風之所起天下髙則髙天下下則下天髙我下則財利税於天下矣桓公問於管子曰事盡於此乎管子對曰未也夫齊衢處之本通達所出也游子勝商之所道人求本者食吾本粟因吾本幣騏驥黄金然後出令有徐疾物有輕重然後天下之寶一為我用善者用非有使非人揆度第七十八管子輕重十一齊桓公問於管子曰自燧人以來其大㑹可得而聞乎管子對曰燧人以來未有不以輕重為天下也共工之王帝共工氏繼女媧有天下水處什之七陸處什之三乘天勢以隘制天下至於黄帝之王謹逃其爪牙不利其器藏祕鋒芒不以示人行機權之道使人日用而不知燒山林破増藪焚沛澤沛大澤也一説水草兼處曰沛逐禽獸實以益人然後天下可得而牧也至於堯舜之王所以化海内者北用禺氏之玉禺氏西北戎名玉之所出南貴江漢之珠其勝禽獸之仇以大夫隨之勝猶益也禽獸之仇者使其逐禽獸如從仇雔也以大夫隨之者使其大夫散邑粟財物隨山澤之人求其禽獸之皮桓公曰何謂也管子對曰令諸侯之子將委質者諸國君之子若衛公子聞方魯公子季友之類皆以雙虎之皮雙虎之皮以為裘卿大夫豹飾卿大夫上大夫也袖謂之飾列大夫豹幨列大夫中大夫也襟謂之幨大夫散其邑粟與其財物以市虎豹之皮故山林之人刺七亦反其猛獸若從親戚之仇此君冕服於朝而猛獸勝於外大夫已散其財物萬人得受其流此堯舜之數也言堯舜嘗用此數桓公曰事名二正名五而天下治何謂事名二對曰天筴陽也壌筴隂也此謂事名二何謂正名五對曰權也衡也規也矩也准也此謂正名五其在色者青黄白黒赤也其在聲者宫商羽徵角也其在味者酸辛醎苦甘也二五者童山竭澤人君以數制之人味者所以守民口也聲者所以守民耳也色者所以守民目也人君失二五者亡其國大夫失二五者亡其勢民失二五者亡其家此國之至機也謂之國機輕重之法曰自言能為司馬不能為司馬者殺其身以釁其鼔自言能治田土不能治田土者殺其身以釁其社自言能為官不能為官者劓以為門父故無敢姦能誣禄至於君者矣故相任寅為官都重門擊柝不能去亦隨之以法桓公問於管子曰請問大准管子對曰大准者天下皆制我而無我焉此謂大准桓公曰何謂也管子對曰今天下起兵加我臣之能謀厲國定名者割壌而封臣之能以車兵進退成功立名者割壌而封然則是天下盡封君之臣也非君封之也天下已封君之臣十里矣天下每動重封君之民二十里君之民非富也鄰國富之鄰國每動重富君之民貧者重貧富者重富大准之數也桓公曰何謂也管子對曰今天下起兵加我民棄其耒耜出持戈於外然則國不得耕此非天凶也此人凶也君朝令而夕求具民肆其財物與其五穀為讎厭分而去賈人受而廩之然則國財之一分在賈人師罷民反其事萬物反其重賈人出其財物國幣之少分廪於賈人若此則幣重三分財物之輕重三分賈人市於三分之間國之財物盡在賈人而君無筴焉民更相制君無有事焉此輕重之大准也管子曰人君操本民不得操末人君操始民不得操卒其在涂者籍之於衢塞其在榖者守之春秋其在萬物者立貲而行故物動則應之故豫奪其涂則民無遵君守其流則民失其髙故守四方之髙下國無游賈貴賤相當此謂國衡以利相守則數歸於君矣管子曰善正商任者省有肆省有肆則市朝間市朝間則田野充田野充則民財足民財足則君賦歛焉不窮今則不然民重而君重重而不能輕民輕而君輕輕而不能重天下善者不然民重則君輕民輕則君重此乃財餘以滿不足之數也故凡不能調民利者不可以為大治不察於終始不可以為至矣動左右以重相因二十國之筴也按别本二十作世字下放此鹽鐵二十國之筴也錫金二十國之筴也五官之數不籍於民桓公問於管子曰輕重之數惡終管子對曰若四時之更舉無所終國有患憂輕重五穀以調用積餘藏羨以備賞天下賔服有海内以富誠信仁義之士故民髙辭譲無為竒恠者彼輕重者諸侯不服以出戰諸侯賔服以行仁義管子曰一歲耕五歲食粟賈五倍一歲耕六歲食粟賈六倍二年耕而十一年食夫富能奪貧能予乃可以為天下且天下者處兹行兹若此而天下可一也夫天下者使之不使用之不用故善為天下者毋曰使之使不得不使毋曰用之用不得不用也管子曰善為國者如金石之相舉重鈞則金傾故治權則勢重治道則勢羸今穀重於吾國輕於天下則諸侯之自泄如原水之就下故物重則至輕則去有以重至而輕處者我動而錯之天下即已於我矣物藏則重發則輕散則多幣重則民死利幣輕則決而不用故輕重調於數而止五榖者民之司命也刀幣者溝瀆也號令者徐疾也令重於寶社稷重於親戚胡謂也對曰夫城郭拔社稷不血食無生臣親沒之後無死子此社稷之所重於親戚者也故有城無人謂之守平虚有人而無甲兵而無食謂之與禍居桓公問管子曰吾聞海内玉幣有七筴可得而聞乎管子對曰隂山之礝碈一筴也燕之紫山白金一筴也發朝鮮之文皮一筴也汝漢水之右衢黄金一筴也江陽之珠一筴也秦明山之曾青一筴也禺氏邊山之玉一筴也此謂以寡為多以狹為廣天下之數盡於輕重矣桓公問於管子曰隂山之馬具駕者千乘馬之平賈萬也金之平賈萬也吾有伏金千斤為此柰何管子對曰君請使與正籍者皆以幣還於金吾至四萬此一為四矣吾非埏埴搖鑪櫜而立黄金也今黄金之重一為四者數也珠起於赤野之末光黄金起於汝漢水之右衢玉起於禺氏之邊山此度去周七千八百里其涂逺其至阨故先王度用其重而因之珠玉為上幣黄金為中幣刀布為下幣先王髙下中幣制下上之用百乘之國中而立市東西南北度五十里一日定慮二日定載三日出竟五日而反百乘之制輕重毋過五日百乘為耕田萬頃為户萬户為開口十萬人為分者萬人為輕車百乘為馬四百匹千乘之國中而立市東西南北度百五十餘里二日定慮三日定載五日出竟十日而反千乘之制輕重毋過一旬千乘為耕田十萬頃為户十萬户為開口百萬人為當分者十萬人為輕車千乘為馬四千匹萬乘之國中而立市東西南北度五百里三日定慮五日定載十日出竟二十日而反萬乘之制輕重毋過二旬萬乘為耕田百萬頃為户百萬戸為開口千萬人為當分者百萬人為輕車萬乘為馬四萬匹管子曰匹夫為鰥匹婦為寡老而無子者為獨君問其若有子弟師役而死者父母為獨上必𦵏之衣衾三領木必三寸鄉吏視事𦵏於公壌若産而無弟兄上必賜之匹馬之壌故親之殺其子以為上用不苦也君終歲行邑里其人力同而宫室美者良萌也力作者也脯二束酒一石以賜之力足蕩㳺不作老者譙之當壯者遣之邊戍民之無本者貸之圃疆故百事皆舉無留力失時之民此皆國筴之數也上農挾五中農挾四下農挾三上女衣五中女衣四下女衣三農有常業女有常事一農不耕民有為之饑者一女不織民有為之寒者饑寒凍餓必起於糞土故先王謹於其始事再其本民無􅕷者賣其子三其本若為食四其本則鄉里給五其本則逺近通然後死得𦵏矣事不能再其本而上之求焉無止然則姦涂不可獨遵貨財不安於拘隨之以法則中内摲民也輕重不調無􅕷之民不可責理鬻子不可得使君失其民父失其子亡國之數也管子曰神農之數曰一榖不登減一穀榖之法什倍二榖不登減二榖榖之法再什倍夷疏滿之無食者予之陳無種者貸之新故無什倍之賈無倍稱之民國准第七十九管子輕重十二桓公問於管子曰國准可得聞乎管子對曰國准者視時而立儀桓公曰何謂視時而立儀對曰黄帝之王謹逃其爪牙有虞之王枯澤童山夏后之王燒増藪焚沛澤不益民之利殷人之王諸侯無牛馬之牢不利其器周人之王官能以備物五家之數殊而用一也桓公曰然則五家之數籍何者為善也管子對曰燒山林破増藪焚沛澤猛獸衆也童山竭澤者君智不足也燒増藪焚沛澤不益民利逃械器閉智能者輔已者也諸侯無牛馬之牢不利其器者曰淫器而壹民心者也以人御人逃戈刃髙仁義乘天固以安己者也五家之數殊而用一也桓公曰今當時之王者立何而可管子對曰請兼用五家而勿盡桓公曰何謂管子對曰立祈祥以固山澤立械器以使萬物天下皆利而謹操重筴童山竭澤益利搏流出山金立幣存菹丘立駢牢以為民饒彼菹菜之壌非五穀之所生也麋鹿牛馬之地春秋賦生殺老立施以守五穀此以無用之壌臧民之羸五家之數皆用而勿盡桓公曰五代之王以盡天下數矣來世之王者可得而聞乎管子對曰好譏而不亂亟變而不變時至則為過則去王數不可豫致此五家之國准也輕重甲第八十管子輕重十三桓公曰輕重有數乎管子對曰輕重無數物發而應之聞聲而乘之故為國不能來天下之財致天下之民則國不可成桓公曰何謂來天下之財管子對曰昔者桀之時女樂三萬人端譟晨樂聞於三衢是無不服文繡衣裳者伊尹以薄之游女工文繡纂組一純得粟百鍾於桀之國夫桀之國者天子之國也桀無天下憂飾婦女鍾鼓之樂故伊尹得其粟而奪之流此之謂來天下之財桓公曰何謂致天下之民管子對曰請使州有一掌里有積五窌民無以與正籍者予之長假死而不葬者予之長度饑者得食寒者得衣死者得𦵏不資者得振則天下之歸我者若流水此之謂致天下之民故聖人善用非其有使非其人動言搖辭萬民可得而親桓公曰善桓公問管子曰夫湯以七十里之薄兼桀之天下其故何也管子對曰桀者冬不為杠夏不束柎以觀凍溺㢮牝虎充市以觀其驚駭至湯而不然夷競而積粟饑者食之寒者衣之不資者振之天下歸湯若流水此桀之所以失其天下也桓公曰桀使湯得為是其故何也管子曰女華者桀之所愛也湯事之以千金曲逆者桀之所善也湯事之以千金内則有女華之隂外則有曲逆之陽隂陽之議合而得成其天子此湯之隂謀也桓公曰輕重之數國准之分吾已得而聞之矣請問用兵奈何管子對曰五戰而至於兵桓公曰此若言何謂也管子對曰請戰衡戰准戰流戰權戰勢此所謂五戰而至於兵者也桓公曰善桓公欲賞死事之後曰吾國者衢處之國饋食之都虎狼之所棲也今每戰輿死扶傷如孤荼首之孫仰倳㦸之寳吾無由予之為之奈何管子對曰吾國之豪家遷封食邑而居者君章之以物則物重不章以物則物輕守之以物則物重不守以物則物輕故遷封食邑富商蓄賈積餘藏羨跱蓄之家此吾國之豪也故君請縞素而就士室朝功臣世家遷封食邑積餘藏羨跱蓄之家曰城脆致衝無委致圍天下有慮齊獨不與其謀子大夫有五榖菽粟者勿敢左右請以平賈取之子與之定其劵契之齒釡鏂之數不得為侈弇焉困窮之民聞而糴之釡鏂無止逺通不推國粟之賈坐長而四十倍君出四十倍之粟以振孤寡牧貧病視獨老窮而無子者靡得相鬻而飬之勿使赴於溝澮之中若此則士争前戰為顔行不偷而為用輿死扶傷死者過半此何故也士非好戰而輕死輕重之分使然也桓公曰皮幹筋角之徵甚重重籍於民而貴市之皮幹筋角非為國之數也管子對曰請以令髙杠柴池使東西不相睹南北不相見桓公曰諾行事期年而皮幹筋角之徵去分民之籍去分桓公召管子而問曰此何故也管子對曰杠池平之時夫妻服簟輕至百里今髙扛柴池東西南北不相睹天酸然雨十人之力不能上廣澤遇雨十人之力不可得而恃夫舍牛馬之力所無因牛馬絶罷而相繼死其所者相望皮幹筋角徒予人而莫之取牛馬之賈必坐長而百倍天下聞之必離其牛馬而歸齊若流故髙杠柴池所以致天下之牛馬而損民之籍也道若祕云物之所生不若其所聚桓公曰弓弩多匡䡔者績按䡔苦禮切礙也而重籍於民奉繕工而使弓弩多匡䡔者其故何也管子對曰鵝鶩之舍近鵾雞鵠䳈䳈布老切之通逺鵠鵾之所在君請式璧而聘之桓公曰諾行事期年而上無闕者前無趨人三月解􅂒弓弩無匡䡔者召管子而問曰此何故也管子對曰鵠鵾之所在君式璧而聘之菹澤之民聞之越平而射逺非十鈞之弩不能中鵾雞鵠䳈彼十鈞之弩不得棐擏不能自正故三月解􅂒而弓弩無匡䡔者此何故也以其家習其所也桓公曰寡人欲籍於室屋管子對曰不可是毁成也欲籍於萬民管子曰不可是隱情也欲籍於六畜管子對曰不可是殺生也欲籍於樹木管子對曰不可是伐生也然則寡人安籍而可管子對曰君請籍於鬼神桓公忽然作色曰萬民室屋六畜樹木且不可得籍鬼神乃可得而籍夫管子對曰厭宜乘勢事之利得也計議因權事之囿大也王者乘勢聖人乘幼與物皆宜桓公曰行事奈何管子對曰昔堯之五吏五官無所食君請立五厲之祭祭堯之五吏春獻蘭秋歛落原魚以為脯鯢以為殽若此則澤魚之正百倍異日則無屋粟邦布之籍此之謂設之以祈祥推之以禮義也然則自足何求於民也桓公曰天下之國莫彊於越今寡人欲北舉事孤竹離枝恐越人之至為此有道乎管子對曰君請遏原流大夫立池沼令以矩游為樂則越人安敢至桓公曰行事奈何管子對曰請以令隱三川立員都立大舟之都大身之都有深淵壘十仞令曰能㳺者賜千金未能用金千齊民之㳺水不避吳越桓公終北舉事於孤竹離枝越人果至隱曲薔以水齊管子有扶身之士五萬人以待戰於曲薔大敗越人此之謂水豫齊之北澤燒火獵而行火曰燒式照反光照堂下管子入賀桓公曰吾田野辟農夫必有百倍之利矣是歲租税九月而具粟又美桓公召管子而問曰此何故也管子對曰萬乘之國千乘之國不能無薪而炊今北澤燒莫之續則是農夫得居裝而賣其薪蕘大曰薪小曰蕘一束十倍則春有以倳耜夏有以決芸此租税所以九月而具也桓公憂北郭民之貧召管子而問曰北郭者盡屨縷之甿也以唐園為本利為此有道乎管子對曰請以令禁百鍾之家不得事鞽千鍾之家不得為唐園去市三百步者不得樹葵菜若此則空聞有以相給資則北郭之甿有所讎其手搔之功唐園之利故有十倍之利管子曰隂王之國有三而齊與在焉桓公曰此若言可得聞乎管子對曰楚有汝漢之黄金而齊有渠展之鹽燕有遼東之煑此隂王之國也且楚之有黄金中齊有薔石也茍有操之不工用之不善天下倪而是耳使夷吾得居楚之黄金吾能令農毋耕而食女毋織而衣今齊有渠展之鹽渠展齊地沛水所流入海之處可煑鹽之所也故曰渠展之鹽請君伐菹薪草枯曰菹煑水為鹽煑海水也正而積之桓公曰諾十月始正至於正月成鹽三萬六千鍾召管子而問曰安用此鹽而可管子對曰孟春既至農事且起大夫無得繕冢墓理宫室立臺榭築牆垣北海之衆無得聚庸庸功也而煑鹽北海之衆謂北海煑鹽之人本意禁人煑鹽下令託以農事慮有妨奪先自大夫起欲人不知其機斯為權術若此則鹽必坐長而十倍桓公曰善行事奈何管子對曰請以令糶之梁趙宋衛濮陽彼盡饋食之國也本國自無逺饋而食無鹽則腫守圉之國圉與禦同用鹽獨甚桓公曰諾乃以令使糶之得成金萬一千餘斤桓公召管子而問曰安用金而可管子對曰請以令使賀獻出正籍者必以金金坐長而百倍運金之重以衡萬物盡歸於君故此所謂用若挹於河海若輸之給馬此隂王之業管子曰萬乘之國必有萬金之賈千乘之國必有千金之賈百乘之國必有百金之賈非君之所賴也君之所與故為人君而不審其號令則中一國而二君二王也桓公曰何謂一國而二君二王也管子對曰今君之籍取以正萬物之賈輕去其分皆入於商賈此中一國而二君二王故賈人乘其弊以守民之時貧者失其財是重貧也農夫失其五榖是重竭也故為人君而不能謹守其山林菹澤草萊不可以立為天下王桓公曰此若言何謂也管子對曰山林菹澤草萊者薪蒸之所出犧牲之所起也故使民求之使民籍之因以給之私愛之於民若弟之與兄子之與父也然後可以通財交殷也故請取君之游財而邑里布積之陽春蠶桑且至請以給其口食笝曲之彊若此則絓絲之籍去分而歛矣且四方之不至六時制之春日倳耜次日獲麥次日薄芋次日樹麻次日絶菹次日大雨且至趣芸壅培六時制之臣給至於國都善者鄉因其輕重守其委廬故事至而不妄然後可以立為天下王管子曰一農不耕民或為之饑一女不織民或為之寒故事再其本則無賣其子者事三其本則衣食足事四其本則正籍給事五其本則逺近通死得藏今事不能再其本而上之求焉無止是使姦涂不可獨行遺財不可拘止隨之以法則是下艾民食三升則鄉有正食而盜食二升則里有正食而盜食一升則家有正食而盜今操不反之事而食四十倍之粟而求民之毋失不可得矣且君朝令而求夕具有者出其財無有者賣其衣屨農夫糶其五榖三分賈而去是君朝令一怒布帛流越而之天下君求焉而無止民無以待之走亡而棲山阜持戈之士顧不見親家族失而不分民走於中而士遁於外此不待戰而内敗管子曰今為國有地牧民者務在四時守在倉廪國多財則逺者來地辟舉則民留處倉廩實則知禮節衣食足則知榮辱今君躬犂墾田耕發草土得其榖矣民人之食有人若干步畆之數然而有餓餒於衢閭者何也榖有所藏也今君鑄錢立幣民通移人有百十之數然而民有賣子者何也財有所并也故為人君不能散積聚調髙下分并財君雖强本趣耕發草立幣而無止民猶若不足也桓公問於管子曰今欲調髙下分并財散積聚不然則世且并兼而無止蓄餘藏羨而不息貧賤鰥寡獨老不與得焉散之有道分之有數乎管子對曰唯輕重之家為能散之耳請以令輕重之家桓公曰諾東車五乘迎癸乙於周下原桓公問四因與癸乙管子甯戚相與四坐桓公曰請問輕重之數癸乙曰重籍其民者失其下數欺諸侯者無權與管子差肩而問曰吾不籍吾民何以奉車革不籍吾民何以待鄰國癸乙曰唯好心為可耳夫好心則萬物通萬物通則萬物運萬物運則萬物賤萬物賤則萬物可因知萬物之可因而不因者奪於天下奪於天下者國之大賊也桓公曰請問好心萬物之可因癸乙曰有餘富無餘乘者責之卿諸侯足其所不賂其游者責之令大夫若此則萬物通萬物通則萬物運萬物運則萬物賤萬物賤則萬物可因矣故知三准同筴者能為天下不知三准之同筴者不能為天下故申之以號令抗之以徐疾也民乎其歸我若流水此輕重之數也桓公問於管子曰今倳㦸十萬薪菜之靡日虚十里之衍頓㦸一譟而靡幣之用日去千金之積乆之且何以待之管子對曰粟賈平四十則金賈四千粟賈釜四十則鍾四百也十鍾四千也二十鍾者為八千也金賈四千則二金中八千也然則一農之事終歲耕百畆百畆之收不過二十鍾一農之事乃中二金之財耳故粟重黄金輕黄金重而粟輕兩者不衡立故善者重粟之賈釡四百則是鍾四千也十鍾四萬二十鍾者八萬金賈四千則是十金四萬也二十金者為八萬故發號出令曰一農之事有二十金之筴然則地非有廣狹國非有貧富也通於發號出令審於輕重之數然管子曰湩然擊鼓士忿怒鎗然擊金士帥然筴桐鼔從之輿死扶傷争進而無止口滿用手滿錢非大父母之仇也重禄重賞之所使也故軒冕立於朝爵禄不隨臣不為忠中軍行戰委予之賞不隨士不死其列陳然則是大臣執於朝而列陳之士執於賞也故使父不得子其子兄不得弟其弟妻不得有其夫唯重禄重賞為然耳故不逺道里而能威絶域之民不險山川而能服有恃之國發若雷霆動若風雨獨出獨入莫之能圉桓公曰四夷不服恐其逆政游於天下而傷寡人寡人之行為此有道乎管子對曰吴越不朝珠象而以為幣乎發朝鮮不朝請文皮毤他卧反落毛也服而以為幣乎禺氏不朝請以白璧為幣乎崐崘之虚不朝請以璆琳琅玕為幣乎故夫握而不見於手含而不見於口而辟千金者珠也然後八千里之呉越可得而朝也一豹之皮容金而金也然後八千里之發朝鮮可得而朝也懐而不見於抱挾而不見於掖而辟千金者白璧也然後八千里之禺氏可得而朝也簮珥而辟千金者璆琳琅玕也然後八千里之崐崘之虚可得而朝也故物無主事無接逺近無以相因則四夷不得而朝矣管子補注卷二十三
