body:
  text: 管子補注卷七明劉績撰大匡第十八謂以大事匡君内言一齊僖公生公子諸兒公子糺公子小白使鮑叔傅小白鮑叔辭稱疾不出管仲與召忽往見之曰何故不出鮑叔曰先人有言曰知子莫若父知臣莫若君今君知臣之不肖也是以使賤臣傅小白也鮑叔以小白年幼又不肖而賤故難為之傅也賤臣知棄矣績按言君知己不肖使傅小白于次小白不得立是君有意棄我故我不出召忽曰子固辭無出吾權任子以死亡必免子任保也君若有疑我當保子以疾困至于死亡此可以免子也身績按言子固辭傅稱疾不出君不信我權保子以死亡則君不疑必免子之傅矣鮑叔曰子如是何不免之有乎言必免也管仲曰不可以召忽言非持社稷宗廟者不讓事不廣閒社稷宗廟至重故不可讓難事而廣求閑安將有國者未可知也于三公子未可的知其人子其出乎召忽曰不可吾三人者之于齊國也譬之猶鼎之有足也去一焉則必不立矣言三人不可異其出處吾觀小白必不為後矣績按此言三人于齊猶鼎足俱事一公子則所事者能立若去一人則必不立今己既事糺故知小白必不能立為後管仲曰不然也夫國人憎惡糺之母以及糺之身而憐小白之無母也諸兒長而賤事未可知也夫所以定齊國者非此二公子者將無己也二公謂諸兒子糺言二子既不能定齊國而又不立小白即是將更無所用謂小白必得立矣績按二公子指糺小白也已以同言定齊必此二人也小白之為人無小智惕而有大慮言雖無小智能惕懼而有大慮非夷吾莫容小白小白既無小智必乖迕于俗人故非夷吾莫能容天不幸降禍加殃于齊糺雖得立事將不濟非子定社稷其將誰也糺既不濟次在小白輔小白而定社稷非子而誰子謂召忽召忽曰百嵗之後吾君卜世犯吾君命而廢吾所立奪吾糺也雖得天下吾不生也吾君卜世謂僖公之子小白等也君命謂僖公之命使立子糺今而奪焉我當致死兄與我齊國之政也受君令而不改奉所立而不濟是吾義也召忽稱管仲為兄與我齊國之政謂使知政也今受君令而立子糺不改其所奉更有所立不濟而死是為臣之義也别本註雖許我齊國之政然受君令而立子糾若不濟以死繼之是為臣之義績按兄故况字言犯命廢糺雖得天下尚不生况定齊社稷一國之政乎管仲曰夷吾之為君臣也言已立君臣之義與召忽異將承君命奉社稷以持宗廟豈死一糺哉言當為宗廟社稷致死不死於一糺夷吾之所死者社稷破宗廟滅祭祀絶則夷吾死之非此三者則夷吾生夷吾生則齊國利夷吾死則齊國不利鮑叔曰然則奈何管子曰子出奉令則可子出奉令則小白有所依故曰可鮑叔許諾乃出奉令遂傅小白鮑叔謂管仲曰何行問其事君當何所行管仲曰為人臣者不盡力於君則不親信不為君親信不親信則言不聴言不聴則社稷不定夫事君者無二心此事君之所行鮑叔許諾僖公之母弟夷仲年生公孫無知有寵於僖公衣服禮秩如適言無知之寵與適子同僖公卒以諸兒長得為君是為襄公襄公立后絀無知無知怒公令連稱管至父戍葵丘曰瓜時而往及瓜時而來期戍公問不至請代不許故二人因公孫無知以作亂魯桓公夫人文姜齊女也公將如齊與夫人偕行公謂桓公申俞諫曰不可申俞魯大夫也女有家男有室女有夫之家男有妻之室無相瀆也謂之有禮公不聴遂以文姜㑹齊侯于濼文姜通於齊侯桓公聞責文姜文姜告齊侯齊侯怒饗公使公子彭生乘魯侯脅之乘謂扶公升車拉其脅而殺之公薨於車竪曼曰竪曼齊大夫也賢者死忠以振疑百姓寓焉振敇也賢者死于忠義以救當時之疑故百姓有所託焉寓寄託也智者究理而長慮身得免焉智者既盡禮而謀慮又長故免于危亡今彭生二於君不以正道傅君而從君于昏故曰二無盡言而諛行以戯我君使我君失親戚之禮命無盡言謂不忠諫襄公通其妹故曰失親戚之禮命又力成吾君之禍以構二國之怨恃其多力拉殺魯君故曰力成吾君之禍彭生其得免乎禍理屬然禍敗之理屬於彭生夫君以怒遂禍君怒魯桓彭生則遂成其禍不畏惡親聞容昏生無醜也君而通妹是謂惡親不畏此事逺聞而忍容之然此昏愚之生於不䜟其類故曰昏生無醜醜類也豈及彭生而能止之哉及如也禍由彭生則彭生刀能之今而成禍故當誅之魯若有誅必以彭生為説二月魯人告曰寡君畏君之威不敢寧居來脩舊好禮成而不反無所歸死請以彭生除之齊人為殺彭生以謝于魯五月襄公田于貝丘見豕彘從者曰公子彭生也公怒曰公子彭生安敢見射之豕人立而啼公懼墜於車下傷足亡屨反誅屨於徒人費不得也誅責鞭之見血費走而出遇賊於門脅而束之費袒而示之背賊信之使費先入伏公而出鬭死于門中石之紛如死于階下孟陽代君寢于床賊殺之曰非君也不類見公之足於户下遂殺公而立公孫無知也鮑叔牙奉公子小白奔莒管夷吾召忽奉公子糺奔魯九年公孫無知虐於雍廩雍廪殺無知也桓公自莒先入魯人伐齊納公子糺戰於乾時管仲射桓公中鈎魯師敗績桓公踐位於是刼魯使魯人殺公子糺劫謂興兵脅之桓公問於鮑叔曰將何以定社稷鮑叔曰得管仲與召忽則社稷定矣公曰夷吾與召忽吾賊也鮑叔乃告公其故圖故圖謂管仲始謀令鮑叔傅小白将立之故公曰然則可得乎鮑叔曰若亟召則可得也不亟不可得也夫魯施伯知夷吾為人之有慧也其謀必將令魯致政於夷吾夷吾受之則彼知能弱齊矣夷吾不受彼知其將反於齊也必將殺之既不受魯政而反於齊恐其将為魯害故殺之公曰然則夷吾將受魯之政乎其否乎鮑叔對曰不受夫夷吾之不死糺也為欲定齊國之社稷也今受魯之政是弱齊也夷吾之事君無二心也雖知死必不受也君謂桓公公曰其於我也曽若是乎曽則也則能無二心如是乎鮑叔對曰非為君也為先君也其於君不如親糺也言管仲親糺多於小白也糺之不死而况君乎親尚不死䟽則可知君若欲定齊之社稷則亟迎之管仲既志在定齊社稷故須急迎之公曰恐不及奈何鮑叔曰夫施伯之為人也敏而多畏多畏則念慮深公若先反恐注怨焉必不殺也若先反管仲而施伯殺之齊必注怨故不敢公曰諾從鮑叔之言也施伯進對魯君曰管仲有急其事不濟今在魯君其致魯之政焉有急難之事與小白争國其事既不濟故來在魯可因此事而致政若受之則齊可弱也若不受則殺之殺之以説於齊也與同怒尚賢於已施伯恐管仲反齊為害欲殺之託言以説于齊若與齊同怒如此猶賢於不殺也君曰諾魯未及致政而齊之使至曰夷吾與召忽也寡人之賊也今在魯寡人願生得之若不得也是君與寡人賊比也魯君問施伯施伯曰君與之臣聞齊君惕而亟驕雖得賢庸必能用之乎庸猶何也及齊君之能用之也管子之事濟矣及猶就也就令能用之管子之事必濟也夫管仲天下之大聖也今彼反齊天下皆鄉之豈獨魯乎今若殺之此鮑叔之友也鮑叔因此以作難君必不能待也齊國強鮑叔賢故不能待待猶擬也不如與之魯君乃遂束縛管仲與召忽管仲謂召忽曰子懼乎召忽曰何懼乎吾不蚤死將胥有所定也胥待也今既定矣謂小白已定齊令子相齊之左必令忽相齊之右雖然殺君而用吾身是再辱我也君謂子糺子為生臣忽為死臣生則定社稷死則顯忠義忽也知得萬乘之政而死公子糺可謂有死臣矣子生而霸諸侯公子糺可謂有生臣矣死者成行死者忠義之行生者成名生定社稷之名名不兩立既成生名不可又成死名行不虚至必致身受命乃謂之行也子其勉之死生有分矣乃行入齊境自刎而死管仲遂入君子聞之曰召忽之死也賢其生也召忽之生不能霸諸侯管仲之生也賢其死也管仲之死不成九合之功或曰明年集書者更聞異説故言或曰明年襄公立之明年也襄公逐小白小白走莒三年襄公薨公子糺踐位國人召小白鮑叔曰胡不行矣小白曰不可夫管仲智召忽强武雖國人召我我猶不得入也鮑叔曰管仲得行其智於國國可謂亂乎管仲得行其知於國國則不亂今亂是不得行其智召忽强武豈能獨圖我哉國人既召小白則不與召忽圖我小白曰夫雖不得行其知豈且不有焉乎直是智不行不得言無智召忽雖不得衆其及豈不足以圖我哉召忽雖不得衆若及猶能圖我績按及謂所從黨與也鮑叔對曰夫國之亂也智人不得作内事智人作内事則其國理績按指管仲朋友不能相合摎而國乃可圖也摎交入也朋友不能相交合則黨與弱故乃可圖績按指召忽乃命車駕鮑叔御小白乘而出于莒小白曰夫二人者奉君令吾不可以試也二人指管仲召忽奉君令則致死拒我故不可試也乃將下鮑叔履其足曰事之濟也在此時事若不濟老臣死之公子猶之免也鮑叔言事若不濟則已致死公子猶可得免脱乃行至於邑郊鮑叔令車二十乘先十乘後二十乗先鮑叔欲與之入國十乘後令衛公子鮑叔乃告小白曰夫國之疑二三子莫忍老臣二三子謂從小白者不忍違老臣故相従中心實疑事之未濟也老臣是以塞道以事未濟故以二十乗先行塞道績按鮑叔言齊國人疑立君未定必不忍殺已若事不濟已尚足以塞道而先小白也鮑叔乃誓曰事之濟也聴我令事之不濟也免公子者為上死者為下吾以五乘之實距路鮑叔於前二十乗更將五乗先行距路不令子糺之黨得及小白鮑叔乃為前驅遂入國逐公子糺管仲射小白中鈎管仲與公子糺召忽遂走魯桓公踐位魯伐齊納公子糺而不能桓公二年踐位入國二年方得踐位召管仲管仲至公問曰社稷可定乎管仲對曰君霸王社稷定君不霸王社稷不定公曰吾不敢至於此其大也定社稷而已管仲又請君曰不能管仲辭於君曰君免臣於死臣之幸也然臣之不死糺也臣不敢既不死糺空食齊政之䘵而不定社稷臣則不敢言將致死乃走出至門公召管仲管仲反公汗出曰勿已其勉霸乎必欲令霸王而不已我將勉力而求霸也管仲再拜稽首而起曰今日君成霸臣貪承命趨立於相位君既許霸臣貪于承命故趨立相位乃令五官行事異日公告管仲曰欲以諸侯之間無事也小脩兵革管仲曰不可百姓病公先與百姓而藏其兵百姓困病當先賦興之而兵事且可藏與其厚於兵不如厚於人人厚兵自强齊國之社稷未定公未始於人而始於兵外不親於諸侯而内不親於民公曰諾政未能有行也别本註言未盡行也二年桓公彌亂不盡行夷吾之言故彌亂又告管仲曰欲繕兵管仲又曰不可公不聴果為兵桓公與宋夫人飲舩中夫人蕩舩而懼公公怒出之宋受而嫁之蔡侯績按左𫝊作蔡姬蕩舟事亦不同明年公怒告管仲欲伐宋管仲曰不可臣聞内政不脩外舉事不濟公不聴果伐宋諸侯興兵而救宋大敗齊師公怒歸告管仲曰請脩兵革吾士不練吾兵不實諸侯故敢救吾讎内脩兵革管仲曰不可齊國危矣内奪民用士勸於勇外亂之本也脩兵則用廢故曰奪人用士所勸者唯勇則輕敵故為外亂之本也外犯諸侯民多怨也外犯必多殘害故為人所怨為義之士不入齊國君為不義故義士不歸也安得無危鮑叔曰公必用夷吾之言公不聴乃令四封之内脩兵闗市之征侈之侈謂過常也謂重其税賦公乃遂用以勇授禄士勇之禄鮑叔謂管仲曰異日者公許子霸今國彌亂子將何如管仲曰吾君惕其智多誨智多則可試誨之也姑少胥其自及也胥待也待其自能及道鮑叔曰比其自及也國無闕亡乎管仲曰未也國中之政夷吾尚微為焉亂乎尚可以待國政微為則未至亂可待君自及也外諸侯之佐既無有吾二人者未有敢犯我者諸侯之佐既無有如我二人故不敢犯我明年朝之争禄相刺裚領而刎頸者不絶裚為掣斷之也鮑叔謂管仲國死者衆矣毋乃害乎管仲曰安得已然此皆其貪民也貪人為禄自殘亦未能自為害也夷吾之所患者諸侯之為義者莫肯入齊齊之為義者莫肯仕此夷吾之所患也有義之士内外不歸亂亡立至故可患也若夫死者吾安用而愛之貪人自相殺傷吾何能惜之公又内脩兵三年桓公將伐魯曰魯與寡人近謂國相近鄰於是其救宋也疾疾謂先諸侯至寡人且誅焉管仲曰不可臣聞有土之君不勤於兵不忌於辱不輔其過則社稷安勤於兵忌於辱輔其過則社稷危公不聽興師伐魯造於長勺魯莊公興師逆之大敗之桓公曰吾兵猶尚少吾參圍之安能圉我吾以三倍之兵圍之則何能圉我四年脩兵同甲十萬同甲謂完堅齊等車五千乘謂管仲曰吾士既練吾兵既多寡人欲服魯管仲喟然嘆曰齊國危矣君不競於徳而競於兵人君當以徳義服遠不當競於兵也天下之國帶甲十萬者不鮮矣吾欲發小兵以服大兵欲以齊國服諸侯而致霸王故曰以小兵而服大兵也内失吾衆謂數搖動人則衆疲而散諸侯設備數見侵伐故設備吾人設詐力不足則詐以維之國欲無危得已乎績按言天下兵多齊發小兵以服之内外俱失而國危矣詐一本作誑公不聴果伐魯魯不敢戰去國五十里而為之闗更立國界而為之闗魯請比於闗内以從于齊齊亦無復侵魯謂魯請從服于齊供其徴求比於齊之闗内桓公許諾魯人請盟曰魯小國也固不帶劔今而帶劍是交兵聞於諸侯君不如己若以交兵聞於諸侯不如止而不盟也請去兵桓公曰諾乃令從者毋以兵管仲曰不可諸侯加忌於君君如是以退可忌怨也諸侯欲以結盟致怨於君今請不盟從此即退可也君果弱魯君諸侯又加貪於君若果弱魯君人以貪名加之君後有事小國彌堅大國設備既有貪忌之名故皆設備非齊國之利也桓公不聴管仲又諫曰君必不去魯何用不兵曹劌之為人也績按劌一作沬下同堅强以忌不可以約取也不可以盟取信也桓公不聴果與之遇莊公自懐劍曹劌亦懐劍踐壇莊公抽劔其懐曰魯之境去國五十里亦無不死而已左揕桓公右自承曰均之死也戮死於君前左手舉劍将揕桓公且以右手自承而言曰齊之迫魯境亦死今殺君亦死同是死也将殺君次自殺故曰均之死也戮死于君前管仲走君曹劌抽劍當兩階之間曰二君將改圖無有進者㧞劍當階所以拒管仲言魯齊二君欲改先者之所圖今不當有進也管仲曰君與地以汶為境桓公許諾以汶為境而歸桓公歸而脩於政不脩於兵革自圉辟人以過彌師既不脩其兵革故出入自圉辟其人也以先者之過故弭息其師也五年宋伐杞桓公謂管仲與鮑叔曰夫宋寡人固欲伐之無若諸侯何無若諸侯救宋何夫杞明王之後也杞夏之後今宋伐之予欲救之其可乎管仲對曰臣聞内政之不脩外舉義不信君將外舉義以行先之以内行先之則諸侯可令附桓公曰於此不救後無以伐宋今不救杞於後無辭以伐宋管仲曰諸侯之君不貪於土貪於土必勤於兵勤於兵必病於民民病則多詐夫詐密而後動者勝密静詐則不信於民夫不信於民則亂内動則危於身是以古之人聞先王之道者不競于兵兵者凶器競之則危桓公曰然則奚若管仲對曰以臣則不然以臣之意則不與君同而令人以重幣使之以重幣使宋令罷杞兵使之而不可謂宋不從令也君受而封之受杞告命而建封之桓公問鮑叔曰奚若鮑叔曰公行夷吾之言公乃命曹孫叔使於宋宋不聴果伐杞宋果伐杞桓公城縁陵以封之縁陵杞城予車百乘甲一千謂與杞也明年狄人伐邢邢君出致於齊致命於齊以告急桓公築夷儀以封之夷儀邢城子車百乘卒千人明年狄人伐衛衛君出致於虚虚地名詩所謂升彼虚矣以望楚矣桓公且封之隰朋賔胥無諫曰不可三國所以亡者絶以小小國之亡理則然矣不當封也今君近封亡國國盡若何國之車盡於封亡國其若之何桓公問管仲曰奚若管仲曰君有行之實安得有其名既有行封之名則當虚國而為之安得有其富實乎君其行也公又問鮑叔鮑叔曰君行夷吾之言桓公築楚丘以封之與車三百乘甲五千既以封衛明年桓公問管仲将何行更問以所行之政也管仲對曰公内脩政而勸民可以信於諸侯矣君許諾乃輕稅弛市之征為賦禄之制既已謂已行上事管仲又請曰問病臣臣有病者君當慰問之願賞而無罰五年諸侯可令傅行此五年可令諸侯親附公曰諾既行之管仲又請曰請諸侯之禮請諸交聘之禮令齊以豹皮往小侯以鹿皮報齊以馬往小侯以犬報往重報輕所謂大國善下小國則取小國桓公許諾行之管仲又請賞於國以及諸侯君曰諾行之管仲賞於國中君賞於諸侯諸侯之君有行事善者以重幣賀之從列士以下有善衣裳賀之列士謂齊之列士管仲以衣裳賀之凡諸侯之臣有諫於君而善者以璽問之以信其言謂桓公以壐問之以信騐其所諫之言為善公既行之又問管仲曰何行管仲曰隰朋聰明㨗給可令為東國東國謂自齊東之國令隰朋理之賔胥無堅强以良可令為西土西土謂齊西之土令胥無理之國與土交互言也衛國之教危傅以利謂其教既髙危且相傅以利謂以利成俗公子開方之為人也慧以給不能乆而樂始可㳺於衛其人性輕率不能持乆所謂靡不有初鮮克有終故曰樂始使此人㳺於衛誘動之令歸於齊也績按小匡作公子開方為人巧轉而兊利則不能乆而樂始謂退速進鋭也魯邑之教好邇而訓於禮既訓學於禮禮者所以節貌故曰好邇邇近也季友之為人也恭以精愽於粮多小信可㳺於魯愽於粮謂委多積績按小匡作公子舉愽聞而知禮好學而辭遜請使㳺於魯疑即一人粮乃禮字誤也楚國之教巧文以利不好立大義而好立小信䝉孫小匡作曹孫宿博於教而又巧於辭不好立大義而好結小信可㳺於楚小侯既服大侯既附厚往輕報所以服小侯㳺三人於三國所以附大侯夫如是則始可以施政矣君曰諾乃㳺公子開方於衛㳺季友於魯㳺䝉孫於楚五年諸侯附狄人伐謂入伐齊桓公告諸侯曰請救伐諸侯許諾大侯車二百乘卒二千人小侯車百乘卒千人諸侯皆許諾齊車千乘卒先致縁陵先者使卒戍縁陵今有狄難故致之戰於後故敗狄後故地名其甲與貨小侯受之謂敗狄所得車甲及貨盡與小侯大侯近者以其縣分之不踐其國近齊之大侯則以齊縣分之終不踐其國以侵之北州侯莫來謂不來救齊北州謂北之州即幽州營州等桓公遇南州侯於召陵謂伐楚盟於召陵也曰狄為無道犯天子令以伐小國小國齊自謂以天子之故敬天之命令以救伐言諸侯以敬順天命救齊伐狄北州侯莫至上不聴天子令下無禮諸侯寡人請誅於北州之侯諸侯許諾桓公乃北伐令支令支國名下鳬之山斬孤竹孤竹國名斬其君過山戎顧問管仲曰将何行管仲對曰君教諸侯為民聚食諸侯之兵不足者君助之發如此則始可以加政矣既使諸侯足食足兵然後可以加之政也桓公乃告諸侯必足三年之食安有三年食然後可安以其餘修兵革兵革不足以引其事告齊齊助之發諸侯兵之不足當引其事之闕者以告齊齊當發卒以助之也既行之公又問管仲曰何行管仲對曰君㑹其君臣父子㑹謂考合其君臣父子之宜則可以加政矣公曰㑹之道奈何曰諸侯無專立妾以為妻母專殺大臣無國勞毋專予禄於國無勞者不得專予禄士庶人毋專棄妻母曲隄所謂毋障谷也毋貯粟毋禁材山澤之材當與人共也也行此卒嵗則始可以罰矣行之卒嵗而有不從者可以加刑罰君乃布之於諸侯諸侯許諾受而行之卒嵗吳人伐榖榖齊之下都後以封管仲桓公告諸侯未徧諸侯之師竭至以待桓公竭至言其盡來桓公以車千乘㑹諸侯於竟都師未至吳人逃齊都之師尚未至而吳人逃也諸侯皆罷桓公歸問管仲曰將何行管仲曰可以加政矣諸侯服從如此故可以加之政曰從今以往二年適子不聞孝不聞愛其弟不聞敬老國良其老者國之賢良也三者無一焉可誅也無一尚可誅况無三乎諸侯之臣及國事三年不聞善可罰也及國事預知國政三年不聞善則不賢也故可罰君有過大夫不諫士庶人有善而大夫不進可罰也士庶人聞之吏賢孝悌可賞也士庶人有賢孝悌聞之於吏則可賞也桓公受而行之近侯莫不請事近齊之諸侯皆請齊徴賦之事兵車之㑹六兵車之㑹謂興兵有所征伐乘車之㑹三乗車之㑹謂繼好息民之㑹也饗國四十有二年桓公踐位十九年㢮闗市之征征賦也五十而取一取其貨賄五十之一賦禄以粟案田而税案知其壌塉而税之二嵗而稅一率二嵗而一税之上年什取三中年十取二下年什取一嵗飢不税嵗飢謂時嵗搃飢故不税嵗飢㢮而税此嵗飢謂有飢者有不飢者故㢮飢而税不飢桓公使鮑叔識君臣之有善者晏子識不仕與耕者之有善者不仕謂餘子未仕者髙子識工賈之有善者國子為李李獄官也績按李理同隰朋為東國賔胥無為西土弗鄭為宅為宅掌脩除宫室凡仕者近宫仕者有公事職務故近宫不仕與耕者近門不仕與耕者當出入田野故近於外門工賈近市三十里置遽委焉有司職之遽今之郵驛也委謂當有儲偫以供過者立官以主之從諸侯欲通謂從諸侯欲通於齊吏從行者令一人為負以車其吏從行而來者遽之有司當令一人以車為負載其行裴若宿者令人養其馬食以委其客若宿即以所委食之績按一作食其委客與有司别契别契謂分别其契以知真偽也至國八契自郊至國八契則二百里之郊地相距為五百里此周之大國也費義數而不當有罪義謂供賔客之禮徒費義數而於事不當者罪之凡庶人欲通鄉吏不通七日囚庶人有所陳訴通於君鄉吏抑而不通事經七日者則囚其吏鞠劾其所以也出欲通吏不通五日囚出謂欲適他國貴人子欲通吏不通三日囚凡縣吏進諸侯士而有善觀其能之大小以為之賞有過無罪賞雖過能亦不罪也令鮑叔進大夫勸國家升進大夫令之勉營國家之事得之成而不悔為上舉得此大夫故有成功終然允當無有可悔如此者舉善之上從政治為次所進大夫從政而能理者次上成功也野為原又多不發起訟不驕次之所進大夫有能勸勉農人開闢荒野皆為原田又教之和通不相告發雖有起而訟者莫不恪恭不為驕傲此又其次也勸國家得之成而悔從政雖治而不能野原又多發起訟驕行此三者為下令晏子進貴人之子晏子平仲之先出不仕不仕則樂道深處不華不華則無過失而友有少長友有少長則遵禮經為上舉全此三者故為上得二為次得二三之二也得一為下士處靖靖卑敬貎敬老與貴敬老近於親敬貴近於君交不失禮行此三者為上舉得二為次得一為下耕者農農用力勤而不惰應於父兄孝且義事賢多擇善而從故能多行此三者為上舉得二為次得一為下令髙子進工賈應於父兄事長養老承事敬承奉君敬而從之也行此三者為上舉得二者為次得一者為下令國子以情斷獄定罪罰者貴得其情三大夫既已選舉使縣行之三大夫謂鮑叔晏子髙子管仲進而舉言上而見之于君見三大夫所選舉者此言選舉者國子主斷獄故不在三大夫之數以卒年君舉卒年謂終年如此管仲所進者君舉用之也管仲告鮑叔曰勸國家不得成而悔從政不治不能野原又多而發言相告發訟驕既訟而驕凡三者有罪無赦告晏子曰貴人子處華下處華屋之下則淫泆交好飲食重交好則挾朋黨嗜飲食則道情薄績按處華句照上處不華下交謂以貴凌人使友居下也照友有少長好飲食照出不仕行此三者有罪無赦士出入無常不敬老而營富行此三者有罪無赦耕者出入不應於父兄用力不農不事賢行此三者有罪無赦告國子曰工賈出入不應於父兄承事不敬而違老治危危傾險也行此三者有罪無赦凡於父兄無過州里稱之吏進之君用之無過於父兄見稱於州里更進此人君必用之有善無賞有過無罰吏不進廉意有善不能賞過不能罰吏則茍免而已故不進廉意也於父兄無過於州里莫稱吏進之君用之善為上賞不善吏有罰雖無過於父兄而州里不稱吏進此人君承用之其人善則吏受上賞不善則吏當罰績按當人皆稱其賢而吏舉善者後有善過而舉不賞罰以其出於衆人同然也若吏以賞罰無與己而不舉則廉察其意而罪之至於人不稱其賢而吏舉者後有善過賞罰其舉者以其出於一人獨見也君謂國子凡貴賤之義入與父俱父貴而子賤也出與師俱師貴而資賤也上與君俱君貴而臣賤凡三者遇賊不死不知賊則無赦言人於此三者所在當致死所謂在三如一今賊将害此三者遇之而不能死者有賊而又不知則不臣不子也故無赦也斷獄情與義易義與禄易凡斷獄者所以止罪邪止罪邪所以興禮義今犯罪者非以乖僻易義則以姦偽易禄也易禄可無斂有可無赦姦偽易禄者既當罰其罪可無斂其禄然今所有罪必無赦之也管子補注卷七
