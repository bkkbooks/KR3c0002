body:
  text: 管子補注卷十一明劉績撰君臣下第三十一短語五古者未有君臣上下之别有夫婦妃匹之合獸處羣居以力相征若野獸之處以羣而居力強者征於弱也於是智者詐愚強者凌弱老幼孤獨不得其所故智者假衆力以禁強虐而暴人止智者即聖王也為民興利除害正民之德正人之邪德而民師之師智者也是故道術德行出於賢人賢人知道術德行者也其從義理兆形於民心則民反道矣道術既出故莫不從義而順理之極則無姦辟之事始見於人心則無人不道矣績按反復還也言民有所趨向則反道名物處違是非之分則賞罰行矣人既反道故正其善惡之物處其背理之違則是非者自分矣是非既分故行賞罰以當其功過也績按處名物為是違名物為非上下設民生體而國都立矣上下既設人則生其貴賤之禮故國都立也是故國之所以為國者民體以為國貴賤成禮方乃為國君之所以為君者賞罰以為君無賞罰則君不足貴致賞則匱賞而不已則匱致罰則虐罰而無節則虐財匱而令虐所以失其民也是故明君審居處之教而民可使人從教故可使居治戰勝守固者也居處既治戰則勝守則固績按言明不致賞罰但審教可使民居國則治以戰則勝以守則固也夫賞重則上不給也賞重則使用多故不給罰虐則下不信也令虐則人無所措手足故不信也是故明君飾食飲弔傷之禮飲食謂享燕傷謂喪祭也而物屬之者也禮行則物親也是故厲之以八政八政謂洪範之八政旌之以衣服衣服所以表貴賤也富之以國裹裹謂財物所包裹而藏也貴之以王禁禁令行然後知常者之可貴也則民親君可用也民用則天下可致也天下道其道則至君得其道則天下至不道其道則不至也夫水波而上盡其搖而復下其勢固然者也言水波湧而上既盡其勢還復搖動歸下而止此自然之勢喻人懷德而來畏威而去者也故德之以懷也威之以畏也則天下歸之矣有道之國發號出令而夫婦盡歸親於上矣布法出憲而賢人列士盡功能於上矣千里之內束布之罰束謂帛也布謂錢也古者罰刑或令出錢帛也績按此即宅不種桑麻者有里布之類一畝之賦盡可知也賢人為之視聽故無不知治斧鉞者不敢讓刑讓猶拒也當其罪故不讓刑也治軒冕者不敢讓賞賞當其功故不讓也墳然若一父之子若一家之實義禮明也墳然順貌或刑賞之莫敢違逆若子之從父家之從長如此者禮羲明故也夫下不戴其上臣不戴其君則賢人不來上下不交則賢人隱賢人不來則百姓不用百姓無賢人則不知所歸故百姓不用也百姓不用則天下不至百姓不用則天下無邦將何至哉故曰德侵則君危君德見侵不危何待論侵則有功者危論議侵理則功過不明故有功者危令侵則官危令侵則法不行故官危也刑侵則百姓危刑侵則無辜受戮故百姓危也而明君者審禁淫侵者也上無淫侵之論則下無冀幸之心矣為人君者倍道棄法而好行私謂之亂為人臣者變故易常而巧官以諂上謂之騰亂至則虐騰至則北騰謂凌駕於君騰至則摧降故敗北四者有一至敗敵人謀之四者即上之四危也則故施舍優猶以濟亂則百姓悅言施恩厚舍罪罰二者優厚雖非用法猶能濟亂故百姓悅之也選賢遂材而禮孝弟則姦偽止遂達也要淫佚别男女則通亂隔要謂遮止之言能止淫佚别男女則先雖通亂今能隔厄也貴賤有義倫等不踰則有功者勸國有常式故法不隱則下無怨心隱謂伏而不行此五者興德匡過存國定民之道也夫人君者有大過臣人者有大罪國所有也國之所有也民所君也民者己之所君有國君民而使民所惡制之此一過也言民惡君之制己此亦君之過民有三務不布其民非其民也三務謂春夏秋務農人不務之則餒餓成變故民非其民也民非其民則不可以守戰此君人者二過也夫臣人者受君髙爵重祿治大官倍其官遺其事穆君之色穆猶悅也從其欲阿而勝之阿曲也巧言令色委曲從君至於動也剛漸以勝之其終或至於篡弒故曰阿而取勝之也此臣人之大罪也君有過而不改謂之倒臣當罪而不誅謂之亂君為倒君臣為亂臣國家之衰也可坐而待之是故有道之君者執本相執要大夫執法以牧其羣臣羣臣盡智竭力以役其上謂給上之役也上即君也四守者得則治易則亂故不可不明設而守固明設上四法固而守之昔者聖王本厚民生審知禍福之所生是故慎小事微違非索辨以根之謂有違非必尋索分辨其得根而止之也然則操作姦邪偽詐之人不敢試也不敢為非以嘗君此禮正民之道也制禮者用此道以正人也古者有二言牆有耳伏冦在側牆有耳者微謀外泄之謂也伏冦在側者沉疑得民之道也微謀之泄也狡婦襲主之請而資遊慝也襲入也謂狡婦妖蠱人主遂行請謁所請既從外資遊説為姦慝者也沈疑之得民者前貴而後賤者為之驅也所驅役之人前得貴寵今忽淪賤然賤者必思貴常伺君以興禍故謂之伏冦也明君在上便僻不能食其意便僻者不能諂君以得意故曰不能食其意也刑罰亟近也既不能得君意故刑罰數也大臣不能侵其勢不能侵君之勢比黨者誅明也君明故比黨者誅之績按言刑罰數加於近侍故便僻不能食其意比黨者必誅之故大臣不能侵其勢明字疑衍為人君者能逺讒諂廢比黨淫悖行食之徒行食遊食無爵列於朝者此止詐拘姦厚國存身之道也為人上者制羣臣百姓通中央之人和中央之人謂君之左右也左右與君和之也是以中央之人臣主之參也左右之人在臣主之間參會其事者也制令之布於民也必由中央之人中央之人以緩為急急可以取威君雖曰緩左右行之乃為急故能取威也以急為緩緩可以惠民君雖曰急左右行之為緩故能惠人威惠遷於下則為人上者危矣賢不肖知之於上必由中央之人財力之貢於上必由中央之人能易賢不肖而可威實賢謂之不肖實不肖謂之賢故曰易賢不肖也黨於下按威當作為謂能易賢不肖而可以為朋黨於下注非有能以民之財力上陷其主而可以為勞於下用人財力上以陷主即於下以為勞績按有又也兼上下以環其私上則擅君之柄下則用人財力上下之利皆用繞身故曰環其利也爵制而不可加則為人上危矣勢既凌君故爵制不能加也績按爵謂前賢不肖之知而加爵位也智謂前財力之貢而有定制也中人既皆罔上誣下以全其私是人主之爵制不加於人失君柄而危矣先其君以善者侵其賞而奪之實者也先君行善則是侵君之賞奪君之富貴也先其君以惡者侵其刑而奪之威者也訛言於外者脅其君者也假説妖妄之言外以惑衆如此者欲脅君也鬱令而不出者幽其君者也鬱塞也君之令而不出行者將欲幽君也四者一作而上不知也則國之危可坐而待也神聖者王仁智者君武勇者長此天之道人之情也天道人情通者質寵者從此數之因也質主也能通於天道人情者可以為主其不能通但寵貴之者可以為從從謂臣也言臣主數因此通而立也是故始於患者不與其事親其事者不規其道言初始謀慮而憂患者乃行其事令人為之而不自與此謂君也績按始於患者不與其事即下患而不勞也親其事者不規其道即下勞而不患也是以為人上者患而不勞也百姓勞而不患也君臣上下之分素有謀慮之患無别謂上患而不勞也則禮智定矣是故以人役上人謂百姓百姓勞其身以供上之役也以力役明謂臣勤力役用其明而理其職以刑役心刑法也君則役心以出法制也績按以人役上自君臣言以力役明自等類言以形役心自一身言刑乃形字訛下同此注及下俱非此物之理也心道進退心則度量可否故進退也而刑道滔趕滔謂充也趕謂逡巡曲也設法有當否故有合成也績按趕巨言切走也進退者主制君心進退所以主為制令滔趕者主勞主勞者方主制者圓君臣之道主得制者其事必有方有圓也圓者運運者通通則和圓謂君道也圓而不滯必運而無礙則通通者必暢故和也方者執執者固固則信方謂臣道也方而有常故執而不舍則固固而不妄則信也君以利和君道而和則利也臣以節信臣則守節則上下無邪矣故曰君人者制仁臣人者守節此言上下之禮也君之在國都也若心之在身體也道德定於上則百姓化於下矣戒心形於內戒慎之心成形於內則容貌動於外矣正也者所以明其德必正然後德明知得諸己知得諸民從其理也於己既不失於人必不妄如此者從理故也知失諸民退而修諸已反其本也有失於人必修己自責如此者反其本也所求於己者多故德行立求己多者必修德進業故德行立也所求於人者少故民輕給之求人少者必薄賦斂故人輕於給也故人君者上注臣人者下注上注者紀天時務民力上注謂注意於上天故紀要天時務全人力也下注者發地利足財用也下注謂注意於下地故發興地利足於財用也故能飾大義審時節上以禮神明下以義輔佐者所用輔佐皆得其宜明君之道也能據法而不阿上以匡主之過下以振民之病者忠臣之所行也明君在上忠臣佐之則齊民以政刑牽於衣食之利君明臣忠則國理國理則人重生故人皆以其養形而牽係於衣食之利也故願而易使愚而易塞塞止也易用法止也君子食於道小人食於力分民食道力不同故曰分民也威無勢也無所立必有勢然後有所立事無為也無所生必有為然後有所生若此則國平而姦省矣君子小人既食於道力邪惡之人復無所立生故國平而姦省君子食於道則義審而禮明義不審則無所食也義審而禮明則倫等不踰雖有偏卒之大夫不敢有幸心則上無危國既明禮義倫等不踰雖有大夫偏獨出伏罪而怨不敢有幸亂心齊民食於力則作本作本者衆農以聽命是以明君立世民之制於上猶草木之制於時也草木必得時然後生故民迂則流之人太迂曲不行則流通之民流通則迂之人太流蕩則迂屈之決之則行塞之則止雖有明君能決之又能塞之決之則君子行於禮塞之則小人篤於農君子行於禮則上尊而民順小人篤於農則財厚而備足上尊而民順財厚而備足四者備體謂備具而成體頃時而王不難矣四肢六道身之體也四肢謂手足也六道謂上有四竅下有二竅也四正五官國之體也四正謂君臣父子五官謂五行之官也四肢不通六道不達曰失四正不正五官不官曰亂是故國君聘妻於異姓設為姪娣命婦宫女盡有法制所以治其內也明男女之别昭嫌疑之節所以防其姦也是以中外不通讒慝不生婦言不及官事而諸臣子弟無宫中之交此先王所以明德圉姦昭公威私也績按威乃滅字誤明立寵設不以逐子傷義明立正嫡設其貴寵子不令逐而廢之故不傷義也禮私愛歡勢不並倫嫡子者所以傳重也故禮許私愛雖歡之超異可也餘子之勢終不得與之並倫也爵位雖尊禮無不行言嫡子爵位雖復尊異必須行之以禮也績按言庶子為兄弟者雖有才有寵亦不以逐嫡子而傷義故禮愛隆而不敢並嫡子爵位尊而亦事嫡子也注皆非選為都佼冒之以衣服旌之以章旗所以重其威也所立之嫡必選其都雅佼好者又以美衣麗服覆冒之章表旗幟旌異之凡此皆所以重嫡子之威也然則兄弟無間郤讒人不敢作矣嫡威重則兄弟和故讒人無所作其讒矣故其立相也陳功而加之以德論勞而昭之以法參伍相德而周舉之尊勢而明信之其謂國相則功德兩兼勞法獲美於此四者參驗伍偶相與俱得其事既周然後舉川之既用之尊勢而明信之也是以下之人無諫死之誋君明相賢必從説如流故無諫死之忌也而聚立者無鬱怨之心聚立謂天下會同也各得其所故無怨望也如此則國平而民無慝矣慝姦惡者也其選賢遂材也舉德以就列不類無德舉有德者以就列位不以無德之人為類舉能以就官不類無能以德弇勞不以傷年有德者超於上列使在有功勞者之前故曰有德掩勞茍有德雖年未至而亦將用之不以年少為之傷也如此則上無困而民不幸生矣有功必賞用之故人不以茍生為幸國之所以亂者四其所以亡者二內有疑妻之妾此宫亂也庶有疑嫡之子此家亂也朝有疑相之臣此國亂也任官無能此衆亂也四者無别無别謂妻妾嫡庶得不分别也績按四者即上四亂也主失其體羣官朋黨以懷其私則失族矣國亡則宗族隨之故曰失族也國之幾臣陰約閉謀以相待也則失援矣為國之機臣下陰為要結其所謀者閉而不泄以此相待人必懷疑而不相親矣故失其援也失族於內失援於外此二者亡也故妻必定子必正相必直立以聽官必中信以敬故曰有宫中之亂有兄弟之亂有大臣之亂有中民之亂中民謂百吏之屬也有小人之亂五者一作則為人上者危矣宫中亂曰妬紛言積妬紛然所以亂兄弟亂曰偏黨偏黨則強弱相凌故亂也大臣亂曰稱述各稱述其己德之長而不相讓則亂也中民亂曰讋諄謂以智詐讋恐諄質則亂也小民亂曰財匱賦稅重則財匱故亂財匱生薄財不供則禮義息故薄也讋諄生慢不重淳質而智詐恐讋之此其慢也稱述偏黨妬紛生變此三者或生篡君殺主能為大變也故正名稽疑刑殺亟近則內定矣正嫡庶之名稽妻妾之疑不正者之黨數取其逼近者而刑殺之如此則黨偏妬紛之變息故內定順大臣以功順中民以行順小民以務順用其務農也則國豐矣三者各稱其所順故國豐矣審天時天時各有所宜也物地生以輯民力禁淫務繡文刻鏤淫務勸農功以職其無事無事者皆令得職也則小民治矣上稽之以數謂上欲有所徴發必考其定數以命之也下什伍以徴既得其定數下其什伍名以徴之也近其罪伏以固其意日期既近尚有不供者則加之以罪以權伏之所以固供者之意也鄉樹之師以遂其學每鄉必立之師以遂之也官之以其能及年而舉則士反行矣舉而有材能者則受之以官既有年矣則舉其功過而考察之如此則皆反其行矣稱德度功勸其所能若稽之以衆風若任以社稷之任既稱其德又度其功則其材能不可不知矣既知其能順而考之或使之蒞衆以立風化其材能尢髙者或授之以社稷之任者也若此則士反其情矣有能必任之以職故士反於情也小稱第三十二稱舉也小舉其過則當權而改之短語六管子曰身不善之患毋忠人莫己知言但患身之不善耳無患人不知己也丹青在山民知而取之美珠在淵民知而取之丹青與珠各有可用之性故雖在山泉而藏人猶知而取之况在於人懷善而不知乎是以我有過為而民無過命我身有過則民必知而名之未有無過而妄命者也民之觀也察矣不可遁逃有過必知故不可以遁逃以為不善績按此為句言人之觀我甚明豈可遁逃以為不善也故我有善則立譽我我有過則立毁我當民之毁譽也則莫歸問於家矣人既毁譽則己之善惡審矣故不復問家問家則左右佞媚者善掩其過而飾其非也故先王畏民民之毁譽必當其善過故畏之操名從人無不強也謂君既行善持名使之延譽故強也操名去人無不弱也君既行惡持名即是去人善可稱故弱也雖有天子諸侯民皆操名而去之則捐其地而走矣皆持其名而去於人則過惡日聞人共畏之故棄其地而走也故先王畏民無善名則棄之走故畏人在於身者孰為利氣與目為利氣也者所以生全其形目也者所以獨見其運為功用莫大焉故最為利也聖人得利而託焉故民重而名遂聖人之聖精而又神託而行善則譽滿天下故人重而名遂矣我亦託焉聖人託可好我託可惡我託可惡以來美名其可得乎我雖託氣濁而不神所行皆可惡用此招來美名其可得乎績按别本注聖人託之而可行善故好我託之所行皆可惡又安能美名招來乎愛且不能為我能也託既氣濁雖令人愛猶不得美名况於惡之乎毛嬙西施天下之美人也盛怨氣於面不能以為可好嬙施雖美而面有怨氣亦不能為可好喻聖人外見其惡亦不得其美名我且惡面而盛怨氣焉怨氣見於面惡言出於口去惡充所往去於人者皆以惡事充以求美名乂可得乎喻人君既內無聖德外皆行惡必無美名也甚矣百姓之惡人之有餘忌也惡人不善更有餘忌績按别本注百姓見惡人之所忌是以長者斷之短者續之滿者洫之虛者實之洫虛也長滿者人所忌故或斷之或虛之短虛者人之所好故或續之或實之也績按所謂無過不及也管子曰善罪身者民不得罪也成湯罪已故人不罪之也不能罪身者民罪之桀紂罪人故人罪之故稱身之過者強也稱身之過即是謙受益也治身之節者惠也懷智之人然後治身節故曰惠不以不善歸人者仁也不以不善之事歸之於人如此者仁也故明王有過則反之於身有善則歸之於民有過而反之身則身懼過反於身則懼而修德也有善而歸之民則民喜民得善故喜也往喜民善往則人喜也來懼身過來則懼身也此明王之所以治民也今夫桀紂不然有善則反之於身有過則歸之於民歸之於民則民怒反之於身則身驕往怒民來驕身此其所以失身也故明王懼聲以感耳人以惡聲懼己耳聞而感則心不敢念非矣懼氣以感目人以惡氣懼己目見而感則身不敢造惡以此二者有天下矣可毋慎乎匠人有以感斤欘故繩可得料也羿有以感弓矢故彀可得中也造父有以感轡策故遬獸可及逺道可致彀謂射質棲皮者也感謂深得其妙有應於心者也天下者無常亂無常治不善人在則亂善人在則治在於既善所以感之也既盡也天下所以理在於君人君內外盡善感之於人也管子曰修恭遜敬愛辭讓除怨無爭以相逆也逆迎也謂用此恭遜等以相迎接也則不失於人矣遜以接人有何失乎嘗試多怨爭利相為不遜則不得其身茍為不遜身尚不得况於人乎大哉恭遜敬愛之道吉事可以入察凶事可以居喪大以理天下而不益也直用恭遜敬愛足以理天下更不須益也小以治一人而不損也雖復一身用恭遜敬愛理之才可足耳亦不須損也嘗試往之中國諸夏蠻夷之國以及禽昆蟲皆待此而為治亂有恭遜敬愛則理無之則亂也澤之身則榮去之身則辱恭遜敬愛身之粉澤也故在身則榮去身則辱也審行之身毋怠雖夷貉之民可化而使之愛夷貉之行殘戻凶暴茍以恭遜敬愛化之可使生愛審去之身雖兄弟父母可化而使之惡父母兄弟恩情結固茍無恭遜敬愛化之可令往惡故之身者使之愛惡之是也同是此身有遜愛恭敬則愛無之則惡名者使之榮辱同是此身之名有恭遜敬愛則榮無之則辱也此其變名物也如天如地言恭遜敬愛可以變化愛惡榮辱名物之善惡如天地之生殺也故先王曰道道者貴作變化也如此之道而已矣管仲有病桓公往問之曰仲父之病病矣若不可諱而不起此病也仲父亦將何以詔寡人管仲對曰微君之命臣也故臣且謁之謁謂有所告之也雖然君猶不能也恐其不從故以此言抑之公曰仲父命寡人東寡人東令寡人西寡人西仲父之命於寡人寡人敢不從乎管仲攝衣冠起對曰臣願君之逺易牙豎刁堂誣公子開方夫易牙以調和事公公曰唯蒸嬰兒之未嘗於是蒸其首子而獻之公人情非不愛其子也於子之不愛將何有於公公喜宫而妬豎刁自刑而為公治內人情非不愛其身也於身之不愛將何有於公公子開方事公十五年不歸視其親齊衛之間不容數日之行臣聞之務為不久務時為事久必發揚之也蓋虛不長覆蓋虛妄不得長掩謂上三士皆務虛為蓋者其姦情終當彰露也矣其生不長者其死必不終其所行之行所長之性其至於死必將改復本情未有能終為意也言三士之忠皆偽忠耳必將復其不忠也桓公曰善管仲死已葬公憎四子者廢之官逐堂巫而苛病起兵苛煩躁也巫善令既逐之而公有煩苛之病起兵妄征伐無使療之也逐易牙而味不至逐豎刁而宫中亂逐公子開方而朝不治桓公曰嗟聖人固有悖乎四子既逐而有四闕故以管仲為悖乃復四子者處期年四子作難圍公一室不得出置公一室之中而圍之故不得出也有一婦人遂從竇入得至公所公曰吾飢而欲食渴而欲飲不可得其故何也婦人對曰易牙豎刁堂巫公子開方四人分齊國塗十日不通矣既有兵難故國之道塗行旅十日不得通也公子開方以書社七百下衛矣古者羣居二十五家則共置社以社數書於策謂用此七百之書社降下於衛也食將不得矣作亂欲公之死故不給之食公曰嗟兹乎聖人之言長乎哉言其所見長遠也死者無知則已若有知吾何面目以見仲父於地下乃援素幭以裹首而絶幭所以覆軨也死十一日蟲出於户乃知桓公之死也葬以楊門之扇謂用門扇以掩尸也桓公之所以身死十一日蟲出户而不收者以不終用賢也桓公管仲鮑叔牙寧戚四人飲飲酣桓公謂鮑叔牙曰闔不起為寡人夀乎奉尊者酒祝令增夀鮑叔牙奉杯而起曰使公無忘出如莒時也使管子無忘束縛在魯也使寧戚無忘飯牛車下也桓公辟席再拜曰寡人與二大夫能無忘夫子之言則國之社稷必不危矣四稱第三十三謂稱有道之君無道之君有道之臣無道之臣以戒桓公短語七桓公問於管子曰寡人幼弱惛愚不通四鄰諸侯之義仲父不當盡語我昔者有道之君乎吾亦鑒焉管子對曰夷吾之所能與所不能盡在君所矣君胡有辱令言已能否皆盡之於君無所隱藏今何勞辱君命而使己言之乎桓公又問曰仲父寡人幼弱惛愚不通四鄰諸侯之義仲父不當盡告我昔者有道之君乎吾亦鑒焉管子對曰夷吾聞之於徐伯曰昔者有道之君敬其山川社稷宗廟及至先故之大臣收聚以忠而大富之先故之臣謂祖考時舊臣也今以忠誠收聚而賙恤之令其大富也固其武臣宣用其力聖人在前貞亷在側競稱於義上下皆飭刑政明察四時不貸民亦不憂五穀蕃殖外內均和諸侯臣服國家安寧不用兵革受其幣帛以懷其德昭受其令以為法式鄰國以幣帛來聘當取之以懷來有德其或以制令來告者則君受之以為法式乎此亦可謂昔者有道之君也桓公曰善哉桓公曰仲父既已語我昔者有道之君矣不當盡語我昔者無道之君乎吾亦鑒焉管子對曰今若吾君之美好而宣通也既官職美道又何以聞惡為言君既美好宣通官又合於美道修而行之自可為理何須聞於惡事乎以此抑桓公欲觀其意也桓公曰是何言邪以繬績按繬所力切緣繬吾何以知其美也以素緣素吾何以知其善也仲父已語我其善而不語我其惡吾豈知善之為善也管仲對曰夷吾聞之於徐伯曰昔者無道之君大其宫室髙其臺榭良臣不使讒賊是舍舍止也謂止讒賊於其旁與之近也有家不治借人為圖言自不能理其家借他人圖也政令不善墨墨若夜言其昏暗之甚也譬若野獸無所朝處野獸各恣意為生不相統屬故無朝處也不修天道不鑒四方有家不治辟若生狂狂惑者昧其性不分善惡也衆所怨詛詛祝之也希不滅亡進其俳優繁其鐘鼓流於博塞戲其工瞽誅其良臣敖其婦女惟與婦女敖逰也獠獵畢弋暴遇諸父其所接遇諸父惟以凶暴馳騁無度戲樂笑語式政既輮刑罰則烈言其法式之政既已輮曲至於刑罰則過酷烈矣內削其民以為攻伐反以削生為伐功也辟猶漏釜豈能無竭漏釡則江海不能滿故必有竭也此亦可謂昔者無道之君矣桓公曰善哉桓公曰仲父既已語我昔者有道之君與昔者無道之君矣仲父不當盡語我昔者有道之臣乎吾亦鑒焉管子對曰夷吾聞之徐伯曰昔者有道之臣委質為臣不賓事左右賓敬也君知則仕不知則己若有事必圖國家遍其發揮良臣皆私其所有必能為國家及其發又普遍之也績按别本注盡已之能發揮於政事循其祖德辨其順逆推育賢人讒慝不作事君有義使下有禮貴賤相親若兄若弟忠於國家上下得體居處則思義語言則謀謨動作則事居國則富處軍則克臨難據事雖死不悔近君為拂遠君為輔義以與交亷以與處臨官則治酒食則慈績按一作辭不謗其君不諱其辭君若有過進諫不疑君若有憂則臣服之服行也此亦可謂昔者有道之臣矣桓公曰善哉桓公曰仲父既已語我昔者有道之臣矣不當盡語我昔者無道之臣乎吾亦鑒焉管子對曰夷吾聞之於徐伯曰昔者無道之臣委質為臣賓事左右執説以進不蘄亡已執佞説以進於君專寵固位無求於去也遂進不退所謂知進而不知退假寵鬻貴假因也因君之寵必能鬻其貴也尊其貨賄卑其爵位未必能貴其爵位但尊其貨賄而已矣進曰輔之退曰不可進於君則言已能為輔弼退而私議則曰君不可輔以敗其君皆曰非我由斯人之不肖故君有敗乃更推過於君云此非我不仁羣處以攻賢者小人所忌者君子故其羣處常有陷賢之見見賢若貨其見賢人無敬恭之心反欲規利若求貨然見賤若過其見賤人無矜恤之心蕭然不顧若行者之過貪於貨賄競於酒食不與善人惟其所事人有曲而事已則與之交也倨敖不恭不友善士讒賊與鬭不彌人爭其見人爭則恣令鬬無彌爭之心唯趣人詔人有制令不問可否則向而順之言其佞諛績按詔一本作訟湛湎於酒行義不從從順也不修先故變易國常擅創為令迷惑其君生奪之政生猶奪政况於死後乎保貴寵矜懼寵而矜夸者則保依而貴重遷損善士善士則遷改而損并之捕援貨人其所捕追而援引者唯財貨之人入則乘等出則黨駢其貨賄之人與之同國則同乘而等至其出也乂用黨而駢並貨賄相入酒食相親俱亂其君君若有過各奉其身奉身自利推過於君也此亦可謂昔者無道之臣乎桓公曰善哉正言第三十四闕短語八管子補注卷十一
