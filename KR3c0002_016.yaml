body:
  text: 管子補注卷十六明劉績撰內業四十九區言五凡物之精此則為生精謂神之至靈者也得此則為生下生五穀上為列星流於天地之間謂之鬼神藏於胸中謂之聖人是故民氣謂上之精者則人氣也杲乎如登於天杲明貌也杳乎如入於淵淖乎如在於海淖汋潤也卒乎如在於已人有氣則存故如在於已也是故此氣也不可止以力以力止之氣愈甚而可安以德靜心念德氣自來也不可呼以聲而可迎以音調其宮商使之克諧氣自來也敬守勿失是謂成德不失氣德自成德成而智出德成智自出萬物果得以智安物物皆得宜凡心之刑刑法也謂得安心之法也自充自盈充盈謂完而無虧也自生自成生成謂每生心必有所成凡此皆得安心法故也其所以失之必以憂樂喜怒欲利此六者過常以亂於心則失矣能去憂樂喜怒欲利心乃反濟若能去六者則心反守其所而能濟成也彼心之情利安以寧安寧者心之所利也勿煩勿亂和乃自成若無煩亂心和自成折折乎如在於側忽忽乎如將不得折折明貌言心明察若在其側及其求之則忽忽然而不得渺渺乎如窮無極渺渺微逺貌言心之微逺如欲窮之則無其極此稽不逺日用其德常以此考心不逺之則日有所用也夫道者所以充形也自形內而虛者皆道而人不能固人不能固守其虗反以利欲塞也其往不復其來不舍既有利欲之心則道往而不復雖有其來無處可舍謀乎莫聞其音今謀欲尋於道則不聞其音卒乎乃在於心冥冥乎不見其形尋至於極則近於心心之方寸虗道之君乎淫淫乎與我俱生淫淫增進貌有生則有道故曰與我俱生也不見其形不聞其聲而序其成謂之道雖無形聲常依序而成故謂之道也凡道無所善心安愛言道無他善唯愛心安也心靜氣理道乃可止若靜心則氣自調理故道來止也彼道不逺民得以産人得之以生則道在人故不逺也彼道不離民因以知人既因道而知則道常在而不離是故卒乎其如可與索推尋其終似可與索眇眇乎其如窮無所及欲窮之則眇眇然無所彼道之情惡音與聲音聲者所以亂道故惡之也修心靜音道乃可得道也者口之所不能言也目之所不能視也耳之所不能聽也所以修心而正形也雖不可以言語視聽用之修心則外形自正也人之所失以死所得以生也事之所失以敗所得以成也故凡道無根無莖無葉無榮道非如卉木而有根莖花葉也萬物以生萬物以成命之曰道無根莖而能生無花葉而能成則隂陽不測者也故命之曰道天主正平分四時天之正也地主平均生萬物地之平也人主安靜無為而無不為人之安靜也春秋冬夏天之時也山陵川谷地之枝也為地之枝條也喜怒取豫人之謀也四者謀之用也是故聖人與時變而不化時自變耳聖本不化從物而不移物遷而從之聖本不移能正能靜然後能定必正靜然後定也定心在中耳目聰明四肢堅固心茍定於中則耳目自聰明四肢自堅固者也可以為精舍心者精之所舍精也者氣之精者也氣之尤精者為之精氣道乃生氣得道能有生生乃思生則有心故思也思乃知思則知生也知乃止矣成智則理足故止也凡心之形過知失生安心之法智過其度則失其生一物能化謂之神一事能變謂之智一謂無也謂無心於物事而物事自變化以為神智也化不易氣變不易智惟執一之君子能為此乎茍執一故能不易其氣智也執一不失能君萬物無心為有心者主也君子使物不為物使無心故能使物而物不能使也得一之理治心在於中茍得中則心自治矣治言出於口治事加於人則無狂事然則天下治矣一言得而天下服一言定而天下聽公之謂也理心之謂形不正德不來中不盡心不治績按當依心術作中不精正形攝德天仁地義則淫然而自至言欲正形攝德但能則天之仁法地之義則德淫然自至淫進貌也神明之極照乎知照智者神明之極理萬物中義守不忒若常守中則無差忒績按前心術作昭知天下通於四極則萬物為句不以物亂官貪物則官亂不以官亂心貪官則心亂也是謂中得能忘官貨則中心自得也有神自在身中得則神自在身也一往一來莫之能思神不測者也故往來不能思也失之必亂得之必治謂神也敬除其舍精將自來精想思之除謂有則想思之寧念治之寧靜思念則心自治嚴容畏敬精將至定但能嚴敬則精至而定也得之而勿捨耳目不淫心無他圖既得精守之而勿捨則耳目不淫心無他慮也正心在中萬物得度心在中而正則無過舉故萬物得度也道滿天下普在民所民不能知也言人皆有道但不能自知耳一言之解上察於天下極於地蟠滿九州若能解道之一言則能察天極地而中滿於九州蟠委地也何謂解之在於心安解道者在於心安我心治官乃治我心安官乃安言官之治安皆從心主也治之者心也安之者心也治之與安無不由心心以藏心言心亦藏於心也心之中又有心焉以心藏心故心中又有心彼心之心謂心中所藏之心音以先言言從音生故音先言績按前心術作意以先言此乃字之誤下音同音然後形有音然後見也形然後言有形則是言也言然後使有言則出命故有所使令使然後治不治必亂使而違理故亂亂乃死亂則凶禍至故死也精存自生其外安榮精存於中則自然長生至於外形靜而榮茂也內藏以為泉原內藏於精則無窮竭若水之泉浩然和平以為氣淵言精既浩然和平則能生氣故為氣淵淵之不涸四體乃固生氣之淵不有竭涸故四體固也泉之不竭九竅遂通藏精之泉不竭故九竅通也乃能窮天地被四海體固竅通故能壽畢天地德被四海中無惑意外無邪菑邪菑生於惑意故內無惑意則邪菑自銷也心全於中形全於外中全則外完不逢天菑不遇人害天菑人害能禍不全者也謂之聖人人能正靜皮膚裕寬耳目聰明筋信而骨强但能正靜則皮膚自裕寬耳目自聰明筋骨自申强績按信前心術作韌乃能戴大圜天也而履大方地也鑒於大清道也視於大明日月也敬愼無忒前心術作正靜不失日新其德遍知天下窮於四極敬發其充充謂道也是謂內得發行於道故內得也然而不反此生之忒忒差也若不反守於道則生有差謬也凡道必周必密周密則愼不泄必寬必舒寬舒則博而密必堅必固堅固則精不解守善勿舍勿舍則善自成逐淫澤薄兢逐淫邪津澤浮薄績按澤乃釋字既知其極反於道德知極反德則常道自隆全心在中不可蔽匿有諸內必形於外也和於形容心和者容睟也績按和乃知字誤也前心術作外見於形容可知於顔色是也見於膚色內暢者體澤也善氣迎人親於兄弟惡氣迎人害於戎兵不言之聲疾於雷鼓謂全心以德感物者也德者不疾而速不崇朝而遍天下故疾於雷鼓也心氣之形明於日月察於父母全心之氣發形於外則無不耀無不知若明於日月察於父母也賞不足以勸善慕賞乃善非本為善刑不足以懲過畏刑懲過非本無過氣意得而天下服若不慕賞不畏刑意氣內得善者此誠善也故天下服也心意定而天下聽心意定則理明故天下聽也摶氣如神萬物備存摶謂結聚也結聚純氣則無所不變化故如神而物備存矣績按前心術作專於意一於心耳目端知逺之證下摶亦作專能摶乎能一乎摶結則自一也能無卜筮而知吉凶乎吉凶在於逆順故不須卜筮而知也能止乎能已乎謂正而求諸已也能勿求諸人而得之已乎求人者惑自得者明思之思之又重思之求已者必須再三思之也思之而不通鬼神將通之若再三思之而不通則或致鬼神為通之也非鬼神之力也精氣之極也言今能致鬼神者非鬼神自見其力蓋由思之不已精氣之極也四體既正血氣既靜一意摶心耳目不淫雖遠若近言既體正氣靜意一心專耳目之用不有淫過事雖逺大可以近速而成也思索生知近而遇思索其知自生矣慢易生憂疏慢輕易必致凶禍故主憂也暴傲生怨殘暴傲虐傷害必多故生怨也憂鬱生疾憂恚鬱塞懷不通暢故生疾也疾困乃死既疾而困可謂彌留而死思之而不捨內困外薄思欲不捨則五藏困於內形骸薄於外也不蚤為圖生將巽舍既已內困外薄尚不圖之如此則生將巽遁其舍而至於死期也食莫若無飽飽食者善閉塞思莫若勿致致思者多困竭節適之齊彼將自至齊中也言能節食適思常莫過中則生將自致凡人之生也天出其精言禀精於天也地出其形地出衣食以養成其形績按形謂賦質於地也合此以為人言合天地精氣以成人和乃生二氣和乃成其生也不和不生察和之道其精不見其徵不醜醜類也言欲察和則精不可見至於徴驗又不知其類也平正擅胸論治在心此以長壽和之精類雖不可知見但能平而正則和氣獨擅於胸中論其適理又不離心如此則可以益算而長壽也忿怒之失度乃為之圖若忿怒過度則當圖而去之節其五欲去其二凶喜怒過度皆能為害故曰二凶不喜不怒平正擅胸不喜不怒可謂和也故能既平且正獨擅於胸中也凡人之生也必以平正所以失之必以喜怒憂患是故止怒莫若詩詩有清風之慰故能止怒去憂莫若樂節樂莫若禮守禮莫若敬守敬莫若靜內靜外敬能反其性性將大定凡食之道大充傷而形不臧大充謂過於飽大攝骨枯而血沍大攝謂過於飢血沍謂血銷減而凝沍充攝之間此謂和成間猶中也充攝得中則和暢而有所成也精之所舍而知之所生言精智生舍於和成飢飽之失度乃為之圖圖之令合於度飽則疾動飽而疾動則食氣銷飢則廣思飢而廣思則忘其飢老則長慮老而長慮則遺其老飽不疾動氣不通於四末四末四支飢不廣思飽而不廢廢止也老不長慮困乃遫竭令老則益困而速竭大心而敢心既浩大又能勇敢寬氣而廣當寬舒其氣而廣有所容其形安而不移形安則志固故不移能守一而棄萬苛守一則惡煩故能棄萬苛也見利不誘見害不懼寬舒而仁獨樂其身是謂雲氣意行似天能調其氣故比於雲意之行氣似天之布雲也凡人之生也必以其歡歡則志氣和故生也憂則失紀怒則失端憂怒過常則失其端紀憂悲喜怒道乃無處憂怒則害道故道無所處愛欲靜之遇亂正之謂若愛欲則當靜之若遇廢亂則當正之勿引勿推福將自歸去而勿引來而勿推但任平而往福則自歸也彼道自來可藉與謀藉因也因其自來而與之謀則意動而理盡靜則得之躁則失之靈氣在心一來一逝靜則來躁則逝其細無內其大無外所以失之以躁為害心能執靜道將自定得道之人理丞而屯泄胸中無敗謂腠理丞達屯聚泄散故胸中無敗節欲之道萬物不害能節欲則物無害也封禪第五十元篇亡今以司馬遷封禪書所載管子言以補之雜篇一桓公既霸㑹諸侯於葵丘而欲封禪管仲曰古者封泰山禪梁父者七十二家而夷吾所記者十有二焉昔無懷氏古之王者在伏羲前封泰山禪云云云云山在梁父東虙羲封泰山禪云云神農封泰山禪云云炎帝封泰山禪云云黃帝封泰山禪亭亭亭亭山在年隂顓頊封泰山禪云云帝嚳封泰山禪云云堯封泰山禪云云舜封泰山禪云云禹封泰山禪㑹稽湯封泰山禪云云周成王封泰山禪社首山名在博縣或云在巨平南十五里皆受命然後得封禪桓公曰寡人北伐山戎過孤竹西伐大夏涉流沙束馬懸車上卑耳之山將上山纒束其馬懸釣其車也卑耳即齊語所謂辟耳南伐至召陵登熊耳山以望江漢兵車之㑹三而乘車之㑹六九合諸侯一匡天下諸侯莫違我昔三代受命亦何以異乎於是管仲睹桓公不可窮以辭因設之以事曰古之封禪鄗上之黍北里之禾鄗上山也績按鄗音臛鄗上北里皆地名所以為盛江淮之間一茅三脊所謂靈茅所以為藉也東海致比目之魚各有一目不比不行其名曰鰈西海致比翼之鳥各有一翼不比不飛其名曰鶼鶼然後物有不召而自至者十有五焉今鳯凰麒麟不來嘉穀不生而蓬蒿藜莠茂鴟梟數至而欲封禪毋乃不可乎於是桓公乃止小問第五十一雜篇二桓公問管子曰治而不亂明而不蔽若何管子對曰明分任職則治而不亂明而不蔽矣公曰請問富國奈何管子對曰力地而動於時則國必富矣謂勤力於地利其所動作必合於天時公又問曰吾欲行廣仁大義以利天下奚為而可管子對曰誅暴禁非此大義也存亡繼絶而赦無罪此廣仁也則仁廣而義大矣公曰吾聞之也夫誅暴禁非而赦無罪者必有戰勝之器攻取之數而後能誅暴禁非而赦無罪公曰請問戰勝之器管子對曰選天下之豪傑致天下之精材來天下之良工則有戰勝之器矣公曰攻取之數何如管子對曰毁其備散其積奪之食則無固城矣毁備奪食則無以守故其城不固此謂攻也公曰然則取之若何謂取其土管子對曰假而禮之假謂假借之恩厚而勿欺厚謂重之以德則天下之士至矣公曰致天下之精材若何精材謂美材可為軍之器用也管子對曰五而六之九而十之不可為數欲致精材者必當貴其價故他處直五我酬之六他處直九我酬之十常令貴其一分不可為之定數如此則天下精材可致也公曰來工若何管子對曰三倍不逺千里酬工匠之庸直常三倍他處則工人不以千里為逺皆至矣桓公曰吾已知戰勝之器攻取之數矣請問行軍襲邑舉錯而知先後不失地利若何管子對曰用貨察圖用貨為反間則知其先後察彼國圖則不失地利也公曰野戰必勝若何管子對曰以竒竒謂權譎以勝敵也公曰吾欲遍知天下若何管子對曰小以吾不識則天下不足識也若能博聞多見齊其所不識則知天下遍矣吾之所識天下亦無人能識之也公曰守戰逺見有患為國者必入守出戰今吾於此二者預見其患矣夫民不必死則不可與出乎守戰之難守戰之難必致死然後可出也不必信則不可恃而外知人必誠信然後為君視聽故知外事也夫恃不死之民而求以守戰恃不信之人而求以外知此兵之三暗也茍不死不信則守暗戰暗外暗故曰三暗使民必死必信若何管子對曰明三本公曰何謂三本管子對曰三本者一曰固二曰尊三曰質公曰何謂也管子對曰故國父母墳墓之所在固也人既戀本而哀墳墓則其心固田宅爵祿尊也妻子質也三者備然後大其威厲其意則民必死而不我欺也不我欺則信也桓公問治民於管子管子對曰凡牧民者必知其疾疾謂患苦也而憂之以德勿懼以罪勿止以力煩力役則止而不來愼此四者足以治民也桓公曰寡人睹其善也何為其寡也謂四言雖善然以之理國恐其太少管子對曰夫寡非有國者之患也患在不能行不在寡少也昔者天子中立地方千里四言者該焉何為其寡也該備也謂四言足以備千里之化不為少夫牧民不知其疾則民疾疾謂憎嫌之也不憂以德則民多怨懼之以罪則民多詐設詐以避罪也止之以力則往者不反創其力役之苦來者鷙距鷙疑也距止也聞其役煩則疑而止故聖王之牧民也不在其多也桓公曰善勿已如是又何以行之其事既善雖然不但如是而已更有何事以行此四言也管仲對曰質信極忠質主也謂主能得信又極忠也嚴以有禮愼此四者所以行之也桓公曰請問其說管仲對曰信也者民信之忠也者民懷之嚴也者民畏之禮也者民美之語曰澤命不渝信也謂恩澤之命不有渝變如此者信也詩舍命不渝蓋澤乃釋字釋同舍非其所欲勿施於人仁也仁者忠於人也堅中外正嚴也質信以讓禮也主行於信又能遜讓如此者禮也桓公曰善哉牧民何先管仲對曰有時先事有時先政有時先德有時先恕飄風暴雨不為人害涸旱不為民患百川道百川之流皆從故道年穀熟糴貸賤禽獸與人聚食民食年穀熟則禽獸食人之食民不疾疫當此時也民富且驕牧民者厚收善嵗以充倉廩善嵗謂有年禁藪澤此謂先之以事隨之以刑敬之以禮樂以振其淫振正也禮樂者所以止人淫放此謂先之以政飄風暴雨為民害涸旱為民患年穀不熟嵗饑糴貸貴民疾疫當此時也民貧且罷牧民者發倉廩山林藪澤以共其財後之以事先之以恕以振其罷此謂先之以德其收之也不奪民財謂善嵗也其施之也不失有德謂凶年也富上而足下此聖王之至事也桓公曰善桓公問管仲曰寡人欲霸以二三子之功既得霸矣今吾有欲王其可乎管仲對曰公當召叔牙而問焉管仲知桓公不可王雖以實對故推令問叔牙鮑叔至公又問焉鮑叔對曰公當召賔胥無而問焉賔胥無趨而進公又問焉賔胥無對曰古之王者其君豐其臣教君豐臣教則君能制臣故可以王也今君之臣豐言德豐於君也公遵遁繆然逺二三子遂徐行而進言公之所遵行者皆流遁繆妄之事無所比可謂逺於二三子但當塗而漸以取進耳欲王天下恐未可也公曰昔者大王賢王季賢文王賢武王賢武王伐殷克之七年而崩周公旦輔成王而治天下僅能制於四海之內矣今寡人之子不若寡人寡人不若二三子以此觀之則吾不王必矣桓公曰我欲勝民言欲勝服於民為之奈何管仲對曰此非人君之言也人君之言當仁以化之不可直用刑勝也勝民為易夫勝民之為道非天下之大道也君欲勝民則使有司疏獄而謁有罪者償謂疏録獄囚謁告有罪者則償之也數省而嚴誅數省有過嚴其誅罪若此則民勝矣雖然勝民之為道非天下之大道也使民畏公而不見親嚴刑故也禍亟及於身二世嚴刑身戮望夷雖能不久雖能勝人不可久安則人持莫之弒也危哉持謂見劫執也弒謂殺親也君之國岋乎桓公觀於廄問廏吏曰廏何事最難廏吏未對管仲對曰夷吾嘗為圉人矣圉養馬也傅馬棧最難謂編次之棧馬所立木也先傅曲木曲木又求曲木編棧者先附曲木其次還須曲木求其類曲木已傅直木無所施矣既用曲木又施直木則失其類而棧敗矣喻小人用則君子退也先傅直木直木又求直木直木已傅曲木亦無所施矣喻君子用則小人退桓公謂管仲曰吾欲伐大國之不服者奈何管仲對曰先愛四封之內然後可以惡竟外之不善者四封之內見愛則人致死可以惡竟外之不善者先定卿大夫之家然後可以危鄰之敵國卿大夫之家既定則國强故可以危鄰國是故先王必有置也然後有廢也已國有置然後廢他國也必有利也然後有害也能利己國然後可以害他國也桓公踐位令釁社塞禱殺牲以血澆落於社曰釁社祝鳬已疪獻胙祝祝史鳬已疪其名也胙祭肉也祝曰除君苛疾祝令除君項苛之疾與若之多虛而少實若似也謂君之材能多似有而非實如此者亦祝去之也桓公不說瞋目而視祝鳬已疪祝鳬已疪授酒而祭之曰又與君之若賢謂君似賢亦當去之桓公怒將誅之而未也以復管仲復猶告也管仲於是知桓公之可以霸也祝史誣君之惡君怒而將誅之是心務善也故知可與霸也桓公乘馬虎望見之而伏桓公問管仲曰今者寡人乘馬虎望見寡人而不敢行其故何也管仲對曰意者君乘駮馬而洀桓迎日而馳乎洀古盤字公曰然管仲對曰此駮象也駮食虎豹故虎疑焉楚伐莒莒君使人求救於齊桓公將救之管仲曰君勿救也公曰其故何也管仲對曰臣與其使者言三辱其君顔色不變辱其君而色不變則無羞恥也臣使官無滿其禮三三加其禮皆不滿意强其使者爭之以死不識不滿之意才激强之則爭之以死是不智莒君小人也君勿救其使不賢故知其君小人也桓公果不救而莒亡桓公放春三月觀於野春物放發故曰放春桓公曰何物可比於君子之德乎隰朋對曰夫粟內甲以處中有卷城外有兵刃種粟者甲在內而處葉居外而卷若城苗之纎芒在外有兵刃未敢自恃自命曰粟粟之物用雖如此然不敢自恃故自名曰粟粟則謹促之名也此其可比於君子之德乎管仲曰苗始其少也眴眴乎其孺子也眴眴柔順貌穀苗始則柔順故似孺子也至其壯也莊莊乎何其士也壯謂苗轉長大莊莊矜直貌也至其成也由由乎兹免何其君子也由由悅也實貌兹免謂益有謹勵天下得之則安人以穀為命不得則危故命之曰木以其和調人之性命此其可比於君子之德矣桓公曰善桓公北伐孤竹未至卑耳之溪十里闟然止瞪然視闟住立貌瞪驚視貌援弓將射引而未敢發也謂左右曰見是前人乎左右對曰不見也公曰事其不濟乎寡人大惑今者寡人見人長尺而人物具焉冠右袪衣走馬前疾事其不濟乎寡人大惑豈有人若此者乎管仲對曰臣聞登山之神有俞兒者長尺而人物具焉霸王之君興而登山神見且走馬前疾道也袪衣示前有水也右袪衣示從右方涉也至卑耳之溪有贊水者謂贊引渡水者曰從左方涉其深及冠從右方涉其深至膝若右涉其大濟桓公立拜管仲於馬前曰仲父之聖至若此寡人之抵罪也久矣抵當也不知仲父之聖是寡人當有罪久矣管仲對曰夷吾聞之聖人先知無形今已有形而後知之臣非聖也善承教也善承古人之法桓公使管仲求寧戚寧戚應之曰浩浩乎育育乎管仲不知至中食而慮之婢子曰公何慮管仲曰非婢子之所知也婢子曰公其毋少少毋賤賤昔者吳干戰干江邊地也未齓不得入軍門齓毁齒也國子擲其齒遂入為干國多戰功曰多言於干戰國子功多也百里徯秦國之飯牛者也穆公舉而相之遂霸諸侯由是觀之賤豈可賤少豈可少哉管仲曰然公使我求寧戚寧戚應我曰浩浩乎吾不識婢子曰詩有之浩浩者水育育者魚水浩浩然盛大魚育育然相與而遊其中喻時人皆得配偶以居其室家寧戚有伉儷之思故陳此詩以見意未有室家而安召我居言誰當召我授之配匹與之為居也寧子其欲室乎桓公與管仲闔門而謀伐莒未發也而已聞於國矣桓公怒謂管仲曰寡人與仲父闔門而謀伐莒未發也而已聞於國其故何也管仲曰國必有聖人桓公曰然夫日之役者有執席食以視上者必彼是邪桓公與管仲謀時役人於前乃有執席而食私目上視所以察君也必是人者知吾謀也於是乃令之復役毋復相代時執席而食者代人入役因得察君今不令相代彼亦知君覺已必當來也少焉東郭郵至桓公令儐者延而上儐謂贊引賔客者也與之分級而上公以客禮待之故與之分級而上謂使之就賔階也問焉曰子言伐莒者乎東郭郵曰然臣也桓公曰寡人不言伐莒而子言伐莒其故何也東郭郵對曰臣聞之君子善謀而小人善意善以意度之也臣意之也桓公曰子奚以意之東郭郵曰天欣然喜樂者鐘鼓之色也夫淵然清靜者縗絰之色也漻然豐滿心在兵武形氣盛故其貌豐滿而手足拇動者中勇外形必應故手足拇動也兵甲之色也日者臣視二君之在臺上也口開而不闔是言莒也莒字兩口故二君開口相對即知其言莒舉手而指勢當莒也且臣觀小國諸侯之不服者唯莒於是唯莒不服於是知之臣故曰伐莒桓公曰善哉以微射明此之謂乎言以形色之微知伐國之明也子其坐寡人與子同之同伐莒之謀也客或欲見於齊桓公請仕上官授祿千鍾公以告管仲曰君豫之客聞之曰臣不仕矣公曰何故對曰臣聞取人以人者以人之言然後取人其去人也亦用人吾不仕矣管子補注卷十六
