body:
  text: 管子補注卷十五明劉績撰勢第四十二短語十六戰而懼水此謂淡滅方戰之時懼致水禍此必為水所淡而滅亡也小事不從大事不吉茍懼水禍則事無小大未見其福也戰而懼險此謂迷中方戰之時懼有險礙進退莫知所從故曰迷中言在迷惑之中分其師衆人既迷芒必其將亡之道人既迷惑不知所從則無所用其力是以減其師衆矣又况迷惑芒然乎若是者必亡其衆凡此二事皆滅亡之道也動靜者比於死比近也用師之道我動而敵靜者則靜者勝矣故我近於死亡也動作者比於醜我先動敵反作應者我必無功故近於醜動信者比於距我既動彼能自申以敵我如此者近於見距也動詘者比於避我既動而彼屈服者近於見避夫靜與作時以為主人時以為客貴得度靜作得度則為主人其失度者則為客也績按别本注靜作得度或為主人或為客皆利也知靜之修居而自利既多智而又安靜二者能修則居然自獲其利也知作之從每動有功知其所作常能從理如此者動必有功也故曰無為者帝其此之謂矣言無心於為任理之自然如此者帝王之道也逆節萌生天地未形先為之政其事乃不成繆受其刑言將為篡殺凶逆之節雖萌芽而生然天地寂泊不見徴應無從已之形此則先天而政天乃違之故其事不成則被誅戮受其刑罪也績按别本注天因人事而生變聖人應天變而興也天因人聖人因天所謂先天而天不違後天而奉天時天時不作勿為客不因天時而動者乃為客矣人事不起勿為始不因人事而起可謂先事為始慕和其衆以修天地之從人先生之天地形之聖人成之則與天同極將建大事必慕和其衆天地既已從但當修天之意人先生是心天地又見其修意有從順之形聖人則發動而成如此者可謂與天同極也績按别本注若漢武之興是也正靜不爭動作不二素質不留全其素質無所留者與地同極能行正靜已下可謂與地同極也未得天極則隱於德未得與天同極則隱而修德也已得天極則致其力已得天極則當致力而成之若湯之升陑武王牧野是也既成其功順守其從人不能代從順也功成矣則以順理守之所謂逆取順守者也則人何能代之乎成功之道嬴縮為寶嬴縮猶行藏也所謂時行則行時止則止其道乃著故以為寶毋亡天極究數而止但盡天之數則止而勿為事若未成毋改其形毋失其始形謂常形也守常修始事終有成也靜民觀時待令而起言事未成之時但安靜其人謹候其時待天命令然後起而應也故曰修隂陽之從而道天地之常道從也嬴嬴縮縮因而為當必行藏順時然後事當重言之殷勤其事也死死生生因天地之形死生猶隱顯也聖人隱顯必因天地之形天地之形聖人成之因天地之形則無不成也小取者小利大取者大利但能法則大小無不利盡行之者有天下所謂唯天為大唯堯則之故賢者誠信以仁之慈惠以愛之端政象不敢以先人常執謙以下物中靜不留中心安靜無所留著裕德無求道德饒裕無求於人形於女色女之容色靜而不先求者其所處者柔安靜樂雖復隱處常能柔安靜樂行德而不爭以待天下之濆作也雖復為政行德常能謙讓不與物爭濆動亂也故賢者安徐正靜柔節先定先定謙柔之節然後有所興為也行於不敢則人不能與我爭勇而立於不能則人莫與我爭功守弱節而堅處之守柔弱之節而堅明以自處也故不犯天時不亂民功謙順故無所犯亂也秉時養人持四時之政以順養其人先德後刑賞以春夏刑以秋冬順於天微度人既順於天又微度人之所宜以合之善周者明不能見也善於周周則極也萬物無所至如此者雖有明察之人不能盡矣善明者周不能蔽也善於明明則極也如此者則雖善周之人不能自隱蔽必為善明者所知也大明勝大周則民無大周也明勝大周則人無能為大周也大周勝大明則民無大明也周勝大明則人無能為大明凡此皆欲大周大明獨在君也大周之先可以奮信奮信振起貌言既有大周之德在物之先則可以振起而有事大明之祖可以代天下有大明之德可以為物祖如此則可代天下無道取其位而君之也索而不得求之招搖之下招搖之星隨斗杓順時而建者也天下者神器直欲索之則不得若求之招搖之下順時而取則可也獸厭走而有伏網罟獸所以憎厭其走者恐前有伏網罟故聖人不敢以直道取天下者恐有大禍故也一偃一側不然不得偃側猶倚伏也聖人之取天下知所倚伏力其功而致其權文設武伏如其不然則天位不可得也大文三曾而貴義與德大武三曾而偃武與力大文三曾則文道行也能成其德義大武三曾則武道行也能偃其武力正第四十三短語十七制斷五刑各當其名罪人不怨服罪故不怨也善人不驚曰刑刑當故不驚如此者所謂刑也正之所以勝姦正也服之所以服不能也勝之所以勝姦邪飾之修飾身也必嚴其令而民則之曰政令嚴則人作法之如此者政也如四時之不貣如星辰之不變如宵如晝如隂如陽宵晝隂陽皆有其當如日月之明曰法法之用守常不變愛之生之養之成之利民不德利雖及人不以為德也天下親之曰德德用之恩萬物親之無德無怨無好無惡萬物崇一隂陽同度曰道道之用不二者刑以弊之政以命之法以遏之德以養之物待德養而成道以明之明是非也刑以弊之毋失民命刑斷合理故人命不失也令之以終其欲明之毋徑行令所以終人之欲使之明識正道不從邪徑也績按當作勿使民徑字之誤也遏之以絶其志意毋使民幸用法正人之意志不使人有非分之幸也養之以化其惡必自身始身惡盡則人惡化明之以察其生必修其理恐有不修理故以明察之致刑其民庸心以蔽庸用也不用心以斷則濫及不辜致政其民服信以聽服用也謂用誠信聽理句於人績按缺致法一致德其民和平以靜君德及人以致和靜致道其民付而不爭人被道則相付任而不交爭也罪人當名曰刑罪當其名刑之謂也出令當時曰政令當於時政之謂也當故不改曰法不改當故法之謂也愛民無私曰德君愛無私德之謂也會民所聚曰道聚謂衆所宜也能令衆宜道之謂也立常行政能服信乎服信則政行常立中和愼敬能日新乎苟能和敬則其德日新也正衡一靜能守愼乎衡平也言但能守愼則政平而靜一廢私立公能舉人乎但公而無私則能舉人也臨政官民能後其身乎後其身則能臨政官人也能服信政此謂正紀能行信正者正之紀能服日新此謂行理能行日新可謂行之理也守愼正名偽詐自止能愼則詐息也舉人無私臣德咸道無私則不妄舉故臣德皆合於道也能後其身上佐天子後身則先公故能上佐天子也九變第四十四謂人之情變有九短語十八凡民之所以守戰至死而不德其上者有數以至焉或守或戰雖復至死不敢恃之以德於上則有數仔焉於其間故能至此也曰大者親戚墳墓之所在也一變也田宅富厚足居也二變不然則州縣鄉黨與宗族足懷樂也三變不然則上之教訓習俗慈愛之於民也厚無所往而得之君之恩厚皆在於人無所他往故得人之致死四變績按言無如此者不然則山林澤谷之利足生也五變不然則地形險阻易守而難攻也六變不然則罰嚴而可畏也不然則賞明而足勸也七變不然則有深怨於敵人也八變不然則有厚功於上也功厚則祿多故亦自為戰而不德於君九變此民之所以守戰致死而不德其上者也今恃不信之人而求以智用不守之民而欲以固將不戰之卒而幸以勝此兵之三暗也任法第四十五區言一聖君任法而不任智任數而不任説任公而不任私任大道而不任小物小物小事然後身佚而天下治失君則不然舍法而任智故民舍事而好譽舍數而任説故民舍實而好言舍公而好私故民離法而妄行舍大道而任小物故上勞煩百姓迷惑而國家不治聖君則不然守道要處佚樂馳騁弋獵鐘鼓竽瑟宮中之樂無禁圉也但任法數故無所慮圖也利身體便形軀養壽命垂拱而天下治但任法數則事簡故身不勞壽命長而天下自理也是故人主有能用其道者道則謂上法數公正大道不事心不勞意不動力而土地自辟囷倉自實蓄積自多甲兵自強羣臣無詐偽百官無姦邪竒術技藝之人莫敢髙言孟行以過其情以遇其主矣孟大也遇待也不敢以謬妄姦言妄行以待其主也昔者堯之治天下也猶埴之在埏也埏和也唯陶之所以為猶金之在罏恣冶之所以鑄其民引之而來推之而往使之而成禁之而止故堯之治也善明法禁之令而已矣黃帝之治天下也其民不引而來不推而往不使而成不禁而止比黃帝之於堯則堯有為而黃帝無為故黃帝之治也置法而不變使民安其法者也所謂仁義禮樂者皆出於法法行順仁義生此先聖之所以一民者也法所以齊一於民也周書曰國法有國者以法立也法不一則有國者不祥法不一則亂故不祥民不道法則不祥道從也國更立法以典民則祥更改也典主也言能觀宜改法以主於人則國理故祥也羣臣不用禮義教訓則不祥百官伏事者離法而治則不祥服行也故曰法者不可恆也法敝則當變故不可恆存亡治亂之所從出法順則存治法逆則亂亡聖君所以為天下大儀也君為天下之儀表也君臣上下貴賤皆發焉莫不取法於君臣發行也故曰法古之法也立法者必師古世無請謁任舉之人任保也以法取人則無請謁之保舉無間識博學辨説之士間雜亂也法行則博學辨説之人不敢間亂識事也無偉服無竒行偉服竒行皆過越法制者令止息者畏法故也皆囊於法以事其主囊者所以斂藏也謂人皆斂藏過行以順於法上事具主故明王之所恆者二一曰明法而固守之二曰禁民私而收使之謂以法收斂而使之此二者主之所恆也廢此二者則政亂夫法者上之所以一民使下也私者下之所以侵法亂主也故聖君置儀設法而固守之然故諶杵習士聞識博學之人不可亂也杵所以毁碎於物者也謂姦詐之人偽託於諶以毁君法習士謂習法之士聞識謂多聞廣識君守法堅故此等莫能亂也衆強富貴私勇者不能侵也信近親愛者不能離也離猶違也珍怪竒物不能惑也萬物百事非在法之中者不能動也珍怪竒物此正法為怪僻故法者天下之至道也道無越於法者聖君之實用也用法為理國之實今天下則不然皆有善法而不能守也然故諶杵習士聞識博學之士能以其智亂法惑上衆強富貴私勇者能以其威犯法侵凌謂侵凌於君也鄰國諸侯能以其權置子立相鄰國恃權能廢置君之子援立國相大臣能以其私附百姓謂用私恩誘百姓使附也翦公財以祿私士謂翦公財以祿私士此皆以君不守法故也凡如是而求法之行國之治不可得也謂從失法之後國不可得理也聖君則不然卿相不得翦其私羣臣不得辟其所親愛聖君亦明其法而固守之羣臣修通輻輳謂各得自通於君如輻之輳也以事其主百姓輯睦聽令道法以從其事道從也故曰有生法有守法有法於法夫生法者君也君始制法故曰生法守法者臣也臣則法法而行法於法者民也人則法君之法君臣上下貴賤皆從法此謂為大治故主有三術謂上主中主危主也夫愛人不私賞也惡人不私罰也置儀設法以度量斷者上主也愛人而私賞之惡人而私罰之倍大臣離左右專以其心斷者中主也臣有所愛而為私賞之有所惡而為私罰之為大臣愛惡之故而私賞罰也倍其公法損其正心謂損政教之正專聽其大臣者危主也故為人主者不重愛人不重惡人重愛曰失德重惡曰失威君隨臣愛惡則威德皆在於臣故曰失也威德皆失則主危也故明王之所操者六生之殺之富之貧之貴之賤之此六柄者主之所操也主之所處者四一曰文二曰武三曰威四曰德此四位者主之所處也藉人以其所操命曰奪柄藉人以其所處命曰失位奪柄失位而求令之行不可得也既至於奪柄失位之後欲求令行不可得法不平令不全是亦奪柄失位之道也法不平令不全則柄位不可得而保故曰奪柄失位之道故有為枉法有為毁令此聖君之所以自禁也言有枉法毁令聖君則能禁止之故貴不能威富不能祿賤不能事近不能親美不能淫也此五事解見下文植固而不動竒邪乃恐所立堅則不可動若竒邪則敗亡旋及故恐竒革而邪化令往而民移君之竒邪能有革化則令才往而人已移心而從善也故聖君失度量置儀法聖君見有失度量則置儀法以改也績按失乃以字誤謂聖君以度量置儀法或曰當作一如天地之堅堅謂尊勝如列星之固自古至今不見天星有虧敗也如日月之明無私耀臨如四時之信寒暑之氣來必以時然故令往而民從之君能苞上之四事故令往人從也而失君則不然法立而還廢之令出而復反之枉法而從私毁令而不全是貴能威之富能祿之賤能事之近能親之美能淫之也此五者不禁於身君身不能自禁止也是以羣臣百姓人挾其私而幸其主妄希非分之恩彼幸而得之則主日侵臣得不當得之恩則主日見侵也彼幸而不得則怨日産若不得所幸則怨毒日生也夫日侵而産怨此失君之所愼也凡為主而不得用其法不適其意顧臣而行凡有所行不敢自專顧望其臣而為之也離法而聽貴臣貴臣雖有離法亦聽從之此所謂貴而威之也言貴臣能威於君也富人用金玉事主而來焉謂以金玉來事主也主因離法而聽之此所謂富而祿之也言富人能祿於君也賤人以服約卑敬悲色告訴其主服約謂屈服隱約也主因離法而聽之此所謂賤而事之也言賤人善諂君聽之近者以逼近親愛有求其主主因離法而聽之此所謂近而親之也言近者恃親以要君則君從美者以巧言令色請其主主因離法而聽之此所謂美而淫之也言美者能以言色淫動於君故君亦聽之治世則不然不知親疏逺近貴賤美惡以度量斷之其殺戮人者不怨也殺當其罪故不怨也其賞賜人者不德也以功受賞故不德於君也以法制行之如天地之無私也是以官無私論士無私議民無私説皆虗其胸以聽其上胸恐懼貌上以公正論以法制斷故任天下而不重也法制行則事簡故不重也今亂君則不然有私視也故有不見也有私聽也故有不聞也有私慮也故有不知也凡私則不周故有不見聞知也夫私者壅蔽失位之道也上舍公法而聽私説故羣臣百姓皆設私立方以教於國方謂異道術也羣黨比周以立其私請謁任舉以亂公法人用其心以幸於上上無度量以禁之是以私説日益而公法日損國之不治從此産矣夫君臣者天地之位也民者衆物之象也各立其所職以待君令羣臣百姓安得各用其心而立私乎故遵主令而行之雖有傷敗無罰遵令而行敗非已致故無罰也非主令而行之雖有功利罪死失令有功法所不赦故罪死然故下之事上也如響之應聲也臣之事主也如影之從形也故上令而下應主行而臣從此治之道也夫非主令而行有功利因賞之是教妄舉也賞不從令是教以妄為舉措也遵主令而行之有傷敗而罰之是使民慮利害而離法也羣臣百姓人慮利害而以其私心舉措則法制毁而令不行矣明法第四十六績按此篇注多非觀解自見區言二所謂治國者主道明也主道明則公法明故國治所謂亂國者臣術勝也臣術勝則私事立故國亂夫尊君卑臣非計親也以藝勝也令尊君卑臣者其計非欲使親君也但令君執其勝也績按執解作勢古字同注非百官識非惠也刑罰必也必令百官識非公之惠而不敢受又知刑罰必行無妄求免罪也績按當解作百官論職乃字缺誤注非故君臣共道則亂臣行君事故曰共道專授則失若君有所授與不合衆心而專之亦為失也夫國有四亡令求不出謂之滅求不出令則下無所稟故滅出而道留謂之擁中道而留止故曰擁下情求不上通謂之塞求不上通則與君隔絶故曰塞也下情上而道止謂之侵下情雖欲上通中道為左右所止此則臣侵上事也故夫滅侵塞擁之所生從法之不立也是故先王之治國也不淫意於法之外淫遊也不為惠於法之內也不屈法以成私惠也動無非法者所以禁過而外私也外遺也威不兩錯臣行君威為兩置政不二門臣出君政是為二門以法治國則舉錯而已言能以法理國但舉而置之無不行是故有法度之制者不可巧以詐偽非法度不聽則詐偽何施有權衡之稱者不可欺以輕重以權衡稱之輕重立見也有尋文之數者不可差以長短今主釋法以譽進能則臣離上而下比周矣比周於下所以求譽以黨舉官則民務交而不求用矣交合則自進官何待求用是故官之失其治也是主以譽為賞以毁為罰也以毁譽為賞罰則官自然失理然則喜賞惡罰之人離公道而行私術矣行私術自然得賞安用就公道而求乎比周以相為匿是比周者凡有公是之事皆匿而不行也忘主死交以進其譽績按解作比周以相為慝是故忘生死交以進其譽此乃誤脫故字於下死乃私聲誤故交衆者譽多為交友致死其譽自進外內朋黨雖有大姦其蔽主多矣是以忠臣死於非罪朋黨共毁之故忠臣非罪而死而邪臣起於非功朋黨共譽之故邪臣非功而起所死者非罪所起者非功也然則為人臣者重私而輕公矣私則得利公則致禍故重私而輕公矣十至於私人之門私人之門謂所與交私為朋黨者也不一至於庭謂之君庭百慮其家不一圖其國重私輕公故也屬數雖衆非以尊君也所屬之數雖曰衆多無不黨私故非尊君也百官雖具非以任國也各務私故不任國事此之謂國無人國無人者非朝臣之衰也家與家務於相益不務尊君也大臣務相貴而不任國小臣持祿養交而不以官為事故官失其能官各失能則與無人同也是故先王之治國也使法擇人不自舉也使法量功不自度也設法者自著擇人量功之條故不勞自舉度也故能匿而不可蔽茍有材能則法自舉之不可隱蔽也敗而不可飾也無功而敗法自量之不可虗飾也譽者不能進無材雖譽之而不能進也而誹者不能退也有功雖誹之而不能退也然則君臣之間明别謂賢不肖有功者各明白而分别也明别則易治也明别則無偽濫故易治也主雖不身下為謂不身為其事而守法為之可也但守法則法自為之不勞身也正世第四十七區言三古之欲正世調天下者必先觀國政料事務察民俗本治亂之所生知得失之所在然後從事從為故法可立而治可行夫萬民不和國家不安失非在上則過在下今使人君行逆不修道誅殺不以理重賦斂竭民財急使令罷民力使令急故人力疲也財竭則不能無侵奪人財竭則侵奪以供上稅也力罷則不能無墮倪倪傲也謂疲墮而傲從也民已侵奪墮倪因以法隨而誅之則是誅罰重而亂愈起夫民勞苦困不足則簡禁而輕罪如此則失在上失在上而上不變則萬民無所託其命今人主輕刑政寬百姓薄賦斂緩使令然民淫躁行私而不從制飾智任詐負力而爭則是過在下過在下人君不廉而變亷察也則暴人不勝邪亂不止暴人不勝邪亂不止則君人者勢傷而威日衰矣故為人君者莫貴於勝所謂勝者法立令行之謂勝法立令行故羣臣奉法守職百官有常法不繁匿萬民敦慤反本而儉力謂亷嗇而勤力也故賞必足以使謂使人從善也威必足以勝謂勝禁姦邪也然後不從故古之所謂明君者非一君也五帝三王俱曰明君故曰非一其設賞有薄有厚其立禁有輕有重迹行不必同非故相反也皆隨時而變因俗而動夫民躁而行僻則賞不可以不厚禁不可以不重既躁而僻則難化須厚賞以誘之重禁以威之故聖人設厚賞非侈也立重禁非戾也賞薄則民不利禁輕則邪人不畏設人之所不利欲以使則民不盡力立人之所不畏欲以禁則邪人不止是故陳法出令而民不從故賞不足勸則士民不為用刑罰不足畏則暴人輕犯禁民者服於威殺然後從見利然後用被治然後正得所安然後靜者也夫盜賊不勝邪亂不止強劫弱衆暴寡此天下之所憂萬民之所患也憂患不除則民不安其居民不安其居則民望絶於上矣夫利莫大於治害莫大於亂夫五帝三王所以成功立名顯於後世者以為天下致利除害也事行不必同所務一也莫不務於理也夫民貪行躁而誅罰輕罪過不發有罪過者不發舉也則是長淫亂而便邪僻也有愛人之心而實合於傷民輕刑以愛人姦多反傷人也此二者不可不察也二者謂愛與傷人夫盜賊不勝則良人危良人為盜所害故危法禁不立則姦邪繁故事莫急於當務每事當其務則理也治莫貴於得齊齊謂無非人也制民急則民迫民迫則窘窘則民失其所葆葆謂所恃為生者也緩則縱縱則淫淫則行私行私則離公離公則難用故治之所以不立者齊不得也謂上有非人也齊不得則治難行故治民之齊不可不察也聖人者明於治亂之道習於人事之終始者也其治人民也期於利民而止至於利人則止而勿理也故其位齊也不慕古不留今留謂守常不變與時變與俗化夫君人之道莫貴於勝勝故君道立勝則無不服故君道立也君道立然後下從下從故教可立而化可成也夫民不心服體從則不可以禮義之文教也君人者不可以不察也治國第四十八區言四凡治國之道必先富民民富則易治也民貧則難治也奚以知其然也民富則安鄉重家安鄉重家則敬上畏罪敬上畏罪則易治也民貧則危鄉輕家危謂不安其所居也危鄉輕家則敢陵上犯禁陵上犯禁則難治也故治國常富而亂國常貧是以善為國者必先富民然後治之昔者七十九代之君法制不一號令不同然俱王天下者何也必國富而粟多也夫富國多粟生於農故先王貴之凡為國之急者必先禁末作文巧末作文巧禁則民無所遊食民無所遊食則必農謂必務農民事農則田墾田墾則粟多粟多則國富國富者兵強兵強者戰勝戰勝者地廣是以先王知衆民強兵廣地富國之必生於粟也故禁末作止竒巧而利農事今為末作竒巧者一日作而五日食言取一日之利可供五日之食也農夫終嵗之作不足以自食也然則民舍本事而事末作舍本事而事末作則田荒而國貧矣凡農者月不足而嵗有餘者也而上徴暴急無時謂徭稅不以時則民倍貸以給上之徴矣倍貸謂貸一還二也耕耨者有時而澤不必足謂兩澤不足也則民倍貸以取庸矣澤不足則嵗凶富者倍貸於貧不能還其倍價者則計所倍以取庸矣秋糴以五春糶以束是又倍貸也謂富者秋時以五糴之至春出糶便收其束矣此亦倍貸之類也束十匹也故以上之徴而倍取於民者四謂上無時之徴一也澤不足二也秋糴春糶三也下關市府庫之徴四也關市之租府庫之徴粟什一厮輿之事此四時亦當一倍貸矣府庫謂府之庫新有徴稅言人供關市府庫之徴亦用粟之什一計四時常有所用亦當一倍貸也夫以一民養四主四主即上四倍貸也故逃徙者刑謂有刑罰而上不能止者粟少而民無積也常山之東河汝之間蚤生而晚殺五穀之所蕃熟也四種而五穫四種謂四時皆種五穫謂五穀皆宜而有所穫中年畝二石一夫為粟二百石今也倉廩虛而民無積農夫以粥子者上無術以均之也故先王使農士商工四民交能易作交能易作謂雖士亦善於農工雖農亦通於士業也終嵗之利無道相過也道從也四人均能故其利無從相過之也是以民作一而得均四人交能易作故曰一也民作一則田墾姦巧不生田墾則粟多粟多則國富姦巧不生則民治富而治此王之道也不生粟之國亡粟生而死者霸霸者或不能廣積粟故人有不生而致死者也粟生而不死者王王者積粟既多故人保其生無復致死者也績按别本注霸者或不能廣畜積故有時而竭也王者之民積之廣而生之不已也粟也者民之所歸也粟也者財之所歸也有粟則人歸之粟也者地之所歸也積粟既多或有入地歸降者也粟多則天下之物盡至矣故舜一徙成邑二徙成都三徙成國舜非嚴刑罰重禁令而民歸之矣去者必害謂背舜而去者從者必利也先王者善為民除害興利故天下之民歸之所謂興利者利農事也所謂除害者禁害農事也農事勝則入粟多入粟多則國富國富則安鄉重家安鄉重家則雖變俗易習謂改易其常習驅衆移民至於殺之而民不惡也此務粟之功也上不利農則粟少粟少則人貧人貧則輕家輕家則易去易去則上令不能必行上令不能必行則禁不能必止禁不能必止則戰不必勝守不必固矣夫令不必行禁不必止戰不必勝守不必固命之曰寄生之君謂暫寄為生不能長久此由不利農少粟之害也粟者王之本事也人主之大務有人之塗謂保有其人其塗因粟也治國之道也管子補注卷十五
