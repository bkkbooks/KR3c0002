body:
  text: 管子補注卷二十明劉績撰形勢解第六十四管子解二山者物之髙者也惠者主之髙行也慈者父母之髙行也忠者臣下之髙行也孝者子婦之髙行也故山髙而不崩則祈羊至主惠而不解則民奉養父母慈而不解則子婦順臣下忠而不解則爵禄至子婦孝而不解則美名附故節髙而不解則所欲得矣解則不得故曰山髙而不崩則祈羊至矣淵者衆物之所生也能深而不涸則沈玉至主者人之所仰而生也能寛裕純厚而不苛忮則人民附父母者子婦之所受教也能慈仁教訓而不失理則子婦孝臣下者主之所用也能盡力事上則當於主子婦者親之所以安也能孝弟順親則當於親故淵涸而無水則沈玉不至主苛而無厚則萬民不附父母暴而無恩則子婦不親臣下隨而不忠則卑辱困窮子婦不安親則禍憂至故淵不涸則所欲者至涸則沈玉極天覆萬物制寒暑行日月次星辰天之常也治之以理終而復始主牧萬民治天下莅百官主之常也治之以法終而復始和子孫屬親戚父母之常也治之以義終而復始敦敬忠信臣下之常也以事其主終而復始愛親善養思敬奉教子婦之常也以事其親終而復始故天不失其常則寒暑得其時日月星辰得其序主不失其常則羣臣得其義百官守其事父母不失其常則子孫和順親戚相驩臣下不失其常則事無過失而官職政治子婦不失其常則長幼理而親疎和故用常者治失常者亂天未嘗變其所以治也故曰天不變其常地生養萬物地之則也治安百姓主之則也教䕶家事父母之則也正諌死節臣下之則也盡力供養子婦之則也地不易其則故萬物生焉主不易其則故百姓安焉父母不易其則故家事辦焉臣下不易其則故主無過失子婦不易其則故親養備具故用則者安不用則者危地未嘗易其所以安也故曰地不易其則春者陽氣始上故萬物生夏者陽氣畢上故萬物長秋者隂氣始下故萬物収冬者隂氣畢下故萬物藏故春夏生長秋冬収藏四時之節也賞賜刑罰主之節也四時未嘗不生殺也主未嘗不賞罰也故曰春秋冬夏不更其節也天覆萬物而制之地載萬物而養之四時生長萬物而収藏之古以至今不更其道故曰古今一也蛟龍水蟲之神者也乘於水則神立失於水則神廢人主天下之有威者也得民則威立失民則威廢蛟龍待得水而後立其神人主待得民而後成其威故曰蛟龍得水而神可立也虎豹獸之猛者也居深林廣澤之中則人畏其威而載之人主天下之有勢者也深居則人畏其勢故虎豹去其幽而近於人則人得之而易其威人主去其門而迫於民則民輕之而傲其勢故曰虎豹託幽而威可載也風漂物者也風之所漂不避貴賤美惡雨濡物者也雨之所墮不避小大强弱風雨至公而無私所行無常鄉人雖遇漂濡而莫之怨也故曰風雨無鄉而怨怒不及也人主之所以令則行禁則止者必令於民之所好而禁於民之所惡也民之情莫不欲生而惡死莫不欲利而惡害故上令於生利人則令行禁於殺害人則禁止令之所以行者必民樂其政也而令乃行故曰貴有以行令也人主之所以使下盡力而親上者必為天下致利除害也故徳澤加於天下惠施厚於萬物父子得以安羣生得以育故萬民驩盡其力而樂為上用入則務本疾作以實倉廪出則盡節死敵以安社稷雖勞苦卑辱而不敢告也此賤人之所以亡其卑也故曰賤有以亡卑也起居時飲食節寒暑適則身利而夀命益起居不時飲食不節寒暑不適則形體累而夀命損人惰而侈則貧力而儉則富夫物莫虚至必有以也故曰夀夭貧富無徒歸也法立而民樂之令出而民銜之法令之合於民心如符節之相得則主尊顯故曰銜令者君之尊也人主岀言順於理合於民情則民受其辭民受其辭則名聲彰故曰受辭者名之運也明主之治天下也静其民而不擾佚其民而不勞不擾則民自循不勞則民自試故曰上無事而民自試人主立其度量陳其分職明其法式以莅其民而不以言先之則民循正所謂抱蜀者祠器也故曰抱蜀不言而廟堂既修將將鴻鵠貎之美者也貎美故民歌之徳義者行之美者也徳義美故民樂之民之所歌樂者美行徳義也而明主鴻鵠有之故曰鴻鵠將將維民歌之濟濟者誠莊事斷也多士者多長者也周文王誠莊事斷故國治其羣臣明理以佐主故主明主明而國治境内被其利澤殷民舉首而望文王願為文王臣故曰濟濟多士殷民化之紂之為主也勞民力奪民財危民死寃暴之令加於百姓㦧毒之使施於天下故大臣不親小民疾怨天下叛之而願為文王臣者紂自取之也故曰紂之失也無儀法程式蜚揺而無所定謂之蜚蓬之問蜚蓬之問明主不聽也無度之言明主不許也故曰蜚蓬之問不在所賔道行則君臣親父子安諸生育故明主之務務在行道不顧小物燕爵之集道行不顧明主之動静得理義號令順民心誅殺當其罪賞賜當其功故雖不用犧牲珪璧禱於鬼神鬼神助之天地與之舉事而有福亂主之動作失義理號令逆民心誅殺不當其罪賞賜不當其功故雖用犧牲珪璧禱於鬼神鬼神不助天地不與舉亊有禍故曰犧牲珪璧不足以享鬼神主之所以為功者富强也故國富兵强則諸侯服其政鄰敵畏其威雖不用寳幣事諸侯諸侯不敢犯也主之所以為罪者貧弱也故國貧兵弱戰則不勝守則不固雖出名器重寳以事鄰敵不免於死亡之患故曰主功有素寳幣奚為羿古之善射者也調和其弓矢而堅守之其操弓也審其髙下有必中之道故能多發而多中明主猶羿也平和其法審其廢置而堅守之有必治之道故能多舉而多當道者羿之所以必中也主之所以必治也射者弓弦發矢也故曰羿之道非射也造父善馭馬者也善視其馬節其飲食度量馬力審其足走故能取逺道而馬不罷明主猶造父也善治其民度量其力審其技能故立功而民不困傷故術者造父之所以取逺道也主之所以立功名也馭者操轡也故曰造父之術非馭也奚仲之為車器也方圜曲直皆中䂓矩鉤繩故機旋相得用之牢利成器堅固明主猶奚仲也言辭動作皆中術數故衆理相當上下相親巧者奚仲之所以為器也主之所以治也斵削者斤刀也故曰奚仲之巧非斵削也民利之則來害之則去民之從利也如水之走下於四方無擇也故欲來民者先起其利雖不召而民自至設其所惡雖召之而民不來也故曰召逺者使無為焉莅民如父母則民親愛之道之純厚遇之真實雖不言曰吾親民而民親矣莅民如仇讐則民踈之道之不厚遇之無實詐偽並起雖言曰吾親民民不親也故曰親近者言無亊焉明主之使逺者來而近者親也為之在心所謂夜行者心行也能心行徳則天下莫能與之争矣故曰唯夜行者獨有之也為主而賊為父母而暴為臣下而不忠為子婦而不孝四者人之大失也大失在身雖有小善不得為賢所謂平原者下澤也雖有小封不得為髙故曰平原之隰奚有於髙為主而惠為父母而慈為臣下而忠為子婦而孝四者人之髙行也髙行在身雖有小過不為不肖所謂大山者山之髙者也雖有小隈不以為深故曰大山之隈奚有於深毁訾賢者之謂訾推譽不肖之謂讆訾讆之人得用則人主之明蔽而毁譽之言起任之大事則亊不成而禍患至故曰訾讆之人勿與任大明主之慮事也為天下計者謂之譕臣譕臣則海内被其澤澤布於天下後世享其功乆逺而利愈多故曰譕臣者可與逺舉聖人擇可言而後言擇可行而後行偷得利而後有害偷得樂而後有憂者聖人不為也故聖人擇言必顧其利擇行必顧其憂故曰顧憂者可與致道小人者枉道而取容適主意而偷説備利而偷得如此者其得之雖速禍患之至亦急故聖人去而不用也故曰其計也速而憂在近者往而勿召也舉一而為天下長利者謂之舉長舉長則被其利者衆而徳義之所見逺故曰舉長者可逺見者也天之裁大故能兼覆萬物地之裁大故能兼載萬物人主之裁大故容物多而衆人得比焉故曰裁大者衆之所比也貴富尊顯民歸樂之人主莫不欲也故欲民之懐樂已者必服道徳而勿厭也則民樂懐之故曰美人之懐定服而弗厭也聖人之求事也先論其理義計其可否故義則求之不義則止可則求之不可則止故其所得事者常為身寳小人之求事也不論其理義不計其可否不義亦求之不可亦求之故其所得事者未嘗為頼也故曰必得之事不足頼也聖人之諾已也先論其理義計其可否義則諾不義則已可則諾不可則已故其諾未嘗不信也小人不義亦諾不可亦諾言而必諾故其諾未必信也故曰必諾之言不足信也謹於一家則立於一家謹於一鄉則立於一鄉謹於一國則立於一國謹於天下則立於天下是故其所謹者小則其所立亦小其所謹者大則其所立亦大故曰小謹者不大立海不辭水故能成其大山不辭土故能成其髙明主不厭人故能成其衆士不厭學故能成其聖飺音粢嫌食貎者多所惡也諌者所以安主也食者所以肥體也主惡諌則不安人飺食則不肥故曰飺食者不肥體也言而語道徳忠信孝弟者此言無棄者天公平而無私故美惡莫不覆地公平而無私故小大莫不載無棄之言公平而無私故賢不肖莫不用故無棄之言者參伍於天地之無私也故曰有無棄之言者必參之於天地也明主之官物也任其所長不任其所短故事無不成而功無不立亂主不知物之各有所長所短也而責必備夫慮事定物辯明禮義人之所長而蝚蝯之所短也縁髙出險蝚蝯之所長而人之所短也蝚蝯之所長責人故其令廢而責不塞故曰墜岸三仞人之所大難也而蝯蝚飲焉明主之舉事也任聖人之慮用衆人之力而不自與焉故事成而福生亂主自智也而不因聖人之慮矜奮自功而不因衆人之力専用已而不聽正諌故事敗而禍生故曰伐矜好専舉事之禍也馬者所乘以行野也故雖不行於野其養食馬也未嘗解惰也民者所以守戰也故雖不守戰其治養民也未嘗解惰也故曰不行其野不違其馬天生四時地生萬財以養萬物而無取焉明主配天地者也教民以時勸之以耕織以厚民養而不伐其功不私其利故曰能予而無取者天地之配也解惰簡慢以之事主則不忠以之事父母則不孝以之起事則不成故曰怠倦者不及也以規矩為方圓則成以尺寸量長短則得以法數治民則安故事不廣於理者其成若神故曰無廣者疑神績按謂操其要而不泛求也事主而不盡力則有刑事父母而不盡力則不親受業學問而不加務則不成故朝不勉力務進夕無見功故曰朝忘其事夕失其功中情信誠則名譽美矣修行謹敬則尊顯附矣中無情實則名聲惡矣修行慢易則汚辱生矣故曰邪氣襲内正色乃衰也為人君而不明君臣之義以正其臣則臣不知為臣之理以事其主矣故曰君不君則臣不臣為人父而不明父子之義以教其子而整齊之則子不知為人子之道以事其父矣故曰父不父則子不子君臣親上下和萬民輯故主有令則民行之上有禁則民不犯君臣不親上下不和萬民不輯故令則不行禁則不止故曰上下不和令乃不行言辭信動止莊衣冠正則臣下肅言辭慢動作虧衣冠惰則臣下輕之故曰衣冠不正績按解作整則賔者不肅儀者萬物之程式也法度者萬民之儀表也禮義者尊卑之儀表也故動有儀則令行無儀則令不行故曰進退無儀則政令不行人主者温良寛厚則民愛之整齊嚴莊則民畏之故民愛之則親畏之則用夫民親而為用主之所急也故曰且懐且威則君道備矣人主能安其民則事其主如事其父母故主有憂則憂之有難則死之主視民如土則民不為用主有憂則不憂有難則不死故曰莫樂之則莫哀之莫生之則莫死之民之所以守戰至死而不衰者上之所以加施於民者厚也故上施厚則民之報上亦厚上施薄則民之報上亦薄故薄施而厚責君不能得之於臣父不能得之於子故曰往者不至來者不極道者扶持衆物使得生育而各終其性命者也故或以治鄉或以治國或以治天下故曰道之所言者一也而用之者異聞道而以治一鄉親其父子順其兄弟正其習俗使民樂其上安其土為一鄉主幹者鄉之人也故曰有聞道而好為鄉者一鄉之人也民之從有道也如饑之先食也如寒之先衣也如暑之先隂也故有道則民歸之無道則民去之故曰道徃者其人莫來道來者其人莫往道者所以變化身而之正理者也故道在身則言自順行自正事君自忠事父自孝遇人自理故曰道之所設身之化也天之道滿而不溢盛而不衰明主法象天道故貴而不驕富而不奢行理而不惰故能長守貴富乆有天下而不失也故曰持滿者與天明主救天下之禍安天下之危者也夫救禍安危者必待萬民之為用也而后能為之故曰安危者與人地大國富民衆兵强此盛滿之國也雖已盛滿無徳厚以安之無度數以治之則國非其國而民非其民也故曰失天之度雖滿必涸臣不親其主百姓不信其吏上下離而不和故雖自安必且危之故曰上下不和雖安必危主有天道以禦其民則民一心而奉其上故能貴富而乆王天下失天之道則民離畔而不聽從故主危而不得乆王天下故曰欲王天下而失天之道天下不可得而王也人主務學術數務行正理則化變日進至於大功而愚人不知也亂主淫佚邪枉日為無道至於滅亡而不自知也故曰莫知其為之其功既成莫知其釋之也藏之而無形按經作莫知其釋之藏之無形古者三王五伯皆人主之利天下者也故身貴顯而子孫被其澤桀紂幽厲皆人主之害天下者也故身困傷而子孫䝉其禍故曰疑今者察之古不知來者視之往神農教耕生榖以致民利禹身决瀆斬髙橋下以致民利湯武征伐無道誅殺暴亂以致民利故明王之動作雖異其利民同也故曰萬事之任也異趣而同歸古今一也棟生橈不勝任則屋覆而人不怨者其理然也弱子慈母之所愛也不以其理動者下瓦則慈母笞之故以其理動者雖覆屋不為怨不以其理動者下瓦必笞故曰生棟覆屋怨怒不及弱子下瓦慈母操箠行天道出公理則逺者自親廢天道行私為則子母相怨故曰天道之極逺者自親人事之起近親造怨古者武王地方不過百里戰卒之衆不過萬人然能戰勝攻取立為天子而世謂之聖王者知為之之術也桀紂貴為天子富有海内地方甚大戰卒甚衆而身死國亡為天下僇者不知為之之術也故能為之則小可為大賤可為貴不能為之則雖為天子人猶奪之也故曰巧者有餘而拙者不足也明主上不逆天下不壙地故天予之時地生之財亂主上逆天道下絶地理故天不與時地不生財故曰其功順天者天助之其功逆天者天違之古者武王天之所助也故雖地小而民少猶之為天子也桀紂天之所違也故雖地大民衆猶之困辱而死亡也故曰天之所助雖小必大天之所違雖成必敗與人交多詐偽無情實偷取一切謂之烏集之交烏集之交初雖相驩後必相咄故曰烏集之交雖善不親聖人之與人約結也上觀其事君也内觀其事親也必有可知之理然後約結約結而不襲於理後必相倍故曰不重之結雖固必解道之用也貴其重也明主與聖人謀故其謀得與之舉亊故其事成亂主與不肖者謀故其計失與之舉事故其事敗夫計失而事敗此與不可之罪故曰毋與不可明主度量人力之所能為而後使焉故令於人之所能為則令行使於人之所能為則事成亂主不量人力令於人之所不能為故其令廢使於人之所不能為故其亊敗夫令出而廢舉亊而敗此强不能之罪也故曰毋强不能狂惑之人告之以君臣之義父子之理貴賤之分不信聖人之言也而反害傷之故聖人不告也故曰毋告不知與不肖者舉事則事敗使於人之所不能為則令廢告狂惑之人則身害故曰與不可强不能告不知謂之勞而無功常以言翹明其與人也其愛人也其有徳於人也以此為友則不親以此為交則不結以此有徳於人則不報故曰見與之友幾於不親見愛之交幾於不結見施之徳幾於不報四方之所歸心行者也明主不用其智而任聖人之智不用其力而任衆人之力故以聖人之智思慮者無不知也以衆人之力起事者無不成也能自去而因天下之智力則身逸而福多亂主獨用其智而不任聖人之智獨用其力而不任衆人之力故其身勞而禍多故曰獨任之國勞而多禍明主内行其法度外行其理義故鄰國親之與國信之有患則鄰國憂之有難則鄰國救之亂主内失其百姓外不信於鄰國故有患則莫之憂也有難則莫之救也外内皆失孤特而無黨故國弱而王辱故曰獨國之君卑而不威明主之治天下也必用聖人而后天下治婦人之求夫家也必用媒而后家事成故天下而不用聖人則天下乖亂而民不親也求夫家而不用媒則身醜恥而人不信也故曰自媒之女醜而不信明主者人未之見而有親心焉者有使民親之之道也故其位安而民往之故曰未之見而親焉可以往矣堯舜古之明主也天下推之而不倦譽之而不厭乆逺而不忘者有使民不忘之道也故其位安而民來之故曰逺而不忘焉可以來矣逺經作乆日月昭察萬物者也天多雲氣蔽盖者衆則日月不明人主猶日月也羣臣多姦立私以擁蔽主則主不得昭察其臣下臣下之情不得上通故奸邪日多而人主愈蔽故曰日月不明天不易也山物之髙者也地險穢不平易則山不得見人主猶山也左右多黨比周以壅其主則主不得見故曰山髙而不見地不易也人主出言不逆於民心不悖於理義其所言足以安天下者也人唯恐其不復言也出言而離父子之親䟽君臣之道害天下之衆此言之不可復者也故明主不言也故曰言而不可復者君不言也人主身行方正使人有禮遇人有信行發於身而為天下法式者人唯恐其不復行也身行不正使人暴虐遇人不信行發於身而為天下笑者此不可復之行故明主不行也故曰行而不可再者君不行也言之不可復者其言不信也行之不可再者其行賊暴也故言而不信則民不附行而賊暴則天下怨民不附天下怨此滅亡之所從生也故明主禁之故曰凡言之不可復行之不可再者有國者之大禁也管子補注卷二十
