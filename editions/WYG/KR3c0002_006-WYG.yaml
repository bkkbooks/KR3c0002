body:
  text: 管子補注卷六明劉績撰法法第十六外言七不法法則事毋常不設法以法下故事無常法不法則令不行雖復設法不得法之宜故令不行令而不行則令不法也法而不行則脩令者不審也法既得宜而猶不行則以脩令者未審之故也審而不行則賞罰輕也脩令者既審而猶不行則以上輕於賞罰也重而不行則賞罰不信也賞罰既重而猶不行則以雖賞罰而不信也信而不行則不以身先之也賞罰既信而猶不行則以身不先自行其法也故曰禁勝於身身從禁也則令行於民矣聞賢而不舉殆聞賢不舉不若不聞所以有殆聞善而不索殆見能而不使殆親人而不固殆同謀而離殆危人而不能殆危人不能不若不危廢人而復起殆既廢更起或發其宿嫌可而不為殆可為而不為多生後悔足而不施殆足而不施怨疾必生幾而不密殆幾事不密則害成人主不周密則正言直行之士危所謂君不密則失臣正言直行之士危則人主孤而毋内䇿謀毋自入也人主孤而毋内則人臣黨而成羣君子道消則小人道長也使人主孤而毋内人臣黨而成羣者此非人臣之罪也人主之過也君不宻之過民毋重罪過不大也有大過然後有重罪民毋大過上毋赦也不赦則懼而脩徳不敢為非上赦小過則民多重罪積之所生也所謂積小而成大故曰赦出則民不敬有罪不諌則安用敬惠行則過日益恃恩不恭非過而何惠赦加於民而囹圄雖實殺戮雖繁姦不勝矣造姦以待赦也故曰邪莫如蚤禁之毋使滋蔓蔓難圖也赦過遺善則民不勵善即惠也有過不赦有善不遺勵民之道於此乎用之矣故曰明君者事斷者也君有三欲於民三欲不節則上位危三欲者何也一曰求二曰禁三曰令求必欲得禁必欲止令必欲行求多者其得寡無厭則難供故其得寡禁多者其止寡法令滋章盗賊多有令多者其行寡再三則瀆故其行寡求而不得則威日損獨唱莫和非損而何禁而不止則刑罰侮愈禁愈犯非侮而何令而不行則下凌上不禀其命非凌而何故未有能多求而多得者也未有能多禁而多止者也未有能多令而多行者也故曰上苛則下不聴下不聴而强以刑罰則為人上者衆謀矣為人上而衆謀之雖欲毋危不可得也號令己出又易之禮義己行又止之度量己制又遷之刑法己錯又移之如是則慶賞雖重民不勸也殺戮雖繁民不畏也故曰上無固植植志下有疑心國無常經民力必竭數也數理也國無常經人力必竭而曰不竭者此非理之言也明君在上位民無敢立私議自貴者立私議者必自恃為貴也國毋怪嚴毋雜俗毋異禮士毋私議國不作竒怪則嚴肅而無雜俗有常禮士皆公議倨傲易令錯儀畫制議者盡誅易令謂變令錯儀謂别制儀畫制謂更畫制凡此盡以法誅之故彊者折銳者挫堅者破引之以繩墨繩之以誅僇故萬民之心皆服而從上推之而往引之而來彼下有立其私議自貴分争而退者則令自此不行矣立議分争退而不誅從此之後令不復行故曰私議立則主道卑矣况主倨傲易令錯儀畫制變易風俗詭服殊説猶立立私説尚能卑主况其倨傲易風俗而猶有立者乎上不行君令下不合於鄉里變更自為易國之成俗者命之曰不牧之民於上不行君令於下不合鄉里但率意自為易國之成俗故曰不收之民言其不可養也不牧之民繩之外也繩之外誅使賢者食於能鬭士食於功賢者食於能則上尊而民從鬭士食於功則卒輕患而傲敵上尊而民從卒輕患而傲敵二者設於國則天下治而主安矣凡赦者小利而大害者也茍悦衆心故曰小利人則習而易犯法故曰大害也故乆而不勝其禍犯法漸廣轉欲危君故曰不勝其禍毋赦者小害而大利者也人初不悦故曰小害創而脩徳故曰大利也故乆而不勝其福家正而天下定則太平可致故曰不勝其福也故赦者犇馬之委轡必致覆伕也毋赦者痤癤也睢之礦石也疾可瘳也績按睢恐疽或癰字爵不尊禄不重者不與圖難犯危以其道為未可以求之也以其道未可求故不與尊爵重禄既與之尊爵重禄則可與之圖難犯危也是故先王制軒冕足以著貴賤不求其美設爵禄所以守其服不求其觀也使君子食於道小人食於力君子食於道則上尊而民順小人食於力則財厚而養足上尊而民順財厚而養足四者備體則胥足上尊時而王不難矣胥相也文有三侑侑寛也武毋一赦惠者多赦者也先易而後難乆而不勝其禍法者先難而後易乆而不勝其福故惠者民之仇讎也恵者召其禍故為仇讎也法者民之父毋也法者生其福故為父毋也太上以制制度其次失而能追之能追悔也雖有過亦不甚矣明君制宗廟足以設賔祀不求其美為宫室臺榭足以避燥濕寒暑不求其大為雕文刻鏤足以辨貴賤不求其觀故農夫不失其時百工不失其功商無廢利民無游日無㳺閑之日財無砥墆墆乆積也故曰儉其道乎令未布而民或為之而賞從之則是上妄予也未布而為所謂先時者也當刑而賞故曰妄予上妄予下則功臣怨功臣怨而愚民操事於妄作愚民操事於妄作則大亂之本也令未布而罰及之所謂不令而罰則是上妄誅也上妄誅則民輕生民輕生則暴人興輕生故為暴亂曹黨起而亂賊作矣令已布而賞不從則是使民不勸勉不行制不死節民不勸勉不行制不死節則戰不勝而守不固戰不勝而守不固則國不安矣令已布而罰不及則是教民不聴民不聴則强者立强者立則主位危矣故曰憲律制度必法道號令必著明賞罰必信密此正民之經也凡大國之君尊小國之君卑大國之君所以尊者何也曰為之用者衆也小國之君所以卑者何也曰為之用者寡也然則為之用者衆則尊為之用者寡則卑則人主安能不欲民之衆為已用也使民衆為已用奈何曰法立令行則民之用者衆矣法不立令不行則民之用者寡矣故法之所立令之所行者多而所廢者寡則民不誹謗績按當依下作議民不誹議則聴從矣法之所立令之所行與其所廢者鈞則國無常經國無常經則民妄行矣法之所立令之所行者寡而所廢者多則民不聴民不聴則暴人起而姦邪作矣計上之所以愛民者為用之愛之也為愛民之故不難毁法虧令則是失所謂愛民矣夫以愛民用民則民之不用明矣夫用人者當以法令以愛人廢法而用之則人不可用也夫至用民者殺之危之勞之苦之飢之渇之用民者將致之此極也而民毋可與慮害己者至善也夫善用人者必以法其不從法甚者危殺之其次勞苦飢渇之將欲用之必至此極則姦者不敢為非善者悦而從命欲求可與謀害己者其可得哉明王在上道法行於國民皆舎所好而行所惡所好者私欲也所惡者公義也績按言愛人不足用民及至能用民者反殺危勞苦飢渇之以至此極民遂為之用而無謀害上者盖以法素行民皆舍好之私而行此惡之公也故善用民者軒冕不下儗而斧鉞不上因不以下有私寵妄以軒冕有所許儗不因上有私憾妄以斧鉞有所誅戮也如是則賢者勸而暴人止賢者勸而暴人止則功名立其後矣蹈白刄受矢石入水火以聴上令上令盡行禁盡止引而使之民不敢轉其力轉猶避也績按轉猶展轉推避也推而戰之民不敢愛其死不敢轉其力然后有功不敢愛其死然後無敵進無敵退有功是以三軍之衆皆得保其首領父母妻子完安於内故民未嘗可與慮始而可與樂成功是故仁者知者有道者不與大慮始大猶衆也國無以小與不幸而削亡者必主與大臣之徳行失於身也官職法制政教失於國也諸侯之謀慮失於外也故地削而國危矣言國無以小與不幸而削亡者其削亡也則以臣主有失故也國無以大與幸而有功名者必主與大臣之徳行得於身也官職法制政教得於國也諸侯之謀慮得於外也然後功立而名成言國無以大與幸而有功名者其有功名也則以臣主有得故也然則國何可無道人何可無求得道而導之得賢而使之將有所大期於興利除害期於興利除害莫急於身而君獨甚傷也必先令之失先身無害而有利然後可以及物今君獨立無與則是有害故甚可傷所以然者則申先令之失也人主失令而蔽失令則為下所蔽塞也已蔽而刦已刦而弑凡人君之所以為君者勢也故人君失勢則臣制之矣勢在下則君制於臣矣勢在上則臣制於君矣故君臣之易位勢在下也在臣期年臣雖不忠君不能奪也臣得勢期年君雖知其不忠而不能奪無如之何也在子期年子雖不孝父不能服也亦無如之何故春秋之記春秋即周公之凡例而諸侯之國史也臣有弑其君子有弑其父者矣故曰堂上逺於百里堂下逺於千里門廷逺於萬里今步者一日百里之情通矣堂上有事十日而君不聞其事適在堂上耳而君遂十日不聞此所謂逺於百里也步者十日千里之情通矣堂下有事一月而君不聞此所謂逺於千里也步者百日萬里之情通矣門廷有事期年而君不聞此所謂逺於萬里也故請入而不出謂之滅臣有請告既入而不出此則左右不為通於下其事遂消滅也出而不入謂之絶其事既出而不入此則左右不為通於上其事遂斷絶也入而不至謂之侵其事既入不得至於君此則左右侵君事故也出而道止謂之壅其事既出中道而止此則左右壅君事故也滅絶侵壅之君者非杜其門而守其戸也為政之有所不行也政之不行自致侵壅非由杜門守户也故曰令重於寳社稷先於親戚法重於民威權貴於爵禄故不為重寳輕號令不為親戚後社稷不為愛民枉法律不為爵禄分威權故曰勢非所以予人也凡此上事其勢不當與人故君專之政者正也正也者所以正定萬物之命也萬物之命由正而定是故聖人精徳立中以生正徳精而不遇其正自生也明正以治國故正者所以止過而逮不及也二者中立故過者令止之不及者令逮之過與不及也皆非正也正在於中立非正則傷國一也過與不及傷國一也故勇而不義傷兵不及於勇故傷兵也仁而不法傷正不及於仁故傷正故軍之敗也生於不義不義則失宜故軍敗法之侵也生於不正不正則入邪故法侵也故言有辯而非務者言辯而浮誕則非要務也行有難而非善者行難而詭怪故非正善也故言必中務不茍為辯行必思善不茍為難規矩者方圜之正也雖有巧目利手不如拙規矩之正方圜也故巧者能生規矩不能廢規矩而正方圓雖聖人能生法不能廢法而治國故雖有明智髙行倍法而治績按倍古背字同餘放此是廢規矩而正方圓也一曰管氏稱古言故云一曰績按此乃集書者再述異聞凡人君之徳行威嚴非獨能盡賢於人也人君之徳行雖當威嚴既不能事事盡賢亦須納賢而自輔故曰能自得師者王曰人君也故從而貴之不敢論其徳行之髙卑人曰此人君也謂其道備徳成不察其是非即從而貴之豈敢更論其髙卑乎有故為其殺生急於司命也乗人君之勢怒則伏尸流血也喜則軒冕塞路故急於司命富人貧人使人相畜也人君富人亦可貧人亦可使人以富畜貧亦可貴人賤人使人相臣也貴人亦可賤人亦可使人以貴臣賤亦可人主操此六者以畜其臣六者謂生殺富貴貧賤人臣亦望此六者以事其君人臣事君亦望操此六者以御下君臣之㑹六者謂之謀君臣所以相合皆欲謀操六者六者在臣期年臣不忠君不能奪在子期年子不孝父不能奪故春秋之記臣有弑君子有弑其父者得此六者而君父不智也令臣子得此六者是君父之不智也六者在臣則主蔽矣主蔽者失其令也故曰令入而不出謂之蔽令出而不入謂之壅令出而不行謂之牽牽於左右令入而不至謂之瑕君臣相間故曰瑕牽瑕蔽壅之事君者非敢杜其門而守其戸也為令之有所不行也此其所以然者由賢人不至而忠臣不用也故人主不可以不慎其令令者人主之大寳也一曰賢人不臣謂之蔽忠臣不用謂之塞令而不行謂之障禁而不止謂之逆蔽塞障逆之君者不敢杜其門而守其戸也為賢者之不至令之不行也凡民從上也不從口之所言從情之所好者也上好勇則民輕死上好仁則民輕財故上之所好民必甚焉是故明君知民之必以上為心也故置法以自治立儀以自正也故上不行則民不從彼民不服法死制則國必亂矣是以有道之君行法脩制先民服也服行也先自行法以率人凡論人有要論人才行各有綱要務物之人無大士焉大士不務謙而接物彼矜者滿也滿者虚也所謂滿招損者也滿虚在物在物為制也既滿而虚則制之在物矜者細之屬也自矜者小人之類凡論人而逺古者無髙士焉髙士必順考古道也既不知古而易其功者無智士焉智士必知古而謹功也徳行成於身而逺古卑人也事無資遇時而簡其業者愚士也徳行雖曰成而乃逺古卑人則是事無資稟若遇有道之時其業必見簡弃如此者可謂愚士釣名之人無賢士焉賢士必脩實而成名釣利之君無王主焉王主必度義而取利賢人之行其身也忘其有名也王主之行其道也忘其成功也賢人之行王主之道其所不能已也不能已而後動明君公國一民以聴於世賢明之君必公誠於國以一其民人之心忠臣直進以論其能忠臣必直道而求道明君不以禄爵私所愛唯賢是與忠臣不誣能以干爵禄量能而受禄也君不私國臣不誣能行此道者雖未大治正民之經也治雖未大足成正民之經今以誣能之臣事私國之君而能濟功名者古今無之誣能之人易知也誣能之人功名所以不濟易可知起下文也臣度之先王者臣管氏自稱也舜之有天下也禹為司空契為司徒臯陶為李古治獄之官作此李官績按李同理后稷為田此四士者天下之賢人也猶尚精一徳謂各精一事也以事其君今誣能之人服事任官皆兼四賢之能自此觀之功名之不立亦易知也結上文也故列尊禄重無以不受也徳不足以與其位也勢利官大無以不從也直以勢利官大故每舉必從之以此事君此所謂誣能簒利之臣者也世無公國之君則無直進之士無論能之主則無成功之臣昔者三代之相授也安得二天下而殺之三代無能授於有能桀紂失之湯武得之今之天下即古之天下豈有二天下而行其刑殺哉貧民傷財莫大於兵危國憂主莫速於兵此四患者明矣古今莫之能廢也兵當廢而不廢則古今惑也兵有四患則當廢也五材並用則不當廢廢興之理難明故惑也此二者不廢而欲廢之則亦惑也二者謂廢與不廢既不廢矣又欲廢之則亦惑也此二者傷國一也廢之則冦來無以禦固傷國不廢則費財憂主亦傷國也故曰一也黄帝唐虞帝之隆也資有天下制在一人資用也率土之濵莫非王臣故曰制在一人當此之時也兵不廢今徳不及三帝天下不順三帝之時天下皆服不須用兵而求廢兵不亦難乎故明君知所擅知所患國治而民務積此所謂擅也擅專也君之所專為在於國家治民務積聚也動與静此所患也動静失宜則患生也是故明君審其所擅以備其所患也猛毅之君不免於外難懦弱之君不免於内亂猛毅之君者輕誅輕誅之流道正者不安輕誅則乖正故道正之士不安道正者不安則材能之臣去亡矣彼智者知吾情偽為敵謀我則外難自是至矣智者即道正之士從此亡之敵國既知我情必為敵謀我所以外難至也故曰猛毅之君不免於外難懦弱之君者重誅難為誅罰重誅之過行邪者不革行邪者乆而不革則羣臣比周羣臣比周則蔽美揚惡蔽君羙揚君惡蔽美揚惡則内亂自是起故曰懦弱之君不免於内亂明君不為親戚危其社稷社稷戚於親不為君欲變其令令尊於君不為重寳分其威威貴於寳不為愛民虧其法法愛於民兵法第十七外言八明一者皇察道者帝通徳者王一者氣質未分至一者也徳者道由以成者也夫皇帝王道随世立名者也其實則一也謀得兵勝者霸所謀必得用兵必勝故霸故夫兵雖非備道至徳也然而所以輔王成霸兵者不祥之器不得已而用之故於道則未備於徳則未至然用之上可以輔王下可以成霸今代之用兵者不然不知兵權者也權者所以知輕重既不知兵權則失輕重之節故舉兵之日而境内貧行師十萬日費千金戰不必勝勝則多死雖令得勝死者已多得地而國敗雖復得地既貧且死所以國敗此四者用兵之禍者也四者謂内貧不勝多死國敗也四禍其國而無不危矣一舉兵而國四禍則何為而不危矣大度之書曰謂大陳法度之書舉兵之日而境内不貧戰而必勝勝而不死得地而國不敗為此四者若何四者謂不貧得勝不死不敗也舉兵之日而境内不貧者計數得也戰而必勝者法度審也勝而不死者教器備利而敵不敢校也得地而國不敗者因其民也因其民則號制有發也號令制度因彼而發教器備利則有制也有制則能備利法度審則有守也有所守則法度審也計數得則有明也有明則計數得冶衆有數自治其軍有數存焉勝敵有理勝於敵國有理存焉察數而知理審器而識勝器備利則敵可勝也明理而勝敵勝敵者在於明理也定宗廟寇寕則宗廟定遂男女人安則男女遂官四分既定且寕則四分官以守之則可以定威徳制法儀出號令然後可以一衆治民兵無主則不蚤知敵兵無主則人懷茍且故不能知敵野無吏則無蓄積野無田吏則人惰本業故無蓄積官無常則下怨上官無常則徴賦不節故下怨上器械不巧則朝無定器械不巧則冦敵見凌故朝無定賞罰不明則民輕其産賞罰不明則人無聊生故輕其産故曰早知敵則獨行有蓄積則乆而不匱器械巧則伐而不費賞罰明則勇士勸也三官不繆五教不亂九章著明則危危而無害窮窮而無難危危窮窮皆重有其事故能致逺以數縱强以制有數則逺可致有制則强可縱三官一曰鼔鼓所以任也任猶載也謂今之俶裴也所以起也所以進也二曰金金所以坐也所以退也所以免也三曰旗旗所以立兵也所以利兵也所以偃兵也此之謂三官有三令而兵法治也五教一曰教其目以形色之旗五色之旗各有所當若春尚竒夏尚赤之類二曰教其身以號令之數謂坐起之數三曰教其足以進退之度四曰教其手以長短之利長兵短兵各有所利逺用長近用短也五曰教其心以賞罰之誠貪賞畏罰士乃自厲五教各習而士負以勇矣員恃也恃其便習而勇也九章一曰舉日章則晝行二曰舉月章則夜行三曰舉龍章則行水四曰舉虎章則行林五曰舉鳥章則行陂六曰舉蛇章則行澤七曰舉鵲章則行陸八曰舉狼章則行山九曰舉韟章則載食而駕韟韜也謂韜其章而舉之則載其所食而駕行矣九章既定而動静不過三官五教九章始乎無端卒乎無窮無端無窮皆出敵不意彼不能測知也始乎無端者道也卒乎無窮者徳也道不可量徳不可數也故不可量則衆强不能圖不可數則偽詐不敢嚮兩者備施則動静有功徑乎不知徑謂卒然直指故敵不知發乎不意徑乎不知故莫之能禦也發乎不意故莫之能應也故全勝而無害因便而教准利而行教無常教既因便故無常也行無常行既准利故亦無常也兩者備施動乃有功兩者謂教與行器成教施追亡逐遁若飄風擊刺若雷電絶地不守謂孤絶之地無險固可恃故不守恃固不㧞㧞恃固之守必多費而無功也中處而無敵令行而不留用兵之道常能處可否之中則彼達避而不能敵有令必行而不留也績按中處無敵謂身居中四方皆避之不敢與敵令行不留謂法行彼四方皆遵之不敢留難器成教施散之無方聚之不可計教器備利進退若雷電而無所疑匱匱竭也一氣專定則傍通而不疑精一其氣專而且定故不疑厲士利械則涉難而不匱士既厲械既利故不匱進無所疑退無所匱敵乃為用既無疑匱敵乃服從而為己用凌山阬不待鈎梯習山故也厯水谷不須舟檝習水故也厯謂逺厯而渡徑於絶地攻於恃固獨出獨入而莫之能止見其隟故寳不獨入故莫之能止俘厥寶玉必選精勇與俱故曰不獨入也績按寶疑實字誤謂雖曰獨入實與衆俱入非獨也故不能止下放此寳不獨見與精勇俱見之故莫之能斂寳玊所以禮神使無水旱之災故取之不嫌也無名之至盡其取寳玊也潜伏不名至能盡獲而不匱也盡而不意故不能疑神既盡寳玊皆非彼所意故不能疑度謂之為神畜之以道則民和養之以徳則民合和合故能諧諧故能輯諧輯以悉莫之能傷我之軍士悉以諧輯故敵不能傷也定一至行二要縱三權施四教發五機設六行論七數守八應審九器章十號自一至已下管氏不言其數無得而知也故能全勝大勝全勝謂全我而勝彼大勝謂遍服諸國無守也故能守勝無守謂不守一數故能常守其勝也數戰則士罷數勝則君驕夫以驕君使罷民則國安得無危故至善不戰服之以徳其次一之雖勝不勝破大勝强一之至也不以勝為勝故能破大勝強也亂之不以變亂敵不設計變也乘之不以詭乗敵不以詭計勝之不以詐勝敵不以詐謀一之實也凡此皆至一之實也近則用實逺則施號謂十號力不可量彊不可度氣不可極徳不可測一之原也原本也凡此皆我守其一彼不能知衆若時雨寡若飄風一之終也用衆貴詳審故若時雨之漸用寡貴機速故若飄風之卒至皆以一為本故能終致此道利適器之致也兵刄利而適者其器得宜之至績按致工致也用敵教之盡也士卒用命而敵服則教練之盡不能致器者不能利適不能盡教者不能用敵器既不利教又不盡敵則不服豈能用之哉不能用敵者窮既不能用敵敵則反侵故窮也不能致器者困不能致器則無以應敵故困也逺用兵則可以必勝兵遠用所以絶其反顧之心故必勝出入異塗則傷其敵出入異塗或有所傷也有迷而失道故為敵所傷也深入危之則士自脩深入敵國其處又危所謂置之死地故士自脩以求生也士自脩則同心同力善者之為兵也使敵若據虚居常畏懼若搏景擊無所獲無設無形焉無不可以成也無䇿可以設無形可以尋所向皆無故不可以成功也無形無為焉無不可以化也無形可以覩無計可以為所在皆無故不可以變化也此之謂道矣無形迹可尋詰者道之謂若亡而存若後而先威不足以命之善用兵者體道以為變化者也故若亡者而乃存若後者而乃先今以威武命之去之逺矣管子補注卷六
