body:
  text: 管子補注卷八明劉績撰中匡第十九内言二管仲㑹國用三分二在賔客二以供賔客其一在國管仲懼而復之復白也以賔客之費太半欲白之公曰吾子猶如是乎以吾子為賢當以供賔之義為急務尚懼而白之乎四鄰賔客入者説出者譽入見禮而悦者出必為延譽也光名滿天下入者不說出者不譽汙名滿天下壤可以為粟播壤則生粟木可以為貨破木成器則貨粟盡則有生貨散則有聚君人者名之為貴財安可有吝財則失名故不可有管仲曰此君之明也公曰民辦軍事矣則可乎對曰不可甲兵未足也請薄刑罰以厚甲兵於是死罪不殺刑罪不罰使以甲兵贖有罪使出甲兵以贖之也死罪以犀甲一㦸刑罰以脅盾一㦸脅盾也既出盾又令出一㦸也過罰以金過誤致罰出金以贖之軍無所計而訟者成以束矢不計於軍事而以私訟者令出東矢以平其罪成平也公曰甲兵既足矣吾欲誅大國之不道者可乎對曰愛四封之内而後可以惡竟外之不善者先施愛於四封之内則士致死故可以惡外之不善安卿大夫之家而後可以危救敵之國卿大夫家安得大臣盡力故可以危救敵之國賜小國地而後可以誅大國之不道者舉賢良而後可以廢慢法鄙賤之民是故先王必有置也而後必有廢也必有利也而後必有害也桓公曰昔三王者既弑其君今言仁義則必以三王為法度不識其故何也對曰昔者禹平治天下及桀而亂之湯放桀以定禹功也湯平治天下及紂而亂之武王伐紂以定湯功也且善之伐不善也自古至今未有改之君何疑焉公又問曰古之亡國其何失對曰計得地與寳而不計失諸侯計得財委而不計失百姓計見親而不計見棄三者之屬一足以削遍而有者亡矣古之隳國家隕社稷者非故且為之也必少有樂焉不知其陷於惡也桓公謂管仲曰請致仲父仲父者尊老有徳之稱桓公欲尊事管仲故以仲父之號致之公與管仲父而將飲之行飲酒禮以尊顯之掘新井而柴焉新井而又柴盖之欲以潔清示敬之十日齋戒召管仲管仲至公執爵夫人執尊觴三行管仲趨出公怒曰寡人齋戒十日而飲仲父寡人自以為脩矣仲父不告寡人而出其故何也謂不辭而出所以怒鮑叔隰朋趨而出及管仲於途曰公怒管仲反入倍屏而立公不與言少進中庭公不與言少進中堂公曰寡人齋戒十日而飲仲父自以為脱於罪矣仲父不告寡人而出未知其故也對曰聞之沉於樂者洽於憂樂過則憂博厚於味者薄於行慢於朝者緩於政害於國家者危於社稷臣是以敢出也公遽下堂曰寡人非敢自為脩也仲父年長雖寡人亦衰矣吾願一朝安仲父也言俱至於衰老故欲一朝樂飲而為安對曰臣聞壯者無怠老者無偷順天之道必以善終者也三王失之非一朝之萃三代之季亂亡者非一朝之故其所由來者漸矣萃集也君奈何其偷乎管仲走出君以賔客之禮再拜送之明日管仲朝公曰寡人願聞國君之信對曰民愛之鄰國親之天下信之此國君之信公曰善請問信安始而可對曰始於為身中於為國成於為天下公曰請問為身對曰道血氣以求長年長心長徳長心謂謀慮逺也長徳謂恩施廣也此為身也公曰請問為國對曰逺舉賢人慈愛百姓外存亡國繼絶世起諸孤孤謂死王事者子孫薄稅斂輕刑罰此為國之大禮也法行而不苛刑廉而不赦有司寛而不凌不虐惸獨菀濁困滯皆法度不亡鬱濁謂穢塞不潔清者也困滯謂痩羸微隠者也有如此者皆以法度加之不失有所失亡也往行不來而民㳺世矣其行法度者但往行而進不却來而退而人以此自得行於世也此為天下也小匡第二十内言三桓公自莒反于齊使鮑叔牙為宰鮑叔辭曰臣君之庸臣也君有加惠於其臣使臣不凍飢則是君之賜也若必治國家則非臣之所能也其唯管夷吾乎臣之所不如管夷吾者五寛惠愛民臣不如也治國不失秉臣不如也秉柄也柄操所以作事國柄者所以賞罰之紀要也忠信可結於諸侯臣不如也績按齊語諸侯作百姓制禮義可法於四方臣不如也介胄執枹立於軍門使百姓皆加勇臣不如也抱擊鼓槌夫管仲民之父母也將欲治其子不可棄其父母公曰管夷吾親射寡人中鈎殆於死今乃用之可乎鮑叔曰彼為其君動也君若宥而反之其為君亦猶是也公曰然則為之奈何鮑叔曰君使人請之魯公曰施伯績按一本有夫字魯之謀臣也彼知吾將用之必不吾予也鮑叔曰君詔使者曰寡君有不令之臣在君之國願請之以戮於羣臣戮以徇羣臣也魯君必諾且施伯之知夷吾之才必將致魯之政既知其才故授以國政夷吾受之則魯能弱齊矣夷吾不受彼知其將反於齊必殺之公曰然則夷吾受乎鮑叔曰不受也夷吾事君無二心公曰其於寡人猶如是乎對曰非為君也為先君與社稷之故君若欲定宗廟則亟請之不然無及也公乃使鮑叔行成成平也與魯平曰公子糺親也請君討之魯人為殺公子糺又曰管仲讎也請受而甘心焉魯君許諾施伯謂魯侯曰勿予非戮之也將用其政也用之使知政也管仲者天下之賢人也大器也在楚則楚得意於天下在晉則晉得意於天下在狄則狄得意於天下今齊求而得之則必長為國憂君何不殺而授之其屍績按一作殺之而授其屍魯君曰諾將殺管仲鮑叔進曰殺之齊是戮齊也言戮以徇齊也殺之魯是戮魯也敝邑寡君之賊得之以徇於國為羣臣僇也戮之以誡羣臣若不生得是君與寡君之賊比也言親吾賊非敝邑之君所謂也績按一作非敝邑之所請也使臣不能受命能一作敢於是乎魯君乃不殺遂生束縛而柙以予齊柙檻鮑叔受而哭之三舉三舉其聲偽哀其将死也施伯從而笑之笑其偽也謂大夫曰管仲必不死夫鮑叔之忍不僇賢人言多所容忍必不僇賢人其智稱賢以自成也稱舉也鮑叔相公子小白先入得國得國人心管仲召忽奉公子糺後入與魯以戰能使魯敗謂魯師與齊戰能使魯敗而齊克也功足以得天與失天其人事一也管仲本圖将立小白今能敗魯而勝齊是其功也故於齊為得天於魯為失天至於能成人事則一今魯懼殺公子糺召忽囚管仲以予齊鮑叔知無後事既得管仲則知後無禍難之事也必將勤管仲以勞其君必探管仲本敗魯勝齊之意以成其功勤而慰其君也願以顯其功衆必予之願君施用管仲以顯其定齊之功如此衆必與之與許也績按言鮑叔知齊無他讎為後患恐其君驕故勤管仲使君戒省不佚且以顯仲之功則國衆必歸之勤孜孜也有得力死之功猶尚可加也顯生之功將何如是假令管仲力死成功但一時之事耳猶尚可加况不恥垢辱忍而生全齊將得之而覇以顯其本謀之功何善如之言不可加也績按言常人有為君得曽力死為國者功猶可貴今鮑叔為桓得仲生者則功無以加矣昭徳以貳君也言昭管仲之徳以為君之副貳績按貳君即前勞君謂使桓公思前唯不一於安之矣鮑叔之知不是失也以鮑叔之智能及此圖必不失也至於堂阜之上堂阜地名鮑叔祓而浴之三祓謂除其凶邪之氣桓公親迎之郊管仲詘纓挿衽示将就戮績按挿一本作攝弟子職所謂攝衽盥潄使人操斧而立其後操斧者将受斧鉞之誅也公辭斧三然後退之退操斧者公曰垂纓下衽寡人將見管仲再拜稽首曰應公之賜殺之黄泉死且不朽言君賜之死尚感恩不朽况生之乎公遂與歸禮之於廟三酌而問為政焉曰昔先君襄公髙臺廣池湛樂飲酒田獵畢弋不聴國政卑聖侮士唯女是崇九妃六嬪九妃謂諸侯所娶九女天子九嬪諸侯六也陳妾數千食必粱肉衣必文繡而戎士凍飢戎馬待㳺車之弊㳺車弊然後以為戎車戎士待陳妾之餘陳妾食餘然後以食戎士倡優侏儒在前而賢士大夫在後是以國家不日益不月長吾恐宗廟之不掃除社稷之不血食敢問為之奈何管子對曰昔吾先王周昭王穆王世法文武之逺迹以成其名績按迹齊語作績合羣國績按齊語作􅙕比校民之有道者設象以為民紀校試其人有道者與之設法象而為人紀式美以相應比綴以書原本窮末其所用羙事必令始終相應然後次比緝綴書之簡策故能原其本窮其末无不錯綜也勸之以慶賞糺之以刑罰糞除其顛旄顛者髙之項人或不墾闢旄者所以誓勒兵士言能務農息兵故糞其顛而除其旄也賜予以鎮撫之以為民終始績按設象即周禮所謂縣治象之法于象魏使萬民觀治象是也本謂上之所設末謂下之所行糞分也孟子百畆之糞王制作分是也旄老人也國語作班序也言合羣叟比校民之有道者必先設象刑以為民法其從而相應者比合綴連於書推象刑之意而究其是非合則勸以慶賞違則糺以刑罰於中又分異其老而賜予以鎮撫之猶勞之來之之意也終始猶言常行也公曰為之奈何管子對曰昔者聖王之治其民也參其國而伍其鄙定民之居成民之事以為民紀謹用其六秉如是而民情可得而百姓可御矣桓公曰六秉者何也管子曰殺生貴賤貧富此六秉也桓公曰參國奈何管子對曰制國以為二十一鄉工商之鄉六士農之鄉十五公帥十一鄉髙子帥五鄉國子帥五鄉參國故為三軍公立三官之臣謂三軍之官也績按官官府也此言士之鄉市立三鄉績按此言商之鄉工立三族績按此言工之郷澤立三虞山立三衡自三鄉以下毎皆置其官績按此二句言農之鄉也制五家為軌軌有長十軌為里里有司四里為連連有長十連為鄉鄉有良人五鄉一帥桓公曰五鄙奈何管子對曰制五家為軌軌有長六軌為邑邑有司十邑為率率有長十率為鄊鄊有良人三鄉為屬屬有帥五屬一大夫武政聽屬以武為政者聴於属文政聴鄉績按齊語作制鄙三十家為邑邑有司十邑為卒卒有卒帥十卒為鄊鄊有鄊帥三鄉為縣縣有縣帥十縣為屬屬有大夫五屬故立五大夫各使治一屬焉立五政使各聴一屬焉是故正之政聴屬牧之政聴縣下政聴鄉按後屬退而脩連連退而脩鄉鄉退而脩卒卒退而脩邑則三鄉下缺為連連有帥十連七字但國語以連為縣耳後云立五鄉以崇化逮五属以属武則國語正政牧政下政皆誤之也各保而聴鄉属之聴各自保之毋有淫佚者桓公曰定民之居成民之事奈何管子對曰士農工商四民者國之石民也四者國之本猶柱之石也故曰石不可使雜處雜處則其言哤其事亂哤亂也是故聖王之處士必於閒燕處士閑燕則謀議審處農必就田壄處工必就官府處商必就市井市井必四方若造井之制故曰市井今夫士羣萃而州處閒燕每州之士羣萃共處間燕謂學校之處則父與父言義子與子言孝其事君者言敬長者言愛幼者言弟旦暮從事於此旦暮猶朝夕也以教其子弟少而習焉其心安焉不見異物而遷焉異物異事也非其所當習者是故其父兄之教不肅而成其子弟之學不勞而能夫是故士之子常為士今夫農羣萃而州處審其四時權節於四時中又權量其節之早晚具備其械器用械器皆謂田器績按當作權節其用備其械器乃字誤亂註皆非齊語作權節其用是也比耒耜榖芨比偶其耒耜及榖芨榖芨小於耜耒一人執之以隨耒耜之後重治其闕遺及寒擊槀除田以待時乃耕冬寒之月即擊去其革之槀者偹除其田以待春之耕也深耕均種疾耰耰謂覆種既已均種當疾耰之先雨芸耨以待時雨時雨既至挾其槍刈耨鎛在掖曰挾槍椿也刈鎌也耨鎰基也鎛鉏也以旦暮從事於田壄稅衣就功脱其常服以就功役便事而省費别苗莠列疏遬遬宻也謂苗之踈家者當均列之首戴苧蒲苧蔣也編苧與蒲以為笠身服襏襫襏襫謂麤堅之衣可以任苦著者也績按音鉢釋沾體塗足暴其髮膚盡其四支之力以疾從事於田野少而習焉其心安焉不見異物而遷焉是故其父兄之教不肅而成其子弟之學不勞而能是故農之子常為農樸野而不慝農人之子朴質而野不為姦慝其秀材之能為士者則足賴也農人之子有秀異之材可為士者即所謂生而知之不習而成者也故其賢足可賴也故以耕則多粟以仕則多賢是以聖王敬畏戚農以農民能致粟又秀材生焉故聖王敬畏農而戚近之今夫工羣萃而州處相良材審其四時辨其功苦功謂堅羙苦謂濫惡權節其用論比計制績按齊語作論比協材斷器尚完利裁斷為器貴於完利相語以事相示以巧相陳以功相髙以知事以能知器用之事相髙尚旦暮從事於此以教其子弟少而習焉其心安焉不見異物而遷焉是故其父兄之教不肅而成其子弟之學不勞而能夫是故工之子常為工今夫商羣萃而州處觀凶飢審國變察其四時而監其鄉之貨監視也以知其市之賈負任擔荷服牛輅馬績按輅一作軺以周四方料多少計貴賤以其所有易其所無買賤鬻貴是以羽旄不求而至竹箭有餘於國竒怪時來珍異物聚旦暮從事於此以教其子弟相語以利相示以時績按時齊語作賴相陳以知賈賈知物價相與陳説少而習焉其心安焉不見異物而遷焉是故其父兄之教不肅而成其子弟之學不勞而能夫是故商之子常為商相地而衰其政則民不移矣相地沃塉以差其政則人安其沃塉而不移衰差也績按政齊語作征正旅舊則民不惰國之軍旅正之以從舊貫則禀令而不惰績按當依齊語作政不旅舊則民不偷旅舊棄故舊不用如旅也或疑乃施字誤所謂故舊不遺則民不偷山澤各以其時至則民不茍茍謂非時入山澤也陵陸丘井田疇均則民不惑績按惑齊語作憾無奪農時則百姓富犧牲不勞則牛馬育過用謂之勞績按勞齊語作略桓公又問曰寡人欲脩政以干時於天下其可乎干求也時時見曰㑹欲求天下脩時見之㑹管子對曰可公曰安始而可管子對曰始於愛民公曰愛民之道奈何管子對曰公脩公族家脩家族使相連以事相及以禄則民相親矣相連以事則人慣狎相及以禄則恩情生故有親也放舊罪脩舊宗立無後則民殖矣放舊罪則全人命脩舊宗則收散親立無後則繼絶世故人殖殖生也省刑罰薄稅斂則民富矣鄉建賢士使教於國則民有禮矣出令不改則民正矣此愛民之道也公曰民富而以親則使之而可乎管子對曰舉財長工以止民用工能積財舉而長之民則慕而不費用矣陳力尚賢以勸民知賢能陳力而崇上之民則勸而學智矣加刑無苛以濟百姓行之無私則足以容衆矣出言必信則令不窮矣此使民之道也桓公曰民居定矣事已成矣吾欲從事於天下諸侯其可乎欲從㑹事管子對曰未可民心未安公曰安之奈何管子對曰脩舊法擇其善者舉而嚴用之績按嚴齊語作業皆敬也慈於民予無財貧無財者當施予之寛政役敬百姓則國富而民安矣公曰民安矣其可乎管仲對曰未可君若欲正卒伍脩甲兵則大國亦将正卒伍脩甲兵君有征伐之事則小國諸侯之臣有守圉之備矣然則難以速得意於天下公欲速得意於天下諸侯則事有所隠而政有所寓不顯習其兵事故曰事有所隠軍政寓之田獵故曰政有所寓矣公曰為之奈何管子對曰作内政而寓軍令焉為髙子之里為國子之里為公里三分齊國以為三軍擇其賢民使為里君每里皆使賢者為君鄉有行伍卒長則其制令且以田獵因以賞罰因田獵之功道行賞罰則百姓通於軍事矣桓公曰善於是乎管子乃制五家以為軌軌為之長十軌為里里有司四里為連連為之長十連為鄉鄉有良人以為軍令是故五家為軌五人為伍軌長率之十軌為里故五十人為小戎里有司率之四里為連故二百人為卒連長率之十連為鄉故二千人為旅鄉良人率之五鄊一帥故萬人一軍五鄊之帥率之三軍故有中軍之皷中軍則公之里卒則知所之也有髙子之皷有國子之皷春以田曰蒐振旅因窩軍政而且正旅秋以田曰獮治兵順殺氣因治兵是故卒伍政定於里軍旅政定於郊績按齊語政作正字内教既成令不得遷徙故卒伍之人人與人相保家與家相愛少相居長相㳺祭祀相福死䘮相恤禍相憂居處相樂行作相和哭泣相哀是故夜戰其聲相聞足以無亂晝戰其目相見足以相識歡欣足以相死是故以守則固以戰則勝君有此教士三萬人以横行於天下教士謂先教習之士誅無道以定周室天下大國之君莫之能圉也正月之朝鄉長復事復白也績按此即參國五卿一帥每嵗報政於君公親問焉曰於子之鄉有居處為義好學聰明質仁慈孝於父母長弟聞於鄉里者有則以告有而不告謂之蔽賢其罪五謂其罪當入於五刑而定其罰有司巳於事而竣既畢於上事而竣退公又問焉曰於子之鄉有拳勇股肱之力筋骨秀出於衆者有則以告有而不以吿謂之蔽才其罪五有司已於事而竣公又問焉曰於子之鄉有不慈孝於父母不長弟於鄉里驕躁淫暴不用上令者有則以告有而不以吿謂之下比下與有罪者比而掩盖之也其罪五有司巳於事而竣於是乎鄉長退而脩徳進賢桓公親見之遂使役之官謂受之官而役之所以厯試其材能公令官長期而書伐以吿伐功也且令選官之賢者而復之曰有人居我官有功休徳維順績按一作慎端慤以待時使以慤善待時待可用之時而使之也使民恭敬以勸其稱秉言則足以補官之不善政謂此人所稱柄也言可以補不善之政公宣問其鄉里而有考驗宣遍也遍問其鄉里之人以考其所行皆有事驗廼召而與之生省相其質以參其成功成事既有考驗召而與坐更省視其質體以參驗其所成功之事也可立而時設問國家之患而不肉其人既可將立之又時設問國家之患以知其智謀之深淺不直相其骨肉而已肉者所謂皮相也績按齊語作可立而授之設之以國家之患而不疚則肉乃疚之誤退而察問其鄉里以觀其所能而無大過登以為上卿之佐為卿大夫之佐名之曰三選名此人曰三大夫所選髙子國子退而脩鄉朝士既畢二人又如前退脩於鄉鮑在朝故不言鄉退而脩連績按即前十連為鄉連退而脩里績按即前四里為連里退而脩軌績按即前十里為軌軌退而脩家績按即前五家為軌是故匹夫有善故可得而舉也匹夫有不善故可得而誅也政既成鄉不越長朝不越爵罷士無伍罷謂乏於徳義者周禮所謂罷人不義之衆恥以為伍也罷女無家罷女猶罷士衆恥娶之故無家士三出妻逐於境外三出妻所謂士也罔極二三其徳為政者之所忌故逐於境外也女三出嫁入於舂榖三見出而嫁是不貞順者也故入於舂榖是故民皆勉為善士與其為善於鄊不如為善於里與其為善於里不如為善於家家善則鄉善矣所謂居家治理可移於官是故士莫敢言一朝之便皆有終嵗之計莫敢以終嵗為議皆有終身之功脩政則人無茍且正月之朝五屬大夫復事於公績按此即前五鄙五屬大夫每嵗報政於君擇其寡功者而譙之曰列地分民者若一何故獨寡功何以不及人教訓不善政事其不治一再則宥三則不赦公又問焉曰於子之屬有居處為義好學聰明質仁慈孝於父母長弟聞於鄉里者有則以吿有而不以吿謂之蔽賢其罪五有司巳事而竣公又問焉曰於子之屬有拳勇股肱之力秀出於衆者績按秀上前有筋骨二字有則以吿有而不以吿謂之蔽才其罪五有司巳事而竣公又問焉曰於子之屬有不孝於父母不長弟於鄉里驕躁淫暴不用上令者有則以吿有而不以吿者謂之下比其罪五有司巳事而竣於是乎五屬大夫退而脩屬屬退而脩連績按齊語作縣下同連退而脩鄉鄊退而脩卒績按前作率下同卒退而脩邑邑退而脩家是故匹夫有善可得而舉匹夫有不善可得而誅政成國安以守則固以戰則强封内治百姓親可以出征四方立一霸王矣可謂一霸王之功也桓公曰卒伍定矣事已定矣吾欲從事於諸侯其可乎管子對曰未可若君令則吾既寄諸内政矣夫齊國寡甲兵吾欲輕重罪而移之於甲兵公曰為之奈何管子對曰制重罪入以兵甲犀脅二㦸輕罪入蘭盾鞈革二㦸蘭即所謂蘭錡兵架也鞈革重革當心著之所以禦矢績按齊語作制重罪贖以犀甲一㦸輕罪贖以鞼盾一㦸也小罪入以金鈞三十斤曰鈞分宥薄罪入以半鈞分宥謂從坐者分其首犯而寛宥之無坐抑而訟獄者正三禁之而不直則入一束矢以罰之謂其人自無所坐而被抑屈為訟者正當禁之三日得其不直者則令入束矢也績按正如春秋傳正直為正之正言罪五刑本無所坐屈抑訟獄者若為之正先已三禁之不從成獄不直則入束矢以罰其誣齊語作槀訟者三禁而不可上下坐成以束矢美金以鑄戈劔矛㦸試諸狗馬惡金以鑄斤斧鉏夷鋸􅠁試諸木土夷鉏類也鋸􅠁钁類也桓公曰甲兵大足矣吾欲從事於諸侯可乎管子對曰未可治内者未具也為外者未偹也故使鮑叔牙為大諫所以諫正君王子城父為將弦子其為理理獄官也寗戚為田教以農事自此巳上理内已下理外隰朋為行行謂行人也所以通使諸侯曹孫宿處楚商容處宋季勞處魯績按前作季友徐開封處衛匽尚處燕審友處晉令此諸賢各處諸侯之國者所以諷動之令歸齊也又㳺士八千人奉之以車馬衣裘多其資糧財幣足之使出周㳺於四方以號召收求天下之賢士飾玩好使出周㳺於四方鬻之諸侯以觀其上下之所貴好擇其沈亂者而先政之以政正也績按齊語作擇其淫亂者而先征之則政乃攻字之訛公曰外内定矣可乎管子對曰未可鄰國未吾親也公曰親之奈何管子對曰審吾疆塲反其侵地正其封界毋受其貨財而美為皮幣以極聘覜於諸侯覜見也以安四鄰則鄰國親我矣桓公曰甲兵大足矣吾欲南伐何主謂以何國為征伐之主也管子對曰以魯為主反其侵地常潜常潜地名績按語作堂使海於有弊或遇水灾教令泄於海使有弊盡也渠彌於有陼復教之穿渠彌亘於河陼綱山於有牢教之立國城必依山以為綱紀而有牢固桓公曰吾欲西伐何主管子對曰以衛為主反其侵地吉臺原姑與柒里皆地名績按㭍齊語作漆使海於有弊渠彌於有陼綱山於有牢桓公曰吾欲北伐何主管子對曰以燕為主反其侵地柴夫吠狗亦地名也使海於有弊渠彌於有陼綱山於有牢四鄰大親既反其侵地正其封疆地南至於岱隂謂岱山之北西至於濟北至於海東至於紀隨紀隨地名績按齊語作地方三百六十里三嵗治定四嵗教成五嵗兵出有教士三萬人革車八百乘諸侯多沈績按同淫亂不服於天子於是乎桓公東救徐州分吳半分吳地之半存魯蔡陵蔡陵地名割越地南據宋鄭既割越地又據宋鄭之國以為親援也征伐楚濟汝水伐楚時渡汝水踰方地謂方城之地績按地乃城字誤後亦作方城望汶山楚山也使貢絲於周室使貢絲即所謂檿絲者也堪為琴瑟絃成周反胙於隆嶽周室有事歸胙於齊齊太嶽之後故言隆嶽荆州諸侯莫不來服中救晉公禽狄王敗胡貉破屠何屠何東胡之先也而騎寇始服北狄以騎為寇北伐山戎制泠支斬孤竹而九夷始聴海濵諸侯莫不來服西征攘白狄之地遂至于西河謂龍門之西河方舟設柎績按一作投柎乘桴濟河至于石沈石沈地名績按齊語作石杭縣車束馬踰大行與卑耳之貉拘秦夏與卑耳之貉共拘秦夏之不服者績按拘之秦夏乃地名齊語作拘夏西服流沙西虞西虞國名而秦戎始從故兵一出而大功十二自救徐州巳下有十二也故東夷西戎南蠻北狄中國諸侯莫不賔服與諸侯飾牲為載書書謂要盟之辭載之於策以誓要于上下薦神謂以上下之神祇為民誓又以其牲薦之於神績按薦當依齊語作庶然後率天下定周室大朝諸侯於陽榖故兵車之㑹六乘車之㑹三九合諸侯一匡天下甲不解纍兵不解翳翳所以蔽兵謂脅盾之屬不解甲於纍不解兵於翳言不用也弢無弓服無矢弢弓衣也無弓無矢亦言不用也寢武事行文道以朝天子績按齊語作帥諸侯而朝天子葵丘之㑹天子使大夫宰孔致胙於桓公曰余一人之命有事於文武有祭事於文王武王之廟也使宰孔致胙且有後命曰以爾自卑勞以爾自卑而勞弊實謂爾伯舅母下拜桓公召管仲而謀管仲對曰為君不君君命臣無下拜是不君也為臣不臣臣承命而不讓是不臣也亂之本也桓公曰余乘車之㑹三兵車之㑹六九合諸侯一匡天下北至於孤竹山戎濊貉拘秦夏西至流沙西虞南至吳越巴䍧牱􅂒不庾雕題黒齒皆南夷之國號也荆夷之國莫違寡人之命而中國卑我中國之人不尊崇樂推使居臣位是卑我也昔三代之受命者其異於此乎管仲對曰夫鳳凰鸞鳥不降而鷹集鴟梟豐庶神不格庶神不至則未歆其祭享守龜不兆守龜國之守龜不兆謂不以誠信告之握粟而筮者屢中長者不告而短者告是徳之不至𫝊曰龜長筮短詩曰握粟出卜時雨甘露不降飄風暴雨數臻五穀不蕃六畜不育而蓬蒿藜􅀢竝興夫鳳皇之文前徳義後日昌前抱徳義後有日昌明先徳義乃可以日昌昔人之受命者龍龜假假至也河出圖雒出書地出乘黄乗黄神馬也山海經載云坤利牝馬之貞故從地出若漢之渥洼神馬之比今三祥未見有者三祥謂龜龍圖書乘黄也雖曰受命無乃失諸乎桓公懼出見客曰天威不違顔咫尺小白承天子之命而毋下拜恐顛蹶於下以為天子羞遂下拜登受賞服大路龍旂九㳺渠門赤旂渠門旗名天子致胙於桓公而不受天下諸侯稱順焉桓公憂天下諸侯魯有夫人慶父之亂而二君弑死慶父通莊公夫人姜氏弑子般又弑閔公國絶無後桓公聞之使髙子存之男女不淫淫亂雜也馬牛選具選擇其善者以成具凡欲以貢齊也執玉以見請為闗内之侯請為齊闗内之侯而桓公不使也狄人攻邢桓公築夷儀以封之男女不淫馬牛選具執玉以見請為關内之侯而桓公不使也狄人攻衛衛人出旅於曹旅客也客居曹也桓公城楚丘以封之其畜以散亡故桓公與之繫馬二百匹謂在閔廐繋養之言其良也天下諸侯稱仁焉於是天下之諸侯知桓公之為已勤也是以諸侯之歸之也譬若市人桓公知諸侯之歸己也故使輕其幣而重其禮故使天下諸侯以疲馬犬羊為幣疲謂痩也齊以良馬報諸侯以縷帛布鹿皮四分以為幣謂四分其鹿皮績按覇形作縵帛鹿皮報則縷乃縵字誤齊語作縷纂以為奉鹿皮四个註謂奉籍所以藉玉之藻也縷纂以縷織纂不用緣取易供也纂織文也个枚也亦不甚通齊以文錦虎豹皮報諸侯之使垂櫜而入攟載而歸垂櫜言其空也攟收拾也故釣之以愛致之以利結之以信示之以武是故天下小國諸侯既服桓公莫之敢倍而歸之喜其愛而貪其利信其仁而畏其武桓公知天下小國諸侯之多與已也於是又大施忠焉可為憂者為之憂可為謀者與之謀可為動者為之動伐譚萊而不有也績按齊語作軍譚遂而不有也諸侯稱仁焉通齊國之魚鹽于東萊自東萊通魚鹽於諸侯使關市幾而不征壥而不稅幾察也察其姦非而不征稅以為諸侯之利諸侯稱寛焉築蔡鄢陵培夏靈父丘皆邑名績按齊語作築葵兹晏負夏領釜丘以衛戎狄之地所以禁暴於諸侯也築五鹿中牟鄴盖與牡丘以衞諸夏之地所以示勸於中國也績按勸齊語作權教之大成是故天下之於桓公逺國之民望如父母近國之民從如流水故行地滋逺得人彌衆是何也懐其文而畏其武故殺無道定周室天下莫之能圉武事立也定三革車馬人皆有革甲曰三革偃五兵朝服以濟河而無怵惕焉謂乗車之㑹朝服濟河以與西諸侯盟也文事勝也是故大國之君慙媿小國諸侯附比是故大國之君事如臣僕小國諸侯驩如父母夫然故大國之君不尊不以國大加其尊禮小國諸侯不卑不以國小而卑其敬是故大國之君不驕小國諸侯不懾於是列廣地以益狹地損有財以與無財周其君子不失成功周給君子得其力用故不失成功也周其小人不失成命周給小人懷徳而歸故不失成命也夫如是居處則順出則有成功不稱動甲兵之事以遂文武之迹於天下既以朝服濟河故不稱甲兵文徳成也大國畏威事如臣僕也桓公能假其羣臣之謀以益其智也其相曰夷吾大夫曰寗戚隰朋賔胥無鮑叔牙用此五子者何功言何功而不成度義光徳繼法紹終以遺後嗣貽孝昭穆大霸天下名聲廣裕不可掩也則唯有明君在上察相在下也初桓公郊迎管子而問焉管仲辭讓然後對以參國伍鄙立五鄊以崇化建五屬以厲武寄兵於政因罰備器械加兵無道諸侯以事周室桓公大説於是齋戒十日將相管仲管仲曰斧鉞之人也幸以獲生以屬其􅆎領屬綴連也臣之禄也若知國政非臣之任也公曰子大夫受政寡人勝任言子受政而輔我我則勝君之任也子大夫不受政寡人恐崩管仲許諾再拜而受相三日公曰寡人有大邪三其猶尚可以為國乎對曰臣未得聞公曰寡人不幸而好田晦夜而至禽側言夙興晦夜之時已至禽之側畔也田莫不見禽而後反其田必見禽多獲而後反諸侯使者無所致百官有司無所復既専於田故使者不得致命有司不得白事對曰惡則惡矣然非其急者也公曰寡人不幸而好酒日夜相繼諸侯使者無所致百官有司無所復對曰惡則惡矣然非其急者也公曰寡人有汙行不幸而好色而姑姊有不嫁者對曰惡則惡矣然非其急者也公作色曰此三者且可則惡有不可者矣此三者尚以為可豈更有不可於此者對曰人君唯優與不敏為不可優謂倭隨不斷優則亡衆不敏不及事公曰善吾子就舍異日請與吾子圖之對曰時可將與夷吾何待異日乎可言之時正與夷吾不可待他日公曰奈何對曰公子舉為人愽聞而知禮好學而辭遜請使㳺於魯以結交焉公子開方為人巧轉而兊利請使㳺於衛以結交焉曹孫宿其為人也小廉而苛􅏸苛􅏸密習也言多所慣習也􅏸逝也足恭而辭結其辭能與人定交結績按大匡作愽於教而又巧於辭不好立大義而好結小信則辭結當作辭給苛微細也正荆之則也言此人立行正與荆俗同使之㳺荆必得其歡心上二人亦然請使往㳺以結交焉遂立行三使者而後退使三使將出然後退相三月請論百官公曰諾管仲曰升降揖讓進退習閑辨辭之剛柔臣不如隰朋請立為大行大行大使之官墾草入邑辟土聚粟多衆盡地之利臣不如寗戚請立為大司田平原廣牧廣逺可牧之地車不結轍士不旋踵皷之而三軍之士視死如歸臣不如王子城父請立為大司馬决獄折中不殺不辜不誣無罪臣不如賔胥無請立為大司理犯君顔色進諫必忠不辟死亡不撓富貴臣不如東郭牙請立以為大諫之官此五子者夷吾一不如於五子各不如其一然而以易夷吾夷吾不為也以五子能易夷吾之徳則夷吾所不為君若欲治國强兵則五子者存矣若欲霸王夷吾在此桓公曰善王言第二十一闕内言四管子補注卷八
