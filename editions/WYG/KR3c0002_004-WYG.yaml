body:
  text: 管子補注卷四眀劉績撰宙合第十一古往今来曰宙也所陳之道既通往古又合来今無不包羅也外言二左操五音右執五味第一舉目懐繩與准鉤多備䂓軸減溜大成是唯時徳之節第二舉目春采生秋采蓏夏處隂冬處陽大賢之徳長第三舉目眀乃哲哲乃眀奮乃苓眀哲乃大行第四舉目毒而無怒怨而無言欲而無謀第五舉目大揆度儀若覺卧若晦眀若教之在堯也第六舉目毋訪于佞毋蓄于謟毋育于㐫毋監于讒不正廣其荒第七舉目不用其區區鳥飛准繩第八舉目讂充末衡易政利民第九舉目績按讂火縣反毋犯其凶毋邇其求而逺其憂髙為其居危顛莫之救第十舉目可淺可深可浮可沉可曲可直可言可黙第十一舉目天不一時地不一利人不一事績按第十一舉目當在此可正而視定而履深而迹第十二舉目夫天地一險一易若鼓之有揨擿擋則擊别本注揨牢耕反擿丁厯反擋丁用反績按第十二舉目當在此天地萬物之橐宙合有橐天地第十三舉目左操五音右執五味此言君臣之分也左陽君道右隂臣道故曰君臣之分也君出令佚故立於左君但出令故曰佚凡右為用事故左佚而右勞臣任力勞故立於右臣則任力故曰勞夫五音不同聲而䏻調此言君之所出令無妄也五音雖有不同樂師盡䏻調之喻百度雖各有别君則盡䏻裁之故所出無妄而無所不順順而令行政成君出令皆順奉之則政成五味不同物而䏻和此言臣之所任力無妄也五味宰夫䏻和之百職臣守任之而無妄也而無所不得得而力務財多臣䏻任職得宜務而財必多也故君出令正其國而無齊其欲民欲既異常隨其欲而教之也一其愛而無獨與是王臣其愛宜一率土周之無所獨與則是愛䏻一毋獨與是也王施而無私則海内来賔矣臣任力同其忠而無爭其利不失其事而無有其名分敬而無妬則夫婦和勉矣君失音則風律必流流謂蕩散流則亂敗臣離味則百姓不養臣離味百職曠故百姓不養也百姓不養則衆散亡君臣各䏻其分則國寧矣故名之曰不徳懷繩與准鉤多備規軸減溜大成是唯時徳之節夫繩扶撥以為正准壊險以為平准必壊舊髙峻而後以為平也鈎入枉而出直工人用鈎則就枉取直也此言聖君賢相之制舉也言制以舉賢之法用鈎也博而不失因以備䏻而無遺所舉既博則枉直咸盡故無所失雖雞鳴狗盜無所不取皆有所長各備其䏻也國猶是國也民猶是民也桀紂以亂亡湯武以治昌湯之國人亦桀之國人武之國人亦紂之國人桀紂以之亡亂之故也湯武以之昌治之故也章道以教眀法以期民之興善也如此湯武之功是也湯武之昌教化眀也人之興善亦章眀也多備規軸者成軸也規者正圓器軸者轉規大小悉須備故多備方主嚴剛圓主柔和今用規者欲施恩引物也夫成軸之多也其處大也不究其入小也不塞究窮也大軸用大處小用小處因物施宜故有大小也績按别本註成軸既多因物施宜隨大小而用之者也猶迹求履之憲也迹者履之所出善者恩之所生憲法也擬迹而求履法履法可得施恩而求善心善心可生也夫焉有不適善以恩駈善故無不適也適善備也僊也是以無乏僊輕順貌既皆適善䏻備以恩為善輕順人君善既備順何所乏哉則求者無不善也故諭教者取辟焉辟法也取為規矩也天淯陽無計量地化生無法崖淯古育字天以陽氣育生萬物物生不可計量地以隂氣化萬物物之生化無有崖畔君之恩法天地之厚廣也所謂是而無非非而無是亦既行恩又須順物當順而是之不得有非當順而非之不得有是也是非有必交来茍信是以有不可先規之是非既有必使二者俱来得以驗之是既信之有矣非則不可掩故先以恩意令悉改也必有不可識慮之然将卒而不戒不可識謂其非謀隠伏意在不測或包藏禍心故必有以防慮之如其事将終必當隂備待之不可戒告於彼也故聖人博聞多見畜道以待物以道待物物無不容也物至而對形曲均存矣對配也物至矣以多少之恩配大小之形如此則均平皆在於恩中無遺失也減盡也溜發也言徧環畢莫不備得故曰減溜大成減溜盡發君既均施以恩故物盡發於善亦既盡善君教不偏減順環圓之周無不備得也成功之術必有巨獲巨大也功大成大獲必周於徳審於時時徳之遇事之㑹也若合符然故曰是唯時徳之節徳既周時又審二者遇㑹若合符契則何功而不成也春采生秋采蓏夏處隂冬處陽此言聖人之動静開闔詘信浧績按浧弋井􅋀濡取與之必因於時也時則動不時則静是以古之士有意而未可陽也故愁其治言含愁而藏之也有意濟世時亂方殷未可眀論故曰理代之言隂愁而藏之賢人之處亂世也知道之不可行則沈抑以辟罰静黙以侔免侔取也辟之也猶夏之就凊冬之就温焉可以無及於寒暑之菑矣夏不就凊冬不就温更以寒暑致災終無益也喻賢者不避亂世更招刑譴何榮之可得哉非為畏死而不忠也賢人之避亂世豈畏死而不忠哉但以無益而徒死也夫強言以為僇而功澤不加時非所言必致刑僇既刑僇矣何功澤之加哉進傷為人君嚴之義臣進而遇傷人君因此益加其嚴酷也退害為人臣者之生退而不遇害而人臣因此轉更偷生也其為不利彌甚不避亂世而遇害則君益其嚴酷臣益偷生不利彌甚也故退身不舎端修業不息版版牘也以待清眀賢者雖復退身終不舎其端操不息修業亦不息其版籍所以俟亂世清眀俟風雲以舉翼也故微子不與於紂之難而封於宋以為殷主先祖不滅後世不絶故曰大賢之徳長可久可大則賢人之徳業眀迺哲哲迺眀奮乃苓眀哲乃大行此言擅美主盛自奮也以琅湯績按湯一本作璘凌轢人人之敗也常自此是故聖人著之簡筴𫝊以告後進曰奮盛苓落也盛而不落者未之有也故有道者不平其稱不滿其量不依其樂不致其度有道者則湯武也所以不平稱滿量依樂致度者所以晦其眀爵尊則肅士禄豐則務施功大而不伐業眀而不矜夫名實之相怨久矣是故絶而無交有名有實必為人怨其來久所以絶四鄰之好杜賔客之交惡其名實之聞也恵者知其不可兩守乃取一焉故安而無憂名實不可兩守故但存其一怨從此而息所以安然而無憂也毒而無怒此言止忿速濟沒法也毒者隂為賊害從而怒之彼知其所以行毒怨恨續赴其行毒之法没而不用今不為怒者所以止此忿速濟斷沒法也怨而無言言不可不慎也言不周宻反傷其身凢怨怒但可藏之在心不言之口以泄其恨隂懐他計反傷其身也故曰欲而無謀言謀不可以泄謀泄菑極既欲其事方始聞之無使謀泄泄謀災必至故曰災極至夫行忿速遂沒法賊發言輕謀泄菑必及於身故曰毒而無怒怨而無言欲而無謀大揆度儀若覺卧若晦眀言人君財質雖不慧但大揆度儀法有疑則問之賢若覺而卧若從晦而視明可以成大也言淵色以自詰也静黙以審慮依賢可用也君有所未晤當淵寂其色以自窮詰静黙其神以審思慮有所不晤依賢以問之故其為可用也仁良既眀通於可不利害之理循發䝉也問於仁良其事既眀見利害之理則通晤循而用之其䝉自發眀也故曰若覺卧若晦眀若敖之在堯也敖堯子丹朱慢而不恭故曰敖敖在堯時雖凡下材但以聖人在上賢人在下位動而履規矩常自禮法竟以改邪為眀故賔虞朝譲徳羣后書曰無若丹朱敖毋訪於佞言毋用佞人也用佞人則私多行毋蓄於謟言毋聴謟聴謟則欺上毋育於㐫言毋使暴使暴則傷民毋監于䜛言毋聴䜛聴䜛則失士夫行私欺上傷民失士此四者用所以害君義失正也夫為君上者既失其義正而倚以為名譽為臣者不忠而邪以趨爵禄亂俗敗世以偷安懷樂雖廣其威可損也故曰不正廣其荒是以古之人阻其路塞其遂守而物修故著之簡筴𫝊以告後世人曰其為怨也深是以威盡焉不用其區區者虚也人而無良焉故曰虚也凡堅觧而不動陼隄而不行其於時必失失則廢而不濟失植之正而不謬不可賢也植而無䏻不可善也所賢美於聖人者以其與變隨化也淵泉而不盡微約而流施是以徳之流潤澤均加于萬物故曰聖人參於天地鳥飛准繩此言大人之義也鳥飛准繩曲以為直大人之義權而合道夫鳥之飛也必還山集谷不還山則困不集谷則死山與谷之處也不必正直而還山集谷曲則曲矣而名繩焉以為鳥起於北意南而至于南起於南意北而至于北茍大意得不以小缺為傷鳥意将集南北亦隨山谷而曲飛茍遂南北之大意不以曲飛小缺為傷聖人行權亦猶是也茍得合義之大致不以反經小過而為傷也故聖人美而著之美飛鳥之事著之簡䇿也曰千里之路不可扶以繩繩直千里路必窮也萬家之都不可平以准平准萬家居必塞也言大人之行不必以先帝常義立之謂賢守常為變道必躓也故為上者之論其下也議欲理也不可以失此術也此術權道讂充言心也心欲忠績按别本注讂逺也末衡言耳目也耳目欲端中正者治之本也耳司聴聴必順聞聞審謂之聰耳之所闈既順且審故謂之聰目司視視必順見見察謂之眀目之順視曰眀心司慮慮必順言言得謂之知心之所慮既順且得故謂之智聰眀以知則博博而不惛所以易政也聰也眀也智也三者既博故事無過舉乃得中可制禮作樂易先古政績按易政所謂平易近民也政易民利利乃勸勸則告民既勸勉故可以禮樂告之績按告當作吉對下凶字聴不慎績按衍此不慎二字不審不聰不審不聰則繆事不察不眀不察不眀則過慮不得不知不得不知則惛繆過以惛則憂憂則所以伎苛績按伎梁紀切伎苛所以險政政險民害害乃怨怨則凶故曰讂充末衡言易政利民也毋犯其凶言中正以蓄慎也毋邇其求言上之敗常貪於金玊馬女而􅈔愛於粟米貨財也厚藉歛于百姓則萬民懟怨逺其愛言上之亡其國也常邇其樂立優美而外淫于馳騁田獵内縱于美色淫聲下乃觧怠惰失百吏皆失其端則煩亂以亡其國家矣髙為其居危顛莫之救此言尊髙滿大而好矜人以麗主盛處賢而自予雄也言君王豪盛處己以賢自許以為英雄予許也故盛必失而雄必敗夫上既主盛處賢以操士民國家煩亂萬民心怨此其必亡也猶自萬仭之山播而入深淵其死而不振也必矣故曰無邇其求而逺其憂髙為其居危顛莫之救也可淺可深可浮可沉可曲可直可言可黙此言指意要功之謂也凢此淺深曲直諸事皆可詳之言之指意要必得此然可以成功天不一時春秋夏冬各有其時地不一利五土十地各有其利人不一事士農工商各有其事是以著業不得不多人之名位不得不殊天時地利猶有不一況於人之著事業及其名位豈得不多而殊乎方眀者察于事故不官於物而旁通於道方謂法術言法術通眀之士察於天地知不可専一官主也故云不主一物功用無方旁通於道也道也者通乎無上詳乎無窮運乎諸生諸物由道而生是故辯于一言察于一治攻于一事者可以曲說而不可以廣舉言寡䏻之人但辯一言察一理攻一事如此者唯可以示一曲之說未足以廣包也聖人由此知言之不可兼也故博為之治而計其意知一言不可兼羣言故博為理衆言而復計度所言之意以告諭之也知事之不可兼也故名為之說而況其功又知一事不足以兼衆事故每事皆况立名而為之說又恐未明其功故比而曉告之嵗有春秋冬夏月有上下中旬日有朝暮夜有昏晨半星星半隠半見也辰序各有其司故曰天不一時此以上畧舉天時不一半星辰序言其星辰半隠夜出常見半至於次序有司以為法也山陵岑巖淵泉閎流泉踰瀷瀷湊漏之流也績按瀷余力昌力二切而不盡薄承瀷而不滿泉逾而前瀷隨而後欲其流不盡至溪谷小既停薄隨至而泄雖承瀷而常不滿之流也髙下肥墝物有所宜故曰地不一利此以上畧言地不一利也鄉有俗國有法食飲不同味衣服異采世用器械規矩繩准稱量數度品有所成故曰人不一事此以上舉人之事不一也此各事之儀其詳不可盡也此天地人三者之儀但略舉之故其詳不盡也可正而視言察美惡審别良善不可以不審操分不雜故政治不悔定而履言處其位行其路為其事則民守其職而不亂故葆統而好終深而迹言眀墨章書道徳有常則後世人人修理而不迷故名聲不息夫天地一險一易若鼓之有楟楟當為響擿擋則擊險易猶否泰也夫天地否泰應徳而至猶鼔之含響應擊而鳴者也言茍有唱之必有和之和之不差因以盡天地之道唱則擊也小則小和大則大和故曰和擊而不差應擊為響象天地應徳為否泰也景不為曲物直響不為惡聲美物曲則影曲聲惡則響惡亦以天道福善禍淫随事而至也是以聖人眀乎物之性者必以其類來也惡聲往則惡響来猶積善餘慶積惡餘殃故君子繩繩乎慎其所先天地萬物之槖也君子知善惡必報繩繩戒慎先天地以類善天地萬物從而應之則善在先應在後如槖之盛物也故曰天地萬物之槖宙合有槖天地宙合之道教以先天地行善故槖天地也績按有又也天地苴萬物故曰萬物之槖苴裏萬物在天地之中故為槖也宙合之意上通於天之上下泉於地之下外出於四海之外合絡天地以為一裹宙合廣積善以通天上入地下包絡天地為一裹也散之至於無間不可名而山宙合之裏故散其終上䏻無偷觀猶不可得其名若山然也績按山乃止字誤是大之無外小之無内故曰有橐天地其義不傳茍非其人道不虚行故其不可名則義不可妄𫝊也一典品之不極一薄然而典品無治也典常也宙合之道専一而䏻常行則可不窮若乃輕薄不䏻崇重則此道或㡬乎息矣常品之人不䏻重理也多内則富時出則當而聖人之道富貴以當奚謂當本乎無妄之治運乎無方之事應變不失之謂當變無不至無有應當本錯不敢忿當謂行賞以當功當功所以錯而不用者則以變不至也故雖不用物不敢忿怒也故言而名之曰宙合尋古遺言之立名名曰宙合也樞言第十二樞者居中以運外動而不窮者也言則慮心而發口變而無主者也其用若樞故曰樞言外言三管子曰道之在天者日也日者萬物由之以照萬象由之以顯功莫大焉故謂之道也其在人者心也心者萬物由之以慮萬理由之以斷云為莫大焉故謂之道故曰有氣則生無氣則死生者以其氣日與心以成生為功而生成以氣為生此言氣者道之用尤冝重也績按諸本無生者以其氣五字非有名則治無名則亂治者以其名物既生成須立法以治之在於名實相副故實稱其名則治名重其實則亂樞言曰愛之利之益之安之四者從道而生故曰道之出也帝王者用之而天下治矣帝王者審所先所後先民與地則得矣民者君之木地者民之本先此二者則無所不得矣先貴與驕則失矣貴而不已則驕驕而不已則亡先此二者則無所不失矣是故先王慎貴在所先所後人主不可以不慎貴不可以不慎民不可以不慎富慎貴在舉賢慎民在置官慎富在務地故人主之卑尊輕重在此三者不可不慎慎三則尊以重忽三則卑以輕國有寳有器有用城郭險阻蓄藏寳也城郭完險阻修則㓂盜息蓄藏積民無饑故為寳也聖智器也聖無不通智無遺䇿二者可操以成事故曰器珠玉末用也珠玉者饑不可食寒不可衣費多而益少故為末用也先王重其寳器而輕其末用故䏻為天下生而不死者二謂寳與器立而不立者四人君雖欲自立而重珠玉則不令得立者四謂喜怒惡欲喜也者怒也者惡也者欲也者天下之敗也而賢者寳之為善者非善也非善此珠玉也故善無以為也故先王貴善貴善蓄藏王主積於民無不足績按言廣人民也霸主積于将士卒勇奮衰主積於貴人益其驕績按多貴寵亡主積於婦女珠玉速其亡也故先王慎其所積疾之疾之萬物之師也為之為之萬物之時也強之強之萬物之指也凡國有三制有制人者有為人之所制者有不䏻制人人亦不䏻制者何以知其然徳盛義尊而不好加名於人加名扵人者人亦加之也人衆兵强而不以其國造難生患患難於人者人亦患難之天下有大事而好以其國後謙受益也如此者制人者也下人者在人上徳不盛義不尊而好加名於人人不衆兵不強而好以其國造難生患恃與國幸名利言恃黨與之國又不為推譲每輒幸其名利也如此者人之所制也陵人者人反陵之息侯伐鄭之比人進亦進人退亦退人勞亦勞人佚亦佚進退勞佚與人相胥胥視也常視人與之俱進退勞佚也如此者不䏻制人人亦不䏻制也愛人甚而不䏻利也愛甚不利生其怨心憎人甚而不䏻害也憎甚不害生其賊心故先王貴當愛必利憎必害貴周深宻不測則周也周者不出於口不見于色一龍一蛇一則為龍一則為蛇喻人行藏一日五化之謂周行藏五變故曰五化故先王不以一過二以少喻多衆所驚也先王不獨舉不擅功獨舉擅功人之所疾先王不約束不結紐約束則觧有束故可得而觧結紐則絶有紐故可得而絶故親不在約束結紐相親從心生也先王不貨交貨交則人心有親不列地列地則人心有向背以為天下不可改也親疎向背是其改也改謂分别而可以鞭箠使也若乃不改而以鞭箠威之則無思不服時也利也出為之也先王有所出為必上得天時下盡地利餘目不眀餘耳不聰茍非時利雖目視有餘不用其眀耳聴有餘不用其聰也是以䏻繼天子之容天子之容時利而已官職亦然亦時利也時者得天義者得人義即利也既時且義故䏻得天與人先王不以勇猛為邉境則邉境安邉境安則鄰國親鄰國親則舉當矣人故相憎也人之心悍故為之法法出於禮禮出於治治禮道也萬物待治禮而後定凡萬物隂陽兩生而參視先王因其參而慎所入所出以卑為卑卑不可得以尊為尊尊不可得桀舜是也先王之所以最重也得之必生失之必死者何也唯無得之堯舜禹湯文武孝己斯待以成天下必待以生故先王重之一日不食比嵗歉三日不食比嵗饑五日不食比嵗荒七日不食無國土十日不食無疇類盡死矣先王貴誠信誠信者天下之結也信誠者所以結固天下之心也賢大夫不恃宗至士不恃外權坦坦之利不以功坦坦之備不為用坦坦謂平平非有超而異者故不䏻立功而成用也故存國家定社稷在卒謀之間耳聖人用其心沌沌乎博而圜豚豚乎莫得其門一本作沌沌乎博圜豚豚乎莫得而聞也紛紛乎若亂絲遺遺乎若有所從治故曰欲知者知之欲利者利之欲勇者勇之欲貴者貴之彼欲貴我貴之人謂我有禮彼欲勇我勇之人謂我恭彼欲利我利之人謂我仁彼欲知我知之人謂我慜戒之戒之微而異之人心不同其猶面焉令既順欲穫失時無所收動作必思之無令人識之卒来者必備之信之者仁也不可欺者智也既智且仁是謂成人賤固事貴不肖固事賢貴之所以能成其貴者以其貴而事賤也賢之所以䏻成其賢者以其賢而事不肖也惡者美之充也卑者尊之充也賤者貴之充也故先王貴之天以時使地以材使人以徳使鬼神以祥使禽獸以力使所謂徳者先之之謂也故徳莫如先應適莫如後先王用一隂二陽者霸盡以陽者王以一陽而二隂者削盡以隂者亡量之不以少多稱之不以輕重度之不以長短不審此三者不可舉大事䏻戒乎䏻勅乎䏻隠而伏乎䏻而稷乎䏻而麥乎春不生而夏無得乎衆人之用其心也愛者憎之始也徳者怨之本也唯賢者不然先王事以合交徳以合人二者不合則無成矣無親矣凡國之亡也以其長者也人之自失也以其所長者也故善㳺者死于梁池善射者死于中野命屬于食治屬于事無善事而有善治者自古及今未嘗之有也衆勝寡疾勝徐勇勝怯智勝愚善勝惡有義勝無義有天道勝無天道凡此七勝者貴衆用之終身者衆矣人主好佚欲亡其身失其國者殆其徳不足以懐其民者殆眀其刑而殘其士者殆諸侯假之威久而不知極已者殆身彌老不知敬其適子者殆蓄藏積陳朽腐不以與人者殆凡人之名三有治也者有恥也者有事也者事之名二正之察之五者而天下治矣名正則治名倚則亂無名則死故先王貴名先王取天下逺者以禮近者以體體禮者所以取天下逺近者所以殊天下之際日益之而患少者惟忠日損之而患多者惟欲多忠少欲智也為人臣者之廣道也為人臣者非有功勞于國也家冨而國貧為人臣者之大罪也為人臣者非有功勞扵國也爵尊而主卑為人臣者之大罪也無功勞于國而貴富者其惟尚賢乎衆人之用其心也愛者憎之始也愛盡而憎至徳者怨之本也徳竭而怨生其事親也妻子具則孝衰矣其事君也有好業家室富足則行衰矣爵禄滿則忠衰矣唯賢者不然賢者有始有卒故先王不滿也人主操逆人臣操順先王重榮辱榮辱在為天下無私愛也無私憎也為善者有福為不善者有禍禍福在為故先王重為眀賞不費眀刑不暴賞罰眀則徳之至者也故先王貴眀天道大而帝王者用愛惡愛惡天下可祕愛惡重閉必固釡鼓滿則人概之人滿則天概之故先王不滿也先王之書心之敬執也而衆人不知也故有事事也毋事亦事也吾畏事不欲為事吾畏言不欲為言故行年六十而老吃也管子補注卷四
