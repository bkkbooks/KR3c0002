body:
  text: 管子補注卷十四明劉績撰水地第三十九短語十三地者萬物之本原諸生之根苑也苑囿城也美惡賢不肖愚俊之所生也謂生於地水者地之血氣如筋脉之通流者也言水材美具備其潤澤若氣以支持於地者若筋分流地上若脉也故曰水具材也言水材美具備何以知然也曰夫水淖弱以清而好洒人之惡仁也淖和也惡垢穢也視之黒而白精也視其色雖黒及揮揚之則白如此者精也量之不可使概至滿而止正也以意量之則多少不可以概注於器滿則止不可加剰如此者正也唯無不流至平而止義也方圓邪曲無所不流平則止不可增髙如此者義也人皆赴髙已獨赴下卑也卑也者道之室王者之器也道以卑為室王以卑為器也而水以為都居都聚也水聚居於下卑也凖也者五量之宗也水可為平凖五量取則焉故為五量之宗也素也者五色之質也無色謂之素水雖無色五色不得不成故為五色質也淡也者五味之中也無味謂之淡水雖無味五味不得不和故為五味中也是以水者萬物之凖也萬物取平焉故曰凖也諸生之淡也能濟諸生以適中故曰淡也違非得失之質也得亦自水生焉失亦自水生焉故為得失之質是以無不滿無不居也集於天地雨従天降而亦有河漢故水集於天地而藏於萬物動植之物皆含液也産於金石㨂金於水山石之穴或有溜泉焉集於諸生諸合生類皆得水而生之故曰水神莫不有水焉不知其所故謂之神也集於草木根得其度得其生之度華得其數得其榮落之數實得其量得其生熟之量鳥獸得之形體肥大羽毛豐茂文理明著萬物莫不盡其幾幾謂従無以適有也反其常者常謂長育之常數也水之内度適也内度謂潛潤之度也夫玉之所貴者九德出焉夫玉温潤以澤仁也鄰以理者知也鄰近也玉文相適近理各自通如此知也堅而不蹙義也蹙屈聚也如此義也亷而不劌行也鮮而不垢潔也折而不撓勇也瑕適皆見精也瑕適玉病也以其精純故不掩瑕適茂華光澤並通而不相陵容也叩之其音清搏徹逺純而不殺辭也象古君子之辭也是以人主貴之藏以為寶剖以為符瑞九德出焉人主所以寶而藏之為符瑞九德之故人水也男女精氣合而水流形隂陽交感流布成形也三月如咀咀者何曰五味五味者何咀咀口和嚼之謂三月之胎渾初凝類口所嚼食也曰五藏五味出於五藏後也酸主脾醎主肺辛主腎苦主肝甘主心五藏已具而後生肉脾生膈膈在脾上也肺生骨腎生腦肝生革革皮膚也心生肉五肉已具而後發為九竅脾發為鼻肝發為目腎發為耳肺發為口心發為舌績按舊本無此句今據文子補之五月而成十月而生生而目視耳聽心慮目之所視非特山陵之見也察於荒忽耳之所聽非特雷鼓之聞也察於淑湫心之所慮非特知於麤粗也察於㣲𦕈故脩要之精言精思是理脩要妙之精也是以水集於玉而九德出焉凝蹇而為人蹇停也言精液凝停則為人也而九竅五慮出焉五慮謂耳目鼻口心也此乃其精言九竅五慮是身之精也麤濁蹇能存而不能亡者也謂人之禀氣麤濁而蹇但能存而不能亡也績按此言水之精麤濁蹇能存而不能亡者生人與玉注俱非伏闇能存而能亡者蓍龜與龍是也言龜龍禀氣㣲妙悠逺而暗㝠故能存亡而為變化也龜生於水發之於火謂卜者以火鑽灼之於是為萬物先為禍福正謂龜得水火之靈故先知於萬物識禍福之正也龍生於水被五色而游故神得水不測之靈故神欲小則化如蠶蠋蠋藿中虫欲大則藏於天下言能隱覆天下欲尚則凌於雲氣尚上也欲下則入於深泉變化無日隨時而變不期於日上下無時謂之神龜與龍伏闇能存而能亡者也或世見謂下谷不徙水不絶之也或世不見者謂涸川水有時而絶生蟡與慶忌世見生慶忌世不見生蟡也績按蟡於危切又音詭故涸澤數百嵗谷之不徙水之不絶者生慶忌謂涸澤之中有谷有水谷不徙而水不絶也慶忌者其狀若人其長四寸衣黄衣冠黄冠戴黄蓋乘小馬好疾馳以其名呼之可使千里外一日反報此涸澤之精也涸川之精者生於蟡蟡者一頭而兩身其形若蛇其長八尺以其名呼之可以取魚鼈此涸川水之精也是以水之精麤濁蹇能存而不能亡者生人與玉伏闇能存而能亡者蓍龜與龍或世見或不見者蟡與慶忌故人皆服之謂服用水而管子則之言管子獨能知水法則也人皆有之莫不有水而管子以之以用也言管子獨能用水也是故具者何也水是也言水無理不具也萬物莫不以生得水以生唯知其託者能為之正具者水是也託依也能知水理之所依者能正於萬物故理之具者水也故曰水者何也萬物之本原也諸生之宗室也美惡賢不肖愚俊之所産也何以知其然也夫齊之水道躁而復故其民貪麤而好勇以水道回復故令人貪以其躁速故令人麤勇也楚之水淖弱而清故其民輕果而賊以其淖弱故輕佚清則明察故人果賊也越之水濁重而汨故其民愚疾而垢汨浸也濁重故愚浸則多所漸入故疾垢也秦之水泔最而稽􅙹滯而雜最絶也稽停留也謂秦水絶泔而味停留又泥􅙹沉滯與水相雜也故其民貪戾㒺而好事以其甘而稽故貪戾以其滯雜故誣而好事齊晉之水枯旱而運􅙹墆而雜齊晉謂齊之西而晉之東枯旱謂其水慘澁而無光也故其民諂諛而葆詐巧佞而好利以其運故諂諛以其枯旱故葆詐以其􅙹雜故巧佞而好利燕之水萃下而弱沉滯而雜故其民愚戇而好貞輕疾而易死沉故愚戇而好貞萃雜故輕疾而易死也宋之水輕勁而清故其民簡易而好正輕故簡易清勁故好正也是以聖人之化世也其解在水言解人之邪正嘗水而知故水一則人心正一謂不雜水清則民心易一則欲不汚人心既一故欲不汚穢民心易則行無邪易直則無邪也是以聖人之治於世也不人告也不户説也其樞在水樞主運轉者也言欲轉化於人但則水之理故曰其樞在水也四時第四十短語十四管子曰令有時王者命令必有其時無時則必視順天之所以來視謂觀而察之若不得時則必觀察其所致改革以順天道之來也五漫漫六惽惽孰知之哉漫漫曠逺貌惽惽㣲暗貌五謂每時之政其理曠遠六謂隂陽四時其理微暗既漫且惽故知之者少也唯聖人知四時不知四時乃失國之基不知五穀之故國家乃路路謂失其常居故天曰信明地曰信聖言能信順天地之道則而行之者曰明曰聖也四時曰正順行四時之令曰正也其王信明聖其臣乃正君明聖則能用賢材故正也何以知其王之信明信聖也曰愼使能而善聽信之謂能聽信賢材之人使能之謂明使任賢能則為明也聽信之謂聖既聽其言又信其事所以為聖信明聖者皆受天賞信明者天福也使不能為惽既使不能所以為惽惽而忘也者皆受天禍惽忘則動皆違理故受天殃也是故上見成事而貴功則民事接勞而不謀謂君見下有成則能貴賞其功是上能以恩接人事故雖下勞不謀上報其事也上見功而賤則為人下者直恃其功勞故肆直也為人上者驕不恤下功則以驕悖故也是故隂陽者天地之大理也天地用隂陽為生成四時者隂陽之大經也隂陽更用於四時之間為緯也刑德者四時之合也德合於春夏刑合於秋冬刑德合於時則生福詭則生禍然則春夏秋冬將何行東方曰星東方隂陽之氣和雜之時故為星星亦不定於隂陽也其時曰春春蠢也時物蠢而生也其氣曰風陽動而隂寒為風也風生木與骨木為風而發暢骨亦木之類也其德喜嬴而發出節出生也言春德喜悦長嬴為發生之節也時其事號令脩除神位謹禱弊梗梗塞也時方開通而有弊敗梗塞者則禱神以通道之績按淮南子仲春祭不用犧牲用圭璧更皮幣疑此乃幣更誤宗正陽春陽事故以正陽為宗治隄防夏多水潦故於春預脩隄防耕芸樹蓺正津梁謂正橋梁也脩溝瀆甃屋行水甃者使之行水也脩屋壞時方漑灌依次行而用解怨赦罪通四方凡此皆助發生之氣然則柔風甘雨乃至柔和也百姓乃壽百蟲乃蕃此謂星德星以和為德也星者掌發發為風掌主也主以風發生是故春行冬政則彫肅殺之氣乘之故彫落也行秋政則霜秋霜降時也行夏政則欲績按疑燠字誤月令行夏令煗氣早來意是故春三月以甲乙之日發五政甲乙統春之三時也一政曰論㓜孤舎有罪二政曰賦爵列授祿位列次也三政曰凍解脩溝瀆復亡人人之逃亡者復還之四政曰瑞阻險路有險阻理之使端平也脩封疆正千伯千伯即阡陌也五政曰無殺麑夭毋蹇華絶芋蹇拔也芋之屬其根經冬不死不絶之也績按後禁藏作毋夭英毋柎竽必有一誤五政茍時春雨乃來南方曰日南方太陽故為日也其時曰夏夏假也謂時物皆假大也其氣曰陽夏之氣也陽生火與氣陽為鬱熱敲蒸故為火氣也其德施舎脩樂施舎謂施爵祿舎逋罪脩樂謂作樂以脩輔也其事號令賞賜賦爵受祿順鄉順鄉謂不違土俗之宜也謹脩神祀量功賞賢以動陽氣陽氣主仁故行恩賞以助之也九暑乃至九暑謂九夏之暑也時雨乃降五穀百果乃登此謂日德日以昭育為德也中央曰土土位在中央而寄王於六月承火之後以土火之子故也而統於夏所以與火同章也土德實輔四時入出土在四時之季與之入出績按此言工無定時也以風雨節土益力土得雨遍益其生植之力績按此言土無定氣也土生皮肌膚土所生木實成皮與肌膚績按此言土氣之生也其德和平用均土無不載無不生故和而用均也中正無私位居中正無偏私實輔四時績按此言土之德也春嬴育夏養長秋聚收冬閉藏言上之四時皆土之所輔成也績按此言土之事也大寒乃極國家乃昌四方乃服言土輔四時使均成然後寒極而成嵗國昌而民服此謂嵗德謂土能成歳之德也日掌賞賞為暑得賞則熱熱故為暑嵗掌和和為雨和則隂陽交故為雨夏行春政則風風主春故行秋政則水行冬政則落霜氣肅殺故彫落也是故夏三月以丙丁之日發五政一政曰求有功發績按疑伐字勞力者而舉之二政曰開久墳久墳瘞之處開通之也發故屋辟故窌以假貸辟開也三政曰令禁扇去笠禁扇去笠者不欲令人禦盛陽之氣毋扱免禁扱袵免袒者亦不欲人惡盛陽之氣也除急漏田廬田中之廬欲漏之不欲人惡盛陽之氣也四政曰求有德賜布施於民而賞之五政曰令禁罝設禽獸謂設罝以取禽獸也毋殺飛鳥五政茍時夏雨乃至也西方曰辰辰星日交會也秋隂陽適中故為辰其時曰秋秋揫也時物成熟揫斂之其氣曰隂秋之氣也隂生金與甲隂氣凝結堅實故生金為爪甲也其德憂哀靜正嚴順秋氣悽惻故以憂恤哀憐為德靜正隂之性也嚴順謂德雖嚴然順時而為之也居不敢淫佚順秋氣而靜居不敢為淫佚過失也其事號令毋使民淫暴順旅聚收謂順時理軍旅聚而收之也量民資以畜聚賞彼羣幹衆有武幹人當賞之聚彼羣材材謂可以充兵器之材當收聚之百物乃收使民毋怠時云收斂出師故聚装人無懈怠所惡其察所欲必得察所惡之方而伐之則得其所欲也我信則克我旣誠信故能克敵此謂辰德辰以收斂殺姦邪為德也辰掌收收為隂收聚冬閉藏故為隂秋行春政則榮春發榮也行夏政則水夏多行水潦也行冬政則耗冬肅殺損耗也是故秋三月以庚辛之日發五政一政曰禁博塞博塞長姦邪故禁之圉小辯鬬譯誋小辯則利口覆國及譯傳言語相疾忌為鬬訟者皆當禁圉之也二政曰毋見五兵之刄時或出師掩襲故藏五兵之刄也三政曰愼旅農趣聚收四政曰補缺塞坼師旅營農當愼收之秋方閉藏故令補塞缺坼也五政曰脩牆垣周門閭亦所以助閉藏之氣五政茍時五穀皆入北方曰月北方太隂故為月也其時曰冬冬中也言藏收萬物於中也其氣曰寒冬之氣也寒生水與血寒釋則水流血亦水之類其德淳越温怒周密冬時花葉凋落唯根幹存焉故以淳質為德越散也冬既閉藏時則入於恡嗇故令散施為德雖復隂怒當節之以温周密者衆隂之閉藏也其亊號令脩禁徙民令靜止時方休息故禁人私徙令為靜止也地乃不泄冬令行故池不泄也斷刑致罰無赦有罪以符隂氣隂氣主殺故斷刑致罪以符之大寒乃至甲兵乃强五穀乃熟國家乃昌四方乃備此謂月德月以閉藏罰罪嵗德也月掌罰罰為寒罰則殺物故為寒也冬行春政則泄春陽氣發泄也行夏政則靁夏雷雹行行秋政則旱謂冬氣旱早也是故冬三月以壬癸之日發五政一政曰論孤獨恤長老二政曰善順隂脩神祀賦爵祿授備位三政曰効㑹計毋發山川之藏山藏謂銅銀之屬藏在山者川藏謂珠玉之屬藏在川者也四政曰捕奸遁得盜賊者有賞五政曰禁遷徙止流民圉分異分異謂離居者五政茍時冬事不過所求必得所惡必伏績按自是故至此舊本誤在暴虐積則亡下是故春凋秋榮冬雷夏有霜雪此皆氣之賊也氣反時則為賊害也刑德易節失次則賊氣遫至賊氣遫至則國多菑殃是故聖王務時而寄政焉謂順時而立政作教而寄武因教而習武也作祀而寄德焉謂設祭以顯德則神歆也此三者聖王所以合於天地之行也天地之行唯此三者而已日掌陽月掌隂星掌和陽為德隂為刑和為事是故日食則失德之國惡之月食則失刑之國惡之彗星見則失和之國惡之失則當受罰故其所失各以其所類而興惡也風與日爭明則失生之國惡之日惡風且熱旱災成矣方生之物皆枯悴矣此失生德也故失生之國惡也是故聖王日食則脩德月食則脩刑彗星見則脩和風與日爭明則脩生此四者聖王所以免於天地之誅也信能行之五榖蕃息六畜殖而甲兵强治積則昌暴虐積則亡道生天地道者自然能生天地也德出賢人德者賢人所脩為故能生賢也道生德法道則成德也德生正德脩則理自正正生事正直則事幹是以聖王治天下窮則反終則始德始於春長於夏刑始於秋流於冬謂刑於冬而休息也刑德不失四時如一皆順時而成故如一刑德離鄉時乃逆行鄉方也作事不成必有大殃月有三政月三旬政異故曰三政也王事必理以為必長王者行事必順三政之理然後可以長久不中者死失理者亡中猶合也不合三政者則無違失其理必敗亡國有四時固執王事固執四時之政以輔行王事四守有所謂守四時令得其所三政執輔執月三之政輔行已德也五行第四十一短語十五一者本也本農桑也二者器也器所以理農桑之具也三者充也充謂人力能稱本與器也治者四也人既務本設治以理之也教者五也人既奉法則以禮義教之守者六也人既奉法従教則設官以守之立者七也既設官以守之則能立事前者八也既能設官立事可與前王比隆終者九也既能與前王比隆可謂王道之終也十者然後具五官於六府也立五行之官分掌六府也五聲於六律也謂播五聲於六律也六月日至陽生至六為夏至隂生至六為冬至是故人有六多陽至六為純陽之多也隂至六為純隂之多也人禀隂陽之純以生故曰人有六多六多所以街天地也街猶陽隂多也天道以九制九老陽之數以老陽制天所以君長之也地理以八制八少隂之數以少隂制地欲其生息也人道以六制六者兼三才之數人禀天地隂陽之氣以生故以制人也以天為父以地為母以開乎萬物父母開通以生萬物以總一統總持其本以統萬物也通乎九制六府三充而為明天子言能總一統九制已下可謂明天子脩槩水上以待乎天菫菫誠也言天子能以中正自脩以槩自平上待天誠也反五藏以視不親又親反察於五藏以視知何者不親也治祀之下以觀地位理於祭祀之時於其所祭之下觀知地位之尊卑也貨曋神廬合於精氣神廬謂廟祠也日所次隅曰曋言祭神廬之時或薦珍貨雖已奠於地復以日次隅之所以為精祥也如此者所以招合鬼神精氣之道也已合而有常神既合聚而享祐則風雨得其常也有常而有經風雨有常百貨成而常經不失也審合其聲脩十二鍾以律人情不失其經則庶績咸通故可審合理世之聲以成安樂之音然後十二鍾以播其音音之髙下皆法人情律法也人情已得萬物有極然後有德得人情則物理極極於物理可謂有德也故通乎陽氣所以事天也經緯日月用之於民天氣以積陽成德故通陽氣然後能事天又經緯日月之時候使人用之也通乎隂氣所以事地也經緯星厯以視其離地以積隂成體故通隂氣然後能事地又經緯星厯之節氣視知其離絶也通若道然後有行言能通上隂陽天地之道然後所行不失也然則神筮不靈神龜不卜既通天地之道則所行無不當故龜筮不能為卜兆黄帝澤參治之至也黄帝雖通天地之道不使參問田澤以得萬靈之情可謂理之至也昔者黄帝得蚩尤而明於天道得大常而察於地利得奢龍而辯於東方績按一本奢作蒼下倣此得祝融而辯於南方得大封而辯於西方得后土而辯於北方黄帝得六相而天地治神明至蚩尤明乎天道故使為當時謂知天時之所當也大常察乎地利故使為廩者廩給也謂開廩以給人也奢龍辯於東方故使為工師工師即司空也祝融辯乎南方故使為司徒謂主徒衆使務農也大封辯於西方故使為司馬主兵馬以出征后土辯乎北方故使為李李獄官也取使象水之平也是故春者工師也夏者司徒也秋者司馬也冬者李也昔黄帝以其緩急作五聲調政理之緩急作五聲也以政五鍾令其五鍾一曰青鍾大音大音東方鍾名二曰赤鍾重心三曰黄鍾灑光四曰景鍾昧其明五曰黑鍾隱其常自大音重心已下皆鍾名其義則未聞五聲既調然後作立五行以正天時五官以正人位人與天調然後天地之美生美謂甘露醴泉之類也日至睹甲子木行御謂春日既至睹甲子用木行御時也天子出令命左右士師内御謂内侍之官也總别列爵謂總别等列之爵也論賢不肖士吏論士吏之賢與不肖當有所黜陟也賦秘賜秘藏之物出而賦賜之也賞於四境之内發故粟以田數故粟陳也以田數多少用陳粟給人使得務農出國衡官名愼山林禁民斬木所以愛草木也然則水解而凍釋草木區萌萌牙區别而生也贖蟄蟲卵菱贖猶去也卯鳬菱茨也皆早春而生也春辟勿時春當耕闢無得不及時也苗足本足猶擁也春生之苗當以土擁其本不癘雛鷇癘殺也雛隨母食者不夭麑䴠麑鹿子也言夭傷之毋傅速亡傷繦褓繦褓之嬰孩無得傷損也時則不凋若能行上事春則繁茂而不凋枯也七十二日而畢春當九十日而今七十二日而畢者則季月十八日屬土位故也績按自甲子起周一甲子六十日又零十二日得丙子故曰七十二日而畢下皆倣此葢五七三百五十日又五二為十日通三百六十日一年之數也注皆非睹丙子火行御天子出令命行人内御行人行使之官也令掘溝澮津舊塗舊塗謂先時濟水處當設其津梁也發藏任君賜賞任委也藏中委積物當發用之即以充君之賞賜也君子脩游馳以發地氣游馳謂游戯馳馬也出皮幣命行人脩春秋之禮於天下諸侯通天下遇者兼和春秋二時聘問之禮然則天無疾風草木發奮鬱氣息謂鬱蒸之氣止息也民不疾而榮華蕃七十二日而畢睹戊子土行御天子出令命左右司徒内御命司徒御理夏政也不誅不貞貞正也太陽用事時方長育故無所誅戮無責正以助養氣也農事為敬夏時農事尤盛順而敬之也大揚惠言言大舉仁惠之事也寛刑死緩罪人皆所以助養氣也出國司徒令命順民之功力以養五穀君子之靜居隂氣方生故靜居以遵也而農夫脩其功力極然則天為粤宛粤厚也宛順也天為厚順不逆時氣也草木養長五穀蕃實秀大六畜犧牲具民足財國富上下親諸侯和七十二日而畢睹庚子金行御天子出令命祝宗選禽獸之禁禁謂牢囿圃所養擬供祭祀也五穀之先熟者先熟則黍稷也而薦之祖廟與五祀五祀謂門行户竈中霤鬼神饗其氣焉君子食其味焉然則凉風至白露下天子出令命左右司馬衍組甲厲兵組甲謂以組貫甲也合什為伍謂立仆人之長為伍以脩於四境之内諛然告民有事所以待天地之殺斂也諛悦順貌有事謂出師以伐不服象天地殺斂也然則晝炙陽夕下露地競環環炙實貌方秋之時晝則暴炙夕則下寒露而潤之隂陽更生故池氣交競而炙實五穀鄰熟鄰緊也隂陽氣足故緊熟草木茂實嵗農豐年大茂七十二日而畢賭壬子水行御天子出令命左右使人内御御其氣足則發而止使人御理冬政其閉藏之氣足則發令休止也其氣不足則發􅏌瀆盜賊􅏌謂遮禁也羣聚之謂其閉藏之氣不足則􅏌防盜賊以助其閉藏之氣也數劋竹箭言數劋削竹箭以為矢也伐檀柘伐檀柘所以為弓也令民出獵禽獸不釋臣少而殺之所以貴天地之所閉藏也貴天地閉藏故收獵取禽以助也然則羽卵者不叚叚謂離散不成毛胎者不􅢥􅢥謂胎敗潰也􅤟婦不銷棄􅤟古孕字銷棄謂散壞也草木根本美閉藏實堅則根本美凡此皆順冬閉藏之政所致也七十二日而畢睹甲子木行御天子不賦不賜賞而大斬伐傷此以下言逆時政所致災禍也君危不殺太子危家人夫人死若君雖危而不見殺則又太子危而家人夫人有死禍也不然則長子死如無家人夫人死則長子死七十二日而畢逆氣亦畢於七十二日也睹丙子火行御天子敬行急政旱札苗死民癘札夭死也癘疫死時當寛緩而乃急故有旱札疫之災也七十二日而畢睹戊子土行御天子修宮室築臺榭君危土方用事而修宮室以動亂之故君有危亡之禍也外築城郭臣死築城郭動土危故其臣死七十二日而畢土王在六月而得七十二日者則每季得十八故也睹庚子金行御天子攻山擊石有兵作戰而敗士死䘮執政時方收斂而乃攻山擊石故致兵器之禍也七十二日而畢睹壬子水行御天子決塞動大水王后夫人薨不然則羽卵者叚毛胎者贖􅤟婦銷棄草木根本不美七十二日而畢也管子補注卷十四
