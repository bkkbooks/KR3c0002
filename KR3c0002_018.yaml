body:
  text: 管子補注卷十八明劉績撰入國第五十四謂始有國入而行化雜篇五入國四旬五行九惠之教旬即廵也謂四靣五方行而施九惠之教一曰老老以養老之禮養老者二曰慈幼三曰恤孤四曰養疾五曰合獨六曰問疾七曰通窮八曰振困九曰接絶所謂老老者凡國都皆有掌老謂置掌老之官年七十已上一子無征不預國之征伐三月有饋肉謂官饋之肉八十已上二子無征月有饋肉九十已上盡家無征日有酒肉死上共棺槨勸子弟精膳食問所欲求所嗜問老者何所欲求訪其所嗜以嗜欲而供之此之謂老老所謂慈幼者凡國都皆有掌幼士民有子子有幼弱不勝養為累者勝堪也謂不堪自養故為累有三幼者無婦征四幼者盡家無征五幼又予之葆葆今之教母受二人之食官給二人之食能事而后止幼者漸長能自管事然后止其養此之謂慈幼所謂恤孤者凡國都皆有掌孤士人死子孤幼無父母所養既無父母又無所養之親也不能自生者屬之其鄉黨知識故人養一孤者一子無征養二孤者二子無征養三孤者盡家無征掌孤數行問之必知其飲食饑寒身之膌胜而哀憐之膌痩也胜肥也此之謂恤孤所謂養疾者凡國都皆有掌養疾聾肓喑啞跛躄偏枯握遞遞著也謂兩手相拱著而不申者謂之握遞不耐自生者上収而養之疾既養之又與療疾官而衣食之謂官給之衣食殊身而後止殊猶離也疾離身而後止其養此之謂養疾所謂合獨者凡國都皆有掌媒丈夫無妻曰鰥婦人無夫曰寡取鰥寡而合和之予田宅而家室之三年然後事之事謂供國之職役也此之謂合獨所謂問疾者凡國都皆有掌病士人有病者掌病以上令問之九十以上日一問八十以上二日一問七十以上三日一問衆庶五日一問疾甚者以告上身問之掌病行於國中以問疾為事此之謂問病所謂通窮者凡國都皆有通窮若有窮夫婦無居處窮賔客絶糧食居其鄉黨以聞者有賞不以聞者有罰此之謂通窮所謂振困者嵗凶庸人訾厲訾疾也厲病也多死喪弛刑罰赦有罪散倉粟以食之此之謂振困所謂接絶者士民死上事死戰事使其知識故人受資於上資謂財用而祠之此之謂接絶也九守第五十五主位主明主聴主賞主問主因主周主參督名雜篇六安徐而静人居位當安徐而又静黙柔節先定以和柔為節先能定已然後可定人虚心平意以待須虚其心平其意以待臣之諌説須亦待也右主位人主居位當如此目貴明耳貴聰心貴智以天下之目視則無不見也以天下之耳聽則無不聞也以天下之心慮則無不知也輻凑並進則明不塞矣言聖人不自用其聰明思慮而任之天下故明者為之視聰者為之聽智者為之謀輻凑並進不亦宜乎故曰明不可塞右主明主明在於用天下耳目視聽之聽之術曰勿望而距勿望而許聽言之術必須審察不可望風即有所距有所許也許之則失守距之則閉塞既未審察輒有距而許之故或失守或閉塞髙山仰之不可極也深淵度之不可測也不審察者常為彼所知故戒之當如髙山深淵不可極而測之神明之徳正静其極也既知山淵則其徳配神明而正且静如此者乃其窮極矣右主聽用賞者貴誠用刑者貴必刑賞信必於耳目之所見則其所不見莫不闇化矣誠暢乎天地通於神明見姦偽也既暢天地通於神明故有姦偽必能見之右主賞一曰天之二曰地之三曰人之言三才之道幽䆳深逺必問於賢者而後行之四曰上下左右前後凡此皆有順逆之宜故湏問之熒惑其處安在又湏知法星所在也右主問心不為九竅九竅治心任九竅九竅自治君不為五官五官治君任五官故五官自治為善者君予之賞為非者君予之罰君因其所以來因而予之則不勞矣因來而加賞何勞之有聖人因之故能掌之掌主也因來而賞物皆屬已故能主之因之修理故能長乆績按所以来謂為善非因而予之謂賞罰右主因人主不可不周周謂謹宻也人主不周則羣臣下亂不周則泄其機事故臣下交争而亂也寂乎其無端也慎宻者當如是外内不通安知所怨外内不通則事不泄故無怨關閈不開善否無原既不開其闗閈故善之與不善不得知其原矣右主周一曰長目二曰飛耳三曰樹明明知千里之外隠微之中曰動姦姦動則變矣姦在隠微其理將動姦既動矣自然變更右主參修名而督實按實而定名名實相生反相為情名實當則治不當則亂名生於實實生於徳徳生於理理生於智智生於當右督名桓公問第五十六雜篇七齊桓公問管仲曰吾念有而勿失得而勿忘為之有道乎對曰勿創勿作時至而隨毋以私好惡害公正察民所惡以自為戒人有所惡已行之非黄帝立明臺之議者上觀於賢也堯有衢室之問者下聽於人也舜有告善之旌而主不蔽也禹立建皷於朝而備訊唉訊問也唉驚問也湯有總街之庭以觀人誹也武王有靈臺之復而賢者進也復謂白也此古聖帝明王所以有而勿失得而勿忘者也桓公曰吾欲效而為之其名云何對曰名曰嘖室之議謂議論者言語讙嘖曰法簡而易行刑審而不犯事約而易從求寡而易足人有非上之所過謂之正士見上有過而非之可謂正士内於嘖室之議納正士之言著為嘖室之議有司執事者咸以厥績按疑作決事奉職而不忘焉此嘖室之事也請以東郭牙為之此人能以正事争於君前者也桓公曰善度地第五十七雜篇八昔者桓公問管仲曰寡人請問度地形而為國者其何如而可管仲對曰夷吾之所聞能為霸王者蓋天子聖人也故聖人之處國者必於不傾之地言其處深厚岡原復壯者謂之不傾而擇地形之肥饒者鄉山左右經水若澤其國都或在山左或向山右及縁水澤然後建内為落渠之寫因大川而注焉謂於都内更為落水之渠以注於大川乃以其天材地之所生利養其人以育六畜天材謂五榖之屬因天時而植者也天下之人皆歸其徳而惠其義惠順乃别制斷之乃分别其地制之斷之也州者謂之術地數充為州者謂之術不滿術者謂之里不成術而餘者謂之里故百家為里里十為術術十為州州十為都都十為霸國不如霸國者國也不成於霸國者諸侯之國也以奉天子霸國率諸侯以奉天子也天子有萬諸侯也其中有公侯伯子男焉天子中而處此謂因天之固所處之處自然不傾故曰因之歸地之利内為之城城外為之郭郭外為之土閬閬謂隍地髙則溝之下則堤之命之曰金城樹以荆棘上相穡著者所以為固也穡鈎也謂荆棘刺條相鉤連也嵗修増而毋已時修増而無已福及孫子此謂人命萬世無窮之利人君之保守也謹置國都繕修城郭此人君所保全而守臣服之以盡忠於君君體有之以臨天下故能為天下之民先也此宰之任則臣之義也宰謂執君之政者也故善為國者必先除其五害人乃終身無患害而孝慈焉桓公曰願聞五害之説管仲對曰水一害也旱一害也風霧雹霜一害也厲一害也蟲一害也厲疾病也此謂五害五害之屬水最為大五害已除人乃可治桓公曰願聞水害管仲對曰水有大小又有逺近水之出於山而流入於海者命曰經水言為衆水之經水别於他水謂從他水分流若江别為沱入於大水及海者命曰枝水言為之枝山之溝一有水一母水者命曰谷水水之出於他水溝流於大水及海者命曰川水出地而不流者命曰淵水此五水者因其利而往之可也謂因地之勢䟽引以溉灌因而扼之可也扼塞也恐其泛溢而塞之亦可也而不乆常有危殆矣謂卒有暴溢或能漂沒居人故危殆也桓公曰水可扼而使東西南北及髙乎管仲對曰可夫水之性以髙走下則疾至於漂石謂能漂於浮石而下向髙即留而不行故髙其上領瓴之尺有十分之三里滿四十九者水可走也上謂水從來處髙之者欲注下取勢也領謂瓴甋也言欲令水上髙必大為瓴甋私空其中使前後相受以尺為分每領而有十尺即長一丈也分之於三里間之毎里滿此九如此則水可走上矣乃迂其道而逺之以勢行之迂曲也謂下曲水道逺張其勢而以行之水之性行至曲必留退滿則後推前謂水至曲必流而却退其處既滿則後水推前水令去地下則平行地髙即控控謂頓也言水頓挫而却杜曲則𢷬毁杜猶衝也𢷬觸也言水行至曲則衝而觸有所毁傷杜曲激則躍躍則倚倚排也謂前後相排也倚則環環則中前後相排則圓流生空若環之中所謂齊中則涵圓流無所通則相涵激也涵則塞塞則移移則控控亦塞也控則水妄行水妄行則傷人傷人則困困則輕法輕法則難治難治則不孝不孝則不臣矣故五害之屬傷殺之類禍福同矣知備此五者人君天地也所謂與天地合其徳桓公曰請問備五害之道管子對曰請除五害之説以水為始請為置水官令習水者為吏大夫大夫佐各一人率部校長官佐各財足財謂其禄廪乃取水左右各一人使為都水匠工為水工之都匠令之行水道城郭堤川溝池官府寺舎及州中當繕治者給卒財足卒謂所當治水者財其粮用也令曰常以秋嵗末之時閲其民閲謂省視案家人比地定什伍口數案人比地有十口五口之數當受地若干别男女大小其不為者輒免之謂其幼小不任役者則免之有錮病不可作者疾之著其名於疾之數有以賙恤之也可省作者半亊之謂疾者雖不任役可以省視作者取其半功也并行以定甲士當被兵之數上其都因力役之際并行視之强壯者預定之以為甲士而被兵之數既而上其名籍於國都也都以臨下視有餘不足之處輒下水官水官亦以甲士當被兵之數都既臨下視其兵不足之處即甲士下之於水官水官既得甲士還以被兵數也與三老里有司伍長行里因父母案行閱其備水之器謂水官與三老五長等行視其里因其家之父母與之閲其備水之器以冬無事之時籠函板築各什六謂什人共貯六具下准此土車什一雨輦什二車輦所以禦雨故曰雨輦食器兩具每人兩具人有之錮藏里中以給喪器謂人既有貯器當錮藏於里中兼得給㓙喪之用也後常令水官吏與都匠因三老里有司伍長案行之常以朔日始出具閱之取完堅補弊乆去苦惡其器已補弊而乆有苦惡者除去之常以冬少事之時令甲士以更次益薪積之水旁州大夫將之唯毋後時謂將領之毋得後時其積薪也以事之己巳畢也謂農事既畢然後益薪其作土也以事未起謂春亊未起天地和調日有長乆以此觀之其利百倍故常以毋事具器有事用之水常可制而使毋敗此謂素有備而豫具者也桓公曰當何時作之管子曰春三月天地乾燥水紏列之時也山川涸落天氣下地氣上萬物交通故事已新事未起草木荑生可食寒暑調日夜分分之後夜日益短晝日益長利以作土功之事土乃益剛令甲士作堤大水之傍大其下小其上隨水而行地有不生草者必為之囊大者為之堤小者為之防夾水四道禾稼不傷嵗埤増之樹以荆棘以固其地雜之以栢楊以備決水民得其饒是謂流膏令下貧守之往往而為界可以毋敗當夏三月天地氣壯大暑至萬物榮華利以疾􅘥殺草薉使令不欲擾命曰不長不利作土功之事放農焉利皆耗什分之五土功不成當秋三月山川百泉踊降雨下山水出海路距雨露屬天地凑汐利以疾作収斂毋留一日把百日餔民毋男女皆行於野不利作土功之事濡濕日生土弱難成利耗什分之六土功之事亦不立當冬三月天地閉藏暑雨止大寒起萬物實熟利以填塞空郄繕邊城塗郭術平度量正權衡虚牢獄實廪倉君修樂與神明相望凡一年之事畢矣舉有功賞賢罰有罪遷有司之吏而第之不利作土功之事利耗什分之七土剛不立晝日益短夜日益長利以作室不利以作堂四時以得四害皆服桓公曰寡人悖不知四害之服柰何管仲對曰冬作土功發地藏則夏多暴雨秋霖不止春不収枯骨朽脊伐枯木而去之則夏旱至矣夏有大露原煙噎下百草人采食之傷人人多疾病而不止民乃恐殆君令五官之吏與三老里有司伍長行里順之令之家起火為温其田及宫中皆蓋井毋令毒下及食器將飲傷人有下蟲傷禾稼凡天菑害之下也君子謹避之故不八九死也大寒大暑大風大雨其至不時者此謂四刑或遇以死或遇以生君子避之是亦傷人故吏者所以教順也三老里有司伍長者所以為率也五者已具民無願者願其畢矣故常以冬日順三老里有司伍長以冬賞罰使各應其賞而服其罰五者不可害則君之法犯矣此示民而易見故民不比也桓公曰凡一年之中十二月作土功有時則為之非其時而敗將何以待之管仲對曰常令水官之吏冬時行堤防可治者章而上之都都以春少事作之已作之後常案行堤有毁作大雨各葆其所可治者趣治以徒隸給大雨堤防可衣者衣之績按衣謂以物覆其上公所謂簑城之類衝水可据者据之終嵗以毋敗為效此謂備之常時禍何從來所以然者獨水䝉壤自塞而行者江河之謂也嵗髙其堤所以不沒也春冬取土於中秋夏取土於外濁水入之不能為敗桓公曰善仲父之語寡人畢矣然則寡人何事乎哉亟為寡人教側臣管子補注卷十八
