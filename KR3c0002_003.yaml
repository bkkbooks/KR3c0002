body:
  text: 管子補注卷三眀劉績撰幼官第八幼始也陳從始輔官齊政之法經言八若因夜虛守靜人物人物則皇言欲候氣聼聲以知吉凶必因夜虛之時守其安靜以聽候人物此時人物則皇暇故吉凶之驗不妄五和時節土生數五土氣和則君順時節而布政君服黃色味甘味聽宫聲此土王之時故服黃味甘聽宫也然土雖均王四季而正位在六月也績按别本注用土之物也治和氣土主和故治和氣用五數績按諸本脫此一句非飲於黃后之井中央井也以倮獸之火㸑倮獸謂淺毛之獸虎豹之屬藏溫濡藏謂苞之在心君之所藏者溫和濡緩所以助土氣績按濡字古軟字也行驅養謂禽獸之屬䏻為苖害者時驅逐之所以養嘉穀也績按行對藏而言謂行之於身也下放此坦氣修通坦平也平土政則其氣修通凡物開靜形生理常至命凡土王之時所生之物但開通安靜則其形自生既循理之常則無殘盡於所賦之命也績按當理字為句尊賢授德則帝帝者之臣其實師也故尊賢授德則可為帝也身仁行義服忠用信則王服行審謀章禮選士利械則霸章眀定生處死謹賢修伍則衆生者安定之死者處置之斂葬其柩信賞審罰爵材祿䏻則强有材者爵之有䏻者祿之計凡付終務本飭末則富凡謂都數也付終謂財日月既終付之後人眀法審數立常備䏻則治常謂五常也備䏻謂才䏻之士備有之同異分官則安同異之職分官而治通之以道畜之以惠親之以仁養之以義報之以德結之以信接之以禮和之以樂期之以事攻之以官政治績按當依後作考之以言發之以力威之以誠一舉而上下得終謂初㑹諸侯上下得終其禮自此至九舉說九合諸侯之所致再舉而民無不從三舉而地辟散成成謂諸侯自盟要不事於齊至三㑹則諸侯散其成而朝齊四舉而農佚粟十四㑹之後徭役减省故農人佚樂而粟得十全五舉而務輕金九五㑹之後兵戰既息事務轉輕而金得九分一以供官也六舉而潔知事變潔圍度也七舉而外內為用外謂諸侯八舉而勝行威立九舉而帝事成形九㑹之後威行海內雖居侯伯帝王之事既以成形九本搏大人主之守也自九本以下管氏但舉其目或有數在於他篇但此書多從𣪚逸無得而知然九本所以搏擊强大故人主守之八分有職卿相之守也七官飾勝備威將軍之守也六紀審密賢人之守也五紀不解庶人之守也動而無不從靜而無不同强動弱必從强靜弱必同治亂之本三卑尊之交四富貧之終五盛衰之紀六安危之機七强弱之應八存亡之數九練之以散羣傰署傰猶曹也凡上之諸數既已精練然後散之於衆使傰曹署著其名以司之績按傰音朋凡數財署數謂國用之數使財者署殺僇以聚財或因亡國或因滅家莫不籍沒其財故曰殺僇以聚財也勸勉以選衆使二分具本使上之傰署財署分知其事各具其名籍之本則財署知聚財傰署知遷衆發善必審於密執威必眀於中發善謂行賞執威謂行刑此居圖方中此立時之政管仲别五其圖謂之方圖而土位居中春行冬政肅肅寒也冬氣乘之故也行秋政雷春陽秋隂隂乘陽故雷行夏政閹春既陽夏又陽陽氣猥併故掩閉也十二地氣發戒春事自此已下隂陽之數日辰之名于時國異政家殊俗此但齊獨行不及天下且經秦焚書或為煨燼無得而詳焉闕之以待䏻者十二小卯出耕十二天氣下賜與十二義氣至修門閭十二清眀發禁十二始卯合男女十二中卯十二下卯三卯同事謂三卯所用事同他皆放此八舉時節木之成數八木氣舉君則順時節以布政也君服青色味酸味聽角聲此木王之時故服青味酸聽角績按别本注用木之物也治燥氣春多風而旱故治慘氣用八數八亦木之成數也飲于青后之井東方井也以羽獸之火㸑羽獸南方朱雀也用南方之火故曰羽獸之火藏不忍行驅養坦氣修通凡物開靜形生理合內空周外春主仁故所藏者不忍之理合聚於內出空於外强國為圈弱國為屬强國所以禁禦弱國弱國圈然也動而無不從靜而無不同强動弱必從强靜弱必同舉發以禮時禮必得强國舉發必當以禮時也禮也必得其宜和好不基貴賤無司事變日至鄰國和好不基貴賤之位無司存如此則事變日至無寧居基漸此居於圖東方外方夏行春政風春箕宿多風也行冬政落寒氣肅殺故凋落也重則雨雹其災重則雨雹水寒所致行秋政水秋畢宿多霖雨十二小郢至德十二絶氣下下爵賞十二中郢賜與十二中絶收聚十二大暑至盡善十二中暑十二小暑終三暑同事七舉時節火成數七火氣舉君則順時莭而布政君服赤色味苦味此火王之時故服赤味苦也績按别本注用火之物也聽羽聲羽北方聲也火王之時不聽徴而聽羽者所以抑盛陽也治陽氣績按諸本無此句非用七數七亦火之成數飲於赤后之井南方井也以毛獸之火㸑毛獸西方白虎用西方之火故曰毛獸之火藏薄純盛陽之性失在奢縱故所藏者省薄純素也行篤厚陽性寬和故行篤厚坦氣修通凡物開靜形生理物理既生自然修理而長育也定府官眀名分而審責於羣臣有司則下不乘上賤不乘貴法立數得而無比周之民則上尊而下卑逺近不乖此居於圖南方方外秋行夏政葉盛陽氣乘之故卉木生葉行春政華少陽氣乘之故卉木更生華行冬政耗盛隂肅殺故虛耗也十二期風至戒秋事十二小卯薄百爵十二白露下收聚十二復理賜與十二始節賦事十二始卯合男女十二中卯十二下卯三卯同事九和時節金成數九金氣和君則順時莭而布政君服白色味辛味聽商聲此金王之時故服白味辛聽商績按别本注用金之物也治濕氣秋多霖雨水故治濕用九數九亦金之成數飲於白后之井西方井也以介蟲之火㸑介蟲北方𤣥武也用北方之火故曰介蟲之火藏恭敬金性亷潔故所藏者恭敬也行搏鋭兑金性徑鋭時方肅殺故曰以徑鋭搏擊所以順殺氣也坦氣修通凡物開靜形生理間男女之畜男女之畜有內外之異故須間之也修鄉閭什伍殺氣方至可以出師征伐故修什伍量委積之多寡定府官之計數養老弱而勿通老少異糧故其養勿通信利周而無私申布秋利既令周遍無得有私績按周當依後作害此居于圖西方方外冬行秋政霧秋氣多隂霧行夏政雷盛陽乘盛隂故雷也行春政蒸泄少陽乘隂故蒸泄也十二始寒盡刑十二小榆賜豫十二中寒收聚十二中榆大收十二寒至靜十二大寒之隂十二大寒終三寒同事六行時節水成數六水氣行君則順時節而布政君服黑色味鹹味此水王之時故服黑味鹹績按别本注用水之物也聽徴聲不聽羽而聽徴者亦所以抑盛隂也治隂氣不治則盛隂大過大過則治隂氣也用六數六亦水之成數飲於黑后之井北方井也以鱗獸之火㸑鱗獸東方青龍也用東方之火故曰鱗獸之火藏慈厚君人者好生惡殺故以刑殺之時藏於慈厚所以示其不忍也行薄純冬物朴素故行省薄純儉坦氣修通凡物開靜形生理器成於僇冬行刑之時故成僇器也教行於鈔鈔末也冬為四時之末嵗之將終也動靜不記行止無量記靜動則行止可量戒審四時以别息息生也四時生物各有不同故須别之異出入以兩易出入既異又並令無差故曰兩易也眀養生以解固固謂護吝也生既須養則物不可吝故曰解固也審取與以總之又恐所養過時故審取與之多少以總統之一㑹諸侯令曰非𤣥帝之命毋有一日之師役𤣥帝北方之帝齊桓初㑹命諸侯不使非時出師故令曰若非𤣥帝有命之時毋得有一日之師役一日尚不可況多乎再會諸侯令曰養孤老食常疾收孤寡三㑹諸侯令曰田租百取五百分取五分市賦百取二關賦百取一毋乏耕織之器四㑹諸侯令曰修道路偕度量一稱數偕同也稱斤兩也數多少也藪澤以時禁發之草木零落然後入山林獺祭魚然後修澤梁也五㑹諸侯令曰修春秋冬夏之常祭食常所祭常所食各有時物也天壤山川之故祀必以時六㑹諸侯令曰以爾壤生物共𤣥官𤣥官主禮天之官也請四輔四輔卿三公四輔也所以助祭行禮也將以禮上帝七㑹諸侯令曰官處四體而無禮者流之焉莠命官處謂處官也處官位而四體無禮者謂之莠命而流放焉莠命者謂穢亂教命若莠之穢苖也八㑹諸侯令曰立四義而毋議者尚之于𤣥官聽于三公四義者謂無障谷無貯粟無易樹子無以妾為妻諸侯䏻順命而無異議者則尚之于天子𤣥官聽三公之錫命尚上也九㑹諸侯令曰以爾封內之財物國之所有為幣為幣禮九㑹大命焉出常至謂上九㑹既出大令故天下諸侯常至非此之外則朝聘之數逺近各有差也績按謂大命諸侯出常來朝㑹之命即下文是也千里之外二千里之內諸侯三年而朝習命因朝而習教命二年三卿使四輔諸侯三卿使天子四輔以受節制也一年正月朔日令大夫來修受命三公習所受命于三公二千里之外三千里之內諸侯五年而㑹至習命因㑹而至以習命也三年名卿請事二年大夫通吉凶十年重適入正義禮重適謂承重也適諸侯之世子也五年大夫請受變謂所變更之教令也三千里之外諸侯世一至道路既逺故世一至置大夫以為廷安其逺國大夫則為置廷館每來於此以安之也入共受命焉入共國所有因以受命此居於圖北方方外必得文威武官習勝之善勝敵者必得文德之威武藝之官與之練習士卒則可以勝之務時因勝之時是也務時因修不逆于理可以得勝也終無方勝之從始至于終計出無方者勝幾行義勝之庶幾行義者可以勝理名實勝之整理名實不謬妄可以得勝急時分勝之敗敵所得之物應受分者急分與之可以得勝事察伐勝之伐功行賞之事必察有功不令無功者妄受可以得勝行備具勝之行師用兵必備其攻戰之具可以得勝原無象勝之竒計若神無象可原者勝本定獨威勝用師之本定䏻獨威者勝定計財勝計謀財用先審定者勝定聞知勝聞知敵謀䏻審定者勝定選士勝精選士卒䏻審定者勝定制祿勝制祿亦與有功能審定者勝也定方用勝異方所用各有不同䏻審定者勝也定綸理勝經綸之理䏻審定者勝也定死生勝定成敗勝定依竒勝所休竒䇿䏻審定者勝定實虛勝定盛衰勝舉機誠要則敵不量發舉兵機誠得其要則敵不䏻量也用利至試則敵不校用兵便利又䏻至誠則敵不敢校也眀名章實則士死節眀忠義之名章功勞之實士則死節不求茍生竒舉發不意則士歡用竒謀之舉發彼不意則士樂為用交物因方則器械備交盾之物因方所有則器械備具也因䏻利備則求必得因彼所䏻所利而以備之則所求必得執務眀本則士不偷執所營之務眀所為之本則士不茍且備具無常無方應也其所備具無有常者所以應敵無方聽於鈔故䏻聞未極鈔深逺也所聽在于深逺故䏻聞于極理視於新故䏻見未形未形者新事將起所視者在新故見未形也思於濬故䏻知未始未始者事之深濬者所思在深故未知始發於驚故䏻至無量發舉可驚故敵不䏻量動于昌故䏻得其寶舉動昌盛故敵懼而輸寶也立於謀故䏻實不可故也其所建立皆用深謀故常堅實不復衰故績按别本注立謀䏻有實效不使衰故也器成教守則不逺道里器用完成教令堅守故欲往則至不憚道里之逺也號審教施則不險山河號令審悉教命施行則赴湯火而不顧豈險難於山河也博一純固則獨行而無敵德博而一行純而固則仰我如時雨歡我如椒蘭誰䏻敵之慎號審章則其攻不待慎號令審旗章則攻者爭先登豈顧後而相待乎權與眀必勝則慈者勇權謀明略必能勝敵則慈仁者猶致勇奮况惡少哉器無方則愚者智器用無方應卒必備則愚者習而成智況不愚乎攻不守則拙者巧我攻既妙彼不䏻守則拙者習而成巧況不拙乎數也動慎十號兵既數動必慎十號九章等此有數在他篇眀審九章飾習十器善習五官謹修三官必設常主計必先定軍之主將既必有常軍之計謀亦須先定求天下之精材精材可以為軍之器用者論百工之鋭器器成角試否臧收天下之豪傑有天下之稱材稱材謂材稱其所用也說行若風雨發如雷電此居於圖方中此中圖之副也旗物尚青木用事故尚青兵尚矛象春物之芒鋭刑則交寒害釱其行刑戮則於初旦夜盡之交其時尚寒主春人不得已而行刑故離害而釱禁釱或為鈸績按釱鉗械人足也恐當作轄釱器成不守器用既成則敵不䏻圍守也經不知經法也用兵之法敵不䏻知也教習不著我之教習敵不䏻著著猶明著發不意其所舉發出敵不意經不知故莫之䏻圉發不意故莫之䏻應莫之䏻應故全勝而無害莫之䏻害故必勝而無敵四機不眀不過九日而遊兵驚軍四機即上不守不知不著不意也障塞不審不過八日而外賊得間障塞者所以防守要路也由守不慎不過七日而內有讒謀由守所由而防守者詭禁不修不過六日而竊盜者起詭禁所以禁詭常也死亡不食不過四日而軍財在敵死亡者不享食鬼神必怨怒故軍財在敵此居於圖東方方外此東圖之副也旗物尚赤火用事故尚赤兵尚㦸象夏物之森聳刑則燒交疆郊其用刑則於疆郊焚燒而交也必眀其一一謂號令不二必眀其將必眀其政必眀其士四者備則以治擊亂以成擊敗數戰則士疲數勝則君驕驕君使疲民則國危至善不戰用兵至善者其唯不戰乎其次一之其次善者雖戰而號令一績按一之解見兵法此注非大勝者積衆積衆然後可以大勝勝而無非義者焉可以為大勝所以勝皆大義故成大勝也大勝無不勝也此居於圖南方方外此南圖之副也旗物尚白金用事故尚白兵尚劍象金性之利也刑則紹昧斷絶其用刑則繼晝之昧斷絶而戮之也始乎無端卒乎無窮始乎無端道也卒乎無窮德也道不可量德不可數不可量則衆强不能圖不可數則為詐不敢鄉績按鄉響同兩者備施兩者謂道德也動靜有功畜之以道養之以德畜之以道則民和養之以德則民合和合故䏻習習故䏻偕偕謂同為其事積按兵法作和合故䏻諧諧故䏻輯諧輯以悉莫之䏻傷則習乃輯聲之誤後倣此偕習以悉悉盡也莫之䏻傷也此居於圖西方方外此西圖之副也旗物尚黑水用事故尚黑兵尚脅盾象時物之閉盾或署之於脅故曰脅盾刑則遊仰灌流其用刑則遊縱之所使仰藥死而既乃投之於灌流察數而知治審器而識勝眀謀而適勝通德而天下定定宗廟育男女宗廟存則男女育也官四分則可以立威行德制法儀出號令擇才授官四面分設至善之為兵也非地是求也罰人是君也至善之兵不求其地所以君可罰人若桀紂之人比屋可誅也立義而加之以勝至威而實之以德守之而後修勝心焚海內既獲敵人之國順而守之然後修其法制如此則强勝之心可以焚灼於海內民之所利立之所害除之則民人從立利除害則人從也立為六千里之矦則大人從既九㑹之後天子加命立為侯伯面各三千里四方相距六千里大人謂天子三公四輔也使國君得其治則人君從㑹國君謂天下同盟諸矦請命於天地知氣和則生物從謂郊祀天地神祗使之合德則四氣和可知故生物從之計緩急之事則危危而無難緩急之事皆已計定則二者之危無所難緩急之事皆有可危之理故曰危危眀於器械之利則涉難而不變察於先後之理則兵出而不困通於出入之度則深入而不危審於動靜之務則功得而無害著於取與之分則得地而不執謂不吝執慎於號令之官則舉事而有功此居於圖北方方外此北圗之副也幼官圖第九中方本圖東方副圖中方副圖南方本圖東方本圖南方副圖西方本圖北方本圖西方副圖北方副圖經言九若因處虛守靜人物則皇績按前作若因夜虛守靜人物人物則皇五和時節君服黃色味甘味聽宫聲治和氣用五數飲於黃后之井以倮獸之火㸑藏溫濡行驅養坦氣修通凡物開靜形生理常至命尊賢授德則帝身仁行義服忠用信則王審謀章禮選士利械則霸定生處死謹賢修伍則衆信賞審罰爵材祿䏻則強計凡付終務本飭末則富眀法審數立常備䏻則治同異分官則安通之以道畜之以惠親之以仁養之以義報之以德結之以信接之以禮和之以樂期之以事考之以言發之以力威之以誠一舉而上下得終再舉而民無不從三舉而地辟散成四舉而農佚粟十五舉而務輕金九六舉而潔知事變七舉而內外為用八舉而勝行威立九舉而帝事成形九本搏大人主之守也八分有職卿相之守也十官飾勝備威將軍之守也六紀審密賢人之守也五紀不解庶人之守也動而無不從靜而無不同績按此二句舊缺治亂之本三卑尊之交四富貧之終五盛衰之紀六安危之機七强弱之應八存亡之數九練之以散羣傰署凡數財署殺僇以聚財勸勉以選衆使二分具本發善必審於密執威必眀於中此居圖方中右中方本圖必得文威武官習勝之務時因勝之終無方勝之幾行義勝之理名實勝之急時分勝之事察伐勝之行備具勝之原無象勝之本定獨威勝定計財勝定聞知勝定選士勝定制祿勝定方用勝定綸理勝定死生勝定成敗勝定依竒勝定虛實勝定盛衰勝舉機誠要則敵不量用利至誠則敵不校眀名章實則士死節竒舉發不意則士歡用交物因方則械器備因䏻利備則求必得執務眀本則士不偷備具無常無方應也聽於鈔故䏻聞未極視於新故䏻見未形思於濬故䏻知未始發于驚故䏻至無量動於昌故䏻得其寶立於謀故䏻實不可故也器成教守則不逺道里號審教施則不險山河博一純固則獨行而無敵慎號審章則其攻不待權與眀必勝則慈者勇器無方則愚者智攻不守則拙者巧數也動慎十號眀審九章飾習十器善習五官謹修三官必設常主計必先定求天下之精材論百工之鋭器器成角試否臧收天下之豪傑有天下之稱材說行若風雨發如雷電此居於圖方中右中方副圖春行冬政肅行秋政雷行夏政則閹十二地氣發戒春事十二小邜出耕十二天氣下賜與十二義氣至修門閭十二清眀發禁十二始邜合男女十二中卯十二下卯三卯同事八舉時節君服青色味酸味聽角聲治燥氣用八數飲於青后之井以羽獸之火㸑藏不忍行驅養坦氣修通凡物開靜形生理合內空周外強國為圈弱國為屬動而無不從靜而無不同舉發以禮時禮必得和好不基貴賤無司事變日至此居於圖東方方外右東方本圖旗物尚青兵尚矛刑則交寒害釱器成不守經不知教習不著發不意經不知故莫之䏻圉發不意故莫之䏻應莫之䏻應故全勝而無害莫之䏻害故必勝而無敵四機不眀不過九日而遊兵驚軍障塞不審不過八日而外賊得間由守不慎不過七日而內有讒謀詭禁不修不過六日而竊盜者起死亡不食不過四日而軍財在敵此居於圖東方方外右東方副圖夏行春政風行冬政落重則雨雹行秋政水十二小郢至德十二絶氣下下爵賞十二中郢賜與十二中絶收聚十二大暑至盡善十二中暑十二小暑終三暑同事七舉時莭君服赤色味苦味聽羽聲治陽氣用七數飲於赤后之井以毛獸之火㸑藏薄純行篤厚坦氣修通凡物開靜形生理定府官眀名分而審責於羣臣有司則下不乘上賤不乘貴法立數得而無比周之民則上尊而下卑逺近不乖此居於圖南方方外右南方本圖旗物尚赤兵尚㦸刑則燒交疆郊必眀其一必眀其將必眀其正必眀其士四者備則以治擊亂以成擊敗數戰則士疲數勝則君驕驕君使疲民則國危至善不戰其次一之大勝者積衆勝而無非義者焉可以為大勝大勝無不勝也此居於圖南方方外右南方副圖秋行夏政葉行春政華行冬政耗十二期風至戒秋事十二小卯薄百爵十二白露下收聚十二復理賜豫十二始前節第賦事績按前作十二始莭賦事無前第二字十二始卯合男女十二中卯十二下卯三卯同事九和時節君服白色味辛味聽商聲治濕氣用九數飲於白后之井以介蟲之火爨藏恭敬行搏鋭坦氣修通凡物開靜形生理間男女之畜修鄉里之什伍量委積之多寡定府官之計數養老弱而勿通信利害而無私此居於圖西方方外右西方本圖旗物尚白兵尚劍刑則紹昧斷絶始乎無端卒乎無窮始乎無端道也卒乎無窮德也道不可量德不可數不可量則衆强不䏻圖不可數則為詐不敢鄉兩者備施動靜有功畜之以道養之以德畜之以道則民和養之以德則民合和合故䏻習習故䏻偕偕習以悉莫之䏻傷也此居於圖西方方外右西方副圖冬行秋政霧行夏政雷行春政蒸泄十二始寒盡刑十二小榆賜豫十二中寒收聚十二中榆大收十二寒至靜十二大寒之隂十二大寒終三寒同事六行時莭君服黑色味醎味聽徴聲治隂氣用六數飲於黑后之井以麟獸之火㸑藏慈厚行薄純坦氣修通凡物開靜形生理器成於戮教行於鈔動靜不記行止無量戒審四時以别息異出入以兩易眀養生以解固審取與以總之一㑹諸侯令曰非𤣥帝之命毋有一日之師役再㑹諸侯令曰養孤老食常疾收孤寡三㑹諸侯令曰田租百取五市賦百取二關賦百取一毋乏耕織之器四㑹諸侯令曰修道路偕度量一稱數藪澤以時禁發之五㑹諸侯令曰修春秋冬夏之常祭食天壤山川之故祀必以時六㑹諸侯令曰以爾壤生物共𤣥官請四輔將以禮上帝七㑹諸侯令曰官處四體而無禮者流之焉莠命八㑹諸侯令曰立四義而無議者尚之於𤣥官聽於三公九㑹諸侯令曰以爾封內之財物國之所有為幣九㑹大命焉出常至千里之外二千里之內諸侯三年而朝習命二年三卿使四輔一年正月朔日令大夫來修受命三公二千里之外三千里之內諸侯五年而㑹至習命三年名卿請事二年大夫通吉凶七年重適入正禮義五年大夫請受變三千里之外諸侯世一至置大夫以為廷安入共受命焉此居於圖北方方外右北方本圖旗物尚黑兵尚脅盾刑則遊仰灌流察數而知治審器而識勝眀謀而適勝通德而天下定定宗廟育男女官四分則可以立威行德制法儀出號令至善之為兵也非地是求也罰人是君也立義而加之以勝至威而實之以德守之而後修勝心焚海內民之所利立之所害除之則民人從立為六千里之侯則大人從使國君得其治則人君從㑹請命於天地知氣和則生物從計緩急之事則危危而無難眀於器械之利則涉難而不變察於先後之理則兵出而不困通於出入之度則深入而不危審於動靜之務則功得而無害著於取與之分則得地而不執慎於號令之官則舉事而有功此居於圖北方方外右北方副圖五輔第十謂六興七體八經五務三度此五者可以輔弼國政也外言一古之聖王所以取眀名廣譽厚功大業顯於天下不忘於後世非得人者未之嘗聞不得於人而䏻使名譽顯當時功業流後世者則未嘗聞暴王之所以失國家危社稷覆宗廟滅於天下非失人者未之嘗聞不失於人而䏻使失國覆宗者亦未嘗聞今有土之君皆處欲安動欲威戰欲勝守欲固大者欲王天下小者欲霸諸侯言諸侯欲大利則王天下欲小利則霸諸侯也而不務得人是以小者兵挫而地削大者身死而國亡既不務得人故必致禍小則地削大則國亡故曰人不可不務也當務得之於人此天下之極也曰然則得人之道莫如利之利之之道莫如教之以政故善為政者田疇墾而國邑實朝廷閒而官府治公法行而私曲止倉廩實而囹圄空賢人進而姦民退其君子上中正而下諂諛其士民貴武勇而賤得利賤茍得之利也其庶人好耕農而惡飲食惡費用之飲食於是財用足好耕農故財用足而飲食薪菜饒省費用則薪菜饒績按惡飲食故飲食薪菜饒是故上必寬裕而有解舍解放也舍免也績按舍同釋下必聽從而不疾怨上下和同而有禮義故處安而動威戰勝而守固是以一戰而正諸侯不䏻為政者田疇荒而國邑虛朝廷凶小人競進故凶而官府亂小人用法故亂公法廢而私曲行倉廩虛而囹圄實賢人退而姦民進其君子上諂諛而下中正其士民貴得利而賤武勇其庶人好飲食而惡耕農於是財用匱而飲食菜薪乏上彌殘茍居上位者小人故殘賊茍且也績按當作殘苛乃字之誤也而無解舍下愈覆鷙而不聽從覆察也鷙疑也上既殘茍而不舍故下伺察而懷疑上下交引而不和同上引下以供御下引上以恩覆二俱不得故不和同也故處不安而動不威戰不勝而守不固是以小者兵挫而地削大者身死而國亡故以此觀之則政不可不慎也德有六興義有七體禮有八經法有五務權有三度所謂六興者何曰辟田疇利壇宅壇堂基修樹藝勸士民勉稼穡修牆屋此謂厚其生上六者可以養厚其生也發伏利利人之事積久隱伏者發而用之輸墆積墆貯積也修道途便關市謂所置關市皆令要便也慎將宿將送貨財必慎止宿此謂輸之以財上五者皆生財之術故曰輸財所以納財於民道水潦利陂溝決潘渚潘溢也渚潘溢者疏決之令通潘音翻潰泥滯泥塗為滯者亦潰決之令通也通鬱閉鬱閉亦謂川潰有遏塞者慎津梁此謂遺之以利上之六者所謂遺利於民薄徴斂輕征賦㢮刑罰赦罪戾宥小過此謂寬其政上之五者所以寬裕其政養長老慈幼孤恤鰥寡問疾病弔禍喪此謂匡其急上之五者所以救民之急衣凍寒食饑渴匡貧窶賑罷露疾憊裸露者有以賑救之資乏絶此謂賑其窮上之五者所以賑民之窮乏凡此六者德之興也六者既布則民之所欲無不得矣夫民必得其欲然後聽上聽上然後政可善為也故曰德不可不興也曰民知德矣而未知義然後眀行以導之義行即七義義有七體七體者何曰孝悌慈惠以養親戚恭敬忠信以事君上中正比宜以行禮節比合也行既中正而又合宜也齊整撙詘以辟刑僇撙節也言自節而卑屈也纎嗇省用以備饑饉纎細也嗇吝也既細又吝故財用省也敦懞純固以備禍亂懞厚也和協輯睦以備冦戎凡此七者義之體也夫民必知義然後中正中正然後和調和調乃䏻處安處安然後動威動威乃可以戰勝而守固故曰義不可不行也曰民知義矣而未知禮然後飾八經以導之禮所謂八經者何曰上下有義貴賤有分長幼有等貧富有度凡此八者禮之經也故上下無義則亂貴賤無分則爭長幼無等則倍倍乖戾也貧富無度則失失其節制上下亂貴賤爭長幼倍貧富失而國不亂者未之嘗聞也是故聖王飾此八禮以導其民八者各得其義則為人君者中正而無私為人臣者忠信而不黨為人父者慈惠以教為人子者孝悌以肅為人兄者寬裕以誨為人弟者比順以敬比和也為人夫者敦懞以固為人妻者勸勉以貞夫然則下不倍上臣不弒君賤不踰貴少不陵長逺不間親新不間舊小不加大淫不破義凡此八者禮之經也夫人必知禮然後恭敬恭敬然後尊讓尊讓然後少長貴賤不相踰越少長貴賤不相踰越故亂不生而患不作故曰禮不可不謹也曰民知禮矣而未知務然後布法以任力任力有五務五務者何曰君擇臣而任官大夫任官辨事辨眀也䏻眀所任之事也官長任事守職士修身功材材謂藝䏻士既修身必以藝䏻有功也庶人耕農樹藝君擇臣而任官則事不煩亂大夫任官辨事則舉措時官長任事守職則動作和士修身功材則賢良發庶人耕農樹藝則財用足故曰凡此五者力之務也夫民必知務然後心一心一然後意専心一而意専然後功足觀也故曰力不可不務也曰民知務矣而未知權然後考三度以動之所謂三度者何曰上度之天祥下度之地宜中度之人順此所謂三度故曰天時不祥則有水旱地道不宜則有饑饉人道不順則有禍亂此三者之來也政召之曰審時以舉事時則天祥地宜人順之時也得其時則事可成以事動民事成則民可動以民動國民昌則國可動以國動天下國強則天下可動也天下動然後功名可成也故民必知權然後舉錯得權謂䏻知三度舉錯得則民和輯民和輯則功名立矣故曰權不可不度也故曰五經既布然後逐姦民詰詐僞屏讒慝而毋聽淫辭毋作淫巧若民有淫行邪性樹為淫辭作為淫巧以上諂君上而下惑百姓移國動衆以害民務者其刑死流大罪死小罪流故曰凡人君之所以內失百姓外失諸侯兵挫而地削名卑而國虧社稷滅覆身體危殆非生於淫諂者未之嘗聞也何以知其然也曰淫聲諂耳淫觀諂目耳目之所好諂心心之所好傷民民傷而身不危者未之嘗聞也曰實壙虛墾田疇修牆屋則國家冨節飲食撙衣服則財用足舉賢良務功勞布德惠則賢人進逐奸人詰詐僞去讒慝則奸人止修饑饉救災害賑罷露則國家定眀王之務在於强本事去無用然後民可使冨本事謂農工也無用謂末作也論賢人用有䏻而民可使治薄稅斂毋茍於民謂無茍取於民待以忠愛而民可使親三者霸王之事也事有本而仁義其要也今工以巧矣而民不足於備用者其恱在玩好君恱玩好則民務末作故備用不足農以勞矣而天下饑者其恱在珍怪方丈陳於前方丈陳前則役用廣故農勞而不免饑女以巧矣而天下寒者其恱在文繡君恱文繡則女工傷故天下寒是故博帶梨梨博帶以就狹也梨割也大袂列列大袂以從小文繡染染文繡為純色刻鏤削削刻鏤為純素雕琢采采雕琢為純漫關幾而不征幾察也但使察非常而不征賦也市鄽而不稅鄽市中置物處但藉知其數不稅斂古之良工不勞其知巧以為玩好是故無用之物守法者不失或為無用物守法者必得而誅之不使漏失也管子補注卷三
