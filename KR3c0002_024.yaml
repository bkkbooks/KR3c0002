body:
  text: 管子補注卷二十四明劉績撰輕重乙第八十一管子輕重十四桓公曰天下之朝夕可定乎管子對曰終身不定桓公曰其不定之説可得聞乎管子對曰地之東西二萬八千里南北二萬六千里天子中而立國之四面面萬有餘里民之入正籍者亦萬有餘里故有百倍之力而不至者有十倍之力而不至者有倪而是者則逺者疏疾怨上邊竟諸侯受君之怨民與之為善缺然不朝是天子塞其塗熟榖者去天下之可得而霸桓公曰行事奈何管子對曰請與之立壤列天下之旁天子中立地方千里兼霸之壤三百有餘里佌諸侯度百里負海子男者度七十里若此則如胸之使臂臂之使指也然則小不能分於民推徐疾羡不足雖在下不為君憂夫海出泲無止山生金木無息草木以時生器以時靡幣泲水之鹽以日消終則有始與天壤爭是謂立壤列也武王問於癸度曰賀獻不重身不親於君左右不足友不善於羣臣故不欲收穡户籍而給左右之用為之有道乎癸度對曰吾國者衢處之國也逺秸之所通遊客蓄商之所道財物之所遵故茍入吾國之粟因吾國之幣然後載黃金而出故君請重重而衡輕輕運物而相因則國策可成故謹毋失其度未與民可治武王曰行事奈何癸度曰金出於汝漢之右衢珠出於赤野之末光玉出於禺氏之旁山此皆距周七千八百餘里其塗逺其至厄故先王度用於其重因以珠玉為上幣黃金為中幣刀布為下幣故先王善髙下中幣制下上之用而天下足矣桓公曰衡謂寡人曰一農之事必有一耜一銚一鎌一耨一椎一銍然後成為農一車必有一斤一鋸一釭一鑽一鑿一銶竒休反鑿也一軻然後成為車一女必有一刀一錐一針一鉥時橘反長針也然後成為女請以令斷山木鼓山鐵是可以毋籍而用足管子對曰不可今發徒𨽻而作之則逃亡而不守發民則下疾怨上邊竟有兵則懷宿怨而不戰未見山鐵之利而內敗矣故善者不如與民量其重計其贏民得其十君得其三有雜之以輕重守之以髙下若此則民疾作而為上虜矣桓公曰請問壤數管子對曰河􅙹諸侯畝鍾之國也皟側革反山諸侯之國也河􅙹諸侯常不勝山諸侯之國者豫戒者也桓公曰此若言何謂也管子對曰夫河􅙹諸侯畝鍾之國也故榖衆多而不理固不得有至於山諸侯之國則斂蔬藏菜此之謂豫戒桓公曰壤數盡於此乎管子對曰未也昔狄諸侯畝鍾之國也故粟十鍾而錙金程諸侯山諸侯之國也故粟五釡而錙金故狄諸侯十鍾而不得倳戟程諸侯五釜而得倳戟十倍而不足或五分而有餘者通於輕重高下之數國有十歲之蓄而民食不足者皆以其事業望君之祿也君有山海之財而民用不足者皆以其事業交接於上者也故租籍君之所宜得也正籍者君之所強求也亡君廢其所宜得而斂其所強求故下怨上而令不行民奪之則怒豫之則喜民情固然先王知其然故見豫之所不見奪之理故五穀粟米者民之司命也黃金刀布者民之通貨也先王善制其通貨以御其司命故民力可盡也管子曰泉雨五尺其君必辱食稱之國必亡待五榖者衆也故樹木之勝霜露者不受令於天家足其所者不從聖人故奪然後豫髙然後下喜然後怒天下可舉桓公曰強本節用可以為存乎管子對曰可以為益愈而未足以為存也昔者紀氏之國強本節用者其五榖豐滿而不能理也四流而歸於天下若是則紀氏其強本節用適足以使其民榖盡而不能理為天下虜是以其國亡而身無所處故可以益愈而不足以為存故善為國者天下下我髙天下輕我重天下多我寡然後可以朝天下桓公曰寡人欲毋殺一士毋頓一戟而辟方都二為之有道乎管子對曰涇水十二空汶淵洙浩滿三之於乃請以令使九月種麥日至而穫則時雨未下而利農事矣桓公曰諾令以九月種麥日至而穫量其艾一收之積中方都二故此所謂善因天時辨於地利而辟方都之道也管子入復桓公曰終歲之租金四萬二千金請以一朝素賞軍士桓公曰諾以令至鼓期於泰舟之野期軍士桓公乃即壇而立寧戚鮑叔隰朋易牙賔胥無皆差肩而立管子執枹而揖軍士曰誰能陷陳破衆者賜之百金三問不對有一人秉劒而前問曰幾何人之衆也管子曰千人之衆千人之衆臣能陷之賜之百金管子又曰兵接弩張誰能得卒長者賜之百金問曰幾何人卒之長也管子曰千人之長千人之長臣能得之賜之百金管子又曰誰能聽旌旗之所指而得執將首者賜之千金言能得者壘千人賜之人千金其餘言能外斬首者賜之人十金一朝素賞四萬二千金廓然虛桓公惕然太息曰吾何以識此管子對曰君勿患且使外為名於其內鄉為功於其親家為德於其妻子若此則士必爭名報德無北之意矣吾舉兵而攻破其軍并其地則非特四萬二千金之利也五子曰善桓公曰諾乃誡大將曰百人之長必為之朝禮千人之長必拜而送之降兩級其有親戚者必遺之酒四石肉四鼎其無親戚者必遺其妻子酒三石肉三鼎行教半歲父教其子兄教其弟妻諫其夫曰見其若此其厚而不死列陳可以反於鄉乎桓公終舉兵攻萊戰於莒必市里鼓旗未相望衆少未相知而萊人大遁故遂破其軍兼其地而虜其將故未列地而封未出金而賞破萊軍并其地禽其君此素賞之計也桓公曰曲防之戰民多假貸而給上事者寡人欲為之出賂為之奈何管子對曰請以令令富商蓄賈百符而一馬無有者取於公家若此則馬必坐長而百倍其本矣是公家之馬不離其牧皂而曲防之戰賂足矣桓公問於管子曰崇弟蔣弟丁惠之功世吾歲罔寡人不得籍斗升焉去菹菜鹹鹵斥澤山間㙗􅱖不為用之壤寡人不得籍斗升焉去一列稼緣封十五里之原強耕而自以為落其民寡人不得籍斗升焉則是寡人之國五分而不能操其二是有萬乘之號而無千乘之用也以是與天子提衡爭秩於諸侯提持也合衆弱以事一強者謂之衡秩次也為之有道乎管子對曰唯籍於號令為可耳桓公曰行事奈何管子對曰請以令發師置屯籍農屯戍也發師置戍人有粟者則不行十鍾之家不行六斛四斗為鍾百鍾之家不行千鍾之家不行行者不能百之一千之十而囷窖之數囷丘倫反窖力救反皆見於上矣君案囷窖之數令之曰國貧而用不足請以平價取之子皆案囷窖而不能挹損焉挹損謂減其數君直幣之輕重以決其數直猶當也謂決其積粟之數使無劵契之責分之曰券合之曰契使百姓皆稱貸於君則無契券之債則積藏囷窖之粟皆歸於君矣故九州無敵竟上無患令曰罷師歸農無所用之管子曰天下有兵則積藏之粟足以備其糧天下無兵則以賜貧氓若此則菹菜鹹鹵斥澤山間㙗􅱖之壤無不發草此之謂籍於號令管子曰滕魯之粟釜百則使吾國之粟釜千滕魯之粟四流而歸我若下深谷者非歲凶而民飢也辟之以號令引之以徐疾施平其歸我若流水桓公曰吾欲殺正商賈之利而益農夫之事為此有道乎管子對曰粟重而萬物輕粟輕而萬物重兩者不衡立故殺正商賈之利而益農夫之事則請重粟之價金三百若是則田野大辟而農夫勸其事矣桓公曰重之有道乎管子對曰請以令與大夫城藏使卿諸侯藏千鍾令大夫藏五百鍾列大夫列大夫中大夫藏百鍾富商蓄賈藏五十鍾內可以為國委外可以益農夫之事桓公曰善下令卿諸侯令大夫城藏農夫辟其五榖三倍其賈則正商失其事而農夫有百倍之利矣桓公問於管子曰衡有數乎管子對曰衡無數也衡者使物一髙一下不得常固桓公曰然則衡數不可調耶管子對曰不可調調則澄澄則常常則髙下不二髙下不二則萬物不可得而使固桓公曰然則何以守時管子對曰夫歲有四秋而分有四時故曰農事且作請以什伍農夫賦耜鐵此之謂春之秋大夏且至絲纊之所作此之謂夏之秋而大秋成五榖之所會此之謂秋之秋大冬營室中女事紡績緝縷之所作也此之謂冬之秋故歲有四秋而分有四時已有四者之序發號出令物之輕重相什而相百故物不得有常固故曰衡無數桓公曰皮幹筋角竹箭羽毛齒革不足為此有道乎管子曰惟曲衡之數為可耳桓公曰行事奈何管子對曰請以令為諸侯之商賈立客舍一乘者有食三乘者有芻菽五乘者有伍飬天下之商賈歸齊若流水輕重丙第八十二亡管子輕重十五輕重丁第八十三管子輕重十六桓公曰寡人欲西朝天子而賀獻不足為此有數乎管子對曰請以令城隂里城者築城也隂里齊地也使其牆三重而門九襲襲亦重也欲其事密而人不知又先託築城因使玉人刻石而為璧刻石刻其蒥石尺者萬泉八寸者八千七寸者七千圭中四千瑗中五百好倍肉曰瑗璧之數已具管子西見天子曰弊邑之君欲率諸侯而朝先王之廟觀於周室請以令使天下諸侯朝先王之廟觀於周室者不得不以彤弓石璧不以彤弓石璧者彤弓朱弓也非齊之所出蓋不可獨言石璧兼以彤弓者猶藏其機不得入朝天子許之曰諾號令於天下天下諸侯載黃金珠玉五穀文采布泉輸齊以收石璧石璧流而之天下天下財物流而之齊故國八歲而無籍隂里之謀也右石璧謀桓公曰天子之養不足號令賦於天下則不信諸侯為此有道乎管子對曰江淮之間有一茅而三脊每至其本名之曰菁茅請使天子之吏環封而守之夫天子則封於太山禪於梁父號令天下諸侯曰諸從天子封於太山禪於梁父者必抱菁茅一束以為禪籍不如令者不得從天子下諸侯載其黃金爭秩而走江淮之菁茅坐長而十倍其賈一束而百金故天子三日即位天下之金四流而歸周若流水故周天子七年不求賀獻者菁茅之謀也右菁茅謀桓公曰寡人多務令衡籍吾國之富商蓄賈稱貸家以利吾貧萌農夫不失其本事反此有道乎管子對曰惟反之以號令為可耳桓公曰行事奈何管子對曰請使賔胥無馳而南隰朋馳而北寧戚馳而東鮑叔馳而西四子之行定夷吾請號令謂四子曰子皆為我君視四方稱貸之間其受息之氓幾何千家以報吾鮑叔馳而西反報曰西方之氓者帶濟負河菹澤之萌也漁獵取薪蒸而為食其稱貸之家多者千鍾少者六七百鍾其出之鍾也一鍾其受息之萌九百餘家賔胥無馳而南反報曰南方之萌者山居谷處登降之萌也上斫輪軸下采杼栗田獵而為食其稱貸之家多者千萬少者六七百萬其出之中伯伍也其受息之萌八百餘家寧戚馳而東反報曰東方之萌帶山負海若處上斷福漁獵之萌也治葛縷而為食其稱貸之家丁惠髙國多者五千鍾少者三千鍾其出之中鍾五釡也其受息之萌八九百家隰朋馳而北反報曰北方之萌者衍處負海煮泲為鹽梁濟取漁之萌也薪食其稱貸之家多者千萬少者六七百萬其出之中百二十也受息之萌九百餘家凡稱貸之家出泉參千萬出粟參數千萬鍾受子息民參萬家四子已報管子曰不棄我君之有萌中一國而五君之正也然欲國之無貧兵之無弱安可得哉桓公曰為此有道乎管子曰惟反之以號令為可請以令賀獻者皆以鐻枝蘭鼓則必坐長什倍其本矣君之棧臺之職亦坐長什倍請以令召稱貸之家君因酌之酒太宰行觴桓公舉衣而問曰寡人多務令衡籍吾國聞子之假貸吾貧萌使有以終其上令寡人有鐻枝蘭鼓其賈中純萬泉也願以為吾貧萌決其子息之數使無劵契之責稱貸之家皆齊首而稽顙曰君之憂萌至於此請再拜以獻堂下桓公曰不可子使吾萌春有以倳耜夏有以決藝寡人之德子無所寵若此而不受寡人不得於心故稱貸之家曰皆再拜受所出棧臺之職未能參千純也而決四方子息之數使無劵契之責四方之萌聞之父教其子兄教其弟曰夫墾田發務上之所急可以無庶乎君之憂我至於此此之謂反凖管子曰昔者癸度居人之國必四面望於天下天下髙亦髙天下髙我獨下必失其國於天下桓公曰此若言曷謂也管子對曰昔萊人善染練茈之於萊純錙緺綬之於萊亦純錙也其周中十金萊人知之聞纂茈空周且斂馬作見於萊人操之萊有推馬是自萊失綦茈而反凖於馬也故可因者因之乘者乘之此因天下以制天下此之謂國凖桓公曰齊西水潦而民飢齊東豐庸而糶賤庸用也謂豐稔而足用欲以東之賤欲西之貴為之有道乎管子對曰今齊西之粟釡五鍾為釜百泉則鏂二十也斗二升八合曰鏂烏區反泉錢也齊東之粟釜十泉則鏂二錢也請以令籍人三十泉得以五榖菽粟決其籍若此則齊西出三斗而決其籍齊東出三釡而決其籍然則釜十之粟皆實於倉廩西之民飢者得食寒者得衣無本者豫之陳無種者豫之新若此則東西之相被逺近之凖平矣君下令稅人三十錢凖以五穀令齊西之人納三斗東之人納三釡以賑西之人則東西俱平矣管子曰智用無窮以區區之齊一匡天下本仁祖義成其霸業所行權術因機而發非為常道故别篇云遍行而不盡也桓公曰衡數吾已得聞之矣請問國凖管子對曰孟春且至溝瀆阮而不遂溪谷報上之水不安於藏內毁室屋壞牆垣外傷田野殘禾稼故君謹守泉金之謝物且為之舉大夏帷蓋衣幕之奉不給謹守泉布之謝物且為之舉大秋甲兵求繕弓弩求弦謹絲麻之謝物且為之舉大冬任甲兵糧食不給黃金之賞不足謹守五穀黃金之謝物且為之舉已守其謝富商蓄賈不得如故此之謂國凖龍鬬於馬謂之陽牛山之隂管子入復於桓公曰天使使者臨君之郊請使大夫初飭左右玄服天之使者乎天下聞之曰神哉齊桓公天使使者臨其郊不待舉兵而朝者八諸侯此乘天威而動天下之道也故智者役使鬼神而愚者信之桓公終神管子入復桓公曰地重投之哉兆國有慟風重投之哉兆國有槍星其君必辱國有彗星必有流血浮丘之戰彗之所出必服天下之仇今彗星見於齊之分請以令朝功臣世家號令於國中曰彗星出寡人恐服天下之仇請有五榖收粟布帛文采者皆勿敢左右國且有大事請以平賈取之功臣之家人民百姓皆獻其榖菽粟泉金歸其財物以佐君之大事此謂乘天嗇而求民鄰財之道也桓公曰大夫多并其財而不出腐朽五榖而不散管子對曰請以令召城陽大夫而請之桓公曰何哉管子對曰城陽大夫嬖寵被絺絺巾鵝鶩含餘粖齊鍾鼓之聲吹笙箎同姓不入伯叔父母逺近兄弟皆寒而不得衣飢而不得食子欲盡忠於寡人能乎故子母復見寡人滅其位杜其門而不出功臣之家皆爭發其積藏出其資財以豫其逺近兄弟以為未足又收國中之貧病孤獨老不能自食之萌皆與得焉故桓公推仁立義功臣之家兄弟相戚骨肉相親國無飢民此之謂繆數桓公曰崢丘之戰崢丘地名未聞説即葵丘民多稱貸負子息以給上之急度上之求寡人欲復業産業産者本業也此何以洽洽通也言百姓為戎事失其本業今欲取之何以通於此也管子對曰惟繆數為可耳繆讀曰謬假此術以陳其事也桓公曰諾令左右州曰表稱貸之家旌表也皆堊白其門而髙其閭亦所以貴重之州通之師執折籙曰君且使使者桓公使八使者式璧而聘之以給鹽菜之用令使者賫石璧而與仍存問之謙言鹽菜之用稱貸之家皆齊首稽顙而問曰何以得此也使者曰君令曰寡人聞之詩曰愷悌君子民之父母也寡人有崢丘之戰吾聞子假貸吾貧萌使有以給寡人之急度寡人之求使吾萌春有以倳耜夏有以決藝而給上事子之力也是以式璧而聘子以給鹽菜之用故子中民之父母也稱貸之家皆折其劵而削其書舊執之劵皆折毁之所書之債皆削除之不用發其積藏出其財物以賑貧病分其故資故國中大給崢丘之謀也此之謂繆數桓公曰四郊之民貧商賈之民富寡人欲殺商賈之民以益四郊之民為之奈何管子對曰請以令決瓁洛之水通之杭莊之間桓公曰諾行令未能一歲而郊之民殷然益富商賈之民廓然益貧桓公召管子而問曰此其故何也管子對曰決瓁洛之水通之杭莊之間則屠酤之汁肥流水則蚊氓巨雄翡燕小鳥皆歸之宜昏飲此水上之樂也賈人蓄物而賣為讎買為取市未央畢而委舍其守列投蚊蛇巨雄新冠五尺請挾彈懷丸遊水上彈翡燕小鳥被於暮故賤賣而貴買四郊之民賣賤何為不富哉商賈之人何為不貧乎桓公曰善桓公曰五衢之民衰然多衣弊而屨穿寡人欲使帛布絲纊之賈賤為之有道乎管子曰請以令沐途旁之樹枝使無尺寸之隂桓公曰諾行令未能一歲五衢之民皆多衣帛完屨桓公召管子而問曰此其何故也管子對曰途旁之樹未沐之時五衢之民男女相好往來之市者罷市相睹樹下談語終日不歸男女當壯扶輦推輿相睹樹下戲笑超距終日不歸父兄相睹樹下論議玄語終日不歸是以田不發五榖不播麻桑不種繭縷不治內嚴一家而三不歸則帛布絲纊之賈安得不貴桓公曰善桓公曰糶賤寡人恐五榖之歸於諸侯寡人欲為百姓萬民藏之為此有道乎管子曰今者夷吾過市有新成囷京者二家大囷曰京君請式璧而聘之式用也璧石璧也聘問也賜之以璧仍存問之桓公曰諾行令半歲萬民聞之舍其作業而為囷京以藏菽粟五榖者過半桓公問管子曰此其何故也管子曰成囷京者二家君式璧而聘之名顯於國中國中莫不聞是民上則無功顯名於百姓也功立而名成下則實其囷京上以給上為君一舉而名實俱在也民何為也桓公問於管子曰請問王數之守終始可得聞乎管子曰正月之朝穀始也日至百日黍秫之始也九月斂實平麥之始也管子問於桓公敢問齊方于幾何里桓公曰方五百里管子曰隂雍長城之地其於齊國三分之一非穀之所生也池龍夏其於齊國四分之一也朝夕外之所墆齊地者五分之一非榖之所生也然則吾非託食之主也桓公遽然起曰然則為之奈何管子對曰動之以言潰之以辭可以為國基且君幣籍而務則賈人獨操國趣君榖籍而務則農人獨操國固君動言操辭左右之流君獨因之物之始吾已見之矣物之終吾已見之矣物之賈吾已見之矣管子曰長城之陽魯也長城之隂齊也三敗殺君二重臣定社稷者吾此皆以孤突之地封者也故山地者山也水地者澤也薪芻之所生者斥也公曰託食之主及吾地亦有道乎管子對曰守其三原公曰何謂三原管子對曰君守布則籍於麻十倍其賈布五十倍其賈此數也君以織籍籍於系未為系籍系撫織再十倍其賈如此則云五穀之籍是故籍於布則撫之系籍於榖則撫之山籍於六畜則撫之術籍於物之終始而善御以言公曰善管子曰以國一籍臣右守布萬兩而右麻籍四十倍其賈術布五十倍其賈公以重布決諸侯賈如此而有世齊之故是故輕軼於賈榖制畜者則物軼於四時之輔善為國者守其國之財湯之以髙下注之以徐疾一可以為百未嘗籍求於民而使用若河海終則有始此謂守物而御天下也公曰然則無可以為有乎貧可以為富乎管子對曰物之生未有形而王霸立其功焉是故以人求人則人重矣以數求物則物重矣公曰此若言何謂也管子對曰舉國而一則無資舉國而十則有百然則吾將以徐疾御之若左之授右若右之授左是以外內不踡終身無咎王霸之不求於人而求之終始四時之髙下令之徐疾而已矣源泉有竭鬼神有歇守物之終始身不竭此謂源究輕重戊第八十四管子輕重十七桓公問於管子曰輕重安施管子對曰自理國虙戲以來未有不以輕重而能成其王者也公曰何謂管子對曰虙戲作造六峜以迎隂陽作九九之數以合天道而天下化之神農作樹五榖淇山之陽九州之民乃知榖食而天下化之黃帝作鑽鐩生火以熟葷臊民食之無兹􅠛之病而天下化之黃帝之王童山竭澤有虞之王燒增藪斬羣害以為民利封土為社置木為閭始民知禮也當是其時民無愠惡不服而天下化之夏人之王外鑿二十虻韘十七湛疏三江鑿五湖道四涇之水以敵九州之髙以治九藪民乃知城郭門閭室屋之築而天下化之殷人之王立帛牢服牛馬以為民利而天下化之周人之王循六􅀢合隂陽而天下化之公曰然則當世之王者何行而可管子對曰并用而毋俱盡也公曰何謂管子對曰帝王之道備矣不可加也公其行義而已矣公曰其行義奈何管子對曰天子幼弱諸侯亢強聘享不上公其弱強繼絶率諸侯以起周室之祀公曰善桓公曰魯梁之於齊也千榖也蜂螫也齒之有脣也蜂古蜂字言魯梁二國常為齊患也今吾欲下魯梁何行而可管子對曰魯梁之民俗為綈徒奚反繒之厚者謂之綈也公服綈令左右服之民從而服之公因令齊勿敢為必仰於魯梁則是魯梁釋其農事而作綈矣桓公曰諾即為服於泰山之陽魯梁二國在泰山之南故為服於此近其境也欲魯梁人速知之十日而服之管子告魯梁之賈人曰子為我致綈千匹賜子金三百斤什至而金三千斤則是魯梁不賦於民財用足也魯梁之君聞之則教其民為綈十三月而管子令人之魯梁魯梁郭中之民道路揚塵十步不相見絏繑而踵相隨絏繑謂連續也絏息列反繑立喬反車轂􅀢騎連伍而行􅀢士角反齧也言其車轂往來相齧而騎東西連而行皆趨綈利耳管子曰魯梁可下矣公曰奈何管子對曰公宜服帛率民去綈閉關毋與魯梁通使公曰諾後十月管子令人之魯梁魯梁之民餓餒相及相及猶相繼也應聲之正無以給上應聲之正謂急速之賦正音征魯梁之君即令其民去綈修農穀不可以三月而得魯梁之人糴十百穀斗千錢齊糴十錢穀斗十錢二十四月魯梁之民歸齊者十分之六三年魯梁之君請服桓公問管子曰民飢而無食寒而無衣應聲之正無以給上室屋漏而不居牆垣壞而不築為之奈何管子對曰沐塗樹之枝也桓公曰諾令謂左右伯沐塗樹之枝左右伯受沐塗樹之枝濶其年民被白布清中而濁應聲之正有以給上室屋漏者得居牆垣壞者得築公召管子問曰此何故也管子對曰齊者夷萊之國也一樹而百乘息其下者以其不􅀈也衆鳥居其上丁壯者胡丸操彈居其下終日不歸父老柎枝而論終日不歸歸市亦惰倪終日不歸今吾沐塗樹之枝日中無尺寸之隂出入者長時行者疾走父老歸而治生丁壯者歸而薄業彼臣歸其三不歸此以鄉不資也桓公問於管子曰萊莒與柴田相并為之奈何管子對曰萊莒之山生柴君其率白徒之卒鑄莊山之金以為幣重萊之柴賈萊君聞之告左右曰金幣者人之所重也柴者吾國之竒出也以吾國之竒出盡齊之重寶則齊可并也萊即釋其耕農而治柴管子即令隰朋反農二年桓公止柴萊莒之糴三百七十齊糶十錢萊莒之民降齊者十分之七二十八月萊莒之君請服桓公問於管子曰楚者山東之強國也其人民習戰鬭之道舉兵伐之恐力不能過兵弊於楚功不成於周為之奈何管子對曰即以戰鬬之道與之矣公曰何謂也管子對曰公貴買其鹿桓公即為百里之城使人之楚買生鹿楚生鹿當一而八萬管子即令桓公與民通輕重藏穀什之六令左司馬伯公將白徒而鑄錢於莊山令巾大夫王邑載錢二千萬求生鹿於楚楚王聞之告其相曰彼金錢人之所重也國之所以存明主之所以賞有功禽獸者羣害也明主之所棄逐也今齊以其重寶貴買吾羣害則是楚之福也天且以齊私楚也子告吾民急求生鹿以盡齊之寶楚民即釋其耕農而田鹿管子告楚之賈人曰子為我致生鹿二十賜子金百斤什至而金千斤也則是楚不賦於民而財用足也楚之男子居外女子居塗隰朋教民藏粟五倍楚以生鹿藏錢五倍管子曰楚可下矣公曰奈何管子對曰楚錢五倍其君且自得而修穀錢五倍是楚強也桓公曰諾因令人閉關不與楚通使楚王果自得而修穀穀不可三月而得也楚糴四百齊因令人載粟處楚之南楚人降齊者十分之四三年而楚服桓公問於管子曰代國之出何有管子對曰代之出狐白之皮公其貴買之管子曰績按疑衍此三字狐白應隂陽之變六月而一見公貴買之代人忘其難得喜其貴買必相率而求之則是齊金錢不必出代民必去其本而居山林之中離枝聞之必侵其北離枝侵其北代必歸於齊公因令齊載金錢而往桓公曰諾即令中大夫王師北將人徒載金錢之代谷之上求狐白之皮代王聞之即告其相曰代之所以弱於離枝者以無金錢也今齊乃以金錢求狐白之皮是代之福也子急令民求狐白之皮以致齊之幣寡人將以來離枝之民代人果去其本處山林之中求狐白之皮二十四月而不得一離枝聞之則侵其北代王聞之大恐則將其士卒葆於代谷之上離枝遂侵其北王即將其士卒願以下齊齊未亡一錢幣修使三年而代服桓公問於管子曰吾欲制衡山之術為之奈何管子對曰公其令人貴買衡山之械器而賣之燕代必從公而買之秦趙聞之必與公爭之衡山之械器必倍其賈天下爭之衡山械器必什倍以上公曰諾因令人之衡山求買械器不敢辨其貴賈齊修械器於衡山十月燕代聞之果令人之衡山求買械器燕代修三月秦國聞之果令人之衡山求買械器衡山之君告其相曰天下爭吾械器令其賈再什以上衡山之民釋其本修械器之巧齊即令隰朋漕粟於趙趙糴十五隰朋取之石五十天下聞之載粟而之齊齊修械器十七月修糶五月即閉關不與衡山通使燕代秦趙即引其使而歸衡山械器盡魯削衡山之南齊削衡山之北內自量無械器以應二敵即奉國而歸齊矣輕重已第八十五管子輕重十八清神生心心生規規生矩矩生方方生正正生厯厯生四時四時生萬物聖人因而理之道遍矣以冬日至始數四十六日冬盡而春始天子東出其國四十六里而壇服青而絻青搢玉總帶玉監朝諸侯卿大夫列士循於百姓號曰祭日犧牲以魚發號出令曰生而勿殺賞而勿罰罪獄勿斷以待期年教民樵室鑽鐩墐竈泄井所以夀民也耟耒耨懷鉊鈶又㩖權渠繉緤所以御春夏之事也績按鉊之姚切鎌也鈶辭理切必具教民為酒食所以為孝敬也民生而無父母謂之孤子無妻無子謂之老鰥無夫無子謂之老寡此三人者皆就官而衆可事者不可事者食如言而勿遺多者為功寡者為罪是以路無行乞者也路有行乞者則相之罪也天子之春令也以冬日至始數九十二日謂之春至天子東出其國九十二里而壇朝諸侯卿大夫列士循於百姓號曰祭星十日之內室無處女路無行人茍不樹藝者謂之賊人下作之地上作之天謂之不服之民處里為下陳處師為下通謂之役夫三不樹而主使之天子之春令也以春日至始數四十六日春盡而夏始天子服黃而靜處朝諸侯卿大夫列士循於百姓發號出令曰毋聚大衆毋行大火毋斷大木誅大臣毋斬大山毋戮大衍滅三大而國有害也天子之夏禁也以春日至始數九十二日謂之夏至而麥熟天子祀於太宗其盛以麥麥者穀之始也宗者族之始也同族者人殊族者處皆齊大材出祭王母天子之所以主始而忌諱也以夏日至始數四十六日夏盡而秋始而黍熟天子祀於太祖其盛以黍黍者穀之美者也祖者國之重者也大功者太祖小功者小祖無功者無祖無功者皆稱其位而立沃有功者觀於外祖者所以功祭也非所以戚祭也天子之所以異貴賤而賞有功也以夏日至始數九十二日謂之秋至秋至而禾熟天子祀於太惢西出其國百三十八里而壇服白而絻白搢玉總帶錫監吹塤箎之風鑿動金石之音朝諸侯卿大夫列士循於百姓號曰祭月犧牲以彘發號出令罰而勿賞奪而勿豫罪獄誅而勿生終歲之罪毋有所赦作衍牛馬之實在野者王天子之秋計也以秋日至始數四十六日秋盡而冬始天子服黑絻黑而靜處朝諸侯卿大夫列士循於百姓發號出令曰毋行大火毋斬大山毋塞大水毋犯天之隆天子之冬禁也以秋日至始數九十二日天子北出九十二里而壇服黑而絻黑朝諸侯卿大夫列士號曰發繇趣山人斷伐具械器趣菹人薪雚葦足蓄積三月之後皆以其所有易其所無謂之大通三月之蓄凡在趣耕而不耕民以不令不耕之害也宜藝而不藝百草皆存民以僅存不藝之害也宜穫而不穫風雨將作五榖以削士民零落不穫之害也宜藏而不藏霧氣陽陽宜死者生宜蟄者鳴不藏之害也張耜當弩銚耨當劒戟穫渠當脅􅀈蓑笠當􅀈櫓故耕械具則戰械備矣輕重庚第八十六亡管子補注卷二十四
