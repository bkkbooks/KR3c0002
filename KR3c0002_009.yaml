body:
  text: 管子補注卷九明劉績撰霸形第二十二陳霸言之形容內言五桓公在位管仲隰朋見立有間有二鴻飛而過之桓公嘆曰仲父今彼鴻鵠有時而南有時而北有時而往有時而來四方無遠所欲至而至焉非唯有羽翼之故是以能通其意於天下乎管仲隰朋不對桓公曰二子何故不對管子對曰君有霸王之心而夷吾非霸王之臣也是以不敢對桓公曰仲父胡為然盍不當言寡人其有鄉乎何不陳當言令寡人有所歸鄉寡人之有仲父也猶飛鴻之有羽翼也若濟大水有舟楫也仲父不一言教寡人寡人之有耳將安聞道而得度哉言何以自度得至於霸王哉管子對曰君若將欲霸王舉大事乎則必從其本事矣桓公變躬遷席拱手而問曰敢問何謂其本管子對曰齊國百姓公之本也人甚憂饑而稅斂重人甚懼死而刑政險人甚傷勞而上舉事不時公輕其稅斂則人不憂饑緩其刑政則人不懼死舉事以時則人不傷勞桓公曰寡人聞仲父之言此三者聞命矣不敢擅也將薦之先君不敢專擅自發此命將進之宗廟告先君而後行所謂以神道設教者也於是令百官有司削方墨筆方謂版牘也凡此欲書其所定令也明日皆朝於太廟之門朝定令於百吏因朝廟而定百吏之令也使稅者百一鍾下令百石而取一鍾孤幼不刑澤梁時縱放人入不設禁關譏而不征市書而不賦書謂録其名籍績按書乃㕓字誤近者示之以忠信遠者示之以禮義行此數年而民歸之如流水此其後宋伐杞狄伐邢衛桓公不救裸體紉胸稱疾紉猶摩也自摩其胸若有所痛患也召管仲曰寡人有千嵗之食而無百嵗之夀今有疾病姑樂乎管子諾於是令之縣鐘磬之榬榬所以嚴飾之陳歌舞竽瑟之樂日殺數十牛者數旬羣臣進諫曰宋伐杞狄伐邢衛君不可不救桓公曰寡人有千嵗之食而無百嵗之夀今又疾病姑樂乎且彼非伐寡人之國也伐鄰國也子無事焉宋已取杞狄已拔邢衛矣桓公起行筍簴之間管子從至大鐘之西桓公南面而立管仲北鄉對之大鐘鳴桓公視管子曰樂夫仲父管子對曰此臣之所謂哀非樂也臣聞之古者之言樂於鐘磬之間者不如此言脫於口而令行乎天下脫出也遊鐘磬之間而無四面兵革之憂今君之事言出於口令不得行於天下在鐘磬之間而有四面兵革之憂此臣之所謂哀非樂也桓公曰善於是伐鐘磬之縣伐謂斫斷也併歌舞之樂併除也宫中虛無人不令人掌守之桓公曰寡人已伐鐘磬之縣併歌舞之樂矣請問所始於國將為何行管子對曰宋伐杞狄伐邢衛而君之不救也臣請以慶以不救為是故慶之臣聞之諸侯爭於彊者勿與分於彊若救三國是分於彊今君何不定三君之處哉三君既失國當定其居處也於是桓公曰諾因命以車百乘卒千人以緣陵封杞車百乘卒千人以夷儀封邢車五百乘卒五千人以楚丘封衛桓公曰寡人已定三君之居處矣今又將何行管子對曰臣聞諸侯貪於利勿與分於利君何不發虎豹之皮文錦以使諸侯令諸侯以縵帛鹿皮報桓公曰諾於是以虎豹皮文錦使諸侯諸侯以縵帛鹿皮報則令固始行於天下矣此其後楚人攻宋鄭燒焫熯焚鄭地使城壞者不得復築也屋之燒者不得復葺也令其人有喪雌雄失男女之偶居室如鳥鼠處穴要宋田夾塞兩川使水不得東流楚人又遮取宋田夾兩川築堤而壅塞之故水不得東流兩川蓋睢汴也東山之西水深滅垝垝敗牆也四百里而後可田也楚欲吞宋鄭而畏齊曰思人衆兵彊能害己者必齊也於是乎楚王號令於國中曰寡人之所明於人君者莫如桓公所賢於人臣者莫如管仲明其君而賢其臣寡人願事之既以其君臣為明賢故願事之誰能為我交齊者寡人不愛封侯之君焉於是楚國之賢士皆抱其重寶幣帛以事齊桓公之左右無不受重寶幣帛者於是桓公召管仲曰寡人聞之善人者人亦善之今楚王之善寡人一甚矣寡人不善將拂於道拂違也若不報善之是違於道也仲父何不遂交楚哉管子對曰不可楚人攻宋鄭燒焫熯焚鄭地使城壞者不得復築也屋之燒者不得復葺也令人有喪雌雄居室如鳥鼠處穴要宋田夾塞兩川使水不得東流東山之西水深滅垝四百里而後可田也楚欲吞宋鄭思人衆兵彊而能害己者必齊也是欲以文克齊以寶幣賂齊而齊自服故曰以文克齊而以武取宋鄭也楚取宋鄭而不知禁是失宋鄭也禁之則是又不信於楚也知失於內兵困於外非善舉也桓公曰善然則若何管子對曰請興兵而南存宋鄭而令曰無攻楚言與楚王遇冬㑹曰遇至於遇上而以鄭城與宋水為請楚若許則是我以文令也楚若不許則遂以武令焉桓公曰善於是遂興兵而南存宋鄭與楚王遇於召陵之上而令於遇上曰毋貯粟毋曲隄無擅廢適子毋置妾以為妻因以鄭城與宋水為請於楚楚人不許遂退七十里而舍使軍人城鄭南之地立百代城焉取其雖百代而無敢毁者也曰自此而北至於河者鄭自城之而楚不敢隳也東發宋田夾兩川使水復東流而楚不敢塞也遂南伐及踰方城濟於汝水望汶山績按汶音岷岷山江水所從出南致楚越之君而西伐秦北伐狄東存晉公於南自伐秦而遂存晉於晉之南故曰東存北伐孤竹還存燕公兵車之㑹六乘車之㑹三九合諸侯反位已霸修鐘磬而復樂管子曰此臣之所謂樂也霸言第二十三謂此言足以成霸道內言六霸王之形象天則地謂象天明則地義化人易代謂美教化移風俗創制天下與之更始等列諸侯列爵惟五各得其宜賓屬四海賓禮四夷以恩屬之時匡天下時一㑹而正之大國小之曲國正之强國弱之輕國重之亂國并之并亂所以總其威權暴王殘之僇其罪卑其列維其民然後王之其王之胸暴者則殘滅之於國則戮其首罪卑其爵列維持其人衆夫豐國之謂霸但自豐其國者霸也兼正之國之謂王兼能正他國者王夫王者有所獨明德共者不取也道同者不王也夫能王天下者必有獨見之明羣物之所不違若彼德與我共彼道與我同則不取而且不王夫爭天下者以威易危暴王之常也若以兵威易彼危亂此固暴王之常也非霸王之道也君人者有道有常道也霸王者有時必遇其時然後霸王國修而鄰國無道霸王之資也我修而彼暴可以取亂侮亡故曰資也夫國之存也鄰國有焉雖存而國小弱必事鄰國以為安故曰鄰國有焉國之亡也鄰國有焉因其亡而取之鄰國有事鄰國得焉鄰國有征伐之事因而敗績故鄰國得焉鄰國有事鄰國亡焉或有征伐之事大勝而多獲遂亡鄰國天下有事則聖王利也必有非常之事然後有非常之人國危則聖人知矣懷獨見之明故先知也夫先王所以王者資鄰國之舉不當也奉事皆當則我無因為功舉而不當此鄰國敵之所以得意也不當所以資我故得意也夫欲用天下之權者必先布德諸侯諸侯懷德而歸欲求無權其可得乎是故先王有所取有所與所謂將欲取之必固與之有所詘有所信所謂尺蠖之屈以求伸也然後能用天下之權妙於前四事故能用天下之權夫兵幸於權權幸於地兵幸在於有權權從在於得地幸尤勝也故諸侯之得地利者權從之失地利者權去之夫爭天下者必先爭人人惟邦本明大數者得人審小計者失人得天下之衆者王得其半者霸是故聖王卑禮以下天下之賢而王之均分以釣天下之衆而臣之既王有地均分其祿用此以引天下之衆故可得而臣之也故貴為天子富有天下而伐不謂貪者其大計存也得地均分可以臣彼地自利彼於我何貪此其大計也以天下之財利天下之人以明威之振利天下之人還用天下之財於我無所減削更可以明威權之振所謂惠而不費者也合天下之權績按以我明威之振征伐人者合天下之權而總之注俱非以遂德之行結諸侯之親合天下之權皆令在己權總則德遂德遂則親成也績按遂德之行猶成德之行也如此者諸侯親之所謂親有德也以姦佞之罪刑天下之心所謂懲一而勸百因天下之威以廣明天之伐因天下所欲亡而亡之則明王之伐自廣攻逆亂之國賞有功之勞封聖賢之德明一人之行而百姓定矣賞加一人而天下勸罰加一人而天下畏故曰明一人之行而百姓定矣夫先王取天下也術非術則無以取天下也術乎大德哉物利之謂也術可以取天下故曰大德然術之所歸在於令物得利也夫使國常無患而名利竝至者神聖也神聖則多所感致國在危亡而能夀者明聖也明聖則不失事機是故先王之所師者神聖也其所賞者明聖也賞樂玩也夫一言而夀國用其言故夀也不聽而國亡若此者大聖之言也夫明王之所輕者馬與玉其所重者政與軍若失主不然輕與人政而重與人馬輕豫人軍而重豫人玉重宫門之營而輕四境之守所以削也夫權者神聖之所資也獨明者天下之利器也獨斷者微密之營壘也謂獨斷可以自營而即定故曰營壘此三者聖人之所則也聖人畏微而愚人畏明至人能知吉凶之先見故曰畏微愚人近火方知熱履水乃知寒故曰畏明也聖人之憎惡也內愚人之憎惡也外至人知心胸之姦謀故曰憎內愚人兵在頸方懼故曰憎外也聖人將動必知愚人至危易辭至人之動必暗知愚者至危不知禍之將至尚有慢易之辭然後湯武之師起也績按至人將動先知其安危若愚人則至危之時方改易其平素言知之聖人能輔時不能違時至人能因時來輔成其事不能違時而立功不有桀紂之暴則無湯武之功知者善謀不如當時精時者日少而功多夫謀無主則困事無備則廢是以聖王務具其備而慎守其時以備待時以時興事時至而舉兵絶堅而攻國其兵超絶而又堅利故能攻國破大而制利大本而小標標末也本大而末小則難崩也埊近而攻逺所全之地近故能攻逺而有歸若髙光之有關中河內也以大牽小以强使弱以衆致寡德利百姓威振天下令行諸侯而不拂近無不服逺無不聽夫明王為天下正理也修正理而動故能成天下之功也按强助弱按抑也圉暴止貪存亡定危繼絶世此天下之所載也德義如此故為天下所載也諸侯之所與也與親也百姓之所利也是故天下王之天下樂推以為王知蓋天下繼最一世其繼敗續亡能成天下之功也材振四海王之佐也千乘之國得其守諸侯可得而臣天下可得而有也萬乘之國失其守國非其國也天下皆理巳獨亂國非其國也諸侯皆令皆從霸者之令己獨孤國非其國也鄰國皆險己獨易易平易不牢固謂無守禦之備也國非其國也此三者亡國之徵也夫國大而政小者國從其政小政䠞國故國從其政國小而政大者國益大大政開國故國益大大而不為者復小大而不為則日損故復小强而不理者復弱强而不理則綱紀亂故復弱也衆而不理者復寡衆而不理則人散故復寡貴而無禮者復賤貴而無禮則位奪故復賤也重而凌節者復輕重而凌節則威喪故復輕也富而驕肆者復貧富而驕肆則財竭故復貧也故觀國者觀君君為化主觀君者觀將將為兵本觀備者觀野野有障塞則國不侵其君如明而非明也外明而內暗也其將如賢而非賢也外賢而內愚其人如耕者而非耕也雖耕而鹵莽三守既失國非其國也三守謂明賢耕既失謂是而非地大而不為命曰土滿謂土滿而功狹也人衆而不理命曰人滿謂人多而政少兵威而不止命曰武滿所謂亢之為言也知進而不知退也三滿而不止國非其國也三滿不止敗亡立至地大而不耕非其地也地大不耕則無所獲卿貴而不臣非其卿也卿貴不臣化為敵也謂卿大夫人衆而不親非其人也人衆不親欲亡者也夫無土而欲富者憂無上欲富猶緣木而求魚故憂也無德而欲王者危無德而王猶欲進而却行故危施薄而求厚者孤施薄求厚人必不應故孤夫上夾而下苴苴包裹也上既狹故為下所苞國小而都大者弒此二者常有篡弒之禍主尊臣卑上威下敬令行人服理之至也使天下兩天子天下不可理也一國而兩君一國不可理也一家而兩父一家不可理也凡此所謂兩權必爭亂之本也夫令不髙不行不摶不聽摶聚也君命不髙不聚而聽之堯舜之人非生而理也化之而理桀紂之人非生而亂也效之而亂故理亂在上也夫霸王之所始也以人為本本理則國固本亂則國危故上明則下敬政平則人安士教和則兵勝敵使能則百事理親仁則上不危任賢則諸侯服霸王之形說霸王之形容德義勝之智謀勝之兵戰勝之地形勝之動作勝之故王之有此五勝故可以王夫善用國者因其大國之重以其勢小之因彊國之權以其勢弱之因重國之形以其勢輕之凡大彊重皆國之盈盛者也然盛者有時而衰盈者有時而息故因其衰息之勢大者小之彊者弱之重者輕之彊國衆合彊以攻弱以圖霸謂時彊國衆多吾國雖彊亦可圖霸彊國少合小以攻大以圖王謂時彊國既少我則合衆聚小以攻彊大之國如此者可以圖王彊國衆而言王勢者愚人之智也非言王之時彊國少而施霸道者敗事之謀也非施霸之時夫神聖視天下之形知動靜之時視先後之稱知禍福之門彊國衆先舉者危後舉者利彊國衆先舉必為彊者所圖故危彊國少先舉者王後舉者亡戰國衆後舉可以霸戰國少先舉可以王夫王者之心方而不最心雖方直未為其最列不讓賢雖列爵位不讓賢俊賢不齒第擇衆雖稱為賢無優劣齒第又非選衆而舉也是貪大物也大物謂大寶之位有此數者是定貪大位之利而無德位之實也是以王之形大也不可以小數得夫先王之爭天下也以方心心方而最故可以爭天下也其立之也以整齊整而齊之故可立也其理之也以平易平而易之故可理立政出令用人道政令須合人心施爵祿用地道地道平而無私舉大事用天道心應天時然後可以舉大事是故先王之伐也伐逆不伐順伐險不伐易伐過不伐不及伐其太過者四封之內以正使之以正使之則人無怨諸侯之㑹以權致之以權致之則不敢不來近而不服者以地患之侵削其地則自服逺而不聽者以刑危之興師以征之一而伐之武也守一不移興師伐之此其武也服而舍之文也既服舍之綏之以德此其文也文武其滿德也唯文教武功可以滿其德夫輕重彊弱之形諸侯合則强孤則弱驥之材而百馬伐之驥必罷矣彊最一伐而天下共之國必弱矣彊國得之也以收小其失之也以恃彊小國得之也以制節制度合節故得之績按制節謂事大國受其法令其失之也以離彊離彊則乖節者也故失夫國小大有謀彊弱有形服近而彊逺謂用强兵威逺國故曰强逺王國之形也合小以攻大敵國之形也以負海攻負海謂以蠻夷攻蠻夷負海以為固故曰負海中國之形也折節事彊以避罪小國之形也自古以至今未嘗有能先作難違時易形以立功名者無有言無有此事也常先作難違時易形無不敗者也夫欲臣伐君以臣伐君若湯武之於桀紂也正四海者不可以兵獨攻而取也謂當兼下事必先定謀慮便地形利權稱親與國視時而動王者之術也夫先王之伐也舉之必義用之必暴其用師必加於暴亂相形而知可謂相其亂亡之形量力而知攻攻得而知時是故先王之伐也必先戰而後攻先攻而後取地故善攻者料衆以攻衆量吾衆寡可敵彼衆然後攻餘放此料食以攻食料備以攻備以衆攻衆衆存不攻彼衆存則我不能亡之故不攻以食攻食食存不攻以備攻備備存不攻釋實而攻虛知其實而避之釋堅而攻膬釋難而攻易夫摶國不在敦古在於合今時之宜摶聚也理勢不在善攻在於權宜霸王不在成曲在於全大體夫舉失而國危刑過而權倒刑罰過理則權柄倒錯謀易而禍反謀事易數禍必反來計得而强信音申功得而名從權重而令行固其數也數猶理也夫爭彊之國必先爭謀爭刑爭權先此三爭然後爭彊令人主一喜一怒者謀也謀得則喜謀失則怒令國一輕一重者刑也怒刑則重喜刑則輕令兵一進一退者權也權重則進權輕則退故精於謀則人主之願可得而令可行也精於刑則大國之地可奪彊國之兵可圉也精於權則天下之兵可齊諸侯之君可朝也夫神聖視天下之刑知世之所謀知兵之所攻知地之所歸知令之所加矣夫兵攻所憎而利之此鄰國之所不親也兵攻所憎之國而以攻得為利德義不施鄰國必怨而不親權動所惡而實寡歸者彊其威權既動移所惡而德義之實少為人所歸如此但彊而已不能至霸王也擅破一國彊在後世者王今能專破一國常守其彊𫝊之後世如此者王也擅破一國彊在鄰國者亡既破一國不能守其彊令鄰國得之如此者亡也問第二十四謂為國所當察問者內言七凡立朝廷問有本紀所問之事必有根本綱紀爵授有德則大臣興義祿豫有功則士輕死節上帥士以人之所戴則上下和上帥其士所為者皆人之所戴仰故上下和授事以能則人上功有能然後得事故人上功也審刑當罪則人不易訟易猶交也所刑皆當其罪故人不交相訟無亂社稷宗廟則人有所宗社稷宗廟各得其正則人知所宗毋遺老忘親則大臣不怨大臣非國老則君親今不遺忘故不怨舉知人急則衆不亂行此道也急謂困難也舉困難之事以示人則人不復行此道國有常經人知終始此霸王之術也國有常經則人知終始之所歸霸王之術也然後問事事先大功先問大功則勞臣悅政自小始為政先小從微而至著問死事之孤其未有田宅者有乎未有則給與之死事孤謂死王事之子孫也問少壯而未勝甲兵者幾何人知其數則預有所准問死事之寡其餼廩何如寡謂其妻餼廪言給其餼廩餼生食廪米粟之屬也問國之有功大者何官之吏也問何官之火欲知其材之所當問州之大夫也何里之士也問州里欲知其風俗所好尚今吏亦何以明之矣問吏所明欲知其優賞厚薄問刑論有常以行不可改也今其事之久留也何若罪既論定國有常科當奉而行之此不可改易者也今乃久留其事將如之何問五官有度制官都其有常斷今事之稽也何待官都謂總攝諸司者也五官既各有制度官都復自有常斷今稽其事而不行將何待乎問獨夫寡婦孤寡疾病者幾何人也知其人數當有所廪餼問國之棄人何族之子弟也棄人謂有過不齒投之四裔者也問之其族欲有所救也問鄉之良家其所牧養者幾何人矣良家謂善營生以致富者牧養謂其人不能自存良家全活之知其所養之數欲有所復除也問邑之貧人債而食者幾何家債而食謂從富者出息以供食知其家數欲有所矜免也問理園圃而食者幾何家人之開田而耕者幾何家士之身耕者幾何家問鄉之貧人何族之别也知從何族而别或從公族當有所收恤也問宗子之收昆弟者以貧從昆弟者幾何家以貧而從昆弟以求養者與之從者各有幾家也餘子仕而有田邑今入者幾何人謂收入其稅者子弟以孝聞於鄉里者幾何人餘子父母存不養而出離者幾何人出離謂父母在分居者士之有田而不使者幾何人吏惡何事不使謂不用其吏不惡此等當惡何事士之有田而不耕者幾何人身何事既不耕此人身為何事君臣有位而未有田者幾何人外人之來從而未有田宅者幾何家國子弟之遊於外者幾何人貧士之受債於大夫者幾何人貧士無資而被大夫債者有幾人官賤行書身士以家臣自代者幾何人其人居官乃賤自行文書身任士職輒以家臣自代亦須知其數也官承吏無田餼而徒理事者幾何人承吏謂攝官無餼而空理事羣臣有位事官大夫者幾何人羣臣自有位事乃左官於大夫外人來遊在大夫之家者幾何人外人謂外國人也鄉子弟力田為人率者幾何人既自力田又能率人國子弟之無上事衣食無節率子弟不田弋獵者幾何人既無上事乃率子弟不田農但弋獵男女不整齊亂鄉子弟者有乎謂不以禮交者問人之貸粟米有别劵者幾何家别劵謂分契也問國之伏利其可應人之急者幾何所也伏利謂貨利𨼆蔽不見若銅銀山及溝瀆可决而溉灌者人之所害於鄉里者何物也人之為害者何物也績按物事也問士之有田宅身在陳列者幾何人餘子之勝甲兵有行伍者幾何人問男女有巧伎能利備用者幾何人能利備器之用處女操工事者幾何人能操女工之事謂綺繡之屬也冗國所開口而食者幾何人言其不農作置開口仰食問一民有幾年之食也問兵車之計幾何乘也牽家馬軛家車者幾何乘牽家馬言直有馬軛家車言直有車相配以成乘處士修行足以教人可使帥衆蒞百姓者幾何人士之急難可使者幾何人謂士之可以急難使者工之巧出足以利軍伍處可以修城郭補守備者幾何人其人既有技巧出用則能利軍居處則可以修城補備也城粟軍糧其可以行幾何年也行由經也城粟謂守城之粟軍糧謂出軍之糧二者可經幾年吏之急難可使者幾何人大夫疏器疏飾畫也甲兵兵車旌旗鼓饒帷幕帥車之載幾何乘載謂其車蓋疏藏器疏畫而可以藏者弓弩之張弓弩之可以張者衣夾鋏鋏兩刃鈹也衣夾謂在腋也鈎弦之造鈎弦所以挽弦戈㦸之緊緊謂其堅强者其厲何若其淬厲可用如何其宜修而不修者故何視視比也其器物宜修者於故物何比而造修之官出器處器之具宜起而未起者何待出器謂可出用之器處器謂貯庫而為備者起謂其材所經日月可起用者也鄉師車輜造修之具其繕何若輜謂車之有防蔽可以重載者工尹伐材用毋於三時羣材乃植而造器定冬完良備用必足工尹工官之長三時謂春夏秋此時木方生植不堅故不可伐材其伐材必以冬也人有餘兵詭陳之行以慎國常方戰有餘兵不用且詭而陳之以為行伍當慎而聽命遵國之常令也時簡稽帥馬牛之肥膌其老而死者皆舉之軍之統帥常時簡選稽考之以知其能否而有黜陟至於馬牛肥膌及老而死者皆舉之以知其數也其就山藪林澤食薦者幾何薦草之美者出入死生之㑹幾何㑹謂合其數若夫城郭之厚薄溝壑之淺深門閭之尊卑宜修而不修者上必幾之幾察也君必察知之守備之伍器物不失其具淫雨而各有處藏器物遇雨必致腐敗故當有藏處問兵官之吏國之豪士其急難足以先後者幾何人官吏國豪有急難可令之先後者當知其數相道前後曰先後詩曰豫曰有先後夫兵事者危物也不時而勝不義而得未為福也必合於時義然後為福失謀而敗國之危也慎謀乃保國問所以教選人者何事其教人其選人者問以何事欲知其勤且觀其材用也問執官都者其位事幾何年矣執官都之職者問其官位及執事并建立之年數所辟草萊有益於家邑者幾何矣所封表以益人之生利者何物也謂其事業最可以益人者遂封表以示之問知是何物也所築城郭修牆閉絶通道厄闕深防溝以益人之地守者何所也牆閉謂築牆有所遮閉雖通路而為妨礙者絶塞之路開空之處亦當絶之凡此守地者所以省其功費故曰益地守所捕盜賊除人害者幾何矣制地君曰理國之道地德為首當制地之時君為此言故言曰法地以為政故曰地德為首君臣之禮地有髙下君臣之禮也父子之親髙地下覆下地上承父子之親也覆育萬人百貨出於地人得以生焉故曰覆育萬人官府之藏彊兵保國城郭之險外應四極四極謂國之四鄙也自官府以下非地則無所容居具取之地凡此皆因地而成故曰具取之地而市者天地之財具也求天地之財不登山不入海至於市求而得之故曰天地則具而萬人之所和而利也和謂交易也萬人因市交易而得利正是道也言市正合道之理民荒無苛人盡地之職一保其國欲理荒人無得苛虐但使盡地之職自然齊一而保國也各主異位毋使讒人亂普而德營九軍之親自君以下其位既異當各主之無使讒人交鬬普廢其德如此則九軍之親自營也關者諸侯之陬隧也謂陬隅之道也而外財之門戶也他國之財因之而入萬人之道行也謂因此出入明道以重告之當明道路之令再重而告之征於關者勿征於市征於關謂行商也征於市者勿征於關征於市謂坐賈虛車勿索索虛車益其煩擾徒負勿入徒負貨既寡故勿令入其征以來逺人關征如此可以來逺人十六道同齊國凡有十六道皆置關並同此令身外事謹則聽其名謂出入於關者身外之事既謹而從令則當聽其名之真僞者也視其名視其色既知其名又須視其色之是非是其事稽其德既知其色乂須是正其事以考合其德也以觀其外既知其德又觀其外以校量之也則無敦於權人以困貌德敦猶厚也校察如此則權詐之人無以成其厚校察行則困厚姦非因而不生故曰以困貌德國則不惑行之職也國無姦人所以不惑凡此掌行者之職問於邊吏曰小利害信小怒傷義邊信傷德邉人失信故傷德也厚和搆四國以順貌德敦厚而和可以搆結四國四國之來皆以誠信故曰以順貌德后鄉四極既結四國然後向四極而撫安之令守法之官日行又令守法之官日行邉鄙與關塞度必明失經常其巡行之時必明其制度無得失於經常謀失第二十五闕內言八管子補注卷九
