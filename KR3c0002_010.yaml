body:
  text: 管子補注卷十明劉績撰戒第二十六所以陳戒桓公內言九桓公將東遊問於管仲曰我遊猶軸轉斛言我之遊必有所濟猶軸之轉載斛石績按孟子昔者齊景公問於晏子曰吾欲觀於轉附朝儛遵海而南放於琅邪此必轉附朝之誤也但以之為景公晏子未知孰是南至琅邪司馬曰亦先王之遊已何謂也春遊而南行故司馬正令之為先王之遊公未達其意故問管仲管仲對曰先王之遊也春出原農事之不本者謂之遊原察也農事不依本務當原察之秋出補人之不足者謂之夕秋為西成尚有不足者當補之也夫師行而糧食其民者謂之亡師行無成功空費糧食如此者必亡從樂而不反者謂之荒先王有遊夕之業於人無荒亡之行於身桓公退再拜命曰寶法也謂其法可寶也管仲復於桓公曰無翼而飛者聲也出言門廷千里必應故曰無翼而飛無根而固者情也同舟而濟胡越不患異心知其情也故曰無根而固無方而富者生也生全則萬方輻湊生盡則鴻毛不振故曰無方而富也莫知生所在故曰無方也公亦固情謹聲以嚴尊生言當固物情謹聲教嚴為防禁以尊其生此謂道之榮謂此三者順道而光榮桓公退再拜請若此言若順也管仲復於桓公曰任之重者莫如身萬事萬行非身不舉故曰重任塗之畏者莫如口樞機之發榮辱之主故可畏也期而逺者莫如年殤夭日聞期頤實寡故曰逺期也以重任行畏塗至逺期唯君子乃能矣桓公退再拜之曰夫子數以此言者教寡人管仲對曰滋味動靜生之養也好惡喜怒哀樂生之變也聰明當物生之德也非禮勿視聽故曰當物是故聖人齊滋味而時動靜所以養其生也御正六氣之變所以循其變也六氣即好惡喜怒哀樂禁止聲色之淫所以成其德邪行亡乎體違言不存口體無邪行口無違言靜然定生聖也欲靜則生定如此者聖也行從中出義從外作仁自心生故曰中出義因事斷故曰外作仁故不以天下為利義故不以天下為名若以天下為名利則非仁義也仁故不代王不以道輔君而代之王者非仁也義故七十而致政老而不致政貪冒者耳非義也是故聖人上德而下功尊道而賤物物謂名利之事道德當身故不以物惑身茍有道德豈名利之物能惑哉是故身在草茅之中而無懼意道德為重何懼之有南面聽天下而無驕色伸器儻來何驕之有如此而後可以為天下王所以謂德者不動而疾德必冥通故不動而疾不相告而知不出户牖以知天下不為而成無為而無不為不召而至是德也同聲相應同氣相求如此者可謂至德也故天不動四時云下萬物化天常無為故曰不動然四時云下故萬物化云運動貌也績按云周旋也君子不動政令陳下而萬功成君亦常無為故曰不動然政令陳列而下故萬物成也心不動使四肢耳目而萬物情心亦常無為故曰不動然四肢耳目使萬物莫不得其情也績按一本作萬物而得之所以然者必以情得是也寡交多親謂之知人以其知人故能交寡而親多寡交成功謂之知用以其知用故能事寡而功成聞一言以貫萬物謂之知道以其知道故能聞一言而得萬物貫也多言而不當不如其寡也故曰狗不以善吠為良人不以多言為賢博學而不自反必有邪博學而不反修於其身心曼衍者故必有邪行孝弟者仁之祖也仁從孝弟生故為仁祖忠信者交之慶也有忠信之心故能慶交友之善內不考孝弟言不仁外不正忠信言不友澤其四經而誦學者是亡其身者也四經謂詩書禮樂也既無孝弟忠信空使四經流澤徒為誦學者即四經可以亡身也桓公明日弋廩廪所以盛米粟禽鳥或多集焉故於此弋也管仲隰朋朝公望二子弛弓脫釬釬所以鈎弦而迎之曰今夫鴻鵠春北而秋南而不失其時夫唯有羽翼以通其意於天下乎今孤之不得於天下非皆二子之憂也二子不能為羽翼所以當憂桓公再言二子不對桓公曰孤既言矣二子何不對乎管仲對曰今夫人患勞而上使不時人患飢而上重斂焉人患死而上急刑焉如此而又近色親治容而逺有德疏賢俊雖鴻鵠之有羽翼濟大水之有舟楫也其將若君何不飛雖羽翼無益不濟雖舟楫徒施不聽雖讜言空設故曰其將若君何桓公蹴然逡遁管仲曰昔先王之理人也蓋人有患勞而上使之以時則人不患勞矣人患飢而上薄斂則人不患飢矣人患死而上寬刑焉則人不患死矣如此而近有德而遠有色則四封之內視君其猶父母邪四方之外歸君其猶流水乎公輟射援綏而乘自御管仲為左隰朋參乘朔月三日進二子於里官里官謂里尉也齊國之法舉矣必自里尉始故令里官進二子將旌别而用之也再拜頓首曰孤之聞二子之言也耳加聰而視加明於孤不敢獨聽之薦之先祖謂陳其所言以薦祖廟管仲隰朋再拜頓首曰如君之王也君能如此可以王也此非臣之言也君之教也此雖臣言必君用之然後成教曰君之教於是管仲與桓公盟誓為令曰老弱勿刑參宥而後弊老弱犯刑者無即刑之必三寬宥而後斷罪三宥即周禮三宥一曰不識二曰過誤三曰悼耄也關幾而不征市正不布布謂錢也即其物而正之不必分錢山林梁澤以時禁發而不正也獺祭魚然後入梁澤豺祭獸然後入山林也草封澤鹽者之歸之也譬若市人草封澤謂澤多草刈積成封可用煮鹽者也其處既多鹽故歸者譬若市人言不設禁也三年教人四年選賢以為長五年始興車踐乘遂南伐楚門傳施城施城楚城名謂附至其下以得其所也北伐山戎出冬蔥與戎菽布之天下山戎有冬蔥戎菽今伐之取其物布天下戎菽胡豆果三匡天子而九合諸侯桓公外舍而不鼎饋外舍謂出宿於外不以鼎饋食言其饌不盛也中婦諸子謂宫人盍不出從乎君將有行中子諸婦內官之號君將有行何不出乎盍何不也宫人皆出從公怒曰孰謂我有行者宫人曰賤妾聞之中婦諸子公召中婦諸子曰女言聞吾有行也對曰妾人聞之君外舍而不鼎饋非有內憂必有外患今君外舍而不鼎饋君非有內憂也妾是以知君之將有行也公曰善此非吾所與女及也而言乃至焉言我本不與汝及此謀今汝言乃能至如此謂能知我謀也吾是以語女吾欲致諸侯而不至為之奈何我欲諸侯之至而不至今欲令其至如何中婦諸子曰自妾之身之不為人持接也為猶與也言妾身在深宫之中未嘗得出與人相持而接對未嘗得人之布織也意者更容不審邪言中既少織婦絍之事又不得外人之布織言此者既昧於人事不當訪以軍謀蓋託不知以止君之行也故言更當容我思其不審之事績按此言已不事人未嘗得人布織而衣猶君不下小國故諸侯不至也意者或有不審致諸侯之道邪注皆非明日管仲朝公告之管仲曰此聖人之言也君必行也謂中婦諸子止君不行此合聖人之言也故令君行之管仲寢疾桓公往問之曰仲父之疾甚矣若不可諱也不幸而不起此疾彼政我將安移之管仲未對桓公曰鮑叔之為人如何管仲對曰鮑叔君子也千乘之國不以其道豫之不受也雖與千乘之國不以其道彼必不受雖然不可以為政其為人也好善而惡惡己甚己猶太也言曾惡惡人太甚見一惡終身不忘桓公曰然則孰可管仲對曰隰朋可朋之為人好上識而下問好上識謂好知逺大之事臣聞之以德豫人者謂之人以財豫人者謂之良以善勝人者未有能服人者也以善勝人人亦生勝己之心故不服以善養人者未有不服人者也於國有所不知政於家有所不知事必則朋乎若皆知之則事鍾於已將不勝任而敗朋能有所不知故可以移政且朋之為人也居其家不忘公門居公門不忘其家事君不二其心亦不忘其身舉齊國之幣握路家五十室其人不知也大仁也哉其朋乎握持也或有舉齊國之幣持與路旁之家五十室其事大而且易顯此皆自有主司朋能不干預而強知此所謂於國有所不知政合於天地之無不容載故曰大仁哉其朋乎也公乂問曰不幸而失仲父也二三大夫者其猶能以國寧乎管仲對曰君請矍已乎矍已謂有所驚懼而問未止也鮑叔牙之為人也好直賓胥無之為人也好善寧戚之為人也能事孫在之為人也善言公曰此四子者其孰能一人之上也寡人并而臣之則其不以國寧何也言四子皆有超絶之材無人能過其上今吾并得臣之國尚不寧何也對曰鮑叔之為人也好直而不能以國詘不能為國以屈其直也賓胥無之為人也好善而不能以國詘寧戚之為人也能事而不能以足息寧戚善於農植貪於積聚不能知足而息也孫在之為人也善言而不能以信默其所陳言既見信用不能尚默凡此四子皆矜其能太過不能與時屈伸故國不能也臣聞之消息盈虛與百姓詘信然後能以國寧勿己者朋其可乎朋之為人也動必量力舉必量技言終喟然而嘆曰天之生朋以為夷吾舌也其身死舌焉得生哉言朋亦將隨已早亡不得久理齊政故哀歎也以先知未然夷吾所以稱聖也管仲曰夫江黃之國近於楚為臣死乎二國既近於楚必臣於楚豈為齊臣而死乎君必歸楚而寄之以二國歸楚若寄託然則楚不得為私而齊猶有望君不歸楚必私之私之而不救也則不可救之則亂自此始矣楚既私二國二國有難齊必不救一為不救則不可救此救彼不臣則構怨矣故曰亂自此始績按臣管仲自謂也言江黃二國近楚已死後君必歸二國於楚使楚知服己而不伐君不歸楚為齊私國楚必伐之盟不救固不可若救則逺興師旅而致亂矣榖梁曰貫之盟管仲曰江黃逺齊而近楚楚為利之國也若伐而不能救則無以宗諸侯矣桓公不聽遂與之盟管仲死楚伐江滅黃桓公不能救故君子閔之也桓公曰諾管仲又言曰東郭有狗嘊嘊旦暮欲齧我猳而不使也今夫易牙子之不能愛將安愛君必去之公曰諾東郭之狗喻易牙言其人殘忍同於狗矣猳謂以木連狗取聲為義即國家也言易牙終能亡國滅家此不當使必須去之也績嘊魚佳切狗欲齧也管子又言曰北郭有狗嘊嘊旦暮欲齧我猳而不使也今夫豎刁其身之不愛焉能愛君君必去之公曰諾管子又言曰西郭有狗嘊嘊旦暮欲齧我猳而不使也今夫衛公子開方去其千乘之太子而臣事君是所願也得於君者是將欲過其千乘也開方在衛當嗣君之位今棄而事齊則所望不只千乘也其意必得齊國然後稱所望也君必去之桓公曰諾管子遂卒卒十月隰朋亦卒桓公去易牙豎刁衛公子開方五味不至於是乎復反易牙宫中亂復反豎刁利言卑辭不在側復反衛公子開方桓公內不量力外不量交而力伐四鄰公薨六子皆求立易牙與衛公子內與豎刁因共殺羣吏而立公子無虧故公死七日不斂九月不葬孝公奔宋宋襄公率諸侯以伐齊戰於甗大敗齊師殺公子無虧立孝公而還襄公立十三年桓公立四十二年地圖第二十七短語一凡兵主者必先審知地圖轘轅之險謂路形若轅而又轘曲緱氏東南有轘轅道是也濫車之水其水深渺能泛車名山通谷經川謂常川也陵陸丘阜之所在苴草林木蒲葦之所茂苴草謂其草深茂能有所覆藏道里之遠近城郭之大小名邑廢邑困殖之地困謂其地墝埆不可種藝殖謂壤田可播殖者必盡知之凡此皆兵主所當知地形之出入相錯者盡藏之藏謂包藴在心然後可以行軍襲邑舉錯知先後不失地利此地圖之常也人之衆寡士之精粗器之功苦盡知之此乃知形者也形謂兵之形知形不如知能知能不如知意故主兵必參具者也主明相知將能之謂參具明智能三者合謂之參具故將出令發士期有日數矣宿定所征伐之國宿猶先也使羣臣大吏父兄便辟左右不能議成敗人主之任也事之成敗明主獨斷之於心故其臣不能議論也論功勞行賞罰不敢蔽賢不敢蔽隱賢能有私行用貨財供給軍之求索言相室或用私財供軍所求若竇嬰李牧之為也使百吏肅敬不敢解怠行邪以待君之令相室之任也繕器械選練士為教服設教令使士服習連什伍使其什伍各相鉤連有所統屬遍知天下審御機數此兵主之事也參患第二十八太強亦有患太弱亦有患必參詳強弱之中自致於無患也短語二凡人主者猛毅則伐懦弱則殺猛毅者何也輕誅殺人之謂猛毅懦弱者何也重誅殺人之謂懦弱此皆有失彼此凡輕誅者殺不辜而重誅者失有罪故上殺不辜則道正者不安上失有罪則行邪者不變道正者不安則才能之人去亡行邪者不變則羣臣朋黨才能之人去亡則宜有外難能士去亡必搆鄰來伐故有外難也羣臣朋黨則宜有內亂羣臣朋黨則狗變為虎篡殺常因是生故有內亂也故曰猛毅者伐懦弱者殺也君之所以卑尊國之所以安危者莫要於兵故誅暴國必以兵禁辟民必以刑然則兵者外以誅暴內以禁邪故兵者尊主安國之經也不可廢也若夫世主則不然外不以兵而欲誅暴則地必虧矣無兵誅暴暴必內侵故地虧內不以刑而欲禁邪則國必亂矣無刑禁邪邪必上侵故國亂故凡用兵之計三驚當一至驚謂耀威示武能驚敵使懼如此者三可當師之一至敵國三至當一軍師之三至可當一軍之用三軍當一戰軍之三用可當一戰之功故一期之師十年之蓄積殫師行一期能盡十年之蓄積一戰之費纍代之功盡傾國一戰能盡纍代之功今交刃接兵而後利之則戰之自勝者也交刃接兵必卒喪刃折貨財空耗雖未被敵勝先已自勝攻城圍邑主人易子而食之析骸而爨之則攻之自拔者也主人食子爨骸攻者必致智窮力盡財殫士喪城雖未攻先已自拔凡此者庸主之師非善計者也是以聖人小征而大匡不失天時不空地利用日維夢其數不出於計小征謂誅暴國大匡謂正天下既合天時又得地利用吉日襲吉夢其數從何而生皆出於計謀者也故計必先定而兵出於竟計未定而兵出於竟則戰之自敗攻之自毁者也得衆而不得其心則與獨行者同實不得其心則叛亡至故與獨行同實也兵不完利與無操者同實甲不堅密與俴者同實俴謂無甲單衣者弩不可以及逺與短兵同實射而不能中與無矢者同實中而不能入與無鏃者同實將徒人與俴者同實徒人謂無兵甲者俴單也人雖衆無兵甲則與單人同也短兵待逺矢與坐而待死者同實逺矢至短兵不能應則坐而受死也故凡兵有大論必先論其器論其士論其將論其主故曰器濫惡不利者以其士豫人也士不可用者以其將豫人也將不知兵者以其主豫人也主不積務於兵者以其國豫人也故一器成往夫具而天下無戰心一器謂師之器其器既成敢往之夫又具則天下不敢生心與戰也二器成驚夫具而天下無守城二器謂軍之器其器既成驚敵之夫又具則天下不敢守城而禦也三器成遊夫具而天下無聚衆三器謂一國之器其器既成遊務之夫又具則天下之衆懼而自散也所謂無戰心者知戰必不勝故曰無戰心所謂無守城者知城必拔故曰無守城所謂無聚衆者知衆必散故曰無聚衆制分第二十九短語三凡兵之所以先爭謂欲用兵所當先而爭為者為下事聖人賢士不為愛尊爵有聖人賢士則以尊爵加之而不愛惜也道術知能不為愛官職有道術智能則以官職加之也巧伎勇力不為愛重祿聰耳明目不為愛金財故伯夷叔齊非於死之日而後有名也其前行多修也由前行多修故死後多名武王非於甲子之朝而後勝也其前政多善矣由前政多善故甲子之朝一戰大勝故小征千里遍知之小征謂以諸侯之衆有所征古者諸侯大國有五百里者今既舉衆而征己國與敵國皆當知之故遍知千里築堵之牆十人之聚日五間之間謂私候之假令築一堵之牆或十人聚作主者猶日五候之况戎事之大可以不遍知哉大征遍知天下大征謂以天下之衆有所征伐天子以天下為家故遍知天下也日一間之散金財用聰明也夫動衆當令主者日一間候之其問候之也或散金財有所慕賞或用聰明度其不虞故善用兵者無溝壘而有耳目溝壘防禦小耳目視聽遠兵不呼警不茍聚不妄行不強進呼警則敵人戒茍聚則衆不用無事徒聚衆必不用若周之偽烽也妄行則羣卒困強進則鋭士挫故凡用兵者攻堅則軔軔牢固之名也所攻既堅則軔而難入乘瑕則神瑕謂虛脫也所乘既脆繣然瓦解故若神攻堅則瑕者堅所攻雖堅能令脆者則以士卒堅強故也乘瑕則堅者瑕所乘雖脆却為堅者則以士卒脆弱故也故堅其堅者瑕其瑕者謂強卒攻堅弱卒攻脆屠牛坦朝九牛而刀可以莫鐡莫猶削也則刃遊間也刃遊理間故刀不虧故天道不行屈不足從用兵者必順天道若及天道之不行必屈竭而不足績按從事為句舊在下非人事荒亂以十破百敵國人事既荒且亂故十可破百器備不行以半擊倍敵國器備不可施行故此雖半可以擊彼之倍故軍爭者不行於完城池行謂先覘之也欲以軍爭而行其城池彼則知而備之也有道者不行於無君覘彼無君亦恐知而有備也故莫知其將至也既不先覘以潛襲所以不知其將至至而不可圉莫知其將去也不可圉者必潛而遁故不知其將去楚幕有烏之比去而不可止績按言至不可圉去不可止敵人雖衆不能止去既不可止雖衆何能止待績按待即上圉意注非又不知此為句治者所道富也而治未必富也有所待而治其道當然未能富也必知富之事然後能富富者所道強也而富未必強也富者其道當強而未必能強也必知強之數然後能強強者所道勝也而強未必勝也必知勝之理然後能勝勝者所道制也而勝未必制也必知制之分然後能制是故治國有器富國有事強國有數勝國有理制天下有分君臣上第三十短語四為人君者修官上之道而不言其中君在衆官之上但修此官上之道而已至於官中之事則有司存非所言也為人臣者比官中之事而不言其外比謂校次之也若言官外則為越職君道不明則受令者疑權度不一則修義者惑民有疑惑二豫之心而上不能匡則百姓之與間間謂礙不通也人心有疑君不能正故其所與為多礙而不通也猶揭表而令之止也揭舉也表謂以木為標有所告示也既使舉於表又令止之是不一也故以况人心之疑也是故能象其道於國家加之於百姓而足以飾官化下者明君也象法也謂能本道而立法能上盡言於主下致力於民而足以修義從令者忠臣也上惠其道下敦其業上下相希言相希準以為法也若望參表則邪者可知也參表謂立表所以參驗曲直吏嗇夫任事吏嗇夫謂檢束羣吏之官也若督郵之比也人嗇夫任教人嗇夫亦謂檢束百姓之官教在百姓令在不橈謂百姓有不從教論其罪法不橈法以行私賞在信誠體之以君臣其誠也以守戰既賞信罰必君臣合體莫不致誠故入可以守城出可以野戰也如此則人嗇夫之事究矣吏嗇夫盡有訾程事律訾限也程準也事律謂每事據律而行也論法辟衡權升斛文劾不以私論而以事為正辟刑也文劾謂據文而舉劾謂法刑已下皆據事以為正不曲從其私也如此則吏嗇夫之事究矣人嗇夫成教吏嗇夫成律之後則雖有敦慤忠信者不得善也人嗇夫之教既成則人皆忠信故無有獨得善者也而戲豫怠傲者不得敗也吏嗇夫之事既成人皆懼法不敢為非雖有豫怠不得為敗也績按言教律既成善惡不能損益如此則人君之事究矣是故為人君者因其業謂因人嗇夫之業也乘其事謂乘吏嗇夫之事而稽之以度又以國之法度考此二者有善者賞之以列爵之尊田地之厚而民不慕也善自應賞故不善者不敢橫慕有過者罰之以廢亡之辱僇死之刑而民不疾也過自應罰故人不敢疾怒殺生不違而民莫遺其親者或罰而殺之或賞而生之皆不違其理則人知王德之有常不輕為去就故人不遺其親也此唯上有明法而下有常事也天有常象懸象著明不改其貞地有常形山澤通氣不改其靜人有常禮尊君父卑臣子其儀不易一設而不更此謂三常兼而一之人君之道也人君無官兼統衆官故曰兼而一之分而職之各有司存人臣之事也君失其道無以有其國臣失其事無以有其位然則上之畜下不妄而下之事上不虛矣上之畜下不妄則所出法制度者明也下之事上不虛則循義從令者審也上明下審上下同德代相序也代更也謂上明下審更相序次君不失其威下不曠其産而莫相德也君以威覆下下以産供上各有所職故不相德是以上之人務德而下之人守節義禮成形於上而善下通於民則百姓上歸親於主而下盡力於農矣故曰君明相信五官肅士亷農愚商工願則上下體上下各得其體也而外內别也民性因而三族制也三族謂農商工也言因上下有體內外有别故此三族各得其制也夫為人君者廕德於人者也君者以德廕人也為人臣者仰生於上者也臣者仰君而生為人上者量功而食之以足量其功之多少制祿以食之各得足也為人臣者受任而處之以教受任必設教也布政有均績按指君食足則國家豐矣以勞授祿則民不幸生有勞者必得祿人則致死以立功不僥幸而偷生也刑罰不頗則下無怨心名正分明則民不惑於道刑名職分明則人於道不惑也道也者上之所以道民也是故道德出於君德從君出制令傳於相令因相傳事業程於官官各以其事業程於君也百姓之力也胥令而動者也胥視也視令而動則所舉不妄是故君人也者無貴如其言君以言制下無言則下無所稟令故言最貴也臣人也者無愛如其力臣則宣力事君故其力最可愛也言下力上君言下於臣臣力上於君也而臣主之道畢矣是故主畫之相守之畫謂分别其所授事君既盡其事相則守而行之也相畫之官守之官畫之民役之官既畫之民則役力以行其事則又有符節印璽典法策籍以相揆也符節印璽所以示其信也典法策籍所以示之制也凡此可以考其真偽定其是非故曰以相揆也此明公道而滅姦偽之術也論材量能謀德而舉之謀知其德然後舉用之上之道也專意一心守職而不勞不以職事為勞苦下之事為人君者下及官中之事則有司不任也下及官中之事則君奪臣職故有司不任也為人臣者上共專於上則人主失威臣常上供從君之命令乃專上之權故主失威績按此言臣奪君職供其專令是故有道之君正其德以蒞民而不言智能聰明智能聰明者下之職也所以用智能聰明者上之道也謂用下之智能聰明上之人明其道下之人守其職上下之分不同任而復合為一體君為元首臣為股肱故曰一體是故知善人君也知善則謀慮深逺故可以為人君也身善人役也身善則材能可用故為人役也君身善則不公矣君身善則智淺故不公人也績按君任人而不自任故知善而不身善若身善則自用小而不公矣人君不公常惠於賞而不忍於刑不公則不識理之正故惠賞而不忍刑也是國無法也治國無法則民朋黨而下比飾巧以成其私績按此言君身善之弊法制有常則民不散而上合竭情以納其忠績按此言君不身善之益是以不言智能而順事治國患解大臣之任也不言於聰明而善人舉姦偽誅視聽者衆也績按此言君不言智能聰明以此乃臣下之職故曰大臣之任也視聽者衆也是以為人者君坐萬物之原而官諸生之職者也謂授諸生之官而任之以職也生謂知學之士也績按諸生之職猶言治亂所從起也選賢論材而待之以法舉而得其人坐而收其福不可勝收也得人則福多故不可勝收官不勝任奔走而奉其敗事不可勝救也不勝則敗廣故不可勝救而國未嘗乏於勝任之士上之明適不足以知之是以明君審知勝任之臣者也故曰主道得賢材遂百姓治治亂在主而已矣故曰主身者正德之本也官治者耳目之制也官稟君命而後行若耳目待上制而後用故曰官者耳目之制身立而民化正德而官治治官化民其要在上是故君子不求於民立身正德而已是以上及下之事謂之矯及猶預也矯偽也上預下事則偽有餘而實不足也下及上之事謂之勝下預上事則威權勝君也為上而矯悖也為下而勝逆也國家有悖逆反忤之行忤背也有土主民者失其紀也是故别交正分之謂理别上下之交正君臣之分順理而不失之謂道道德定而民有軌矣有道之君者善明設法而不以私防者也而無道之君既已設法則舍法而行私者也為人上者釋法而行私則為人臣者援私以為公公道不違則是私道不違者也臣之所以為公者乃是私也名曰不違公道便是不違私道也行公道而託其私焉寖久而不知姦心得無積乎既久行私而不知則是姦心之積也故言姦心豈無積乎姦心之積也其大者有侵逼殺上之禍其小者有比周內爭之亂此其所以然者由主德不立而國無常法也主德不立則婦人能食其意若意委曲隨於女謁若食之充口故曰婦人能食其意國無常法則大臣敢侵其勢大臣假於女之能以規主情假因也因女之能食主意以規度主之情也婦人嬖寵假於男之知以援外權婦人既得君之嬖乂因大臣之智以引其外權則何為不成也於是乎外夫人而危太子女有寵隆又挾大臣之助故夫人被外太子見危兵亂內作以召外冦此危君之徵也是故有道之君上有五官以牧其民則衆不敢踰軌而行矣下有五橫以揆其官則有司不敢離法而使矣橫謂糾察之官得入人罪者也五官各有其橫曰五橫也朝有定度衡儀以尊主位衡正也衣服緷絻盡有法度緷絻古衮冕字則君體法而立矣體猶依也君據法而出令有司奉命而行事百姓順上而成俗著久而為常著明而且久積習而為常也犯俗離教者衆共姦之衆必離教為姦而罪之也則為上者佚矣天子出令於天下諸侯受令於天子大夫受令於君子受令於父母下聽其上弟聽於兄此至順矣衡石一稱斗斛一量丈尺一綧制所謂同律度量衡也綧古準字準節律度量也謂丈尺各有準限也戈兵一度書同名車同軌此至正也從順獨逆從正獨辟此猶夜有求而得火也姦偽之人無所伏矣衆皆從順而有獨逆者衆皆從正而有獨僻者必為順正者所發也此先王之所以一民心也是故天子有善讓德於天諸侯有善慶之於天子諸侯有善讓於天子而慶也大夫有善納之於君民有善本於父慶於長老此道法之所從來是治本也道法以讓為主是故嵗一言者君也謂正嵗之朝布政縣象績按一作王省惟嵗是也時省者相也月稽者官也務四支之力修耕農之業以待令者庶人也是故百姓量其力於父兄之間聽其言於君臣之義而官論其德能而待之謂百吏之官各論其德能以待君命績按此言庶人大夫比官中之事不言其外而相為常具以給之具謂衆官之法制也績按此言官相總要者相無常官所以總統百吏之官官謀士量實義美匡請所疑士事也官各謀其職事又當量實宜其有美善者用匡於所疑必陳而請之也績按此上言相而君發其明府之法瑞以稽之府謂百吏所居之官曹也立府必有明法故曰明府之法瑞君所與臣為信圭璧之屬也又必合其瑞以考之也立三階之上南面而受要君之路寢前有三階要為百吏之日也績按此以上言君明府之法瑞謂大吏既布憲入籍於太府者猶象魏所縣之法也稽考其合否瑞或疑端字誤是以上有餘日上唯受要故有餘日而官勝其任各理其職故能勝任時令不淫而百姓肅給言其敬而供上唯此上有法制下有分職也道者誠人之姓也非在人也姓生也言道立人之生人之所從出故非在人而聖王明君善知而道之者也道猶言也聖王善知道理故言而相教也是故治民有常道而生財有常法道也者萬物之要也為人君者執要而待之則下雖有姦偽之心不敢殺也不敢殺君也夫道者虛設道無形而善應故曰虛設其人在則通其人亡則塞者也非兹是無以理人非兹是無以生財前兹是謂是道民治財育其福歸於上是以知明君之重道法而輕其國也得遁之真以理身緒餘以理國家故重道輕國故君一國者其道君之也道可為君故君一國王天下者其道王之也道可王故王天下大王天下小君一國其道臨之也其道足以臨國與天下也是以其所欲者能得諸民君之所欲人則順之令得其所惡者能除諸民君之所惡亦順之而除也所欲者能得諸民故賢材遂所惡者能除諸民故姦偽省如冶之於金陶之於埴制在工也廢置之由君若金埴之由工也是故將與之惠厚不能供謂欲與人雖有惠厚之意財不能供績按此言留賞將殺之嚴威不能振謂欲殺人以致其理然而嚴威銷縮不能振起也績按此言留罰嚴威不能振惠厚不能供聲實有間也或有聲無實或有實無聲聲實間礙故不供不根也有善者不留其賞故民不私其利善必得賞私利何為有過者不宿其罰故民不疾其威宿猶停也罰得其過則人不疾其威疾怨也威罰之制無踰於民因人所欲罰而罰之故不踰於人也績按威當作賞注非則人歸親於上矣如天雨然澤下尺生上尺澤從上降潤有一尺則苗從下生上引一尺澤下降苗上引猶君恩下流人心上就也是以官人不官事人不事獨立而不稽者人主之位也君者與人之官而不自官授人之事而不自事獨立於無過之地臣下莫得而稽之如此者人主之位也先王之在天下也民比之神明之德先王善牧之於民者也夫民别而聽之則愚别而聽之則各信其一方暗莫之發故愚合而聽之則聖合而聽之則得失相輔可否相濟芻蕘之言賢聖不能易故聖也雖有湯武之德復合於市人之言是以明君順人心安情性而發於衆心之所聚聚謂所同歸湊也是以令出而不稽稽留也刑設而不用人不犯法故無所用刑先王善與民為一體以百姓心為心故言一體與民為一體則是以國守國以民守民也一國同一意萬人同一心然則民便不為非矣為非則失利故不便雖有明君百步之外聽而不聞耳聽有所極間之堵牆窺而不見也目視有所窮而名為明君者君善用其臣臣善納其忠也君能善用臣能善納則何聽而不聞何視而不見耳目不壅非明而何也信以繼信善以傳善君信而臣繼之君善而臣傳之是以四海之內可得而治是以明君之舉其下也盡知其短長知其所不能益若任之以事夫任人以事者必擇其可否君之舉臣亦猶是也賢人之臣其主也盡知短長與身力之所不至謂知君之短長及其身力所不至也若量能而授官夫授人官者亦擇其可否臣之擇事亦猶是也上以此畜下擇其可畜而畜之下以此事上擇其可事而事之也上下交期於正君有賢臣臣有令主欲求不正其可得乎則百姓男女皆與治焉君臣正則百姓無自為淫辟也管子補注卷十
