body:
  text: 管子補注卷十二明劉績撰侈靡第三十五績按此篇多錯簡脫誤不可讀短語九問曰古之時與今之時同乎曰同天地四時既無所易故曰同其人同乎不同乎曰不同古淳而今澆古質而今薄故不同也可與政誅言今雖不同古然可為政誅其不法以復古嚳堯之時混吾之美在下其道非獨出人也嚳帝嚳也言二帝之時比屋可封美俱在下其能若此亦言非有出人之道修古而已混同也山不童而用贍澤不弊而養足山無草木曰童弊竭也耕以自養以其餘應良天子故平以其自養之餘應天子之食故天下平有時而賦曰良也牛馬之牧不相及各自足則自不相及人民之俗不相知人至老死不相往來故不相知不出百里而來足行者不出百里而來者所求自足故也故卿而不理靜也雖得公卿之位不理其事故曰以人靜其獄一踦腓一踦屨而當死諸侯犯罪者令著一隻屨以恥之可以當死刑績按踦音竒物體不具今周公斷指滿稽斷首滿稽斷足滿稽而死民不服非人性也敝也今周公謂時所用法也稽考也罪滿而斷則從而考之首滿其罪者亦從而考而考之應斷足所罪滿者乂從而考之凡此欲以為慎審也罪定者死之然人尚不服其罪豈人性之然乎時爽故也地重人載毁敝而養不足事末作而民興之載生也今地利既重人之生植榖物吾乂從而毁奪弊盡之所以養不足人既惰於本業故競起而事末作是以下名而上實也謂下但有農作之名不得自用而實皆歸於上也聖人者省諸本而遊諸樂聖人為能察人之本遊之於富夀之域則嚳堯以前為然也大昏也博夜也夜謂暗昧之行也令人主至於大昏者則以博為夜事故也問曰興時化若何謂度時興化其理若何也莫善於侈靡侈靡謂珠玉者飢不可食寒不可衣然時共貴之君若不重則強者守之以招人故度時興化莫若重珠玉以為侈靡也賤有實敬無用則人可刑有實謂榖帛可貴而賤之無用謂珠玉可賤而敬之若此則人之賢不肖可刑也故賤粟米而如敬珠玉好禮樂而如賤事業本之始也言粟常人賤之賢者貴之如常人之敬珠玉末業常人貴之賢人賤之今則賢者之好禮樂如常人貴末業若此者可謂務本之始也矣珠者陰之陽也故勝火珠生於水而有光鑒故為陰之陽以向日則火烽故勝火玉者陰之陰也故勝水玉之生於山而藏於石故為隂之陰以向月則水流故勝水其化如神言珠玉能致水火故曰如神也故曰天子藏珠玉諸侯藏金石大夫蓄狗馬百姓藏布帛不然則強者能守之智者能牧之賤所貴而貴所賤粟米可貴而賤之珠玉可賤而貴之不然鰥寡獨老不與得焉均之始也君不貴而藏之則利積於強智雖務鰥寡獨老無所與之今藏之者所以賑貧乏故為均之始也政與教孰急政者立法以齊物教者調誘以感心用二者何先也管子曰夫政教相似而殊方若夫教者摽然若秋雲之逺動人心之悲摽髙舉貌秋雲凄慘有愁悴之容髙置且逺能生人之悲心喻教者憂人之不令見其戚容人亦為之傷悼之藹然若夏之靜雲乃及人之體􅀈然若謞之靜藹油潤貌􅀈然和順貌夏雲之起油然含潤將降其澤及人之體去除熱氣而和順雖有謞躁之人亦皆恬靜喻教者灑之溫辭而強梁者亦能感服之動人意以怨蕩蕩若流水教者若秋雲之動人意人意既動則自怨而蕩搖自怨而蕩搖則從教若流水也使人思之人所生往教之始也身必備之教者若夏雲之順適能使人思之人既思之則生其善心教人之始必備此二者然後可也辟之若秋雲之始見賢者不肖者化焉教者既若秋雲始見而哀憐之又若夏雲之起而潤澤之則天下之賢與不肖無不化也敬而待之愛而使之若樊神山祭之既從聖化人則敬而來待愛而後使尊衛其君若樊落神山設祭而祈福者也賢者少不肖者多使其賢不肖惡得不化賢與不肖皆教而使之則不得不化也今夫政則少則即皆從教則人無所犯故於為政少用為則也若夫成形之徴者也去則少人使可乎欲成太平之形以知其徴驗者全能去則而使之斯太平之先兆也用貧與富何如而可問貧富之中適曰甚富不可使甚富則驕故不可使甚貧不知恥甚貧則濫故不知恥水平而不流無源則遫竭水平不流謂停水也停水無源必速竭雲平而雨不甚無委雲雨則遫已平雲少雨乂無委雲以助之其雨必遫已上二事為下有比例政平而無威則不行此則為政者威以為本也愛而無親則流但行泛愛無所偏親則其愛流漫賢智不盡親力左有用無用則辟之若相為有兆怨雖曰當有所親而用親之理僻左則有為用者不為用者譬猶言有中不中此但為怨兆而已親之無益也上短下長無度而用則危本不稱或復上得短而下持長其役用之不以度如此者或能懷怨以敗國故曰危本不稱也而祀談次祖犯詛渝盟傷言談延也國敗絶祀之事延及次祖更有犯詛渝盟傷言之罪敬祖禰尊始也祖禰人之始也齊約之信論行也詛盟欲為整齊要束之信所以論行也尊天地之理所以論威也天地以秋冬肅殺雷震電耀為威為政者所取則故威不可弛之也薄德之君之府囊也凡尊始論行論威為政者所當行德薄之君皆囊而藏之故有敗亡之禍必因成形而論於人此政行也可以王乎必因王事之成形論考於人事此為政所行也遵而勿失故可以王也請問用之若何問用政何如也必辨於天地之道然後功名可以殖天地有尊卑恩威之序故必明之然後可以立功名也辨於地利而民可富通於侈靡而士可戚戚親也貴珠玉以賞士故士可親也君親自好事謂好為政事也強以立斷強立其志以斷是非仁以好任所謂悅以使人人君夀以政年君以所夀考由為政以順年之四時令也百姓不天厲厲發疾也六畜遮育五榖遮熟遮猶兼也然後民力可得用人俱富而力全可用也鄰國之君俱不賢然後得王若俱賢則不可得而制難以王矣俱賢若何問之曰忽然易卿而移黜不肖立仁賢忽然易事而化去故而取新變而足以成名變革舊弊故成名承弊而民勸之承先代之弊而成能名故民勸勉之也慈種而民富慈愛以勉種故人富應言待感與物俱長應物而後言待感而後動所謂應天順人者也故與物俱長也故日月之明所謂與日月齊其明應風雨而種風雨應時則以君禮不失故也天之所覆地之所載斯民之良也君人者德包天地首出庶物有生莫能踰故曰人之良不有而醜天地非天子之事也不有上事而又醜惡天地之化此非天子之事民變而不能變是棁之傅革棁柱也革皮也棁之附革則外革而內不革也令人變而君不能變亦外革而內不革之類故取喻焉有革而不能革不可服可革而不革則人有輕君之心故不服也民死信人無信不立故死在信也諸侯死化變通之以盡利不化則利竭故死績按别本注德化可以服人則必死於化矣請問諸侯之化弊弊謂久行而無益者弊也者家也言國之弊則以家習不革家也者以因人之所重而行之非人所重則當革也吾君長來獵君長虎豹之皮君好虎豹皮故來獵用功力之君上金玉幣君上用金玉為幣故用功力也好戰之君上甲兵甲兵之本必先於田宅有田宅然後可以充兵甲之賦今吾君戰則請行民之所重飲食者也侈樂者也民之所願也足其所欲贍其所願則能用之耳君之於人必足欲贍願然後可用也今使衣皮而冠角食野草飲野水孰能用之言士既乏於衣食則君之不能用也傷心者不可以致功謂富者奢靡而有餘貧者窘卒而不足則傷心矣傷則無聊而茍且故不能致功故嘗至味而罷至樂謂富者先奏至樂及味至食而罷之績按别本注罷至樂謂耳倦絲竹也而雕卵然後瀹之雕撩然後爨之皆富者所為也撩薪也丹砂之穴不塞則商賈不處趨丹穴而求利故不處也富者靡之貧者為之富者所以得成此侈靡則兼並貧者而為之也此百姓之怠生百振而食非獨自為也百姓既為富者所兼則怠於作葉故能生此富者之靡富者之所以能成此侈靡亦以百姓振起之故也豈富者能自為乎為之蓄化用今欲為此畜貧富之良法當變化富者之用也其臣者豫而奪之謂臣富者今欲化之使貧或先少與而後多奪之也使而輟之使之多使費用然後成其功也徒以而富之或空言與利而令得富且取其物終之也父繫而伏之或加父罪而繫之子必贖父也豫虛爵而驕之或空與爵名而無其位以驕此人令有所貴用也收其春秋之時而消之富者先貯物以射春秋之利今則官自收而消也有雜禮我而居之或有費用財物雜禮於我若此者順其意而居之時舉其強者以譽之富而又強則為之作聲譽或令有所統率強而可使服事服行也強者服事事必成也辨以辨辭其有辨明者則令辨繁辭智以招請富而多智則使招來而請謁也亷以標人富而清亷則使為人標式堅強以乘六廣其德以輕上位君能堅意強力以乘上之六者可以廣其德又可以分其上之任故位輕者也不能使之而流徙此謂國亡之郤若不能使任上之六者乃流而移徙之斯亡國之郤也故法而守常謂古法得其制者則守常故不革也尊禮而變俗流遁之俗則當變之上信而賤文虛文而寡用故賤之好緣而好駔緣即捐也駔馬之壯健者怯惡者必亂故棄之喻姦人之雄亦亂國當絶之也此謂成國之法也為國者反民性然後可以與民戚戚親也反者𡨕也順其性欲必敗亡若能反之然後有成可與之親之也民欲佚而教以勞勞致於耕鑿則有功民欲生而教以死死致於冦難則有功也勞教定而國富積財故也死教定而威行致死則莫能當其鋒故威行也聖人者隂陽之理言法隂陽之理故平外而險中此則含隂於內發陽於外也故信其情者傷其神美其質者傷其文情盛則神滅也化之美者應其名實應其名故化美也變其美者應其時事應其時故變美也不能兆其端者災及之來事之端不知其兆者常失於幾故災及之也故緣地之利緣順也承從天之指指意也當承順天之意也辱舉其死辱猶逆也逆天地以舉事則死也開國閉辱若能開國以納善言則辱可閉也知其緣地之利者所以參天地之吉綱也知能順地之利則能參天地之吉綱承從天之指者動必明辱舉其死者與其失人同逆天舉事故與失人同也公事則道必行公事則無擁故其道必行也開其國者玩之以善言有善言可玩故開國以納之也奈其斝辱亦既有辱當奈之何唯有報斝爵祭神以謝過耳知神次者操犧牲與其圭璧以執其斝當令巫祝知神之次秩者操牲及圭璧執斝爵以禱神而謝逆舉之罪也家小害以小勝大祭祀之費家雖有小損因此小損以勝大災員其中辰其外既以謝過又當員中心無所專固有善則從無失外事之時也辰時也而復畏強長其虛其有強大於已者則當長其謙虛之心而敬畏之也而物正以視其中情其於物也雖有外正猶未可信又當視其中情以驗之也公曰國門則塞百姓誰敢敖胡以備之謂冦有至國門以塞百姓警衛而誰敢傲者事主於如此何救而可也擇天下之所宥謂不為天下之所疾者擇鬼之所當謂為神所福助者也擇人天之所戴謂為人所戴仰也而亟付其身此所以安之也得此三德之人付其身而任之雖有冦賊無若我何故安也強與短而立齊國之若何謂冦賊既持強弓又執短兵列陳而立以攻齊國若之何禦之此亦公問之辭髙豫之名而舉之髙舉其名則歡悅也重豫之官而危之與之重官則不避危亡也因責其能以隨之猶傶則踈之毋使人圖之責知其能隨而任之則自課厲而無所顧望使人圖之為戚猶踈也績按傶韻書當足恐當作戚字誤猶踈則數毋使人曲之因不寵任而踈己者則數加恩意以悅之無使人見怨隂謀曲求己隙者也此所以為之也撫人若此可以禦止強與短兵之冦也大有臣甚大將反為害謂大臣富既有臣且甚大甚大則逼君故將反為害吾欲優患除害將小能察大為之奈何言我且欲寬優此患漸除其害每見其小能則察知其大欲為此事如何亦公之問辭也潭根之毋伐潭深也此以大樹喻惡也譬若大樹深根不可伐大臣根黨盤亦未可卒誅固事之毋入既未能誅且固事之無得入同其惡也深􅀢之毋涸􅀢謂探其深情常令見之無使涸竭也不儀之毋助儀善也彼為不善毋得助佐之也章明之母滅當發人不善令人皆知之無使昧滅也生榮之毋失謂生篡殺之心若草木之生榮此其可誅之時必不得失之十言者不勝此一謂今他事有十言之善不如此一言也雖凶必吉忍而容之屈而事之凶也惡稔易誅吉也故平以滿無事而總以待有事而為之若何若總謂收積也故使國家從故平安之時滿積其財以無事之時收積至時散其積而用也積者立餘績按餘一作為食而侈美車馬而馳多酒醴而靡積謂富而積財者富而侈食美車多醴財有所散因其散以收之千嵗毋出食此謂本事雖復千嵗常令自食其財無使他外則富者之財可得而收之此積之本縣人有主縣謂繫屬也言欲繫屬於人必有所主主於財人此治用官既積財人則於官取之以理其器用也然而不治積之市謂不取官財以理其用翻乃積之於市使髙價得其利也一人積之下一人積之上此謂利無常財既入市則公私共積之上雖積一分下亦積一分上可謂利無常也百姓無寶以利為首百姓無他寶惟以利為寶之首一上一下惟利所趨積利多者百姓則從而歸之也利然後能通通然後成國無利而不通則國亡也利靜而不化觀其所出從而移之利而不化者則由所出不變故也觀而移變之視其不可使因以為民等等謂率而齊之不可使謂其人非有文武之材又不任作役若此者使之率興利之人而齊之也擇其好名因使長民其有好虛譽之名者則擇之使為興利者之長績按别本注好名之人必盡知竭能以干虛譽故使為民之長也好而不已是以為紀好名不已財乃彌積故為國紀功未成者不可以獨名積財之功未成則無獨與之名也事未道者不可以言名成功然後可以獨名衆共言此人有名績按别本注獨擅名譽事道然後可以言名然后可以承致酢既有獨名乂有言名然后可以致於承君之酢報也先其士者之為自犯人有士行當推以為先今反自先之是謂自犯其過也後其民者之為自贍人能興利亦當先之充國今乃後之是自為其贍不憂國也輕國位者國必敗輕國位則有散居之心故國敗也踈貴戚者謀將泄踈貴戚則有外顧之意故謀泄毋事異國之人是為失經異國之人所謂非我族類者也今而任之其心異此謂失國之經也毋數變易是為敗成數變易則事繁而無功故曰敗成大臣得罪勿出封外是為漏情毋數據大臣之家而飲酒是為使國大消飲酒於臣家則威權移焉物不兩盛故臣強則國消也三堯在臧於縣返於連比若是者必從是櫑亡乎雖使三堯在臧但懸其物而不散施之終亦不能守其物亡必不返於連比之臣臣既得之自用樹福則國從是􅪖敗而亡乎即字也辟之若尊談未勝其本亡流而下談延也雖堯守臧不施必亡尤如尊位將反而未能勝其本此位既不可得自然流而下也不平令茍下不治凡治理下者必先能平令令既不平令雖下而不理也髙下者不足以相待自處其髙欲下待上必不待之也此謂殺事立而壞何也兵遠而畏何也此謂弒君之事其事既立而後壞如此者何也即以德不素積故也民已聚而散何也人不歸無道故也輟安而危何也神不佑故也皆謂篡弒功成而不信者殆兵強而無義者殘不謹於附近而欲來遠者兵不信欲來逺者必謹於附近然後逺人來信也略近臣合於其逺者立略禮謂不繁也言於近則略之於逺則合之若此者則可以立功績按據文當作事立而壞亡國之起毁國之族則兵遠而不畏先有踈國之宗族漸以至三者若此則兵皆逃遠無兵則威息故不畏也績按别本注宗族國之藩屏若毁之則國弱兵冦遠而不畏也國小而修大仁而不利猶有爭名者纍哉是也不量國之小好修逺大雖復行仁不遇其利而猶與他國爭名是必自纍者也樂聚之力以兼人之強以待其害雖聚必散好自勉以聚人力欲兼他人之強用此以禦危害如是者先雖聚後必散也太王不恃衆而自恃百姓自聚供而後利之成而無害太王亶父為狄所攻乃去幽之岐杖䇿而往百姓曰仁君也不可失扶老攜幼而從之一年成邑二年成都三年五倍其初言大王雖有衆不恃但自恃其德故百姓隨而聚之供其所須而利之遂至於成功而無危害者也踈戚而好外企以仁而謀泄賤寡而好大此所以危言自己親好交外人雖企慕於仁而所謀多有泄漏既賤且寡好為迂大凡皆危敗之道也衆而約謂與衆為約束也實取而言讓謂實取於民而言遜讓行隂而言陽於行實為隂蜜在言更成顯陽利人之有禍謂因禍而生利言人之無患人雖實禍於言乃為無患吾欲獨有是若何凡此獨君之事也問獨有之何如自衆而約以下皆公問之辭也是故之時陳財之道可以行今也利散而民察必放之然後行管氏言此乃古之陳設致財之道亦可行求於今然利散於下人則察而知之置之於身勿令下知然後可以行放置之言也公曰謂何問所以行之長喪以毁其時毀黯也居喪者毁厝之息謂增長叛居喪之禮使人皆毁黯之敗也重送葬以起身財重送葬則費用廣驕慢則不及事由人習為精厲無事不怠故能起身之財也一親往一親來所以合親謂一親往死一親來生親無絶時故曰合親此謂衆約人皆親教之重葬可以起財故曰衆要之也問用之若何問用衆要巨瘞堷所以使貧民也瘞堷謂壙中埋藏處深堷也貧人雖無財而有力故教之巨瘞堷以役其力也美壟墓所以文明也壟墓髙美文明而不滅也巨槨棺所以起木工也人習為棺槨則增長木之工多衣衾所以起女工習為衣衾則增長女工也猶不盡故有次浮也謂上之禮猶有不盡也次浮謂棺槨壟墓之外逰飾也有差樊樊蕃也謂壟墓之外樹以蕃其制尊卑之差此壟墓之次浮也有瘞藏謂古之瘞藏或以藏金玉器物之類此棺槨之次浮也作次相食然後民相利守戰之備合矣方喪之時孝子荒迷或不舉火鄰里為食以相飼如此此則人遞相衛親恩情結固至於守戰之時必誠力齊敵而不能當之矣鄉殊俗國異禮則民不流矣流移也俗禮殊異則人各得其所安故不流也不同法則民不困鄉丘老不通覩誅流散則人不眺丘大也大老者各足於其所不相交通流散於其鄉則誅之今其覩如此則人安其本不眺望他所而歸之安鄉樂宅享祭而謳吟稱號者皆誅所以留民俗也皆令安樂鄉宅享祭先祖其有謳吟思於他所者則誅之或有稱舉號吟於他所鄉者皆誅之凡此所以留止人俗不令轉移也斷方井田之數謂分人之地每斷定其方而立之田數屋三為井也乘馬甸之衆每一甸之衆數賦長轂一乘馬四匹謂之乘馬十六井曰丘四丘為甸制之陵溪立鬼神而謹祭每大陵深溪皆有靈焉立鬼神之祠使人有禱祈而致祭也皆以能别以為食數示重本也人之大小各有材能多者食多能少者食寡故曰以能别為食數凡此皆重人本之事者也故地廣千里者祿重而祭尊其無餘言不修祭以餘地與飼也地與他若一者從而艾之從謂次受封者艾謂減削也言修祭之君受地與他同故曰若一者則減削其地與次受封之君也君始者謂始為君者也艾若一者從于殺與于殺若一者言始受封之君本既無地故取先受君者彼或不與從而殺之彼或自取與受而殺之彼自與于始封者令與先受封者地均若一也從者艾艾若一者從于殺與于殺若一者從無封始王事者上王者言從者先無封令始王事故艾取他國之地與先者均齊若一則止也上事霸者生功言重本言諸侯既受地分則上事霸王隨政命以生立其功凡此皆為重本也是為十禺分免而不爭言先人而自後也禺猶區也十區謂十里之地每里為一禺故曰十禺若他國來分明勸勉而與之不敢交爭如此者所以先陳他人自取其後也官禮之司每言國官禮各有私昭穆之離離謂次位之别也先後功器事之治功有大小器有精粗各定其先後之差也尊鬼而守尊鬼謂謹其享祭之禮也故戰事之任髙功而下死本事戰士雖有髙下之殊各令死其本事也食功而省利勸臣飼其有功省其無功則臣勸也上義而不能與小利上當操大義而主斷不可顧小利而移也五官者人爭其職然後君聞官爭理職則國治故君名聞於天下祭之時上賢者也謂助祭之時賢者居上為儀而已非能有所益故君臣掌祭者掌禮以行事所用其智謀或君有故使臣攝之事亦無曠故曰君臣掌也君臣掌則上下均臣能行君事故上下均也此知上賢無益也其亡兹適祭祀之時非不上賢但庸臣亦能行君之事無損於令主人雖云上賢而不用其智謀與祭時適故曰無益既不賢則動皆違理故兹適於危也上賢者亡謂空上之而已不能用之也而役賢者昌用賢其功成故國昌上義以禁暴義者所以除去不宜故禁暴也尊祖以敬祖祖始也尊立祖廟所以敬始封之君也聚宗以朝殺示不輕為主也謂聚會也小之封宗以朝於君而有親踈之殺凡此為主之重者也載祭明置載行也言將為行祭至明而置之欲人不知也績按此以下至雖在聖人惡用之皆錯簡也髙子聞之以告中寢諸子髙子齊大夫聞君之將行故告中寢諸子諸侯諸子之居中寢者中寢諸子告寡人舍朝不鼎饋常禮退朝常鼎饋而食今不然故致怪之也中寢諸子告宫中女子曰公將有行故不送公言何故不送公也公言無行女安聞之曰聞之中寢諸子索中寢諸子而問之寡人無行女安聞之吾聞之先人諸侯舍於朝曰不鼎饋者非有外事必有內憂公曰吾不欲與汝及若若不欲與汝論此言也女言至焉不得毋與女及若言至謂盡理也吾欲致諸侯諸侯不至若何哉女子不辨於致諸侯婦人無預於外事故不明於致諸侯之理自吾不為汙殺之事人布織不可得而衣汙殺言為人必有所汙殺染戮者所以服逺而來近今既為人雖織不得已用故有布不得而衣言此者欲桓公立威以伏其諸侯也績按汙殺之事人猶言屈已下人也餘注見前戒篇雖有聖人惡用之言不下人則諸侯不至雖聖人亦無用也故雖有聖人惡用之服者寡也民不用威聖人亦何能用之堯為匹夫不能服三家即其事也能摩故道新道定國家然後化時乎摩謂新其事也故道謂先王之典則新道謂度時而制法言能摩故道以成新道定國安家然後可以化時也國貧而鄙富苴美於朝市國言朝國貧而邉鄙富饒若此者邉鄙之邑必苞苴財貨好遺朝以市權利也國富而鄙貧莫盡如市國富財故富鄙輸貨故貧其取富平反也其物莫知盡入於市以市人不虛取故鄙人不虛與故也市也者勸也勸者所以起本善農者能多致市利則自勸而不怠故能起本也善而末事起不侈本事不得立侈謂饒多也末事不饒多農事不給故本事不得立矣選賢舉能不可得惡得伐不服用欲伐不服用必待賢能百夫無長不可臨也若無賢雖百夫之長無人為之千乘有道不可修也雖千乘之國有道以用之則不可修營而伐之也夫紂在上惡得伐不得紂在上位萬人讎之鬼神怒之雖其旅若林莫不倒戈自伐故無有伐而不得者也鈞則戰守則攻言伐者力鈞則與之野戰城守則圍而攻之百蓋無築千聚無社謂之陋一舉而取天下有事之時也言紂人茍且雖有聚之夫不立一社以統之如此者為政之陋也故武王一舉取天下而有之此萬代一時之事也萬諸侯鈞萬民無聽雖使萬諸侯鈞引於人人必不聽此言王者貴上位不能為功更制其能王乎居上位不獨立其功不更共制之若此者必不能王也緣故修法以政治道則約殺子吾君故取夷吾謂替子君之子也其能緣順故常修理法制為政不違於道若此者可共謀要殺君子之不當獨立者吾君所以取夷吾為替者為有此道也公曰何若明何以獨取夷吾也對曰以同以其德智同故取也其日久臨可立而待鬼神不明謂君子之不當立者雖久臨其位危亡可立而待其享祭鬼神之禮又不能明也囊􅐤之食無報明厚德也此論桓公之隱雖以囊􅐤之食遺人不求其報所以明厚德也沈浮示輕財也其散施於人不顧其沈所以示輕財也不得其報曰沈得報曰浮或曰祭川曰浮沈先立象而定期則民從之先立法象與人定期人則率服皆順從也故為禱謂先人禱神祈福樣朝縷綿明輕財而重名縷帛也言每於朝置縷綿以賞賜所明者輕財而重名也公曰同臨所謂同者其以先後智渝者也所謂臣德同君者能先後於君其遇危難則智謀變而通之詩所謂豫曰有先後是也鈞同財爭依則説假令財與人鈞同人則悅而爭依於已十則從服若財十倍多彼則服而從之也萬則化成功而不能識若財萬倍多彼則變化而無不如意故可以成功而觀者莫能識之而民期然後成形而更名則臨矣人心期以為主相與樂推然後成形於以名前所服之人則臨之以為君請問為邊若何問所以防御邊境對曰夫邊日變不可以常知觀也邊者兩國交爭冦狄伺郤日有變當應機而動故不可以常智觀也民未始變而是變是為自亂未變者應機未發且當循常而伺之令人未當變而輒為變此謂先時也更益其亂故曰是為自亂也請問諸邊而參其亂任之以事而因其謀諸邊則四邊也謂參驗知其委變之亂然後以事任之因其所謀而用之此已上公問之辭也方百里之地樹表相望者丈夫走禍婦人備食謂百里之國自國都至邊境每於髙顯之處樹立其表使遞相望其有冦賊之禍丈夫則走而奔命婦人則備食以餽之也內外相備外拒冦以防內內備食以給其外故曰相備也春秋一日敗事曰千金稱本而動春秋種穫尤為農要此二時而有戰敗但經一日敗費千金故為國者必當稱本而動也候人不可重也唯交於上能必於邊之辭候人謂謁候之來入國者候人入國或伺我虛實覘我動靜不可使重之唯有能與上交必定邊境之辭至當不易者其可重也行人可不有私不有私所以為內因也行人使人也若何而可唯不有私耳無私則意成故能為國內成事也使能者有主矣而內事使人出境必有所主其所主者欲成內國之事也萬世之國必有萬世之寶無萬世之寶不能成萬世之國也必因天地之道天地之道順以動者也無使其內使其外應內而外失外情也使其小毋使其大棄其國寶應小而失大事之宜大臣國之寶也今非理使之故曰棄國寶也使其大貴一與而聖稱其寶使其小可以為道謂使其大臣當尊之一與其事必無轉移如此則舉輒有成能立聖人之功謂稱其寶矣能則專專則佚使得其能於事必專専則成功故佚樂也椽能踰則椽於踰椽猶梯也謂鑿椽以為梯凡欲蹈越髙遠必因梯而後能若不因梯直欲踰之則不能踰矣然則踰因梯而踰矣此喻成功必有良臣賢佐然後事遂而名立之矣能宫則不守而不散宫謂防禦之國四國也能有四國之宫則不有冦難若無宫直欲守之其衆必散也衆能伯不然將見對伯長也謂材能之士衆必能為之長若不能長之豪傑之士將來對己以兩雄兩雄角之道也君子者勉於糾人者也君子者德民之稱故但糾察人不為人所糾非見糾者也故輕者輕重者重前後不慈輕謂臣也重謂君也凡君臣所以能相慈者輕能事重重能制輕然後慈惠之心油然生矣今輕自在輕重自在重或前或後不相交接否之謂也何慈之有乎凡輕者操實也臣須君食故必操君實也以輕則可使輕而操實則可使也重不可起輕雖重無實則輕不可起用輕重有齊重以為國重者不限則以為國輕以為死以道使輕可以致死毋全祿貧國而用不足欲全其祿不以與下則賢去而人散故國逾貧而用逾不足也毋全賞好德惡亡使常雖曰好德全賞而不與雖曰惡亡所使者乃常人若此者敗亡之道請問先合於天下而無私怨謂與天下合同人皆樂推故無私怨也犯強而無私害雖犯於強乃以公義故無私害謂責楚苞茅之比也為之若何對曰國雖強令必忠以義令忠以義雖強必得之也國雖弱令必敬以哀令敬以哀雖弱必免也強弱不犯則人欲聽矣犯雖輕弱則人違之先人而自後而無以為人也先人自後大國禮之何人之為也加功於人而勿得施功而不求於報也所橐者逺矣橐貨而匱民者當逺之也所爭者外矣交爭無禮者當遣之外也明無私交則無內怨私交則不公而偏故內怨起之與大則勝能親與大國故得勝私交衆則怨殺夷吾也使君私交者夷吾之由故恐衆怨而殺之如以豫人財者不如無奪時如以豫人食者不如無奪其事不奪其事則各安其業食無不足也此謂無外內之患事故也財食足則外內之患亡也君臣之際也君臣非有骨肉之親但以禮義相接也禮義者人君之神也禮義在則君尊臣卑萬人以寧故曰神且君臣之屬也以義相屬親戚之愛性也相親相愛性也使君親之察同索屬故也索求也君親於臣子同氺其愛敬矣故事也臣雖屬君當以事親之故事君使人君不安者屬際也使君不安其位者則臣但以義際君無愛敬故也不可不謹也臣無愛敬或化為仇故不可不謹之也賢不可威威賢則邦國殄瘁能不可留材能當引用之不可留之於彼身杜事之於前易也水鼎之汨也姦罔之事先其未然而杜塞之則甚易猶水之在鼎以烹之食事亦不擾也人聚之壤地之美也由壤地美故人聚之也人死之若江湖之大也人所以為君致死者由君量若江湖水之大無不容納故也求珠貝者不令也君之於人有所簡擇若求珠貝之為人必去而不令之逐神而逺熱交觶者不處兄遺利君之於人也使敬之若逐神畏之若逺熱其逐神者交觶祭祀不敢留處其逺熱者雖有兄弟之親亦遺利而去君之尊嚴莫與大誰敢窺覦之哉績按兄古况字夫事左謂人君行事不得正中國之人觀危國過君而弋其能者豈不幾於危社主哉中國謂得禮義之中國也弋取也中國之人見危國過君不能用賢道為己用如此則過君之社主近於危也利不可法故民流神不可法故事之神亦不得其法不知神之所在故畏敬事之所謂隂陽不測者也天地不可留故動化故從新天施地化日夜不息故能生成不已以天地變化不可留停故動化其故以就其新然亦循故之四時周而復始無所易之也績按别本注天地變化生成不息不可留停云是故得天者髙而不崩謂得天變化日新之理故得常保其尊髙而不崩壞也得人者卑不可勝得人則衆歸之故雖卑不可勝是故聖人重之謂重天也人君重之謂重君也故至貞生至信至貞正也謂正心生則至信生而應之也言往至絞生絞謂急言私已今空以言往而無其實則至絞已言生而應至自有道正生則信至言往則絞來皆有因而然故曰至自有道也不務以文勝情以文勝情情彌虛也不務以多勝少少是能正衆非故多不能勝之不動則望有牆君子儼然不動則望者如牆焉旬身行旬均也君子身行必令均平正直法制度量王者典器也理國之常器也執故義道畏變也君人執守故義以尊於道者畏輕躁之人妄有所變也天地若大神之動化變者也天地之極也若能祀神而動變化流弊天地之極理善莫大焉能與化起而王用則不可以道山也若能隨神化而起王者有天下其所運用則不可以常道格之其富饒取類於山也仁者善用智者善用非其人則與神往矣非其人尚能用之則明無不用如此者可謂通靈合契與神往來也衣食之於人也不可以一違日也一日違衣食生理或幾乎不全也親戚可以時大也謂時大聚會之以結其恩意是故聖人萬民艱處而立焉人者難靜而易擾故聖人處立其上常有戰競之心畏難之也人死則易云死者無所為不憂其為亂故易云也績按云旋而歸之也詩婚姻孔云生則難合也生者有利之心合而無防合生姦謀故難合也故一為賞再為常三為固然謂一時行其賜人則欣賴以謂為賞頻再為之則人以為常至此時必當有賞頻三為之則以為理固當然無懷愧之心其小行之則俗也若小行其賞則人習之以為俗無過厚之恩也久之則禮義久而一行厚賞則人荷德而懷恩此禮義之正者也故無使下當上行之無使下人每至時承當君上必行之賞也然後移商人於國非用人也下既不希上賞則專意於市故商人皆移來於國也不擇鄉而處不擇利而使商人常隨利往來故不擇鄉又不擇利出則從利入則不守商人出國惟從利焉其入國遇冦難則恇怯而茍且不為君城守也國之山林也則而利之商人雖不為國用亦有利於國猶山林也隨取而得其利焉則當容受而取其利也市塵之所及二依其本市則衆聚喧囂尤多塵埃今使工商二族依之以為本此亦處物之宜也故上侈而下靡得商賈之利故上侈下靡而君臣相上下得商賈之用故衣之章著上下之儀相親則君臣之財不私藏相親則情公故不私藏財然則貪動枳而得食矣枳棘者所以擁塞也農人貪商賈而動者則多擁塞其幸者但得貪食而已無餘利也徙邑移市亦為數一其有田邑之人今移於市此亦為費數而得一耳也問曰多賢可云問多賢之理可言不對曰魚鱉之不食咡者不出其淵樹木之勝霜雪者不聽於天霜雪不能殺是不聽於天也士能自治者不從聖人能自理者則有餘不從聖人而求之也豈云哉能自理則雖聖人不能致自此之外何可云者也夷吾之聞之也不欲強能材能之士心不慕已勿強引之也不服智而不牧士之材智上不服則勿養之若旬虛期於月津若出於一明然則可以虛矣匝一月曰期津明潤貌君人之道當若每旬之虛而任數自期以來日既至津然後出一明矣如此虛而任數理足自明人但虛懷接物賢才自至亦猶是也故厄其道而薄其所豫則士云矣士之道藝則能厄而服之至人所與則薄而少之如此則必自來其理可言也不擇人而取之謂之好利遇人則與無所簡擇可謂多所愛所愛多不當審此兩者以為處行則云矣兩者謂不擇取與不擇而取寧不取而與用此以為處身之行則其理可云矣不方之政不可以為國不方之政謂邪也曲靜之言不可以為道靜謀也節時於政與時往矣凡為節度當合於時所施政教與時俱往不動以為道齊以為行守正不動以為道齊整肅然以此為行也避世之道不可以進取茍避世則晦明藏用若無所能故不可進取陽者進謀幾者應感顯明其事者欲進而為謀幾理之動唯應所感也再殺則齊一殺尚有參差必再殺然後可齊文王再駕伐崇武王再伐紂也然後運可請也既齊則天下服故請問歷數之運將陟帝位也陽者進謀已下公問之辭也對曰夫運謀者天地之虛滿也合離也言歷運之謀崇替相因若天地之有滿虛合離乃理之不可已者已春夏為合秋冬為虛春秋冬夏之勝也若無春秋冬夏之變則不能相勝而成嵗有道之伐無道亦猶是也然有知強弱之所尤然後應諸侯取交尤殊絶也謂應運而王者必有智而強殊絶於衆然後應諸侯可以取天下之交故知安危國之所存以時事天以天事神謂以神禮事也以神事鬼謂依時而享鬼也故國無罪而君夀而民不殺智運謀而雜櫜刃焉雖用智謀亦須威以成之故曰雜櫜韜也其滿為感感則物應故滿也其虛為亡亡則物散故虛也滿虛之合有時而為實滿時為實也時而為動虛時為動散也地陽時貸地在陽時假貸萬物精氣以長養也其冬厚則夏熱其陽厚則隂寒厚謂過於寒熱冬有極寒夏有極熱夏有極熱冬有極寒是故王者謹於日至謂冬夏至也當知二至之寒熱故知虛滿之所在以為政令知其寒熱之虛為時令以順之已殺生其合而未散可以決事時冬時既有肅殺其萌芽內發欲生也然其時方寒合而未有時可以決斷罰罪之事也將合可以禺其隨行以為兵禺謂事端初見也謂夏末初秋之時寒涼方至將凝合初見其禺隨此時而行可以為兵威也分其多少以為曲政兵之所由各有多少隨其多少委曲為政請問形有時而變乎謂嵗年吉凶之變可知對曰隂陽之分定則甘苦之草生也隂陽之分定於吉則甘草生薺是也定於凶則苦草生葶􅐗是也從其宜則酸醎和焉謂從四時之宜以酸醎之味和而食焉若春多酸冬多醎是也而形色定焉以為聲樂酸色青醎色黑青聲角黑聲羽皆定色而生聲夫隂陽進退滿虛亡時其散合可以視嵗惟聖人不為嵗言隂陽滿虛散合可視知嵗之豐荒也能知滿虛奪餘滿補不足聖人善識滿虛之所在故奪有餘者補於不足以通政事以贍民常或滿與虛萬人均平故能通達政事贍足於民使修常道地之變氣應其所出謂地見災變之氣應其所出之處設法以禳之水之變氣應之以精受之以豫水見災變之氣則當應之以精誠其祥不弭當受之者須預有所防備之也天之變氣應之以正天見災變之氣惟守正以應之也且夫天地精氣有五不必為沮謂五行之時也其時之氣不能必則為沮敗也其亟而反其重陔動毁之進退即此數之難得者也其為沮敗也或才有形而違反者或遲重滯凝久而不去者或發動而有所毁傷者或乍進乍退者凡此皆災敗之數難得而知之者也此形之時變也謂嵗年之形有變也沮平氣之陽若如辭靜言欲沮敗平和之陽氣默至而無形聲如辭言之靜者餘氣之潛然而動愛氣之潛然而哀胡得而治動災之餘氣潛然發動愛憐之氣已潛然而哀則氣候之動難知者也故曰胡得而治動自沮平已下公問之辭對曰得得之衰時位而觀之得其沮氣衰敗之時立分位而觀察之佁美然後有輝佁深思貌謂深得其美理然後情悅而貌輝然也修之心其殺以相待既知災氣之所召則修德於心以禳之其凶殺之至必有以待之也故有滿虛哀樂之氣也當察災而得禳或滿而樂或虛而哀也故書之帝八神農不與存為其無位不能相用問運之合滿安臧易之所存五帝謂伏羲神農黃帝堯舜書之所記三王夏殷周然於八帝之中神農所存事迹獨少則以不為位以觀災處氣又不用公問自今之後運之合滿何所藏隱可得知之者乎二十歲而可廣十二歲而聶廣百歲傷神管氏對曰從今之後二十嵗天下安寧禮義可廣又十二嵗代將亂而攝其廣又百嵗之後天下將分鬼神之祀絶矣周鄭之禮移矣禮移則俗變也則周律之廢矣周之法則壞矣則中國之草木有移於不通之野者時既戰爭廢於農事稼穡之地荆棘生焉故草之屬移變於不通之野然則人君聲服變矣聲謂樂聲衆亂則聲服俱變則臣有依駟之祿依稱也代衰則臣富故臣多養駟馬及其受祿又以稱之婦人為政鐡之重反旅金君幼則母后為政鐡者所以為兵器當重之謂下流卑識不重鐵反旅陳於金而玩之也而聲好下曲食好鹹苦謂聲之下而悲者食多鹹苦之味者婦人所好則人君日退亟既使婦人為政則百度昏君人之衰也日以亟矣則溪陵山谷之神之祭更應國之稱號亦更矣更改也國衰則神之祀改其所應祭國之稱號亦更矣市朝既變後聖既作故改其號國者也視之亦變目視而取節令旌麾之屬亦變矣觀之風氣古之祭有時而星或祭星以祈風氣之和者也有時而星熺熺星之明或有祭明星者有時而熰熰熱甚也或時旱熱而祭有時而胊朐逺也或逺而為來嵗祈福而祭之也鼠應廣之實隂陽之數也鼠憂也凡此皆君之憂人故廣為祈福而祭之調隂陽為物也華若落之名祭之號也言祭時為物作美號若花落之蒞物益其光輝也是故天子之為國圖具其樹物也管子補注卷十二
